rena inbox, AW mechanics, al.x structure, staff/security operations, or hidden house systems.\n\n## Close Orbit / Legacy Kids\n\nClose, useful, recurring peer anchors, but not Brain Trust unless Ryan says otherwise:\n\n- Olympia of Greece (also Almanach)\n- Princess Maria Carolina of Bourbon-Two Sicilies / MC (also Almanach)\n- Ryder Robinson\n- Iris Apatow\n- Nico Parker\n- Gracie Abrams\n- Leni Klum\n- Amelia Gray Hamlin\n- Gene Gallagher\n- Damian Hurley\n- Romeo Beckham\n- Moses Martin\n\nThese people sit naturally in Legacy, Summer House, London Lot, fashion/music/social overlap, or godfamily side channels depending on context. They are not added to Brain Trust by default.\n\nAt the 5 August Albury day, Brain Trust toured the house and stayed for dinner; by the 7 August live opening they are not in the Charles Street meeting unless Ryan places them.\n\n## The Almanach\n\nRoyals/aristocratic/princely-house peer circuit. Use real names only; do not invent Almanach members.\n\nSeed anchors:\n\n- Olympia of Greece\n- Princess Maria Carolina of Bourbon-Two Sicilies / MC\n- Princess Elisabeth of Belgium\n- Prince Christian of Denmark\n- Princess Alexandra of Hanover\n- Countess Olympia of Arco-Zinneberg\n\n40-80 members total; many lurkers. Dry, multilingual, protocol-joke register. Cousinage runs across Hessian, Greek, Bourbon-Two Sicilies, Hanover, Windsor, and Scandinavian lines.\n\n## Family / Godfamily Anchors\n\n| Person | Role |\n|---|---|\n| Rosie Walker | Alex's grandmother / Mama to Alex only |\n| Homer Wilson | Alex's grandfather / Papa to Alex only / Earl of Albury |\n| David Wilson | Alex's biological father / Viscount Wilson / sober, West Village / reconnected with Alex / still close with Chris Martin |\n| Sarah Dawson Wilson | Alex's biological mother / sober, Notting Hill / semi-regularly sees Alex / Stella-linked fashion sustainability |\n| Apple Martin | godfamily / oldest-friend peer |\n| Moses Martin | godfamily / friendly; Apple is much closer |\n| Stella McCartney's children | close through Sarah/Stella/family orbit; slightly younger, lower-publicity |\n| Donatella Versace's children | older-sister / older-cousin energy through Donatella; now approaching 40, not peer-room defaults |\n| Chris Martin | godfather |\n| Stella McCartney | godmother / Sarah's closest friend |\n| Kate Moss | Sarah-side fashion/social orbit |\n| Naomi Campbell | Sarah-side fashion/social orbit |\n| Sadie Frost | Sarah-side London/fashion/film orbit |\n| Sienna Miller | Sarah-side London/fashion/film orbit |\n| Donatella Versace | godmother; calls Alex Alessandro |\n| Prince William | godfather |\n| Catherine, Princess of Wales | godfamily / royal-family layer |\n| Gwyneth Paltrow | Apple/Moses's mother; family-circle adult |\n\n## Staff Anchors\n\n| Person | Role |\n|---|---|\n| Eleanor Vance | Walker Holdings CEO; AW Holdings board chair |\n| Catherine Aldridge | Managing Director, AW Holdings |\n| James Latham | Head of Serena Management |\n| Priya Chandra | Serena Management coordinator |\n| Oliver Wren | Serena Management analyst |\n| Daniel Sorensen | General Counsel |\n| Nadia Hassani | EA / access bridge |\n| Sophie Kalu | PA / logistics |\n| Kevin Marsh | Chief Protection Officer |\n| Judith Ansley | Head of AW Assets |\n| Miriam Santos | Property Coordinator |\n| Rafael Costa | Collections Registrar |\n| Mina Arendt | al.x Rights and Marks Manager |\n| Ottilie Marchant | Albury House Manager |\n\nNo active v20 staff are attached to removed investment/deal vehicles.\n\n## Routing Reminder\n\nSophie handles logistics, not press/legal. Latham handles career/media/commercial intake. Daniel handles legal. Nadia coordinates access. Kevin handles movement/security. Ottilie runs Albury House day-to-day. Catherine owns family-office governance. Eleanor owns Walker-level trust-critical judgment.\n\n## Chat / Social Pools\n\nUse `36_RELATIONSHIP_ROSTERS_FULL.md` for larger social rosters.\n\nNever use placeholder visible speakers such as \"Friend 1\" or \"Someone.\"\n"},{"file":"25_AW_HOLDINGS_FULL.md","content":"# AW Holdings Full Detail\n\nUse this file for Alex's lean family office, personal asset structure, Serena Management, al.x, and the bridge between Alex and Walker Holdings.\n\nFor Walker Holdings as the family enterprise, use `40_WALKER_HOLDINGS_FULL.md`.\n\n## Core Facts\n\n| Field | Canon |\n|---|---|\n| Entity | AW Holdings LLC |\n| Established | 22 June 2003, the day Alex was born |\n| Original status | receiving / holding vehicle for Alex's inheritance and Walker stake |\n| Owner | Alex Wilson |\n| Story-open value | about $1.75-1.85B |\n| Managing Director | Catherine Aldridge |\n| Board Chair | Eleanor Vance |\n| HQ | 12 Charles Street, Mayfair, London W1J |\n| Function | lean family office: locked Walker equity, property/assets, Serena Management, al.x |\n\nAW Holdings is not public-facing. It has no brand personality, no website in the story, and no emotional family voice.\n\nThe money structure remains real and specific. The scale-back removes named investment adventures and acquisition plotlines; it does not make Alex's wealth abstract.\n\nDo not write Alex as having $1.75-1.85B sitting in cash. The headline number is net-worth / asset-structure shorthand. The largest single component is the locked 4% non-voting Walker Holdings stake, which is untouchable in ordinary life.\n\n## Operating Structure\n\n```text\nAW Holdings LLC (parent — Alex sole owner)\n├── AW Investments (internal division — locked Walker stake + conservative portfolio)\n├── AW Assets LLC (properties + registered collections)\n├── Serena Management LLC (career, commercial, media, inbound)\n└── al.x LLC (rights layer: image/name/likeness/marks)\n    └── al.x Music LLC (Electric Ivory recorded/visual/publishing rights)\n```\n\n| Entity | Status | Function |\n|---|---|---|\n| AW Holdings LLC | parent | umbrella entity wholly owned by Alex |\n| AW Investments | internal division | locked 4% non-voting Walker Holdings Class B, conservative liquidity, no story-driving deal flow |\n| AW Assets LLC | wholly owned subsidiary | Albury House, Villa Serena, Appartement Varenne, Casa Borgonuovo, 12 Charles Street, registered collections |\n| Serena Management LLC | wholly owned subsidiary | career, commercial, media management, inbound triage, representation readiness |\n| al.x LLC | wholly owned subsidiary | image rights, name rights, likeness rights, personal marks; parent rights layer for al.x Music |\n| al.x Music LLC | subsidiary under al.x LLC | Electric Ivory recorded rights, visual/film rights, and publishing administration for Alex's improvisations, remakes, reconstructions, transcriptions, and arrangements |\n\nNo active v20 plot should turn AW Holdings into a venture fund, acquisition machine, or portfolio-builder. It exists so Alex can live, own, protect, and choose career moves without being swallowed by administration.\n\n## Story-Open Money Structure\n\n| Component | Value | Status |\n|---|---:|---|\n| Walker Holdings 4% non-voting Class B | $1.08B | locked, illiquid, untouchable strategic family equity |\n| Liquid / rotational portfolio | $500-600M | conservative diversified portfolio, externally managed; not spending cash |\n| AW Assets properties | about $125M | Albury House, Villa Serena, Appartement Varenne, Casa Borgonuovo, 12 Charles Street office building |\n| AW Assets registered collections | $35M | art, fashion archive, watches, books, instruments, objects |\n| Serena Management book value | $3M | management infrastructure and contracts |\n| al.x rights architecture | $15M | image/name/likeness/marks plus al.x Music / Electric Ivory rights layer |\n| Operating cash / reserves | included in liquid portfolio | available for family-office continuity, not personal free cash |\n| **AW Holdings total** | **about $1.75-1.85B** | rounded story figure |\n\nThese are rounded story figures, not a live mark-to-market balance sheet. Do not recalculate the total in-scene, downgrade the headline number, or invent extra assets to close the arithmetic. Use **about $1.75-1.85B** as the headline value and the component lines as structural anchors.\n\nThe liquid / rotational portfolio can be described by category only: commercial-work earnings compounded inside AW Holdings, family distributions, diversified equities, fixed income, cash, external funds, and conservative long-term managers. It is liquidity in family-office terms, not $500-600M Alex casually spends. Do not invent named positions, private companies, founder pitches, acquisition targets, or active direct-investment meetings.\n\n## Personal Commercial Earnings — Cumulative to Story Open\n\nAlex's personal commercial earnings since his first deal at 13 total approximately £20M across nine years. This figure compounded inside the liquid portfolio and does not sit separately.\n\n| Stream | Cumulative | Notes |\n|---|---:|---|\n| Film / TV | ~£3M | Seven credits 2017–2024; standard union/industry rates throughout; fees priced on the work, not on social engagement |\n| Brand / fashion | ~£15M | Nine years (age 13–22); passive-only pricing throughout — image/editorial usage with no social, no interview, no spokesperson rights |\n| Performance / music / other | ~£2M | Public piano, broadcast fees, event appearances, miscellaneous |\n| **Total** | **~£20M** | Rounded; compounded and absorbed into liquid portfolio |\n\n### The Undervaluation Gap\n\nBrand and fashion fees were set under the education-first boundary: passive usage only. No social activation. No spokesperson rights. No interview. No exclusivity premium. Brands received extraordinary access at a structural discount — typically a fraction of what they would have paid for full-rights engagement.\n\nAt story open, with the boundary expired, full-rights engagement is now possible. The commercial gap between what Alex has been paid and what the market will now bear is very large. Serena's inbox already reflects this. Deal-by-deal working price bands live in `52_COMMERCIAL_WORK_TO_STORY_OPEN.md`; exact new-offer numbers belong in meetings.\n\n## Walker Holdings Interlock\n\nAW Holdings holds Alex's locked 4% non-voting Class B stake in Walker Holdings. This is the largest single component of Alex's headline wealth and should read as permanent family structure, not available money.\n\n| Component | Origin | Status |\n|---|---|---|\n| Alex's 4% Class B | allocated at Alex's 21st birthday in 2024 | $1.08B; locked, non-voting |\n| David's separate 4% | held personally by David, not AW Holdings | $1.08B; locked, non-voting; David receives distributions but cannot sell or direct |\n| AW total | 4% of Walker Holdings | $1.08B; permanent bridge, not operational control |\n\nAlex cannot sell, borrow casually against, direct, spend, or use the stake to run Walker Holdings. Eleanor Vance chairs AW Holdings because she is the Walker governance counterpart and family-trust adult in the structure.\n\n## Governance\n\n| Person | Role | Function |\n|---|---|---|\n| Eleanor Vance | Board Chair | strategic oversight, Walker interlock, trust-critical judgment |\n| Catherine Aldridge | Managing Director | day-to-day family-office execution |\n| Daniel Sorensen | General Counsel | legal, privacy, contracts, rights architecture |\n| Alex Wilson | Sole owner | principal; chooses public/career moves |\n\nAlex does not use Slack, attend routine office meetings, run investments, approve rota details, or manage staff. The machine exists so he does not have to.\n\n## Staff\n\n| Person | Role | Based | Notes |\n|---|---|---|---|\n| Catherine Aldridge | Managing Director | London / 12 Charles Street | mature family-office operator |\n| Daniel Sorensen | General Counsel | London / 12 Charles Street | legal architecture, contracts, privacy |\n| Beatrice Vale | Finance Controller | London / 12 Charles Street | payments, accounts, reporting, tax pack coordination |\n| Imogen Park | Office Manager | London / 12 Charles Street | office operations and documents |\n| Judith Ansley | Head of AW Assets | London/travel | properties, collection register, Knight Frank |\n| Miriam Santos | Property Coordinator | London / 12 Charles Street | property vendors/readiness, including Paris/Milan bases and 12 Charles Street tenant coordination |\n| Rafael Costa | Collections Registrar | London/travel | object register, insurance, shipping |\n| James Latham | Head of Serena Management | London / 12 Charles Street | career/commercial/media judgment and intake |\n| Priya Chandra | Senior Coordinator, Serena | London / 12 Charles Street | relationship log, outreach calendar |\n| Oliver Wren | Analyst, Serena | London / 12 Charles Street | research, market intelligence |\n| Mina Arendt | Rights and Marks Manager, al.x | London / 12 Charles Street | usage log, permissions, marks admin |\n| Nadia Hassani | Executive Assistant | London/travel | strategic bridge to Alex |\n| Sophie Kalu | Personal Assistant | with Alex / London | travel, calendar, restaurants, wardrobe movement |\n| Kevin Marsh | Chief Protection Officer | wherever Alex is | direct protection detail |\n\nThere are no active v20 investment-vehicle or acquisition staff.\n\n## AW Investments\n\nAW Investments is a quiet internal division. It holds:\n\n- Alex's locked 4% Walker Holdings stake\n- conservative liquid reserves\n- cash and treasury required for family-office continuity\n\nIt is not a story-facing investment shop. It has real value and real managers, but v20 does not use it as active plot. Do not create active investment meetings, deal memos, acquisitions, ICs, named portfolio positions, or founder pitches unless Ryan explicitly creates a new canon exception.\n\n## AW Assets LLC\n\nAW Assets holds properties and registered tangible collections.\n\n| Asset | Function |\n|---|---|\n| Albury House | Alex's Kensington home; about £55M post-refurb |\n| Villa Serena | Sardinia private residence; major AW Assets residence |\n| Appartement Varenne | 3-bed serviced Paris base on Rue de Varenne for fashion weeks and cultural visits |\n| Casa Borgonuovo | 3-bed serviced Milan base on Via Borgonuovo for fashion/design weeks and short stays |\n| 12 Charles Street | AW-owned Mayfair commercial office building; family-office / Serena / al.x secure core plus vetted tenant space |\n| Collections | art, fashion archive, watches, books, instruments, object register |\n\nAW Assets can produce handovers, shipping, insurance, conservation, room-readiness, property logistics, and 12 Charles Street tenant/vendor coordination. It should not become the plot engine unless the scene is about a property or object.\n\n## Serena Management LLC\n\nSerena Management handles career, commercial, media, and professional inbound.\n\nAt v20 story open, Serena holds:\n\n- first solo-cover and adult-profile/editorial interest\n- first interview/profile/broadcast interest\n- adult-scale fashion / brand / campaign architecture approaches\n- headline professional performance invitations\n- serious music / label / classical / recital-release interest\n- charity and event requests\n- requests to use Alex's name, image, likeness, social reach, recital footage, or personal marks\n\nNothing moves without Alex.\n\n## al.x LLC\n\nal.x is the rights layer, not the management office.\n\n| Layer | Status | Function |\n|---|---|---|\n| al.x Rights | active | image, name, likeness, personal marks |\n| al.x Music LLC | active/held | Electric Ivory recorded rights, visual/film rights, and publishing administration for Alex's improvisations, remakes, reconstructions, transcriptions, and arrangements |\n| al.x public brand | dormant | can become public later if Alex chooses |\n\nal.x Music is a rights-holding company under al.x, not a label, management office, publisher brand, or public-facing music company at story open.\n\nal.x has no consumer launch at story open. It is infrastructure and optionality.\n\n## How Alex Interacts With AW Holdings\n\nAlex sees:\n\n- Nadia arranging access without fuss\n- Sophie handling the day\n- Kevin handling movement\n- Latham filtering professional pressure\n- Daniel appearing when a legal line matters\n- Catherine when governance needs a decision\n- Judith / Knight Frank when property or collections need handling\n\nHe does not see routine staff work, investment allocation, reporting, tax, data rooms, or internal admin.\n\n## Key Distinctions\n\n| Do not confuse | Correct distinction |\n|---|---|\n| Walker Holdings vs AW Holdings | Walker is the $27B family enterprise; AW is Alex's lean personal family office |\n| Serena Management vs al.x / al.x Music | Serena manages career/inbound; al.x holds personal rights; al.x Music holds Electric Ivory music/recording/visual rights |\n| AW Investments vs active dealmaking | AW Investments is quiet locked-equity/liquidity management, not a plot engine |\n| AW Assets vs Albury House staff | AW Assets owns/manages property structurally; Knight Frank/household staff run the house day-to-day |\n| Latham vs Alex | Latham recommends and filters; Alex chooses |\n"},{"file":"26_SERENA_MANAGEMENT_AND_ALX_BRAND.md","content":"# Serena Management / al.x And External Partners\n\nCompact active operations sheet.\n\n## Core Distinction\n\n| Layer | Meaning |\n|---|---|\n| Serena Management | Management/career operations company inside AW Holdings. Holds inbound, filters pressure, routes professional opportunities. |\n| al.x | Rights layer for Alex's image, name, likeness, personal marks, optional public signature system. |\n| al.x Music | Rights company under al.x for Electric Ivory recording, visual/film, performance, publishing/mechanical/arrangement administration where Alex-created material creates rights. |\n\nSerena holds inbound. al.x/al.x Music hold rights. None decide for Alex. At story open al.x is infrastructure/optionality, not a launched consumer brand; al.x Music is not a label, publisher, manager, or public music brand.\n\n## People / Entities\n\n| Person/entity | Role |\n|---|---|\n| Parent | AW Holdings. |\n| Catherine Aldridge | AW oversight. |\n| James Latham | Head of Serena Management; intake, judgment, relationships, one recommendation or no candidate. |\n| Priya Chandra | Senior Coordinator; relationship log/outreach calendar/Nadia coordination. |\n| Oliver Wren | Analyst; research, market intelligence, briefing notes. |\n| Daniel Sorensen | GC; legal review/structure. |\n| Nadia Hassani | Access bridge; coordinates Alex's time if/when he chooses. |\n| Mina Arendt | al.x usage log, permissions register, routine rights admin. |\n| Collins Brand | External strategy support, not operating team. |\n\nLatham: British, 48; former FCDO, then Rothschild private office/family-office advisory; recruited through Catherine/Eleanor. Dry, precise, human, discreet, not impressed. Not family or emotional confidant; prevents professional world reaching Alex unfiltered.\n\n## Rules Set By Alex\n\n1. Scooter Braun blacklist: anyone who met with him at any level, ever, is excluded.\n2. No shortlists: Latham recommends one candidate or no candidate.\n3. Direct Alex check if professionally touching Taylor Swift, Hadids, godparents, Kentucky/Sayre circle, Summer House, Almanach, Dawson family, or close orbit.\n4. Latham triages inbound; Alex sees reviewed material only.\n5. First adult-defining moves require Alex's explicit choice: solo cover, profile, interview, broadcast, long-form public conversation, strategic social posture, adult brand architecture, headline performance, release, public statement, artist launch.\n\n## Rights\n\n| Asset/right | Holder |\n|---|---|\n| Alex name/image/likeness/personal marks | al.x. |\n| Electric Ivory recorded rights | al.x Music / AW Holdings. |\n| Electric Ivory visual/film rights | al.x Music / AW Holdings. |\n| Electric Ivory performance rights | al.x Music / AW Holdings. |\n| Publishing/mechanical/arrangement administration | al.x Music / Daniel / external admin if activated. |\n\n## External Network\n\n| Partner | Area / status |\n|---|---|\n| WME | Representation/live/booking/cross-division; signed and dormant; principal-led activation. |\n| Askonas Holt | Serious music management; held; no release/artist/headline move without Alex. |\n| The Lede Company | Global PR; retained for readiness; no action without Alex. |\n| Karla Otto | Fashion PR support. |\n| Grubman Shire / Ken Meiselas | Entertainment/music law with Daniel. |\n| Greystone | Walker security; Kevin coordinates large movements. |\n| Collins Brand | Long-term positioning/signature system support. |\n\nDo not invent public statements from partners.\n\n## Inbound Held At Story Open\n\nWME activation; Lede frameworks; solo-cover/profile/editorial requests; major labels; serious music agencies; BBC and global broadcast/platform requests; sponsorship/ambassador/adult brand architecture; appearances/events; headline professional performances; adult visual architecture; use of Alex name/image/likeness/recital footage/social presence/personal marks. Detailed scene-use inbox and WME package examples live in `53_INBOX_AND_WME_PITCH_LIST.md`. Nothing moves without Alex.\n\n## Routing\n\n| Issue | Route |\n|---|---|\n| Press/comment/editorial response | Latham / The Lede. |\n| Career/commercial | Latham. |\n| Image/name/likeness licensing | al.x / Daniel / Latham. |\n| Electric Ivory/release | al.x Music / Daniel / Latham. |\n| Brand mark/signature | al.x / Daniel. |\n| Legal/privacy/contracts | Daniel. |\n| Schedule/access/calls | Nadia. |\n| Personal logistics/travel/clothes/restaurants | Sophie. |\n| Security/movement risk | Kevin. |\n| Property/collection/house | Judith / Knight Frank / Ottilie. |\n| Governance | Catherine / Eleanor. |\n\n## Lanes / Boundaries\n\nBoundary expired 1 August 2025. Pressure is not identity reveal or blank debut; it is the end of education as shield.\n\nMusic: Alex has public piano/broadcast history but no album, label, release, Spotify artist profile, public Electric Ivory recording. RAM recital justifies serious music lane. Major-label and serious-music agency interest are distinct.\n\nPR: Silence/no comment/selective acknowledgement/controlled profile/full engagement are options, never deployed unless Alex chooses.\n\nSocial: 95M+ followers/subscribers via being photographed/tagged/clipped; own posts rare and incidental; no sponsored posts or X/TikTok public voice. First strategic posture is Ryan-controlled.\n"},{"file":"27_PROPERTIES_FULL.md","content":"# Properties Full Detail\n\nUse this for the property portfolio as a system.\n\n## Property Portfolio\n\n| Property | Location | Owner/entity | Value | Transfer | Story-open status |\n|---|---|---|---:|---|---|\n| Albury House / Kensington Townhouse | 30 Upper Phillimore Gardens, Kensington W8 | AW Assets | about £55M post-refurb | 2021, at RAM start | refurbishment complete; Alex sees it at v20 opening |\n| Villa Serena | Porto Cervo, Costa Smeralda, Sardinia | AW Assets | high-value private residence | 2021, at 18 alongside Albury House | post-2024 renovation complete; July base before London return |\n| Appartement Varenne | Rue de Varenne, 7th arrondissement, Paris | AW Assets | 3-bed serviced residence | purchased 2024 | Left Bank fashion/culture base for Paris weeks and visits |\n| Casa Borgonuovo | Via Borgonuovo, Brera / Quadrilatero edge, Milan | AW Assets | 3-bed serviced residence | purchased 2024 | Milan fashion/design base near Brera, Via Montenapoleone, and La Scala |\n| 12 Charles Street | Mayfair, London W1J | AW Assets | discreet commercial office building | acquired outright for AW Holdings operations | AW Holdings secure core plus vetted commercial tenants |\n| Phoenix Hollow | Woodford County, Kentucky | Walker/Wilson family / Walker Holdings orbit | not Alex-owned | acquired by Rosie, built out from 1978, home since 1980 | Rosie/Homer primary home |\n\nAW Assets owns Albury House/Kensington, Villa Serena, Appartement Varenne, Casa Borgonuovo, and 12 Charles Street. AW Assets is wholly owned by AW Holdings, and AW Holdings is wholly owned by Alex. Phoenix Hollow is the family seat, not Alex's AW Assets property.\n\nAlbury House is the private/family name for 30 Upper Phillimore Gardens. It predates Homer's title; Homer chose Earl of Albury from the house name in 1977.\n\nAppartement Varenne and Casa Borgonuovo are practical city bases, not status trophies or separate household worlds. They are 3-bed serviced apartments managed through Knight Frank Private Office and used during fashion weeks, fittings, short visits, and schedule-heavy cultural trips. They do not come with independent story engines unless Ryan places a scene there.\n\nAW Assets property value at story open is about $125M across Albury House, Villa Serena, Appartement Varenne, Casa Borgonuovo, and 12 Charles Street. Treat this as a rounded family-office mark, not a public-facing valuation.\n\n12 Charles Street is the only owned commercial property in AW Assets at story-open. Alex owns the building outright through AW Assets; AW Holdings occupies the secured operational core, while spare floors/suites are leased to quiet vetted tenants such as private-client law, art advisory, family-office, or wealth-management firms. The tenant mix keeps the building looking like a normal discreet Mayfair office building rather than an Alex-branded headquarters. Collection overflow, art storage, fashion archive storage, shipping, and specialist conservation are handled through contracted facilities and advisors, not a second AW-owned warehouse or archive building.\n\n## 12 Charles Street\n\n12 Charles Street is a discreet Mayfair commercial office building owned outright by AW Assets. It sits in Alex's property portfolio as a real asset, not as a vanity office.\n\nAW Holdings, Serena Management, al.x, Daniel's legal layer, Catherine's family-office team, and records/meeting infrastructure occupy a secure private core inside the building. Other parts of the building are leased out under strict tenant-vetting and confidentiality terms. Tenants should be boringly appropriate: private-client law, small family offices, art advisory, fiduciary/accounting, or similar Mayfair professional users. Do not put a nightclub, fashion showroom, public gallery, restaurant, or fan-visible Alex business here.\n\nThe building should feel professionally alive: reception, lift control, meeting rooms, secure document handling, bike/taxi arrivals, couriers, quiet tenant traffic, and staff moving between AW and non-AW floors. It is not where Alex hangs out for fun. When he comes in, it is for a decision, signing, meeting, crisis, handover, or private briefing.\n\n## Appartement Varenne / Paris\n\nAppartement Varenne is Alex's Paris base: a 3-bed serviced apartment on Rue de Varenne in the 7th arrondissement, held through AW Assets and managed by Knight Frank Private Office. It is Left Bank, embassy/private-garden, old-stone quiet rather than Avenue Montaigne flash.\n\nVisual identity: pale panelling, old parquet, tall windows, courtyard privacy, good lamps, serious books/art, flowers from the market, compact service kitchen, and closets that can survive couture/fitting weeks. Use it for Paris Fashion Week, fittings, recital/cultural visits, quiet dinners, and short stays. Public risk belongs at building exits, hotel/venue arrivals, and fashion-week movement, not inside the apartment.\n\n## Casa Borgonuovo / Milan\n\nCasa Borgonuovo is Alex's Milan base: a 3-bed serviced apartment on Via Borgonuovo at the Brera / Quadrilatero edge, held through AW Assets and managed by Knight Frank Private Office. It is close enough to Via Montenapoleone, Brera, La Scala, and fashion-house appointments to be useful without feeling like a showroom.\n\nVisual identity: old Milan palazzo restraint, courtyard entrance, terrazzo or old parquet, dark walnut, pale walls, framed art, tailored Italian lighting, a small dining table, and wardrobe-ready storage for fittings. Use it for Milan Fashion Week, Versace/Burberry/Loro Piana-adjacent movement, design/furniture appointments, short cultural stays, and stopovers. It should feel private, efficient, and adult, not a party flat.\n\n## Residential Timeline\n\n| Period | Place logic |\n|---|---|\n| 2003-2014 | Alex primarily grows up at Phoenix Hollow |\n| 2014 onward | Kensington/London years: Alex moves to London for Westminster; Rosie/Homer move with him at first |\n| 2019-2021 | Rosie/Homer return primarily to Phoenix Hollow; Alex remains London-based at Albury House for Westminster with staff support |\n| 2021-2025 | Alex attends Royal Academy of Music; Kensington is his London base until refurbishment displacement |\n| Aug 2024-Jul 2025 | Kensington works; Alex lives in a rented Marylebone apartment near RAM |\n| July 2025 | Alex at Villa Serena; Kensington complete but unseen |\n| 5 August 2025 private return | Alex arrives at Albury House for first post-refurb view |\n| 7 August 2025 story open | Alex is at 12 Charles Street for the first post-boundary team meeting as AD/Youtube publicly reveal Albury House |\n\nDo not create adult Nashville/Bluebird/Opry geography for Alex.\n\n## Management\n\nKnight Frank Private Office manages Kensington, Villa Serena, Appartement Varenne, Casa Borgonuovo, and 12 Charles Street through the AW Assets relationship.\n\n| Function | Kensington | Villa Serena | Appartement Varenne / Casa Borgonuovo | 12 Charles Street |\n|---|---|---|---|---|\n| day-to-day readiness | retained household / Knight Frank | seasonal operations | serviced apartment readiness | office operations / building services |\n| security coordination | Kevin + Knight Frank + local support | Kevin + Knight Frank + local/maritime support | Kevin + Knight Frank + local building support | AW Holdings protocols / building security / tenant separation |\n| maintenance | continuous London property management | seasonal opening/closing, marine/garden systems | building service + Knight Frank oversight | office maintenance and compliance |\n| staffing | retained core, event escalation | seasonal house manager, kitchen, housekeeping, grounds, marine | serviced housekeeping / concierge, no full household | Catherine/Latham/AW operating layer plus ordinary tenant traffic |\n| service | domestic/event capable | summer hosting/cove/guest-villa capable | fashion-week/visit capable, small dinners only | discreet professional operations |\n\n## Privacy Logic\n\n| Place | Privacy level |\n|---|---|\n| Phoenix Hollow inside gate | almost absolute; no press/cameras |\n| Villa Serena estate/cove | genuinely private; sea/boat approach still monitored |\n| Appartement Varenne / Casa Borgonuovo | private serviced residences; public risk at building exits and fashion-week movements |\n| Kensington exterior | public visibility possible |\n| Kensington interior/garden | private but London-adjacent |\n| 12 Charles Street | discreet professional privacy; ordinary commercial tenant cover; not a public-facing brand office |\n| airports, Porto Cervo, London venues | public/pap risk |\n\n## How Properties Enter Scenes\n\nProperties should feel operationally alive, not like static luxury moodboards. Use staff, service routes, storage, laundry, pantries, gardeners, marine support, lighting, and movement paths when relevant.\n\nDo not make Alex explain his own houses. He grew up with this infrastructure.\n\n## Live-State Important Facts\n\n- 12 Charles Street is the active opening place for the first post-graduation/post-boundary team meeting.\n- Albury House was privately returned to on 5 August and publicly revealed by AD/Youtube on 7 August.\n- Kevin is with Alex as security/background; Serena/AW team are the meeting layer.\n- Villa Serena was the socially full July pre-opening location, not isolation.\n- Appartement Varenne and Casa Borgonuovo are owned AW Assets apartments for fashion weeks and short visits, not default story-open locations.\n- Rosie and Homer are at Phoenix Hollow, not flying to Sardinia.\n- Phoenix Hollow remains the only place where Alex is truly inside the gate of privacy.\n"},{"file":"28_VILLA_SERENA_FULL.md","content":"# Villa Serena Full Detail\n\nUse this when a scene is physically at Villa Serena or references its operations.\n\n## Core Summary\n\n| Field | Canon |\n|---|---|\n| Property | Villa Serena |\n| Location | Porto Cervo, Costa Smeralda, Sardinia |\n| Owner/entity | Alex / AW Assets / AW Holdings |\n| Management | Knight Frank Private Office |\n| Type | private Mediterranean villa compound |\n| Operating season | fully staffed summer season, roughly early June to late September; shoulder-season readiness outside that |\n| v20 Alex dates | Alex physically in residence 8 July-5 August 2025 |\n| v20 summer mode | Alex-owned staffed house kept open for trusted friends, Brain Trust, some Legacy overlap, Phoenix Hollow/godfamily elders, and older-generation family/friend traffic; Summer House is a separate wider circuit that may overlap with Sardinia/Porto Cervo |\n| Standard sleeping capacity | about 20 guests/household members |\n| Max owner/guest capacity | 24 |\n| Staff villa | Casa del Custode, 3-4 staff rooms |\n| Renovation | Oct 2024 to pre-summer 2025 refresh/facilities upgrade |\n\nThe renovation is not a rebuild. Pale stone, terracotta, timber, carved arches, granite, carob trees, private cove, and sea terraces remain.\n\n## Design Position\n\nVilla Serena is relaxed, old Costa Smeralda, private, sun-worn, and operationally upgraded. Avoid resort branding, yacht-villa white gloss, nightclub lighting, beach-club staging, visible security, and hotel landscaping.\n\n## Main Zones\n\n| Zone | Contents |\n|---|---|\n| Arrival/service | arrival court, delivery hold, staff office, staff rest, garage/buggy store |\n| Main villa | salon, library/music room, dining room, main kitchen, service kitchen, pantry, 5 bedrooms |\n| Terraces | upper terrace, kitchen terrace/main table, sunset terrace, outdoor bar, grill, outdoor cinema |\n| Alex's suite | bedroom, private terrace, bathroom, dressing room, private sitting area |\n| Guest villas | Casa del Carrubo, Casa di Granito, Casa del Mare, Casa dell'Ombra |\n| Staff villa | Casa del Custode |\n| Cove/waterfront | cove path, private beach, pier, tender landing, marine store, shower/towel point, pavilion |\n| Sport/wellness | padel court, gym, movement deck, massage/recovery, sauna/steam, pool/plunge |\n| Grounds | carob grove, herb/citrus planting, granite seating, lighting, kitchen garden |\n\n## Accommodation\n\n| Area | Bedrooms | Standard occupancy | Notes |\n|---|---:|---:|---|\n| Main villa | 5 | 10 | includes Alex's suite and 4 guest bedrooms |\n| Casa del Carrubo | 2 | 4 | larger guest villa among carob trees |\n| Casa di Granito | 2 | 4 | granite outcrop setting |\n| Casa del Mare | 2 | 4 | sea-facing, closest to cove route |\n| Casa dell'Ombra | 1 | 2 | quieter shaded villa |\n| Total owner/guest | 12 | 20 standard / 24 max | flexible use |\n| Casa del Custode | 3-4 staff rooms | 3-6 staff | separate operations support |\n\n## Opening-Scene Geography\n\nThe cove path rises from the private cove toward upper terrace/kitchen terrace. Alex can come up barefoot from swim. Kevin can be at a shaded corner watching without making a show of it. Apple can be in or near the kitchen. Guests may be scattered across main villa and guest villas.\n\nDo not assume everyone in Legacy or Summer House is physically at Villa Serena. A few are; the chats are much larger.\n\nFor the v20 immediate backstory, Villa Serena was socially full. Alex arrived 8 July 2025, essentially right after RAM graduation, and stayed until returning to London on 5 August. That is Alex's personal residence window, not the villa's whole season. Villa Serena is Alex-owned, fully staffed, and open roughly early June to late September for trusted friends, Brain Trust, some Legacy overlap, Phoenix Hollow/godfamily elders, and older-generation family/friend traffic, even when Alex is not personally hosting every moment.\n\nThe core summer group includes full Brain Trust: Apple Martin, Iris Law, Lila Moss, Kaia Gerber, and Rocco Ritchie. Several others from Legacy, London Lot, and the fashion/music orbit can rotate through. Legacy is the non-Alex-centred room for children/grandchildren of famous people. Summer House is separate: the global younger-famous summer circuit, open to famous younger people moving through London, New York, LA, Glastonbury, Ibiza, Sardinia, Paris, Milan, fashion weeks, boats, and parties. It is not Alex's group, not hosted by Alex, and not based at Villa Serena, though Summer House people may overlap with Villa Serena or Porto Cervo while he is there. Summer texture includes Porto Cervo visibility, late dinners, swims, boats, clothes, teasing, flirting, guest-villa traffic, and people knowing the education-first boundary was about to expire. It was not Alex alone waiting for London.\n\n## Main Villa Details\n\n- Library/music room has an upright piano, intentionally non-concert in character.\n- Kitchen terrace is the daily table.\n- Pantry/cold storage can hold produce, wine overflow, Hatfield spirits, Limestone Springs mixers, and event stock.\n- Outdoor bar/drinks station includes glassware, ice, refrigeration, mixers, Hatfield spirits, local wine.\n- Alex's dressing room supports summer linen, swimwear, eveningwear, watches/accessories, packing support.\n\n## Cove And Waterfront\n\nThe cove remains private and natural, not a beach club. Pier supports tenders/day boats, not marina spectacle. Cove pavilion is shade, towels, water, changing, and quiet seating.\n\n## Operations\n\n| Mode | Staffing/operations |\n|---|---|\n| off-season | security monitoring, maintenance, gardening, marine checks, systems |\n| pre-season | deep clean, systems test, garden reset, cove/pier inspection, pantry/bar stocking |\n| in-season | house manager, housekeeping, chef/cook support, gardener, pool/marine, driver/boat support, security coordination |\n| post-season | inventory, soft-goods storage, maintenance list, weatherproofing |\n\nMarco can be head of kitchen for Villa Serena summers if used. Keep kitchen staff quiet, professional, and real.\n\n## Security\n\nVilla Serena has discreet perimeter sensors, arrival/service camera coverage, maritime approach awareness, gate protocol, guest/contractor logs, low-level safe path lighting, and secure comms with Kevin/AW Holdings.\n\nSecurity should be felt as competence, not militarisation.\n\n## Live Story Open\n\nIn v20, Villa Serena is the 8 July-5 August pre-opening location for Alex and the early-June-to-late-September staffed summer base for trusted friends, some Legacy overlap, and family/godfamily traffic. Summer House is a wider mobile circuit that can overlap with Villa Serena/Porto Cervo but is not Villa Serena's house group. The default live story opens later, on Thursday 7 August 2025, late morning, at 12 Charles Street during Alex's first post-graduation/post-boundary team meeting as the AD/Youtube Albury House reveal drops. Use Villa Serena only when Ryan chooses a summer/Sardinia scene, or when the live opening references the immediate social backstory.\n"},{"file":"29_KENSINGTON_FULL.md","content":"# Albury House — Full Reference\n\nUse this file for Albury House — room-by-room tours, detailed layout, staff logistics, design language, visual anchors, object placement, and live-state rules.\n\n`48_KENSINGTON_ROOM_ANCHORS.md` is absorbed into this file.\n\n---\n\n## Core Summary\n\n| Field             | Canon                                                                            |\n| ----------------- | -------------------------------------------------------------------------------- |\n| House name        | Albury House                                                                     |\n| Address           | 30 Upper Phillimore Gardens, Kensington, London W8                               |\n| Value             | about £55M post-refurb                                                           |\n| Owner/entity      | Alex / AW Assets / AW Holdings                                                   |\n| Design lead       | Studio Ashby / Sophie Ashby (public as of the 7 August AD/Youtube reveal)        |\n| Operations        | Knight Frank Private Office                                                      |\n| Project           | comprehensive refurbishment — strip back to walls, full redesign                 |\n| Works             | August 2024–July 2025 (Alex in Marylebone stopgap flat during works)             |\n| Cost              | about £12M                                                                       |\n| Story-open status | complete; Alex saw it privately on 5 August 2025; default live open is 7 August at 12 Charles Street as AD/Youtube reveal the house publicly |\n\nThe Marylebone flat near RAM (August 2024–July 2025) was a stopgap only. It was not a home, not where godfamily or close friends socialised, and carries no sentimental weight.\n\nThe private return happened on 5 August 2025: Alex at the front door, then Sophie Ashby/Judith tour and handover/mechanics, followed by friend dinner/tour and Boys coming over before the 7 August meeting. The v20 default live opening is 7 August at 12 Charles Street while the public Architectural Digest / YouTube reveal drops.\n\n---\n\n## Core Concept\n\nAlbury House is Alex's adult London home: private, musical, social, beautiful, and newly remade.\n\nIt is not a hotel, museum, bachelor pad, preserved relic, or shrine to Homer and Rosie. It is a working private London house for music, dinners, fashion, art, recovery, guests, service, privacy, and life after RAM.\n\nThe refurbishment was a full strip back to walls. Architecture, proportions, staircase, and windows are the same building. Almost everything else is new. A few objects from before remain — a kitchen table, some photographs, a painting — because Ashby kept them, not because the story needs them. This is not Homer and Rosie's house with new furniture. It is Alex's adult house, newly built inside the same shell. Do not write the opening as a sentimental homecoming. Do not write Alex finding objects and remembering. The house is new. That is the point.\n\n---\n\n## Historical Position\n\nAlbury House was already called Albury House when Homer bought it in 1967. The name appears in old deeds, house accounts, service records, and local correspondence. It goes back to the origin of the house in the 1860s.\n\nWhen Homer was created Earl of Albury in 1977, he chose the title from the house rather than from an obscure territorial village. Outsiders may assume the house is named after the title; family and old staff know the title points back to the house.\n\nKensington was the British family base from the 1970s. From 2014 to 2019, Rosie and Homer lived here physically for Alex's Westminster schooling. After 2019 they returned primarily to Phoenix Hollow while Alex remained London-based.\n\nAlex has owned Albury House outright since 2021, gifted at 18, through AW Assets. It is his house, his staff, his operation. Not Rosie's. Not Homer's.\n\nUsage: formal/public references usually say `30 Upper Phillimore Gardens`, `Upper Phillimore`, or `the Kensington house`. Family, staff, AW Assets, Knight Frank, and house accounts can say `Albury House` or `Albury`.\n\n---\n\n## Design Language\n\nStudio Ashby: heritage proportions, warm modernism, art-led rooms, serious textiles, sculptural lighting, lived-in intelligence.\n\nPalette: warm plaster, limewash, dark oak, smoked oak, walnut, blackened metal, bronze, herringbone floors, stone service/wellness floors, marble/dark stone in bars and bathrooms, olive, tobacco, charcoal, cream, parchment, soft umber.\n\nAvoid: grey developer luxury, Dubai-palace marble, obvious celebrity memorabilia, fake members' club cosplay, cold tech display, nightclub gloss.\n\n---\n\n## Ashby / AD Public Reveal\n\nAt the 7 August story open, Studio Ashby / Sophie Ashby is public because of the pre-approved Architectural Digest cover story and YouTube house tour.\n\nBefore the drop, society and design watchers knew Ashby had been unusually silent for about 18 months — nearly impossible to book, with only occasional cryptic social posts. The silence produced intense speculation about a major undisclosed commission.\n\nOn 7 August, that speculation resolves publicly as Albury House. The AD/Youtube feature shows Sophie taking viewers through the full seven-floor house, including both basement levels. Public knowledge includes published room-by-room visuals and design language. It does not include staff/security operations, private handover mechanics, hidden systems/safe mechanics, Serena/AW/al.x details, or unshown private object provenance.\n\n---\n\n## Floor Stack\n\n| Level                         | Role                                                                               |\n| ----------------------------- | ---------------------------------------------------------------------------------- |\n| Lower Basement / LB -2        | pool, wellness, gym, treatment, reserve wine/bourbon, plant/storage                |\n| Upper Basement / Lower Ground | bar/games, cinema, social tasting room, service kitchen, laundry, delivery staging |\n| Raised Ground                 | entrance, kitchen/breakfast, garden room, study, flower room, boot room, garden    |\n| First Floor / Music Nobile    | music, playback, dining, private entertaining suite                                |\n| Second Floor                  | principal guest floor                                                              |\n| Third Floor                   | flexible guest floor                                                               |\n| Top Floor                     | Alex's private apartment                                                           |\n\nTour direction: ground → music floor → both basements → guest floors → top floor.\n\nWhen a character says \"start at the bottom,\" treat it literally: Lower Basement / LB -2, not the raised-ground garden room.\n\n---\n\n## Staff\n\nAlex's house. Alex's staff. Contracts run through AW Assets / Knight Frank Private Office. Ottilie manages day-to-day; she does not report to Rosie or Homer.\n\n**Key faces:**\n\n| Name | Role | What They Do |\n|---|---|---|\n| Ottilie Marchant | House Manager / Knight Frank Lead | Overall running of the house, contractors, budgets, readiness, inspections. Guest-facing lead. |\n| Kit Peverell | Deputy House Manager | Deliveries, room readiness, event prep, guest movement, staff rota. |\n| Rafael Bellocq | Private Chef | Daily meals, guest meals, supper-room events up to sixteen. |\n| Crispin Vale | Butler / Front-of-House Steward | Guest greeting, drinks, table service, Music Nobile support. |\n| Saskia Rooke | Security Lead | External security, access control, contractor vetting, risk. Works with Greystone. |\n| Mairi Elphinstone | Head Housekeeper | Cleaning standards, linens, guest rooms, seasonal turns. |\n\nThere is also a separate safe room for the rarest private objects, documents, and items that should not live in a dressing-room display. The everyday watch/jewellery storage remains the integrated island in Current-Season Dressing.\n\n**Full staff roster:**\n\n| Name | Department | Role | Status |\n|---|---|---|---|\n| Ottilie Marchant | House | House Manager / Knight Frank Lead | On duty |\n| Kit Peverell | House | Deputy House Manager | On duty |\n| Mairi Elphinstone | Housekeeping | Head Housekeeper | On duty |\n| Sabine Kroll | Housekeeping | Housekeeper | On duty |\n| Priya Nandha | Housekeeping | Housekeeper | On call |\n| Blythe Carrow | Wardrobe | Laundry & Garment-Care Specialist | On duty |\n| Rafael Bellocq | Kitchen | Private Chef | In kitchen |\n| Tolly Venn | Kitchen | Kitchen Assistant / Steward | In kitchen |\n| Crispin Vale | Service | Butler / Front-of-House Steward | On duty |\n| Saskia Rooke | Security | Security Lead | On duty |\n| Niall Bracken | Security | Night Security / Concierge | Overnight |\n| Clem Frobisher | Garden | Gardener | Scheduled |\n| Denzil Pike | Systems | Maintenance Technician | On call |\n| Imogen Straker | Music | AV / Music Systems Consultant | Scheduled |\n| Leander Shaw | Wellness | Pool & Wellness Technician | Scheduled |\n| Honor Ritson | Archive | Wardrobe Conservation Consultant | Scheduled |\n| Marceline Quist | Art | Art Handler / Lighting Consultant | Scheduled |\n\n---\n\n## Key Rooms\n\n| Room | Detail |\n|---|---|\n| Pool / wellness | warm teal mosaic, travertine surround, cove ceiling perimeter lighting, chaise lounges and candles in-room, wellness bar at far end; warm and inviting, not graphite-grey austere |\n| Kitchen/breakfast | modern serious kitchen with original chipped pine table as emotional anchor |\n| Garden room | rear sitting room opening to private garden |\n| Study/library | true study for a 22-year-old who reads; Nord 4 keyboard, guitar, violin on the wall, patch points to upstairs studio. No grand piano here. |\n| Lower bar/games | nocturnal private-club energy, not parody |\n| Cinema | films, concert footage, rough cuts |\n| Reserve cellar | serious wine/champagne/Hatfield bourbon/Kentucky bottle storage |\n| Music room | 1910 C. Bechstein grand, first-floor piano nobile, hidden acoustic treatment |\n| Control/listening room | private control room/playback salon linked to music room; residential creative infrastructure, not a commercial studio |\n| Supper room | 12–14 person private dining |\n| Top-floor apartment | Alex's private living/bedroom/wardrobe/archive layer |\n\nHomer's old British Rail `On Air` sign has moved to Phoenix Hollow.\n\n---\n\n## Top-Floor Wardrobe / Archive\n\nAlex's private layer has exactly two dressing/wardrobe rooms:\n\n- **Current-Season Dressing Room** — everyday clothes, tailoring, shoes, grooming, and integrated watch/jewellery safe island.\n- **Archive Wardrobe Room** — vintage and museum-tier fashion archive. Museum-grade: vitrines, conservation lighting, climate control around 45% humidity, bespoke mannequins for shaped garments. Archive pieces are protected like fine art; wearing one is rare and deliberate.\n\nDo not invent a third dressing room. The everyday Watch/Jewellery Safe is the marble-topped island with glass display trays inside the Current-Season Dressing Room. The separate safe room is for the really rare stuff.\n\n---\n\n## Music Floor\n\nThe first floor can close off from the house through a discreet smoked/fluted glass threshold. Musicians, engineers, caterers, bar support, and deliveries can use the service stair without crossing private family rooms.\n\nThis is residential creative infrastructure. Do not call it `al.x Studio`, `Albury Studio`, or `Phillimore Studio`.\n\n---\n\n## Garden\n\nPrivate walled south-facing Kensington garden, roughly 0.3 acre in feel: terrace, green centre, pleached lime allée, hedging, roses, hydrangeas, mature trees, discreet lighting, far seating pocket. London privacy, walls, leaves, rain on stone.\n\n---\n\n## Whole-House Visual Logic\n\n| Floor | Visual Rule |\n|---|---|\n| Lower Basement / LB -2 | Warm subterranean wellness: travertine, textured stone, teal water, cove lighting, candles, plants, service details. Never white-clinic spa or graphite austerity. |\n| Upper Basement / Lower Ground | Nocturnal private-club layer: blackened timber, dark marble, bottle walls, red or deep-blue upholstery, low amber light, games and cinema glow. Seductive, not nightclub. |\n| Raised Ground | Daily house and garden: taupe plaster, dark herringbone floors, serious art, antique rugs, black metal garden doors, practical rooms softened by greenery and lamps. |\n| First Floor / Music Nobile | Music-led entertaining: moody taupe/olive rooms, records, framed music photography, deep seating, candlelit dining, piano/playback infrastructure, controlled warmth. |\n| Second Floor | Senior guest privacy: grown-up taupe bedrooms, dark joinery, soft lamplight, framed art, tailored bathrooms, quiet hotel-level readiness without hotel branding. |\n| Third Floor | Flexible guest layer: compact warm bedrooms and baths, darker stairs/landings, practical comfort, friend/musician overnight readiness rather than showpiece drama. |\n| Top Floor | Alex's private layer: darker, tailored, archival, city-facing, wardrobe-heavy, bookish, intimate; blackened timber, low amber lighting, marble islands, vitrines, roof-terrace night air. |\n\n---\n\n## Room Visual Anchors\n\n### Lower Basement / LB -2\n\n| Room | Visual Description |\n|---|---|\n| Indoor Pool | Long teal pool set into dark warm stone and travertine, rectangular cove-lit ceiling glow, wall sconces, columns, potted trees, candle lanterns, chaise lounges, folded towels. Feels like a private Roman bath crossed with a London wellness club. Useful bar alcove in the room. |\n| Pool Bar | Stone counter, amber shelf light, glassware, citrus, towels, stools, undercounter fridges directly off the pool. Useful and quietly indulgent, not a hotel juice bar. |\n| Gym | Matte black private gym with rubber floor, mirror wall, cable rack, bench, rower/air-bike, medicine balls, mobility tools, towel cabinet, plants, warm textured-stone walls. Disciplined and used, not decorative. |\n| Sauna | Honeyed timber with tiered benches, soft concealed lighting, compact heat-box calm. Warm, dry, tactile. |\n| Steam / Cold Plunge | Dark stone suite with bronze fittings, glass, subtle mist, compact teal plunge basin. Heat, water, stone, body discipline. |\n| Treatment Room | Warm-plaster recovery room with massage table, folded towels, concealed storage, soft task lights, stone floor. Ready, private, professionally calm. |\n| Wine / Bourbon Cellar | Bottle walls, dark shelving, amber light, tasting-table gravity. Hatfield bourbon and serious wine as collection rather than decor. Intimate and archival. |\n| Plant Room | Pumps, filters, ducting, boilers, pipework, control panels. Precise service-room order. Invisible infrastructure. |\n\n### Upper Basement / Lower Ground\n\n| Room | Visual Description |\n|---|---|\n| Bar / Games Room | Dark private games bar: black herringbone floor, ribbed marble bar, brass pendants, amber bottle shelves, billiards, darts, card table, navy sectional, rust cushions, red card chairs, abstract red-black art. The house exhaling after midnight. |\n| Bar Detail | Amber-lit shelves of bottles and glassware behind dark marble bar. Ice, cut crystal, brass rail, low light on liquid. |\n| Cinema | Low dark cinema: wraparound navy/black velvet seating, rust-gold cushions, acoustic wall panels with bronze vertical trim, warm perimeter lighting, black screening wall, small bottle/bar niche. Built for films, concert footage, rough cuts. Not a bright family media room. |\n| Wine / Bourbon Tasting Room | Library-like bottle room: glass-front wine walls, backlit bourbon shelves, black marble tasting table, burgundy velvet chairs, red abstract-art wall, candle-warm cellar light. Holds a few people deep in conversation. |\n| Powder Room | Lacquered or textured walls, black stone vanity, bronze tapware, warm mirror light, small art. Jewel-box private. |\n| Service Kitchen / Pantry | Dark cabinetry, stone island, stainless counters, plating pass, open glassware shelves, pendant task light, herbs, flowers, direct sightline to cellar/service rooms. Built for events without looking industrial. |\n| Staff Office | Compact coordination: desks, manuals, laptop/printer, secure cupboards, warm lamp light. Competent and quiet. |\n| Delivery / Staging | Flower buckets, garment bags, catering cases, instrument flight cases, folding tables, rolling racks. The machinery of the house, hidden from Alex. |\n| Laundry / Garment Care | Washer/dryer bank, steamers, pressing table, hanging rails, folded towel shelves, stone floor, sink, warm service lighting. |\n| Service Stair Hall | Discreet dark stair, bronze rail, utility doors, wall lights, neatly staged cases or garment bags. The back-of-house route that keeps public rooms seamless. |\n\n### Raised Ground\n\n| Room | Visual Description |\n|---|---|\n| Entrance Hall | Tall hall: black front door, taupe plaster, ornate cornice, dark herringbone, antique runner, lantern, green velvet bench, console with lamp/vase/books, Nara-like portrait, large black-framed art, staircase rising at the back. Grand but not solemn. |\n| Main Stair Hall | Heritage stairwell: pale walls, dark handrail, runnered stairs, framed art, lantern light. Carries movement, not museum reverence. |\n| Kitchen | Warm serious kitchen: stone floor, dark island, marble worktops, black range, brass hardware, open shelves, three black pendants, garden doors. The original pine table is still there — it survived the refurb. It is not a story beat. |\n| Garden Room | Rear sitting room: olive velvet sofa, pale armchairs, shelves, large abstract art, layered lamps, plants, heavy curtains, large black-framed garden doors, terrace immediately beyond. The room friends drift into without being told. |\n| Study / Library | Working study: dark desk, iMac/laptop, bookshelves, fireplace, works on paper, reading chair, camera, Nord 4 keyboard, guitar, violin on wall, small amps, warm lamp light. Used by a 22-year-old who reads and plays. Not a decorative office. No grand piano. |\n| Boot Room | Olive-green: cushioned bench storage, brass hooks, coats, caps, tote bags, wicker baskets, wellies, umbrella stand, stone floor, garden door. Useful, slightly muddy-capable, and beautiful anyway. |\n| Flower Room | Marble-topped worktable, deep sink, shelves of vases and ceramics, wall mirror, clippers, buckets, loose stems, potted plants. House labour made pretty. |\n| Rear Terrace | Black-framed doors back to the house, candlelit table, mature planting, wall privacy, warm garden lighting. At night: London has been shut outside. |\n| Garden | Private walled garden as layered green rooms: hedging, terrace furniture, mature trees, roses/hydrangeas, discreet warm lighting. Not manicured hotel landscape. |\n\n### First Floor / Music Nobile\n\n| Room | Visual Description |\n|---|---|\n| First Landing | Gallery-like: runner, console lamp, framed art, warm controlled evening light. Announces a more adult entertaining floor. |\n| Principal Salon | Deep sofas, leather and velvet chairs, marble fireplace, heavy curtains, framed music/art photography, dark tables, bottle trolley, lamplit conversation energy. In evening mode: darker, denser, more seductive, with glass doors hinting at the studio beyond. |\n| Music Room | Daylit: 1910 C. Bechstein grand at centre, record shelves, turntable, framed jazz/music photography, soft taupe walls, garden-facing sash windows, sofa seating, microphone stands. The piano is physically central without making the room a concert hall. |\n| Control / Listening Room | Darker: proper monitor speakers, desk console, screens, racks, acoustic panels, deep sofa, leather chair, twin turntables, record walls, sightline back to the grand piano. Residential creative infrastructure, not a commercial studio. |\n| Supper Room | Dark dining table for twelve: leather chairs, candlelight, large Christopher Wool text work, framed performance photography, glassware shelves, studio door nearby. Late dinner after music, not formal state dining. |\n| Drinks Pantry | Compact service: bar sink, glasswasher, ice, fridges, coffee setup, glass shelves, service-stair access. Supports the floor invisibly. |\n| Music Nobile Threshold | Smoked/fluted acoustic threshold with bronze handle, stair landing, rug, console, art. Crossing into the house's music skin. |\n\n### Second Floor\n\n| Room | Visual Description |\n|---|---|\n| Second Landing | Soft senior guest landing: taupe plaster, dark runner, linen detail, console lamp, framed art, calm circulation. Private-house hospitality at its most composed. |\n| Principal Guest Bedroom | Mature: taupe walls, dark library-style joinery, upholstered bed, crisp white linens, soft lamps, abstract art, green armchair, writing surface, luggage stand. For serious family or important adult guests. |\n| Principal Guest Bath | Pale stone ensuite: freestanding bath by window, walk-in shower, bronze fittings, double marble vanity, wall sconces, framed art, flowers. Expensive without being flashy. |\n| Principal Guest Dressing | Fitted dark wardrobes, marble island or bench, luggage space, mirror, warm lamps. For guests who arrive with proper clothes. |\n| Guest Bedrooms 2–3 | Quiet guest bedrooms: taupe textiles, fitted storage, good lamps, art, chair, composed second-floor privacy. Restful and adult. |\n\n### Third Floor\n\n| Room | Visual Description |\n|---|---|\n| Third Landing | Narrower upper guest landing: warm lights, dark rail, herringbone floor, art, bench. More flexible and lived-in than the second floor. |\n| Guest Bedrooms 4–6 | Relaxed guest rooms for friends or musicians: taupe walls, bed, dark bedside tables, lamps, art, chair. Comfortable rather than ceremonious. |\n| Guest Sitting Room | Shared: rust velvet sofa, green and leather chairs, black built-in TV/bookshelves, city window, lamps, landscape art. Overnight friends somewhere to gather away from Alex's floor. |\n\n### Top Floor / Alex's Private Suite\n\n| Room | Visual Description |\n|---|---|\n| Private Landing | Dark rail, taupe walls, runner, framed art, small bench/table, city light. Private before anyone opens a door. |\n| Bedroom | Dark, calm, city-facing: low upholstered bed, black marble fireplace, taupe/charcoal textiles, framed art, Giacometti poster, lit shelves, bench, small balcony/terrace door, quiet night-lamp intimacy. Sensual without being staged. |\n| Private Lounge | Bookish and music-adjacent: dark built-ins, deep black seating, low table, record and book shelves, drinks tray, city windows, upright piano, framed music art, Oscar Wilde quote wall. Where he can be awake after everyone else leaves. |\n| Dark Bathroom | Shower-focused daily: dark stone slabs, strong walk-in shower, bronze fittings, backlit mirror, black marble vanity, recessed grooming shelves, black towels. The body-routine room. |\n| Light Bath | Softer pale-stone bathing: freestanding bath in window light, bronze fittings, double vanities, robe hook, open towel storage, lamp, art, warm morning light. |\n| Current-Season Dressing | Large blackened-timber dressing room: open lit wardrobes, labelled designer shelves, folded knitwear, shoes, bags, lounge sofa, marble coffee table, central black marble island with integrated watch/jewellery display. Daily fashion infrastructure, not a boutique. |\n| Archive Wardrobe | Museum-grade: vitrines, lit garment cases, labelled landmark pieces, ladder rail, central glass display island, gloves, look books, framed campaign images, conservation seriousness. Closer to a private costume institute than a closet. |\n| Watch & Jewellery Island | Integrated island in Current-Season Dressing: lit watch winders, stepped watch trays, jewellery drawers, dark marble counter, bronze hardware. Precise and intimate. |\n| Safe Room | Separate secure room for the really rare objects, documents, private-order pieces, and material that should not sit in the dressing-room island. |\n| Rare Books | Tall lit shelves of leather-bound books, dark armchair, brass reading lamp, small side table, framed works on paper, window, plant, amber light. A private reading cell inside the larger suite. |\n| Roof Terrace | Night-time city perch: low sofas, dining table, olive trees, planter lighting, lanterns, outdoor bar/kitchen with wine fridge and sink, flame trough, warm wall sconces, London skyline. Private air above Kensington. |\n\n---\n\n## Object Placement\n\nUse `35_ALEX_COLLECTION_FULL.md` for all collection canon and provenance. Room placement logic:\n\n- Fashion archive pieces: `top_archive`. Current-season clothes, shoes, grooming, watches, jewellery: `top_currentseasondressing` / watch safe.\n- Books: `top_rare-books`, `top_lounge`, `ground_study-library`.\n- Vinyl: first-floor music layer (`first_musicroom`, `first_listeningstudio`) and occasionally `top_lounge`.\n- Art: distributed through arrival, stair, salon, study, music, guest, and private rooms. Do not identify a specific artwork unless locked in Markdown or Ryan supplies it.\n- Watches and jewellery: private-layer objects. Public/friend scenes can see them only if Alex physically brings them into view.\n\nDo not turn rooms into inventory dumps. Let one or two objects carry taste, memory, or use.\n\n---\n\n## Live-State Rules\n\n- Alex saw the completed house for the first time on 5 August; default live story opens 7 August at 12 Charles Street as the AD/Youtube reveal drops.\n- Sophie Kalu may have handled handover photos or logistics earlier; she is not physically present in the Charles Street meeting unless Ryan places her.\n- Judith Ansley / Knight Frank handled readiness on the day; she is not physically present in the Charles Street meeting unless Ryan places her.\n- Do not place Rosie or Homer at Albury House in 2025 by default.\n- At the 7 August opening, published AD/Youtube interiors and Studio Ashby are public; staff/security operations, hidden systems, and private handover mechanics are not.\n- Anchor room details to this file before adding atmosphere. Do not invent room counts, object placement, lighting, materials, or floor routing from mood.\n\n---\n\n## Anti-Defaults\n\n- Do not make the house grey developer luxury, hotel-branded, nightclub-glossy, Dubai marble, or cold tech display.\n- Do not make the pool austere; it is warm teal/travertine wellness with service and lounge life in the room.\n- Do not make the archive a closet; it is a conservation-grade fashion room.\n- Do not add a third dressing room.\n- Do not put a grand piano in the study; it is a Nord 4 keyboard, guitar, and violin.\n- Do not invent a basement recording studio; the control/listening room on the first floor is the music infrastructure.\n- Do not create communal salons on guest floors; second and third floors are bedroom/bath/landing only, plus the third-floor guest sitting room.\n- Do not write raised-ground rooms as showrooms; they are daily-house spaces.\n- Do not use the kitchen table as a story beat, sentimental anchor, or trigger for Homer/Rosie memory. It is a table. It is in the kitchen.\n- Do not write Alex discovering \"surviving\" objects and remembering. The opening is not a sentimental homecoming. He is seeing a new house for the first time.\n- Do not write Homer and Rosie's old house as the emotional reference point for any room. The architecture is the same building. The house is entirely new. Those are different things.\n- Do not invent backstory moments prompted by objects. If an object is not the scene, it is not the scene.\n"},{"file":"30_PHOENIX_HOLLOW_FULL.md","content":"# Phoenix Hollow Full Detail\n\nUse this for the Kentucky compound, Rosie/Homer home gravity, Solstice, and childhood infrastructure.\n\n## Core Summary\n\n| Field | Canon |\n|---|---|\n| Place | Phoenix Hollow |\n| Location | Woodford County, Kentucky |\n| Scale | about 500 acres |\n| Acquired | 1970 by Rosie |\n| Build-out | begins 1978 |\n| Move-in | 1980, when Rosie stops touring |\n| Story-open occupants | Rosie and Homer by default |\n| Privacy | inside gate, no press/cameras |\n\nPhoenix Hollow is not a Nashville/Opry/Bluebird adult-gig geography. It is home, studio, family seat, protective infrastructure, and cultural room.\n\n## Purpose\n\nPhoenix Hollow is the populated room Rosie and Homer built around Alex against the London world that took David and Sarah out of parenthood. It is private, full, lived-in, and unperformed.\n\nThe London co-residence years, 2014-2019, are the only sustained period Rosie and Homer were not primarily in residence. Alex's own Kensington years continue after they return to Phoenix Hollow.\n\n## Approach And Grounds\n\nWhite board fencing, private road, mature hardwoods, rolling land, paddocks, creek line, wooded hollows. The house appears gradually. It is built into the land rather than imposed on it.\n\n## Main House\n\nFifty-plus rooms across three floors. Traditional Southern architecture filtered through old-money restraint: high ceilings, long corridors, deep wraparound porches, no performance.\n\n### Ground Floor\n\nFormal dining room seating twenty-four, drawing room, Homer's library, Rosie's study, family living room with fireplace, music room, breakfast room, small parlor.\n\n### Second Floor\n\nAlex's private east-wing suite, Rosie/Homer west-wing suite, and formal guest wing with four ensuite bedrooms.\n\n### Third Floor\n\nTwo guest suites, staff quarters when Maria chooses to stay over, storage, attic room where old instruments live.\n\n## Kitchen\n\nMaria's domain. French Laundry / Per Se level skill served without ceremony at a Kentucky kitchen table.\n\nDo not write her making generic Southern comfort food. Use serious, precise cooking: pastry, stocks, soft eggs, elegant seasonal dishes, braises, quiet technical competence.\n\n## Music Room\n\n1923 Steinway Model D, Rosie's piano. Soundproofed. This is where Alex first touched a piano. His hands know this action better than any other.\n\n## Alex's Suite\n\nPrivate east wing, roughly 3,600 sq ft. Residence within a residence.\n\n| Room | Detail |\n|---|---|\n| bedroom | east-facing, pasture line, quiet, linen, dark woods |\n| dressing room | suits, stage wardrobe, everyday clothes, shoes, watches, cufflinks |\n| bathroom | marble/brass, freestanding tub, walk-in shower, heated floors |\n| private lounge | sectional, fireplace, bar, good bourbon, Barolo, big screen, close friends at 1am |\n| two guest bedrooms | ensuite rooms for closest people during compound stays |\n\nNo staff routes through Alex's suite. Security stops at the suite door.\n\n## Studio\n\nSeparate building 2-3 minutes uphill from the main house. Purpose-built and soundproofed. Control room with Homer's Neve console, live room with Yamaha concert grand, isolation booths, lounge, kitchen.\n\nThis is where serious music work happens at Phoenix Hollow.\n\n## Amphitheatre\n\nNatural bowl shaped into the hillside. Stone terracing, grass seating, outdoor stage with professional rigging, live-event sound system, 500+ capacity. Annual Solstice ends here.\n\n## Pool And Fitness\n\nSeparate building with 25m temperature-controlled lap pool, hot tub, full gym, yoga/movement studio with sprung floor, changing rooms, steam room.\n\n## Cottages\n\nThe compound can sleep sixty-plus guests with the cottages.\n\n| Cottage | Character |\n|---|---|\n| Stone House | most private; working artists |\n| Creek Cottage | near water; Stevie often takes it |\n| Ridgeline | higher ground/views; Dolly's favourite |\n| The New Place | most modern |\n| Dogwood Cottage | closest to main house; family-scale |\n| Pond House | quiet songwriter favourite |\n| The Paddock | equestrian/Keeneland guest logic |\n| Oak Hill | original 1880s tenant house, preserved and renovated |\n\n## Story Rules\n\n- No press inside the gate.\n- Rosie/Homer are here at story open.\n- Phoenix Hollow chat can include global cultural figures, but the physical compound scene only includes people actually placed there.\n- Do not use Kentucky as shorthand for country music.\n- Do not give Alex adult Nashville performances because Phoenix Hollow is in Kentucky.\n- David is an occasional visitor when in from New York if Ryan places him. He is polite, awkward, sober, and not part of the default household rhythm.\n"},{"file":"31_HATFIELD_FULL.md","content":"# Hatfield Full Detail\n\nUse this for Hatfield Group as a company, not just a bourbon prop.\n\n## Opening Principle\n\nAlex's Walker/Wilson family owns Hatfield Group through Walker Holdings. The Hatfield family are not Alex's blood relatives. Alex has no management role.\n\nHatfield is a serious diversified hospitality, spirits, wine, beverage, and food company. It is not a celebrity vanity brand.\n\n## Vital Statistics\n\n| Field | Canon |\n|---|---|\n| Founded | 1978, when Rosie acquired Hatfield Distillery |\n| HQ | Louisville, Kentucky |\n| CEO | David Buckner |\n| Employees | about 1,715 company employees plus franchise partner employees |\n| Annual revenue | about $835M |\n| Valuation | about $2.3-2.8B |\n| Majority owner | Walker Holdings LLC |\n| Company-owned locations | about 40 |\n| Franchised locations | about 33-42 |\n| Divisions | 9 operating divisions plus franchise/corporate |\n\n## Origin\n\nIn 1978 Homer liked Hatfield bourbon. Rosie bought the distillery for him. The Hatfield family stayed on. Capital allowed careful expansion. That is the origin.\n\nDo not turn this into business-strategy genius from day one. The empire grew out of a personal act and professional management.\n\n## Leadership\n\n| Person | Role |\n|---|---|\n| David Buckner | CEO, Hatfield Group |\n| Carolyn Hatfield-Moore | Master Distiller, third-generation Hatfield distiller |\n| Eleanor Vance | Walker Holdings board representative |\n| Diane Prescott | Walker Holdings legal escalation if needed |\n\nDavid Buckner runs Hatfield day-to-day. Eleanor does not manage menus or recipes. Homer does not consult on business decisions. Alex does not sit at the table.\n\n## Divisions\n\n| Division | Approx revenue | Employees | Notes |\n|---|---:|---:|---|\n| Hatfield Distillery & Spirits | $115M | 80 | Bardstown bourbon, rye, wheated, bonded, cave program |\n| Hatfield Scotland | $18M | 55 | Perthshire distillery development; gin while Scotch matures |\n| Hatfield Bar & Grill | $140M | 450 | 16 company-owned locations |\n| Hatfield Inns | $95M | 220 | 8 company-owned boutique hotels |\n| The Stave | $95M | 520 | 8 private clubs |\n| Still House | $22M | 75 | Bardstown and Perthshire restaurant/hospitality |\n| Hatfield Wines | $125M | 65 | Napa and Tuscany |\n| Limestone Springs Beverage Co. | $110M | 85 | premium mixers/sodas/water |\n| Licensing/Provisions/Merch | $115M | 30 | franchise, condiments, barware, apparel |\n| Corporate | included | 25 | Louisville HQ |\n\n## The Stave Network\n\nOpen clubs: London, New York, Los Angeles, Nashville, Miami, Austin, Paris, Dubai.\n\nThe Stave is culturally hot and whiskey/music-specific, with serious acoustic listening rooms inside a broader club model. Do not make it Alex's personal club.\n\n## Relationship To Alex\n\nFor Alex, Hatfield means:\n\n- family-owned infrastructure\n- bourbon literacy\n- locations where he is quietly known\n- a connection to Rosie/Homer's story\n- Hatfield Single Barrel as his usual pour\n\nIt does not mean:\n\n- blood relation to Hatfields\n- operational role\n- public explanation in every scene\n- generic Southern/country branding\n\n## PR And Legal\n\nHatfield PR that touches the Walker/Wilson family routes through Walker Holdings institutional channels, not Serena Management by default. Alex personal press remains Serena Management/The Lede.\n\n"},{"file":"32_HATFIELD_PRODUCTS_AND_VENUES.md","content":"# Hatfield Products And Venues Detail\n\nUse this when a bottle, menu, bar, venue, gift basket, room-service tray, or product appears.\n\n## Product Rule\n\nHatfield products can simply appear. Do not force Alex to explain them. People close to him know Hatfield the way some families have a house wine or preferred hotel.\n\n## Hatfield Spirits\n\n| Product | Detail | Use |\n|---|---|---|\n| Hatfield Original | 80 proof, 4-year Kentucky straight bourbon | everyday bottle, volume driver |\n| Hatfield Small Batch | 90 proof, 6-year bourbon | better house pour |\n| Hatfield Single Barrel | 94 proof, 8-year bourbon | Alex's usual Hatfield pour |\n| Hatfield Rye | 92 proof, 5-year Kentucky straight rye | whiskey-drinker bottle |\n| Hatfield Reserve | 100 proof, 12-year annual limited release | collector/allocated |\n| Hatfield Cave Select | 15-21 year cave-aged bourbon | ultra-limited; Hatfield properties/The Stave |\n| Hatfield Wheated Bourbon | 90 proof, 7-year wheated bourbon | softer expression |\n| Hatfield Bottled in Bond | 100 proof bonded bourbon | whiskey-educated marker |\n| Hatfield Kentucky Straight Malt Whiskey | limited American malt | Carolyn's experimental permanent addition |\n| The Hatfield Alex Wilson 21-Year Cave-Aged Bourbon | private family barrel, not retail | AW Assets/private collection only |\n\nAlex's usual: Hatfield Single Barrel, neat, two fingers, no ice/water.\n\n## Alex Wilson 21-Year Cave-Aged Bourbon\n\nHomer laid down a barrel the day Alex was born, 22 June 2003. It was opened on 22 June 2024 at Alex's 21st birthday at Phoenix Hollow.\n\n| Fact | Canon |\n|---|---|\n| Bottles | 220 |\n| Label | The Hatfield Alex Wilson 21-Year Cave-Aged Bourbon |\n| Status | not for sale |\n| Party use | 10 opened, 10 gifted |\n| Remaining | about 200 |\n| Insurance | about $100,000 per bottle |\n| Register | AW Assets |\n\n## Limestone Springs Beverage Co.\n\nPremium mixer, soda, and water company at Fever-Tree scale, not a tiny house brand.\n\n| Product | Use |\n|---|---|\n| Limestone Springs Sparkling Water | premium sparkling mineral water |\n| Limestone Springs Still Water | house water at Hatfield properties |\n| Premium Tonic | serious bars/hotels |\n| Light Tonic | tonic variant |\n| Elderflower Tonic | floral mixer |\n| Aromatic Tonic | richer mixer |\n| Ginger Beer | cocktails/non-alcoholic |\n| Ginger Ale | highballs |\n| Cola | premium craft soda |\n| Lemon Soda | citrus soda |\n| Orange Soda | citrus soda |\n| Root Beer | craft soda |\n| Cream Soda | craft soda |\n| Bitter Lemon | mixer |\n| Soda / Club Soda | bar rail |\n| Tonic Syrup | cocktail/provision use |\n\nLimestone can plausibly appear in airports, airlines, serious bars, hotels, grocers, restaurants, and Hatfield venues.\n\n## Hatfield Wines\n\n| Product | Detail |\n|---|---|\n| The Hollow Cabernet | Napa Cabernet |\n| Radio Silence Red Blend | Napa red blend |\n| A Still Small Voice White | white wine |\n| Starlight & Steel Sparkling | sparkling wine |\n| Estate Rosé | rosé |\n| Hatfield Chianti Classico | Tuscany estate wine |\n| Hatfield Gran Selezione | premium Chianti Classico tier |\n| Hatfield Toscana IGT | Super Tuscan-style estate wine |\n\n## Provisions And Barware\n\n| Product | Use |\n|---|---|\n| Hatfield Original Hot Sauce | restaurant table/gift basket |\n| Hatfield Reserve Hot Sauce | premium condiment |\n| Hatfield Bourbon BBQ Sauce | cookout/pantry |\n| Hatfield Smoky Dry Rub | grill/cooking |\n| Hatfield Steak Sauce | Bar & Grill/home pantry |\n| Hatfield Bourbon Mustard | sandwiches/charcuterie |\n| Hatfield Cocktail Cherries | bar product |\n| Hatfield Cocktail Bitters | cocktail kit |\n| Hatfield Barrel-Aged Honey | breakfast/cheese/gift |\n| Hatfield Smoked Salt | kitchen/gift |\n| Heavy-Bottom Rocks Glass | signature lowball |\n| Highball Glass | Limestone Springs/highballs |\n| Tasting Glass | distillery/Stave |\n| Decanter | home bar/gift |\n| Bar spoon / jigger / ice pick | cocktail tools |\n| Apparel | location merch; do not overuse on Alex |\n\n## Venues\n\n| Venue | Use |\n|---|---|\n| Hatfield Bar & Grill | company-owned restaurants plus franchise programme |\n| Hatfield Inns | boutique hotels |\n| The Stave | private whiskey/music clubs |\n| Still House | Bardstown and Perthshire culinary/hospitality |\n| Hatfield Distillery | Bardstown working distillery |\n| Hatfield Scotland | Perthshire distillery development |\n| Hatfield Wines Napa | estate/tasting/restaurant |\n| Hatfield Wines Tuscany | Chianti Classico estate/tasting/guesthouse |\n| Franchised B&G/Inns | partner-operated but Hatfield-branded |\n\n## Failure Guards\n\n- Do not make Hatfield family Alex's relatives.\n- Do not make the private Alex barrel a retail bottle.\n- Do not flatten Limestone Springs into generic bottled water.\n- Do not turn Hatfield into
