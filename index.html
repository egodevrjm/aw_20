ce | Alex photographed in the room, brief host interaction, no performance | £250k-£1M / $312k-$1.25M | Easy money, high overexposure risk. |\n| Global tech keynote cameo | Walk-on, music sting, short conversation, product association | £1M-£5M / $1.25M-$6.25M | Only viable if it feels playful and controlled. |\n| Automotive reveal | Car launch appearance, short film, one press quote | £1M-£4M / $1.25M-$5M | Big money. Can become tacky fast. |\n| Fashion week front-row exclusive | Milan/Paris/London/New York attendance package | £250k-£1M / $312k-$1.25M | Plausible because he already belongs in these rooms. |\n| Fashion awards presenter/host slot | BFC, CFDA, GQ, Vogue, or luxury-house awards | £50k-£500k / $62k-$625k | Good if funny; bad if stiff. |\n| Cannes / Venice / LACMA / amfAR table package | Global image access and donor-room heat | £100k-£750k / $125k-$938k | Valuable room, but easy to look rented. |\n| Formula 1 Monaco / Silverstone / Miami paddock | Paddock, brand suite, photo, maybe piano moment | £250k-£1.5M / $312k-$1.875M | Plausible if tied to friends/brands, not forced. |\n| Private performance: billionaire birthday / Gulf / US tech | Solo or small ensemble, no public release | £500k-£3M / $625k-$3.75M | Often killed. Money is real; optics can be awful. |\n| Private dinner appearance only | Attend, charm, photos barred or controlled | £250k-£750k / $312k-$938k | Serena filters hard. Alex may hate the premise. |\n| Charity gala performance | GOSH, amfAR, UNICEF, Elton John AIDS Foundation, etc. | £0-£250k / $0-$312k, often donated | Good if cause/room feels real. |\n| Festival surprise guest | One-song or short set cameo | £100k-£500k / $125k-$625k | Good if fun and musically aligned. |\n| Store opening / flagship launch | Appearance, ribbon/photo, dinner | £250k-£1M / $312k-$1.25M | Usually too transactional unless brand fit is excellent. |\n| University / conservatoire keynote | Culture speech, masterclass, performance | £25k-£250k / $31k-$312k | Lower money, good if he wants the room. |\n\n### BBC / UK Public Broadcaster Lane (One Region Only)\n\nBBC is not one tone. It can be funny, music-first, charity-led, documentary-serious, daytime-bland, or Newsnight-wrong. Do not over-index on BBC as grave national-institution seriousness.\n\nThe BBC is a domestic/public-service lane, not the centre of the commercial universe. It matters because Alex is British and public, but it should sit beside US, Asia, streamer, tech, automotive, fashion, and appearance pressure.\n\n| Outlet / format | Why it is in the inbox | Rough initial amount | Register note |\n|---|---|---:|---|\n| `Desert Island Discs` / BBC Radio 4 | First real conversation through songs, taste, humour, memory, and music rather than confession | £0-£5k / $0-$6k | Plausible yes. Serious but human. Lets him be funny and musical. |\n| `Later... with Jools Holland` / BBC Two | Performance-first; can show cross-genre musicianship without interview burden | £10k-£30k / $12k-$38k | Strong BBC option. Not classical. Needs right set. |\n| BBC Radio 1 `Live Lounge` | Youth/pop/culture lane; cover choice could prove he is not classical-only | £10k-£25k / $12k-$31k | Good if playful and current. |\n| BBC Radio 2 `Piano Room` | Music-led mainstream adult lane | £10k-£25k / $12k-$31k | Useful if it does not become polite heritage wallpaper. |\n| BBC Sounds long-form music conversation | Audio-first, less visual, more taste/records/arrangement | £0-£10k / $0-$12k | Good if host understands cross-genre Alex. |\n| BBC Proms late-night / special slot | Serious public music stage, cross-genre possible | £25k-£100k / $31k-$125k | Use carefully. Not \"Alex becomes classical.\" |\n| BBC Symphony Orchestra / RPO broadcast collaboration | High-musicianship validation with broadcast | £50k-£150k / $62k-$188k | Valuable if arrangement/orchestration is Alex-shaped. |\n| BBC Children in Need / Comic Relief | Charity + public warmth + existing history | £0-£50k / $0-$62k, often donated | Good if fun, not solemn. |\n| `Jools' Annual Hootenanny` | Festive, social, musical room | £20k-£60k / $25k-$75k | Down-line option, not first move unless Ryan wants it. |\n| BBC Studios global music/documentary special | International distribution around Electric Ivory / first live film | £250k-£750k / $312k-$938k | Big value but risky if narrated as Serious Prince Pianist. |\n| BBC Two / BBC Arts profile film | Controlled arts documentary | £100k-£350k / $125k-$438k | Risky. Needs humour and music, not reverence. |\n| BBC Radio 3 `In Tune` / classical desk | Serious-music lane | £0-£10k / $0-$12k | Dangerous if framed as classical career. Accept only if cross-genre terms are explicit. |\n| `The One Show` / BBC Breakfast | Broad daytime access | £0-£10k / $0-$12k | Usually wrong: too bland, too managed. |\n| `Newsnight` | Current-affairs seriousness | £0 / $0 | No by default. \"Never Newsnight\" is the calibration. |\n| `Strictly Come Dancing` | Competition/reality visibility | £100k-£300k / $125k-$375k | Wrong by default; career rupture if chosen. |\n\nBBC scene rule: Latham should not say \"BBC\" as if it means one thing. He should say which room, which host, which premise, and whether Alex would enjoy himself.\n\n### First Access / Media\n\n| Outlet / platform | What they want | Rough initial amount | Register note |\n|---|---|---:|---|\n| British Vogue | First solo cover, fashion-led, clothes/body/style/taste | £100k-£350k / $125k-$438k | Strong. Not confession-led. |\n| Vogue US | Global cover / fashion film / adult image thesis | £150k-£500k / $188k-$625k | Strong if fashion-first. |\n| Vogue Italia / L'Uomo Vogue | Art-fashion image, Donatella/Italian layer | £75k-£250k / $94k-$312k | Strong visual lane; not underwear/swim. |\n| Vanity Fair | Long-form profile and Annie/legacy-world portraiture | £50k-£200k / $62k-$250k | Down-line. Avoid family-trauma frame. |\n| Rolling Stone | Music/fame/taste profile | £50k-£200k / $62k-$250k | Good if they understand he is not classical. |\n| GQ / British GQ | Style, body, music, masculinity, fun | £75k-£250k / $94k-$312k | Good if not \"posh prince\" punchline. |\n| Interview Magazine | Conversation format with a friend/artist | £25k-£100k / $31k-$125k | Good if paired with the right person. |\n| i-D / Dazed | Youth-culture art-fashion feature | £25k-£100k / $31k-$125k | Good; lower cash, strong register. |\n| AnOther / Fantastic Man | Art-directed style/music interiority | £25k-£100k / $31k-$125k | Good, quieter. |\n| T Magazine / WSJ Magazine | Taste, houses, style, discipline | £25k-£100k / $31k-$125k | Risk of tasteful solemnity; use carefully. |\n| Architectural Digest follow-up | Albury stills, object IDs, Sophie/Alex follow-up | £50k-£150k / $62k-$188k | Already in motion through AD reveal; avoid making it Alex's first voice. |\n| Graham Norton | First broad TV room where he can be funny | £20k-£75k / $25k-$94k | Plausible down-line. The room matters. |\n| Jimmy Fallon | US light entertainment, music/game format | £25k-£100k / $31k-$125k | Plausible if loose and funny. |\n| Stephen Colbert | US intelligent late-night conversation + performance | £25k-£100k / $31k-$125k | Viable if music/comedy balance is right; risk of too statesmanlike. |\n| Jimmy Kimmel | US broad late-night, looser comedy frame | £25k-£100k / $31k-$125k | Plausible if there is a real bit, not a royal novelty booking. |\n| Seth Meyers | Smarter talk room, less circus | £20k-£75k / $25k-$94k | Good if Alex wants wit over spectacle. |\n| Kelly Clarkson Show | Warm US daytime, music-first, possible duet/cover | £10k-£50k / $12k-$62k | Could work if performance-led; not first by default. |\n| Call Her Daddy | Massive US podcast/social reach | £100k-£500k / $125k-$625k | In the inbox because scale; usually killed unless Alex wants chaos. |\n| SmartLess / Conan O'Brien Needs A Friend | Celebrity conversation, humour, low solemnity | £25k-£150k / $31k-$188k | Good if he wants to prove he is funny in a room. |\n| SNL | Host/musical guest or music guest fantasy booking | £0-£50k / $0-$62k | Cultural bomb, low fee. Only if he wants to play. |\n| Chicken Shop Date | Internet proof that he is funny and not precious | £0-£25k / $0-$31k | Very Alex-plausible. Value is social detonation. |\n| Hot Ones | Funny, physical, viral, not reverent | £25k-£100k / $31k-$125k | Plausible. Good anti-solemnity. |\n| NPR Tiny Desk | Performance-first music credibility | £0-£25k / $0-$31k | Good if cross-genre, not classical. |\n| Apple Music interview/performance | Music/taste + platform polish | £250k-£750k / $312k-$938k | Strong if tied to Electric Ivory or first live film. |\n| YouTube / YouTube Music high-end music film | Controlled video reach | £500k-£1.5M / $625k-$1.875M | Useful if rights controlled by al.x Music. |\n| Netflix / Prime Video / HBO-Max documentary interest | First long-form screen access | £1M-£4M / $1.25M-$5M | High money, high risk. Do not let it become family-trauma doc. |\n\n### Music / Release / Performance\n\nAmounts here can be advances, rights fees, film/distribution budgets, or guarantee floors. They are not all cash to Alex personally.\n\n| Partner / lane | What they want | Rough initial amount | Register note |\n|---|---|---:|---|\n| Apple Music | Electric Ivory premiere, film/audio, editorial ecosystem | £1.5M-£4M / $1.875M-$5M | Strong if Alex controls tone. |\n| Spotify | First artist-page launch, filmed session, playlist/event support | £1M-£3M / $1.25M-$3.75M | Powerful but must not flatten him into algorithm. |\n| YouTube / YouTube Music | Premiere film, live performance, global clips | £1M-£3M / $1.25M-$3.75M | Useful because video/body/music all matter. |\n| Amazon Music / Prime Video | Concert film + platform release | £1.5M-£4M / $1.875M-$5M | Strong money; watch tone. |\n| Disney+ / Hulu music special | High-gloss music film | £2M-£5M / $2.5M-$6.25M | Possibly too family-safe unless directed well. |\n| Netflix music film | Global event film | £3M-£8M / $3.75M-$10M | Huge, risky, not first by default. |\n| Nonesuch | Serious cross-genre album/release home | £500k-£1.5M / $625k-$1.875M | Strong taste lane. |\n| XL Recordings / Young | Credible modern British music lane | £750k-£2M / $938k-$2.5M | Good if Alex wants a non-institutional route. |\n| Warp | Electronic/experimental credibility | £500k-£1.5M / $625k-$1.875M | Good if Electric Ivory leans machinery/time. |\n| Ninja Tune | Electronic/jazz/leftfield lane | £400k-£1.25M / $500k-$1.56M | Good if not too niche for first move. |\n| Columbia / Sony | Major label global launch | £4M-£10M / $5M-$12.5M | Big, dangerous if they overbuild. |\n| Republic / Universal | Global pop/culture launch | £5M-£12M / $6.25M-$15M | Huge money, high control risk. |\n| Warner Records | Global launch with catalogue/film tie-ins | £4M-£10M / $5M-$12.5M | Similar major-label risk. |\n| Decca | Prestige/classical-adjacent release | £1M-£3M / $1.25M-$3.75M | Risk: classical/crossover trap. |\n| Deutsche Grammophon | Classical prestige framing | £1M-£3M / $1.25M-$3.75M | Wrong by default unless Alex reshapes the premise. |\n| Askonas Holt | Serious music management | No direct fee; booking value £500k-£2M+ / $625k-$2.5M+ | Held. Must not define him as classical-only. |\n| HarrisonParrott / IMG Artists | Serious global performance management | No direct fee; booking value £500k-£2M+ / $625k-$2.5M+ | Useful market signal, risky framing. |\n| Royal Albert Hall one-off | First headline live performance | £500k-£1.5M gross / $625k-$1.875M | Big UK moment; not a classical recital unless Ryan chooses. |\n| Roundhouse / Barbican / Southbank | Smaller controlled London launch | £150k-£750k gross / $188k-$938k | Better for cross-genre control. |\n\n### Automotive / Mobility\n\nCars should be in the inbox. Some offers fit Alex's world; some are just global brands trying to buy proximity to youth, royalty-adjacent celebrity, music, fashion, and money.\n\n| Brand | What they want | Rough initial amount | Register note |\n|---|---|---:|---|\n| Aston Martin | Global campaign, launch film, Silverstone/Monaco/polo adjacency | £6M-£12M / $7.5M-$15M | Very plausible British luxury performance lane; avoid Bond cosplay. |\n| Bentley | Grand touring, heritage, Albury/Mayfair/European summer image | £5M-£10M / $6.25M-$12.5M | Plausible if elegant; risk of old-money stiffness. |\n| Rolls-Royce | Bespoke commission, Phantom/Spectre film, collector/luxury positioning | £5M-£12M / $6.25M-$15M | Huge fit on money/status, dangerous if too dynastic. |\n| Range Rover / Land Rover | Global luxury utility campaign, country/London/estate movement | £6M-£10M / $7.5M-$12.5M | Strong British-global fit; can go too royal if lazy. |\n| Jaguar | Relaunch/rebrand cultural face | £4M-£8M / $5M-$10M | Interesting if modern and risky; do not make him heritage wallpaper. |\n| Mercedes-Benz / Maybach | Global luxury/performance campaign | £6M-£12M / $7.5M-$15M | Big money, global reach, must not feel rented. |\n| Porsche | Performance/design/music film, possibly Taycan/electric | £5M-£10M / $6.25M-$12.5M | Strong if cool and driven, less aristocratic. |\n| Ferrari | Fashion/performance/cultural event access | £4M-£10M / $5M-$12.5M | Very high status, but Ferrari controls image tightly. |\n| Maserati | Italian glamour/performance campaign | £3M-£7M / $3.75M-$8.75M | Italy layer helps; risk of being second-tier Ferrari. |\n| McLaren | British performance/engineering launch | £3M-£8M / $3.75M-$10M | Good if speed/engineering, not lifestyle fluff. |\n| Ford | Global Mustang / electric / American heritage campaign | £5M-£12M / $6.25M-$15M | Absolutely could arrive. Not taste-safe, but huge reach and money. |\n| Tesla | Global tech/mobility attention play | £8M-£20M / $10M-$25M | Massive cheque, massive reputational volatility. |\n| Lucid | Luxury EV legitimacy campaign | £4M-£10M / $5M-$12.5M | Money wants him more than he needs it. |\n| Audi / BMW / Lexus / Genesis | Premium global ambassador packages | £3M-£8M / $3.75M-$10M | Plausible inbox, not first-defining unless concept is excellent. |\n\n### Technology / Consumer Electronics / Gaming\n\nThis lane should feel like the biggest commercial pressure in the room. Fashion may understand his image better; tech can write the frightening cheques.\n\n| Brand | What they want | Rough initial amount | Register note |\n|---|---|---:|---|\n| Apple | Apple brand campaign, keynote film, Mac/iPhone/music-creation story | £15M-£30M / $18.75M-$37.5M | Different from Apple Music. Enormous money and reach; operationally sensitive because Apple becomes part of his adult public architecture. |\n| Samsung | Global Galaxy campaign, Unpacked appearance, creator/musician story | £10M-£22M / $12.5M-$27.5M | Very plausible and very large. Less taste-coded, more global power. |\n| Sony | Electronics + PlayStation + music/film ecosystem | £8M-£18M / $10M-$22.5M | Strong because it can bridge music, cameras, headphones, film, gaming. |\n| Google / Pixel / YouTube | Pixel/AI/YouTube music campaign, global creator positioning | £8M-£18M / $10M-$22.5M | Big reach; needs privacy and data caution. |\n| Microsoft / Surface / Xbox | Creative workflow, gaming, music production, campus/keynote angle | £5M-£12M / $6.25M-$15M | Plausible, especially if positioned around tools and play. |\n| Meta / Instagram / Ray-Ban Meta | Social/video/fashion tech campaign | £5M-£15M / $6.25M-$18.75M | Obvious reach, high boundary risk. |\n| TikTok | Official account, live launch, music discovery, creator campaign | £10M-£25M / $12.5M-$31.25M | Huge and dangerous. Only viable if Alex controls frequency and tone. |\n| Nintendo | Gaming/culture appearance, music nostalgia, Switch campaign | £3M-£8M / $3.75M-$10M | Fun, charming, lower adult-fashion gravity. |\n| PlayStation | Game/music/film campaign, controller/headset launch, event appearance | £4M-£10M / $5M-$12.5M | Good if playful; avoid \"celebrity gamer\" cringe. |\n| Samsung / Harman / JBL |   let selectedEventId = '';
  let eventLayerFilter = 'all';
  const fileList = document.getElementById('fileList');
  const search = document.getElementById('search');
  const searchMeta = document.getElementById('searchMeta');
  const currentFile = document.getElementById('currentFile');
  const currentMeta = document.getElementById('currentMeta');
  const article = document.getElementById('article');
  const tocList = document.getElementById('tocList');
  const readerWrap = document.getElementById('readerWrap');
  const docShell = document.getElementById('docShell');
  const calendarShell = document.getElementById('calendarShell');
  const calendarGrid = document.getElementById('calendarGrid');
  const monthLabel = document.getElementById('monthLabel');
  const eventDetail = document.getElementById('eventDetail');
  const layerFilter = document.getElementById('layerFilter');
  document.getElementById('docCount').textContent = docs.length;
  document.getElementById('eventCount').textContent = events.length;
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  }
  function slugify(s, i) {
    const slug = s.toLowerCase().replace(/<[^>]+>/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    return slug || 'section-' + i;
  }
  function inlineFormat(s, query) {
    let out = escapeHtml(s);
    out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    out = out.replace(/`([^`]+)`/g, '<code>$1</code>');
    out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    out = out.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    if (query && query.length > 1) {
      const safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      out = out.replace(new RegExp('(' + safe + ')', 'ig'), '<mark>$1</mark>');
    }
    return out;
  }
  function splitTableRow(line) {
    let trimmed = line.trim();
    if (trimmed.startsWith('|')) trimmed = trimmed.slice(1);
    if (trimmed.endsWith('|')) trimmed = trimmed.slice(0, -1);
    return trimmed.split('|').map(cell => cell.trim());
  }
  function isTableSeparator(line) {
    return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line);
  }
  function renderMarkdown(md, query) {
    const lines = md.replace(/\r\n?/g, '\n').split('\n');
    let html = '';
    let toc = [];
    let para = [];
    let inCode = false;
    let code = [];
    let listType = null;
    let bq = [];
    let headingCount = 0;
    function flushPara() { if (para.length) { html += '<p>' + inlineFormat(para.join(' '), query) + '</p>'; para = []; } }
    function flushList() { if (listType) { html += '</' + listType + '>'; listType = null; } }
    function flushBq() { if (bq.length) { html += '<blockquote>' + bq.map(x => '<p>' + inlineFormat(x, query) + '</p>').join('') + '</blockquote>'; bq = []; } }
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const fence = line.match(/^```(.*)$/);
      if (fence) { flushPara(); flushList(); flushBq(); if (!inCode) { inCode = true; code = []; } else { html += '<pre><code>' + escapeHtml(code.join('\n')) + '</code></pre>'; inCode = false; code = []; } continue; }
      if (inCode) { code.push(line); continue; }
      if (!line.trim()) { flushPara(); flushList(); flushBq(); continue; }
      if (i + 1 < lines.length && line.includes('|') && isTableSeparator(lines[i + 1])) {
        flushPara(); flushList(); flushBq();
        const headers = splitTableRow(line);
        i += 2;
        const rows = [];
        while (i < lines.length && lines[i].trim().includes('|')) { rows.push(splitTableRow(lines[i])); i++; }
        i--;
        html += '<table><thead><tr>' + headers.map(h => '<th>' + inlineFormat(h, query) + '</th>').join('') + '</tr></thead><tbody>';
        for (const row of rows) html += '<tr>' + headers.map((_, idx) => '<td>' + inlineFormat(row[idx] || '', query) + '</td>').join('') + '</tr>';
        html += '</tbody></table>';
        continue;
      }
      const heading = line.match(/^(#{1,6})\s+(.+)$/);
      if (heading) { flushPara(); flushList(); flushBq(); const level = heading[1].length; const text = heading[2].replace(/\s+#+\s*$/, ''); const id = slugify(text, headingCount++); toc.push({ level, text, id }); html += '<h' + level + ' id="' + id + '">' + inlineFormat(text, query) + '</h' + level + '>'; continue; }
      if (/^\s*---+\s*$/.test(line)) { flushPara(); flushList(); flushBq(); html += '<hr>'; continue; }
      const quote = line.match(/^>\s?(.*)$/);
      if (quote) { flushPara(); flushList(); bq.push(quote[1]); continue; }
      const ul = line.match(/^\s*[-*+]\s+(.+)$/);
      const ol = line.match(/^\s*\d+[.)]\s+(.+)$/);
      if (ul || ol) { flushPara(); flushBq(); const type = ul ? 'ul' : 'ol'; if (listType !== type) { flushList(); html += '<' + type + '>'; listType = type; } html += '<li>' + inlineFormat((ul || ol)[1], query) + '</li>'; continue; }
      flushList(); flushBq(); para.push(line.trim());
    }
    flushPara(); flushList(); flushBq();
    if (inCode) html += '<pre><code>' + escapeHtml(code.join('\n')) + '</code></pre>';
    return { html, toc };
  }
  function wordCount(s) { return (s.match(/\S+/g) || []).length; }
  function renderList() {
    fileList.innerHTML = '';
    if (mode === 'calendar') { renderEventList(); return; }
    if (!filtered.length) { fileList.innerHTML = '<div class="empty">No matching files.</div>'; return; }
    filtered.forEach((doc, idx) => {
      const btn = document.createElement('button');
      btn.className = 'file-button' + (idx === current ? ' active' : '');
      btn.innerHTML = '<span class="file-name">' + escapeHtml(doc.file) + '</span><span class="file-meta">' + wordCount(doc.content) + 'w</span>';
      btn.addEventListener('click', () => { current = idx; renderDoc(); renderList(); });
      fileList.appendChild(btn);
    });
  }
  function renderDoc() {
    if (mode !== 'docs') return;
    const doc = filtered[current] || filtered[0] || docs[0];
    if (!doc) return;
    currentFile.textContent = doc.file;
    currentMeta.textContent = wordCount(doc.content) + ' words';
    const q = search.value.trim();
    document.documentElement.style.setProperty('--font-size', fontSize + 'px');
    if (rawMode) {
      article.className = 'raw-view';
      article.innerHTML = inlineFormat(doc.content, q);
      tocList.innerHTML = '<div class="empty">Raw view has no section links.</div>';
    } else {
      article.className = 'article';
      const rendered = renderMarkdown(doc.content, q);
      article.innerHTML = rendered.html;
      tocList.innerHTML = rendered.toc.length ? rendered.toc.filter(h => h.level <= 3).map(h => '<a class="toc-item toc-h' + h.level + '" href="#' + h.id + '">' + escapeHtml(h.text) + '</a>').join('') : '<div class="empty">No headings found.</div>';
    }
    readerWrap.scrollTop = 0;
  }
  function applySearch() {
    const q = search.value.trim().toLowerCase();
    if (mode === 'calendar') { renderCalendar(); renderEventList(); return; }
    const previousFile = filtered[current]?.file;
    filtered = q ? docs.filter(doc => doc.file.toLowerCase().includes(q) || doc.content.toLowerCase().includes(q)) : docs.slice();
    current = Math.max(0, filtered.findIndex(doc => doc.file === previousFile));
    if (current < 0) current = 0;
    searchMeta.textContent = q ? filtered.length + ' matching file' + (filtered.length === 1 ? '' : 's') : 'Type to filter.';
    renderList(); renderDoc();
  }
  function parseDateOnly(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    return new Date(y, m - 1, d);
  }
  function isoDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }
  function monthName(ym) {
    const [y, m] = ym.split('-').map(Number);
    return new Date(y, m - 1, 1).toLocaleString(undefined, { month: 'long', year: 'numeric' });
  }
  function eventMatches(e) {
    const q = search.value.trim().toLowerCase();
    const layerOk = eventLayerFilter === 'all' || e.diary_layer === eventLayerFilter || e.category === eventLayerFilter || e.alex_default_status === eventLayerFilter;
    if (!layerOk) return false;
    if (!q) return true;
    return Object.values(e).some(v => String(v).toLowerCase().includes(q));
  }
  function filteredEvents() { return events.filter(eventMatches); }
  function eventDays(e) {
    const out = [];
    const start = parseDateOnly(e.start_date);
    const end = parseDateOnly(e.end_date || e.start_date);
    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) out.push(isoDate(d));
    return out;
  }
  function badgeClass(e) {
    if (e.diary_layer.includes('locked') || e.alex_default_status.includes('confirmed')) return 'event-confirmed';
    if (e.diary_layer.includes('canon') || e.event_kind.includes('canon')) return 'event-canon';
    if (e.diary_layer.includes('commercial')) return 'event-commercial';
    if (e.diary_layer.includes('likely') || e.diary_layer.includes('possible') || e.diary_layer.includes('soft')) return 'event-hold';
    return 'event-public';
  }
  function renderCalendar() {
    const [year, month] = calendarMonth.split('-').map(Number);
    monthLabel.textContent = monthName(calendarMonth);
    const first = new Date(year, month - 1, 1);
    const last = new Date(year, month, 0);
    const start = new Date(first);
    const startOffset = (first.getDay() + 6) % 7;
    start.setDate(first.getDate() - startOffset);
    const visibleEvents = filteredEvents();
    const byDay = new Map();
    for (const e of visibleEvents) {
      for (const day of eventDays(e)) {
        if (!byDay.has(day)) byDay.set(day, []);
        byDay.get(day).push(e);
      }
    }
    let html = '<div class="weekday">Mon</div><div class="weekday">Tue</div><div class="weekday">Wed</div><div class="weekday">Thu</div><div class="weekday">Fri</div><div class="weekday">Sat</div><div class="weekday">Sun</div>';
    for (let i = 0; i < 42; i++) {
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      const iso = isoDate(d);
      const inMonth = d.getMonth() === month - 1;
      const dayEvents = (byDay.get(iso) || []).sort((a, b) => (a.diary_layer + a.event_name).localeCompare(b.diary_layer + b.event_name));
      html += '<div class="day-cell ' + (inMonth ? '' : 'muted-day') + '"><div class="day-num">' + d.getDate() + '</div><div class="day-events">';
      for (const e of dayEvents.slice(0, 5)) {
        html += '<button class="event-pill ' + badgeClass(e) + '" data-event-id="' + escapeHtml(e.event_id) + '">' + escapeHtml(e.event_name) + '</button>';
      }
      if (dayEvents.length > 5) html += '<div class="more-events">+' + (dayEvents.length - 5) + ' more</div>';
      html += '</div></div>';
    }
    calendarGrid.innerHTML = html;
    calendarGrid.querySelectorAll('[data-event-id]').forEach(btn => btn.addEventListener('click', () => selectEvent(btn.dataset.eventId)));
    const count = visibleEvents.length;
    searchMeta.textContent = count + ' calendar event' + (count === 1 ? '' : 's') + ' shown.';
    renderEventDetail();
  }
  function renderEventList() {
    const list = filteredEvents().sort((a, b) => (a.start_date + a.event_name).localeCompare(b.start_date + b.event_name));
    if (!list.length) { fileList.innerHTML = '<div class="empty">No matching events.</div>'; return; }
    fileList.innerHTML = list.map(e => '<button class="file-button ' + (e.event_id === selectedEventId ? 'active' : '') + '" data-event-id="' + escapeHtml(e.event_id) + '"><span class="file-name">' + escapeHtml(e.event_name) + '</span><span class="file-meta">' + escapeHtml(e.start_date.slice(5)) + '</span></button>').join('');
    fileList.querySelectorAll('[data-event-id]').forEach(btn => btn.addEventListener('click', () => selectEvent(btn.dataset.eventId)));
  }
  function selectEvent(id) {
    selectedEventId = id;
    const e = events.find(x => x.event_id === id);
    if (e && e.start_date) calendarMonth = e.start_date.slice(0, 7);
    renderCalendar(); renderEventList(); renderEventDetail();
  }
  function renderEventDetail() {
    const list = filteredEvents();
    const e = events.find(x => x.event_id === selectedEventId) || list[0];
    if (!e) { eventDetail.innerHTML = '<div class="empty">No event selected.</div>'; return; }
    selectedEventId = e.event_id;
    const dateLine = e.start_date === e.end_date ? e.start_date : e.start_date + ' to ' + e.end_date;
    eventDetail.innerHTML = '<h2>' + escapeHtml(e.event_name) + '</h2>'
      + '<div class="detail-date">' + escapeHtml(dateLine + (e.start_time_local ? ' · ' + e.start_time_local : '') + ' · ' + e.city + ', ' + e.country) + '</div>'
      + '<div class="chip-row"><span>' + escapeHtml(e.diary_layer) + '</span><span>' + escapeHtml(e.alex_default_status) + '</span><span>' + escapeHtml(e.category) + '</span></div>'
      + detailRow('Attendance', e.attendance_default)
      + detailRow('Venue / Area', e.venue_or_area)
      + detailRow('Likely Rooms', e.likely_rooms)
      + detailRow('Commercial Pressure', e.commercial_pressure)
      + detailRow('Privacy Risk', e.privacy_risk)
      + detailRow('Travel Logic', e.travel_logic)
      + detailRow('Render Note', e.render_note)
      + detailRow('Canon Note', e.canon_note)
      + (e.source_url ? '<p><a href="' + escapeHtml(e.source_url) + '">Source</a></p>' : '');
  }
  function detailRow(k, v) { return v ? '<div class="detail-row"><strong>' + escapeHtml(k) + '</strong><p>' + escapeHtml(v) + '</p></div>' : ''; }
  function setMode(next) {
    mode = next;
    document.getElementById('docsModeBtn').classList.toggle('active', mode === 'docs');
    document.getElementById('calendarModeBtn').classList.toggle('active', mode === 'calendar');
    docShell.hidden = mode !== 'docs';
    calendarShell.hidden = mode !== 'calendar';
    document.getElementById('renderBtn').style.display = mode === 'docs' ? '' : 'none';
    document.getElementById('rawBtn').style.display = mode === 'docs' ? '' : 'none';
    document.getElementById('prevBtn').textContent = mode === 'docs' ? 'Prev' : 'Prev Month';
    document.getElementById('nextBtn').textContent = mode === 'docs' ? 'Next' : 'Next Month';
    search.placeholder = mode === 'docs' ? 'Search canon files...' : 'Search diary events...';
    if (mode === 'calendar') {
      currentFile.textContent = 'Diary Calendar';
      currentMeta.textContent = events.length + ' events from 54_EVENTS_DIARY_CALENDAR.csv';
      tocList.innerHTML = '<div class="legend"><div><span class="dot event-confirmed"></span>Confirmed/current</div><div><span class="dot event-canon"></span>Canon/private</div><div><span class="dot event-commercial"></span>Commercial inbox</div><div><span class="dot event-hold"></span>Hold/invite</div><div><span class="dot event-public"></span>Public weather</div></div>';
      renderCalendar(); renderEventList();
    } else {
      applySearch();
    }
  }
  search.addEventListener('input', applySearch);
  layerFilter.addEventListener('change', () => { eventLayerFilter = layerFilter.value; renderCalendar(); renderEventList(); });
  document.getElementById('docsModeBtn').addEventListener('click', () => setMode('docs'));
  document.getElementById('calendarModeBtn').addEventListener('click', () => setMode('calendar'));
  document.getElementById('renderBtn').addEventListener('click', () => { rawMode = false; document.getElementById('renderBtn').classList.add('active'); document.getElementById('rawBtn').classList.remove('active'); renderDoc(); });
  document.getElementById('rawBtn').addEventListener('click', () => { rawMode = true; document.getElementById('rawBtn').classList.add('active'); document.getElementById('renderBtn').classList.remove('active'); renderDoc(); });
  document.getElementById('smallerBtn').addEventListener('click', () => { fontSize = Math.max(13, fontSize - 1); renderDoc(); });
  document.getElementById('largerBtn').addEventListener('click', () => { fontSize = Math.min(22, fontSize + 1); renderDoc(); });
  document.getElementById('prevBtn').addEventListener('click', () => {
    if (mode === 'calendar') { const [y, m] = calendarMonth.split('-').map(Number); const d = new Date(y, m - 2, 1); calendarMonth = isoDate(d).slice(0, 7); renderCalendar(); return; }
    if (!filtered.length) return; current = (current - 1 + filtered.length) % filtered.length; renderList(); renderDoc();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    if (mode === 'calendar') { const [y, m] = calendarMonth.split('-').map(Number); const d = new Date(y, m, 1); calendarMonth = isoDate(d).slice(0, 7); renderCalendar(); return; }
    if (!filtered.length) return; current = (current + 1) % filtered.length; renderList(); renderDoc();
  });
  document.addEventListener('keydown', e => {
    if (e.target === search) return;
    if (e.key === '/') { e.preventDefault(); search.focus(); }
    if (e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
    if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
  });
  renderList(); renderDoc();
})();</script>
