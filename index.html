 US #1 for 28 weeks; UK #1 for 19 weeks |\n| Certification | multi-Diamond 15x |\n\nThis is where \"Pulling a Rosie Walker\" begins to take shape: escape, safe house, radio silence, choosing life over machinery.\n\nTracks: `Phoenix (Rise Up)`; `Radio Silence`; `Runaway Heartbeat`; `Static Interference`; `Video Star`; `Transmission`; `Frequency`; `The Safe House`; `Modern Love`; `Broadcasting Live`; `Signal Lost`; `Homecoming`; `Turn It Up`.\n\nSingles: `Phoenix (Rise Up)` (#1, 14 weeks, 3.8B streams, most-licensed song in history, every Olympics since 1984, 380+ hip-hop samples, about $40M/year sync); `Runaway Heartbeat` (#1, 8 weeks, written about Homer); `Radio Silence` (#1, 6 weeks); `The Safe House` (#1, 4 weeks); `Turn It Up` (#1, 3 weeks).\n\n### 8. The Last Cathedral\n\n| Field | Canon |\n|---|---|\n| Year | 1979 |\n| Label | Walker Records |\n| Vibe | cinematic; orchestral; final |\n| Producer | Rosie Walker |\n| Recorded | Abbey Road Studios, Homer engineering |\n| Grammy | Album of the Year 1980 |\n| Chart | US #1 for 31 weeks; UK #1 for 22 weeks; #1 in 27 countries |\n| Certification | multi-Diamond 10x |\n\nThe long goodbye. At the 1980 Grammys, Rosie accepts Album of the Year and says, \"Thank you. I'm done.\" It is a soft stop: in 1980 Rosie and Homer step away from touring, interviews, promo, and the press machine, not from music or work. Rosie remains very much in the public eye: recording when she chooses, selective appearances, cultural gravity, private/event performances, and Phoenix Hollow as the room everyone wants.\n\nTracks: `Before the Quiet`; `The Long Goodbye`; `Echoes in the Hall`; `Shadows`; `Final Confession`; `Swan Song`; `Turn Out the Lights`; `The Heavy Curtain`; `My Legacy`; `Walking Away`; `No More Encores`; `Homer's Hymn`; `The Last Cathedral`.\n\nSingles: `Walking Away` (#1, 10 weeks); `The Long Goodbye` (#1, 6 weeks); `My Legacy` (#1, 5 weeks); `No More Encores` (#1, 4 weeks).\n\n### 9. Glass Garden\n\n| Field | Canon |\n|---|---|\n| Year | 1995 |\n| Label | Walker Records, distributed by UMG |\n| Vibe | ambient gospel; early digital textures; analogue warmth fighting machines |\n| Producer | Homer Wilson at Phoenix Hollow Studio |\n| Grammy | Album of the Year 1996 |\n| Chart | US #1; UK #1; #1 in 31 countries |\n| Certification | multi-Diamond 7x |\n\nThe return after 16 years. No announcement, interview, or tour. Walker Records issues one statement; the album appears and moves 3M copies in week one.\n\nTracks: `Glass Garden`; `Root System`; `Human Frequency`; `The Shape of Breath`; `Circuit Hymnal`; `Soil & Signal`; `Window Without Sky`; `The Patient Machine`; `Harvest Code`; `Eden in Reverse`; `The Listening Field`; `Still It Grows`.\n\nSingles: `Glass Garden`; `Human Frequency`; `Eden in Reverse`. All are global #1s.\n\n### 10. A House With No Mirrors\n\n| Field | Canon |\n|---|---|\n| Year | 2003 |\n| Label | Walker Records, distributed by UMG |\n| Vibe | chamber pop; minimal piano; early 2000s experimental electronica; voice-forward |\n| Producer | Homer Wilson at Phoenix Hollow Studio |\n| Grammy | Album of the Year 2004 |\n| Chart | US #1; UK #1; #1 in 34 countries |\n| Certification | multi-Diamond 8x |\n\nRecorded 2002 to early 2003 and completed before Alex's birth. Walker Records holds release briefly. It arrives in the same year Alex is born in Lexington and brought home to Phoenix Hollow.\n\nTracks: `A House With No Mirrors`; `First Light Through Curtains`; `The Unnamed Room`; `Skin Without History`; `Quiet Inheritance`; `Thread & Bone`; `Before Language`; `The Smallest Sound`; `What We Keep`; `Echo Without Source`; `Holding Pattern`; `Unwritten Ground`; `Open Door No Witness`.\n\nSingles: `A House With No Mirrors`; `Quiet Inheritance`; `What We Keep`. All are global #1s.\n\n### 11. Black Sun Archive\n\n| Field | Canon |\n|---|---|\n| Year | 2008 |\n| Label | Walker Records, distributed by UMG |\n| Vibe | industrial classical; fractured orchestration; low-end electronics; silence as structure |\n| Producer | Homer Wilson at Phoenix Hollow Studio |\n| Grammy | Album of the Year 2009 |\n| Chart | US #1; UK #1; #1 in 30 countries |\n| Certification | multi-Diamond 6x |\n\nReleased as David's spiral hardens into a sustained absence. Alex is 4-5. It is not death grief; it is a system for storing the grief of watching and not being able to stop it. After McQueen's February 2010 suicide, the record is retrospectively heard inside the family as the sound of the last attempt failing. Rosie has never explained it publicly.\n\nTracks: `Black Sun Archive`; `Entry Without Exit`; `The Last Photograph`; `Static for the Living`; `Bone Ledger`; `Unsent Letters`; `The Room After`; `Negative Light`; `Catalogue of Absence`; `A Voice in Storage`; `The Weight of Names`; `Burn After Listening`.\n\nSingles: `Black Sun Archive`; `The Last Photograph`; `Catalogue of Absence`. All are global #1s.\n\n### 12. The Quiet Index\n\n| Field | Canon |\n|---|---|\n| Year | 2021 |\n| Label | Walker Records, distributed by UMG |\n| Vibe | post-genre minimalism; spatial audio thinking; near-silence; precision composition |\n| Producer | Homer Wilson at Phoenix Hollow Studio |\n| Grammy | Album of the Year 2022 |\n| Chart | US #1; UK #1; #1 in 38 countries |\n| Certification | multi-Diamond 5x and climbing |\n\nPandemic-period record. Alex is 17, finishing Westminster and preparing for RAM. He listens to it alone the night it drops. Title track gets 40M streams in 72 hours. Rosie gives no interview, post, or explanation.\n\nTracks: `The Quiet Index`; `Measured Silence`; `Signal to Dust`; `The Distance Between Notes`; `Archive of Air`; `A World Without Edges`; `Slow Data`; `The Final Interval`; `Everything Still Moving`; `The Listener Disappears`; `Index Complete`.\n\nSingles: `The Quiet Index`; `Signal to Dust`; `Everything Still Moving`. All are global #1s.\n\n## Tours\n\nRosie has not toured since 1980.\n\n| Tour | Years | Notes |\n|---|---|---|\n| The Holler Tour | 1966 | early folk-era tour |\n| The Baptized Tour | 1968-1969 | Muscle Shoals breakthrough period |\n| The Imperial Tour | 1970-1971 | stadium breakthrough; Shea Stadium and MSG-scale mythology |\n| The Starlight Tour | 1972-1973 | glam/hard-rock summit; Queen opened the 1973 leg |\n| The Chrome Tour | 1975 | difficult Berlin-era tour |\n| The Long Goodbye Tour | 1977-1979 | farewell arc; Homer front-of-house sound; Tom Petty opened 1977 leg; The Police opened 1979 leg; `Phoenix (Rise Up)` debuted live |\n\n## Confirmed Hidden/Industry-Only Songwriting And Placement Lore\n\nThese are real in canon but not public-press default. Use them for plugged-in music-world rooms, Phoenix Hollow lore, publishing discussions, or private industry artifacts. Do not have random fans know all of them.\n\n| Year | Work | Artist | Credit/Lore |\n|---:|---|---|---|\n| 1967 | Chain of Mercy | Aretha Franklin | full co-write; originally folk, Aretha made it gospel; #1 R&B |\n| 1968 | Piece of My Soul | Janis Joplin | written during a late-night San Francisco jam; #4 US |\n| 1969 | Suspicious Minds | Elvis Presley | bridge and fade-out vocal arrangement; #1 US |\n| 1970 | Stoney End | Barbra Streisand | written on a napkin in a New York diner; #6 US |\n| 1972 | Rocket Man | Elton John | melody contribution; Elton credits her in memoir; #2 UK |\n| 1973 | Desperado | Eagles | helped finish the third verse |\n| 1974 | Rebel Rebel | David Bowie | guitar riff; birthday gift; #5 UK |\n| 1975 | Fame | David Bowie | funk guitar line; Lennon received co-write instead |\n| 1976 | Dancing Queen | ABBA | Stockholm collaboration; uncredited/disputed; #1 US |\n| 1977 | Dreams | Fleetwood Mac | sat with Stevie Nicks while she wrote it; disputed but acknowledged by Nicks; #1 US |\n| 1977 | Heroes | David Bowie | Eno confirms Rosie hummed the counter-melody; #24 UK |\n| 1978 | I Will Survive | Gloria Gaynor | piano intro; #1 US |\n| 1979 | The Rose | Bette Midler | written by Rosie for Bette under pseudonym; #3 US |\n| 1979 | London Calling | The Clash | rhythm guitar on demo; uncredited; #11 UK |\n| 1980 | 9 to 5 | Dolly Parton | helped create typewriter percussion rhythm; #1 US |\n| 1983 | Total Eclipse of the Heart | Bonnie Tyler | written by Rosie in 1979 and given to Jim Steinman; #1 US |\n| 1995-2025 | Post-1995 placements | various artists | selective reduced-rate placements, about two per year; add specific works only when Ryan locks them |\n\n## Unverified Industry Legends\n\nThese are rumors and should stay rumors unless Ryan locks one.\n\n| Legend | Status |\n|---|---|\n| `Hotel California` | rumored Rosie involvement |\n| `Imagine` | rumor only |\n| `Bohemian Rhapsody` | rumor only |\n| `Space Oddity` | rumor only |\n| Rolling Stones/Pink Floyd/Blondie lore | rumor-only territory |\n| Tina Turner `Nuthin'` lore | rumor-only territory unless specified |\n\n## Scene Guards\n\n- Rosie is not a country singer.\n- Phoenix Hollow is not Nashville.\n- Country-adjacent friends can exist in Phoenix Hollow, but they do not define the room.\n- Alex plays piano, guitar, and violin only.\n- Alex has no adult Nashville/Opry/Bluebird performance history.\n- Do not make Rosie's catalog a generic \"discography.\" It is industry infrastructure.\n- Do not overexplain Rosie's importance inside scenes where everyone already knows who she is.\n"},{"file":"44_HOMER_PRODUCTION_CREDITS.md","content":"# Homer Wilson Production And Engineering Credits\n\nUse this file when a scene, press note, chat, or music-world artifact needs Homer's deep professional identity.\n\nThis file is the complete Homer credit reference.\n\nThis file is not just a Rosie-credit list. Homer has a large non-Rosie production and engineering career.\n\nWhen asked for \"all Homer credits,\" do not answer with only the Rosie albums. Give the locked non-Rosie credits, the Rosie credits, the Silver Jubilee Album, and the HWAM/rights layer.\n\n## Category Lock\n\nHomer Wilson is a record producer and sound engineer with Abbey Road roots. He is not a country producer, Nashville session patriarch, or casual celebrity producer.\n\nDefault names:\n\n| Context | Use |\n|---|---|\n| Household/private | Homer, Papa |\n| Music-world/ordinary prose | Homer Wilson, Homer |\n| Formal British context | the Earl of Albury, Lord Albury |\n| Avoid | Sir Homer; knighted styling; casual title performance |\n\nHomer lives at Phoenix Hollow at story-open. He is not London-based, Sardinia-based, or actively moving through public industry rooms unless Ryan places him there.\n\n## Professional Identity\n\n| Field | Canon |\n|---|---|\n| Core identity | greatest living record producer/sound engineer |\n| Early base | Abbey Road Studios, London |\n| Technical signature | exacting microphone placement, spatial intelligence, warmth under scale, silence as part of arrangement |\n| Public posture | private, selective, no press machine |\n| Home studio | Phoenix Hollow Studio |\n| Rights entity | Homer Wilson Asset Management / HWAM inside WilsonWalker |\n| Key personal relationship | married Rosie Walker in 1971 after meeting during `Good Girls Go to Heaven` sessions |\n| Household truth | Papa to Alex |\n\n## Career Architecture\n\nHomer's career has four layers:\n\n| Layer | Scope | Use In Scenes |\n|---|---|---|\n| Abbey Road apprenticeship | 1960s Beatles-era engineering work and studio training | serious music historians, engineers, older rock figures |\n| public landmark credits | fully named albums/events such as `Honky Chateau`, `Goodbye Yellow Brick Road`, Rosie's albums, and the Silver Jubilee Album | press, music-world chats, awards/profiles |\n| royalty-stream credits | work with Beatles, Pink Floyd, Bowie, Zeppelin, Springsteen, Rolling Stones, Elton, Alicia Keys, and others | business notes, HWAM, archive/reissue discussions |\n| Phoenix Hollow era | selective production, remastering, technical IP, Rosie return albums | private studio scenes, WilsonWalker/HWAM context |\n\nDo not flatten this into \"Homer produced Rosie's albums.\" That is only one part of the career.\n\n## Career Timeline\n\n| Year/Period | Credit/Event | Notes |\n|---|---|---|\n| 1965-1969 | Abbey Road Studios apprenticeship / Beatles-era engineering | assistant engineer, tape operator, second engineer, and selected session engineer work across the locked Beatles credits below |\n| 1970 | `Good Girls Go to Heaven`, Rosie Walker | engineer; Abbey Road; met Rosie during sessions |\n| 1971 | `Neon Cathedral`, Rosie Walker | engineer; Abbey Road/Laurel Canyon era |\n| 1972 | `Honky Chateau`, Elton John | engineer; Elton/Homer relationship before the larger 1973 landmark |\n| 1973 | `Goodbye Yellow Brick Road`, Elton John | engineered/co-produced; landmark credit; lifelong Elton friendship begins |\n| 1970s | Pink Floyd / Bowie / Zeppelin / Rolling Stones / David Gilmour | locked credits below; Homer becomes a serious cross-scene engineering and production figure |\n| 1977 | Silver Jubilee Album | produced; multiple British/Commonwealth artists, royal patronage, charity proceeds to Silver Jubilee Trust |\n| 1977 | Created 1st Earl of Albury | for Silver Jubilee Album and service to British cultural life |\n| 1977 | `Radio Silence`, Rosie Walker | co-producer with Rosie; first full Rosie co-production credit |\n| 1977-1979 | The Long Goodbye Tour | front-of-house sound |\n| 1979 | `The Last Cathedral`, Rosie Walker | engineer; co-wrote `Homer's Hymn` |\n| 1980s-1990s | selective studio work | Phoenix Hollow compound studio becomes central; locked credits include Springsteen, Stones, Pink Floyd, Gilmour, and selected producer/consultant work |\n| 2001 | `Songs in A Minor`, Alicia Keys | producer on selected sessions; piano/vocal recording architecture |\n| 1995 | `Glass Garden`, Rosie Walker | producer at Phoenix Hollow Studio |\n| 2003 | `A House With No Mirrors`, Rosie Walker | producer at Phoenix Hollow Studio |\n| 2008 | `Black Sun Archive`, Rosie Walker | producer at Phoenix Hollow Studio |\n| 2021 | `The Quiet Index`, Rosie Walker | producer at Phoenix Hollow Studio |\n| 2014-2019 | London co-residence years | Albury House music floor upgraded for Alex's school years; Homer remains selective and remote where possible |\n| 2019-present | Phoenix Hollow primary base | back primarily at Phoenix Hollow; advises Alex privately; continues working and takes projects that interest him |\n\n## Locked Non-Rosie Credits\n\nThese are the locked non-Rosie credits for v20. Do not add album titles beyond this list unless Ryan explicitly locks them.\n\n| Year | Work | Artist/Event | Homer Credit | Notes |\n|---|---|---|---|---|\n| 1965 | `Help!` | The Beatles | tape operator / assistant engineer on selected Abbey Road sessions | early apprenticeship credit |\n| 1965 | `Rubber Soul` | The Beatles | assistant engineer | first serious Beatles-era credit |\n| 1966 | `Revolver` | The Beatles | second engineer / tape operations | tape manipulation and signal-chain apprenticeship |\n| 1967 | `Sgt. Pepper's Lonely Hearts Club Band` | The Beatles | assistant engineer / tape operations | major Abbey Road formation record |\n| 1967 | `Magical Mystery Tour` sessions | The Beatles | second engineer on selected sessions | Beatles-era experimental workflow |\n| 1968 | `The Beatles` / `White Album` | The Beatles | second engineer on selected sessions | long-form session discipline |\n| 1969 | `Abbey Road` | The Beatles | engineer / second engineer on selected sessions | the Abbey Road credit people cite first |\n| 1970 | `Let It Be` | The Beatles | Abbey Road post-production engineering support | technical/post-production support, not the primary production credit |\n| 1971 | `Sticky Fingers` | The Rolling Stones | engineer on London overdubs / mix support | early Stones royalty-stream credit |\n| 1971 | `Hunky Dory` | David Bowie | engineer on selected London sessions | early Bowie relationship |\n| 1972 | `Honky Chateau` | Elton John | engineer | early Elton/Homer connection |\n| 1972 | `Exile on Main St.` | The Rolling Stones | mix engineer / technical consultant | Stones credit; not public-facing producer identity |\n| 1972 | `The Rise and Fall of Ziggy Stardust and the Spiders from Mars` | David Bowie | engineering consultant on selected sessions | Bowie glam-era connection |\n| 1973 | `The Dark Side of the Moon` | Pink Floyd | technical consultant / tape and signal-chain advisor | Alan Parsons remains primary engineer; Homer is the specialist voice |\n| 1973 | `Goodbye Yellow Brick Road` | Elton John | engineered/co-produced | landmark non-Rosie credit; secured reputation; began lifelong Elton friendship |\n| 1975 | `Physical Graffiti` | Led Zeppelin | mix consultant / engineering support | Zeppelin royalty-stream credit |\n| 1975 | `Wish You Were Here` | Pink Floyd | mix consultant / signal-chain advisor | deepens David Gilmour friendship |\n| 1975 | `Born to Run` | Bruce Springsteen | mix consultant / final sound architecture | Springsteen royalty-stream credit |\n| 1976 | `Station to Station` | David Bowie | engineering consultant | transition-era Bowie credit |\n| 1977 | `Low` | David Bowie | mix/signal-chain consultant | Berlin-era connection; Rosie/Eno context adjacent |\n| 1977 | `Animals` | Pink Floyd | mix consultant | Pink Floyd/Gilmour credit |\n| 1977 | Silver Jubilee Album | major British/Commonwealth artists; royal patronage | producer | album tied directly to Homer's creation as 1st Earl of Albury |\n| 1977-1979 | The Long Goodbye Tour | Rosie Walker live | front-of-house sound | live sound rather than studio album credit |\n| 1978 | `David Gilmour` | David Gilmour | co-producer / engineer | confirms Gilmour as Homer's closest craft friend |\n| 1978 | `Some Girls` | The Rolling Stones | mix consultant | late-70s Stones credit |\n| 1978 | `Darkness on the Edge of Town` | Bruce Springsteen | mix consultant / engineering advisor | Springsteen credit, more restrained than `Born to Run` |\n| 1979 | `Heroes` sessions legacy / Bowie late-70s archive work | David Bowie | archival mix consultant / credit royalty | use carefully; not a producer credit |\n| 1979 | `The Wall` | Pink Floyd | technical consultant on selected mixes | not producer; not primary engineer |\n| 1980 | `Scary Monsters (and Super Creeps)` | David Bowie | mix consultant | late Bowie credit |\n| 1982 | `Nebraska` | Bruce Springsteen | mastering/transfer consultant | technical intimacy; not a production takeover |\n| 1983 | `Let's Dance` | David Bowie | mix consultant | pop-era Bowie credit |\n| 1984 | `Born in the U.S.A.` | Bruce Springsteen | mix consultant / final playback advisor | major Springsteen royalty-stream credit |\n| 1987 | `A Momentary Lapse of Reason` | Pink Floyd | engineering consultant | Gilmour-led Pink Floyd era |\n| 1989 | `Steel Wheels` | The Rolling Stones | mix consultant | late Stones credit |\n| 1994 | `The Division Bell` | Pink Floyd | technical consultant / playback advisor | late Pink Floyd credit |\n| 2001 | `Songs in A Minor` | Alicia Keys | producer on selected sessions / piano-vocal recording architecture | explains Alicia's Phoenix Hollow room access |\n| 2006 | `On an Island` | David Gilmour | producer / engineer on selected sessions | private Gilmour/Homer craft friendship |\n| 2014 | `The Endless River` | Pink Floyd | archive consultant / mix consultant | late archival Pink Floyd credit |\n\n## HWAM / Rights Layer\n\nHomer Wilson Asset Management, or HWAM, sits inside WilsonWalker and manages Homer's production legacy.\n\n| Asset Type | Canon |\n|---|---|\n| Production royalties | points on records Homer produced, engineered, mixed, or consulted on for major artists |\n| Annual revenue | $12M from production royalties |\n| Technology licensing | custom audio equipment modification, microphone design, signal-chain optimization, recording techniques (note: foundational audio patents were spun out to Albury Acoustics in 1988 and are no longer held by HWAM) |\n| Annual technology revenue | $3M |\n| Credit usage licensing | documentaries, music histories, educational material |\n| Annual credit/licensing revenue | $750K |\n| Studio IP | Phoenix Hollow console specifications, acoustic design, custom equipment, technical documentation |\n| Archive | session tapes, notes, technical documentation, photographs, and Homer's own career materials |\n\nThis matters because Homer is not merely \"Rosie's husband who produced her later records.\" He has a monetized, administered, historically significant production estate.\n\n## Rosie Walker Credits\n\n| Year | Work | Credit | Location | Canon Notes |\n|---:|---|---|---|---|\n| 1970 | `Good Girls Go to Heaven` | engineer | Abbey Road | stopped a take over mic placement; Rosie said, \"Show me\"; they married in 1971 |\n| 1971 | `Neon Cathedral` | engineer | Abbey Road / Laurel Canyon | second consecutive Album of the Year album in which he is part of the sound architecture |\n| 1977 | `Radio Silence` | co-producer | Laurel Canyon | first full co-production credit with Rosie; warm machine language; `Phoenix (Rise Up)` era |\n| 1979 | `The Last Cathedral` | engineer | Abbey Road | long goodbye; Homer engineering; final public-period album before soft stop |\n| 1979 | `Homer's Hymn` | co-writer | `The Last Cathedral`, track 12 | only track explicitly named for him; love letter in music |\n| 1995 | `Glass Garden` | producer | Phoenix Hollow Studio | return collaboration after 16-year gap |\n| 2003 | `A House With No Mirrors` | producer | Phoenix Hollow Studio | completed before Alex's birth; released same year Alex is born in Lexington and brought home to Phoenix Hollow |\n| 2008 | `Black Sun Archive` | producer | Phoenix Hollow Studio | David spiral / watching-and-not-being-able-to-stop-it grief; not death grief |\n| 2021 | `The Quiet Index` | producer | Phoenix Hollow Studio | post-genre minimalism; Alex is 17 and hears it while finishing Westminster |\n\n## Elton John / Honky Chateau / Goodbye Yellow Brick Road\n\n`Goodbye Yellow Brick Road` is Homer's landmark non-Rosie credit, but it is not his only Elton credit. `Honky Chateau` is also canon.\n\n| Field | Canon |\n|---|---|\n| Early Elton credit | `Honky Chateau`, 1972, engineer |\n| Landmark Elton credit | `Goodbye Yellow Brick Road`, 1973 |\n| Artist | Elton John |\n| Collaborators | Elton John, Bernie Taupin |\n| Homer role | engineer on `Honky Chateau`; engineered/co-produced `Goodbye Yellow Brick Road` |\n| Importance | secured his reputation and began lifelong Elton friendship |\n| Story use | explains why Elton is Phoenix Hollow family-circle uncle texture, not a casual celebrity cameo |\n\nDo not overuse this as gossip. In-story, people who know music know exactly what this credit means.\n\n## Silver Jubilee Album\n\n| Field | Canon |\n|---|---|\n| Year | 1977 |\n| Homer role | producer |\n| Recording base | Abbey Road |\n| Artists | multiple major British/Commonwealth artists; Rosie is one featured artist |\n| Patronage | royal patronage |\n| Proceeds | charity proceeds to the Silver Jubilee Trust |\n| Consequence | Homer created 1st Earl of Albury in the Silver Jubilee Honours of June 1977 |\n\nThe earldom is tied to service to British cultural life and the Silver Jubilee Album. Homer chose `Albury` from Albury House, the Kensington house he had already bought; the title is not named for a village in this canon. It is not a performance identity for Homer.\n\n## Phoenix Hollow Studio\n\nPhoenix Hollow Studio is Homer's home studio and the sound centre of Rosie's post-soft-stop work.\n\nUse it for:\n\n- Rosie return albums\n- private technical work\n- selective invited sessions\n- Alex listening, practice, and technical education\n- music-world intimacy that is private rather than public-facing\n\nDo not use it for:\n\n- Nashville industry defaults\n- public release events\n- open celebrity drop-ins\n- country jam shorthand\n- random people wandering into Rosie's or Homer's work\n\n## Relationship To Alex's Music\n\nHomer can advise Alex technically. He does not own Alex's music and does not turn every Alex scene into family-legacy instruction.\n\nCanon Alex instruments:\n\n- piano, principal\n- guitar\n- violin\n\nAlex has public piano and broadcast performance history, but no standalone public recording releases, no Spotify artist profile, no label deal, no artist launch, and no adult Nashville/Bluebird/Opry performance history at story-open.\n\n## What Homer Sounds Like In Music Scenes\n\nHomer is specific rather than grand.\n\nGood Homer lines:\n\n- \"Go again.\"\n- \"Listen at 2:14.\"\n- \"Lower register.\"\n- \"The room is answering you there.\"\n- \"Leave the silence alone.\"\n\nBad Homer lines:\n\n- public legacy speeches\n- celebrity anecdotes as self-display\n- casual \"back in Nashville\" color\n- press-ready explanations of Alex\n- title jokes from Homer himself\n\n## Public Knowledge And Access\n\nHomer's major credits are publicly known inside music history. The emotional meaning of those credits inside the Walker/Wilson household is private.\n\n| Knowledge Type | Who Can Use It |\n|---|---|\n| Abbey Road roots | public/music-world |\n| locked Beatles-era credits | public/music-world |\n| Rosie engineering/production credits | public/music-world |\n| `Honky Chateau` credit | public/music-world |\n| `Goodbye Yellow Brick Road` credit | public/music-world |\n| Silver Jubilee Album/earldom link | public/formal |\n| locked Bowie/Zeppelin/Springsteen/Rolling Stones/Pink Floyd credits | business/music-world |\n| how he taught Alex to listen | private/family/studio |\n| detailed Phoenix Hollow working process | private/music-world if present |\n\n## Failure Guards\n\n- Do not call him \"Sir Homer.\"\n- Do not make him a country producer.\n- Do not relocate him to London at story-open.\n- Do not write him as Alex's manager, PR strategist, or commercial gatekeeper.\n- Do not pretend the Rosie list is Homer's full career.\n- Do not create additional Beatles/Bowie/Zeppelin/Springsteen/Rolling Stones/Pink Floyd album titles beyond the locked list unless Ryan locks them.\n- Do not upgrade a consultant/assistant/mix credit into a full producer credit.\n- Do not use banjo, mandolin, harmonica, Opry, or Bluebird as Alex/Homer defaults.\n- Do not make Homer publicly correct the press unless Ryan plays that.\n"},{"file":"45_PHOENIX_MEDIA_FULL.md","content":"# Phoenix Media Full Detail\n\nUse this for Phoenix Media as a company. Phoenix Media is one of three operating pillars of Walker Holdings, alongside Hatfield Group and Albury Acoustics.\n\n## Opening Principle\n\nPhoenix Media is a serious music and cultural content company with a thirty-year operating history, a substantial owned library, distribution capability, a podcast network, and its own studios infrastructure. It is not a vanity prodco. It is not Walker Holdings' in-house promotion arm. It is not Alex's management company. It is not the Walker Archive — that lives at WilsonWalker.\n\nWalker Holdings is majority owner. Rachel Linden is CEO. The company runs arms-length.\n\n## Vital Statistics\n\n| Field | Canon |\n|---|---|\n| Founded | 1995 |\n| Original spark | Rosie's recording return; the family wanted control of the documentary that came with it |\n| HQ | Los Angeles |\n| Offices | LA (HQ), London, New York |\n| CEO | Rachel Linden |\n| Reports to | own board; Walker Holdings majority owner |\n| Valuation | $1.8B |\n| Annual revenue | $300M |\n| Staff | 350 globally |\n| Business | music/cultural content production, owned library, distribution, podcast network, studios infrastructure |\n\n## Origin\n\nIn 1995 Rosie returned to recording after a long stretch out of the studio. The album and the public moment around it required a documentary, and the family — meaning Eleanor, on Rosie's behalf — refused to hand the cameras to a third-party network. They incorporated a production entity to do it themselves and called it Phoenix Media after the family compound.\n\nThat was the birth. The first project was the recording-return documentary. The second was a follow-up on Homer's production work. The third was an unrelated music documentary on a contemporary that Rachel Linden, then a junior producer, brought in.\n\nBy 2000 the company had a small slate. By 2010 it had a real library, distribution relationships, and a podcast operation. By 2020 it had soundstage and post infrastructure. By story open it is a fully realised heritage music/cultural media company with thirty years of compounding behind it.\n\nThe Phoenix Hollow naming is intentional and old. The company is not named for the Phoenix Hollow studio (which is Homer's separate facility); it is named for the place that anchors the family.\n\n## Leadership\n\n| Person | Role |\n|---|---|\n| Rachel Linden | CEO; joined as a junior producer in the late 90s, ran Originals through the 2010s, became CEO when the previous CEO retired |\n| Walker Holdings board representative | Eleanor Vance, with Diane Prescott on legal escalation |\n| President of Originals | (subordinate to CEO; runs the production division) |\n| President of Distribution | (subordinate to CEO; runs the rights packaging and sales division) |\n| Head of Audio | (runs the podcast network and narrative audio) |\n| Head of Library | (manages the owned IP catalog — acquisitions, licensing, restoration coordination) |\n| GM, Phoenix Media Studios | (runs soundstage, post, and restoration lab) |\n| Head of London | (BBC/Sky/European market relationships, UK production coordination) |\n\nRachel Linden runs Phoenix Media day-to-day. Eleanor does not greenlight projects. Rosie does not approve documentaries. Homer does not consult on production. Alex does not sit at the table.\n\n## Divisions\n\n| Division | Revenue | Staff | Notes |\n|---|---:|---:|---|\n| Phoenix Media Originals | $95M | 90 | development executives, producers, associate producers, post liaison; produces docs, limited series, documentary features, select narrative |\n| Phoenix Media Distribution | $50M | 35 | rights packaging, theatrical/festival strategy, broadcaster sales, international distribution, podcast distribution |\n| Phoenix Media Audio | $35M | 40 | podcast network, narrative audio, archival audio projects |\n| Phoenix Media Library | $75M | 20 | owned catalog of acquired and produced cultural content; licensing income; major IP holding |\n| Phoenix Media Studios | $45M | 95 | soundstage facility, post-production house, archive restoration lab; clients include third parties as well as in-house |\n| Corporate / shared services | included | 70 | finance, business affairs, legal, HR, ops |\n\n## Phoenix Media Library\n\nThe Library is the long-term value engine. After thirty years of producing, acquiring, and accumulating, Phoenix Media owns a substantial catalogue of music documentaries, cultural docs, archival music programmes, podcast series, and limited series. Some are originals. Some were acquired from estates, defunct producers, or independents who wanted long-term homes for their work.\n\nThe Library generates licensing income on its own and serves as deal leverage for new productions. It is also a strategic asset: the more cultural music documentary IP Phoenix Media owns, the more credible it becomes as the eventual home for the Walker Archive, decades from now.\n\nThe Walker Archive is not part of the Library. The Walker Archive sits at WilsonWalker. Phoenix Media's strategic positioning is to become the trusted custodian if and when WilsonWalker decides to make any of it releasable. That decision is generations away and is not Phoenix Media's to make.\n\n## Phoenix Media Studios\n\n| Facility | Location | Function |\n|---|---|---|\n| Phoenix Media Soundstage | Los Angeles (Culver City / Atwater) | film and television soundstage; used by in-house productions and rented to third parties |\n| Phoenix Media Post | Los Angeles | editorial, color, sound mix, online, delivery; full post-production house with strong external client base |\n| Phoenix Media Restoration Lab | Los Angeles | film transfer, audio restoration, digital preservation, archival conversion; takes work from estates, labels, museums, and broadcasters |\n\nPhoenix Media Studios does not include music recording studios. Music recording is Phoenix Hollow's domain — Homer's separate facility on the family compound, which is not a Phoenix Media property and is not commercially available. Phoenix Hollow operates under its own logic.\n\nThe Restoration Lab is strategically pretty: it lets Phoenix Media take in third-party archival work (estates, labels, museums) at high margin while quietly maintaining the technical capability to one day handle the Walker Archive itself.\n\n## Output Categories\n\n| Format | Detail |\n|---|---|\n| Music documentaries | artist profiles, archival docs, historical music narratives, theatrical/streaming distribution |\n| TV / limited series | premium music/culture series, often 4-6 hour formats for streamers/broadcasters |\n| Podcasts | long-form audio storytelling, interviews, historical deep dives, cultural criticism, narrative audio |\n| Documentary features | festival/theatrical/streaming documentaries |\n| Select narrative film/TV | only when rooted in music or cultural stories |\n| Licensing / distribution | rights packaging, platform sales, broadcaster deals, podcast distribution, international distribution coordination |\n| Library licensing | catalog content rented to streamers, broadcasters, airline media, educational platforms |\n\n## The Rosie Doctrine\n\nPhoenix Media does not produce on Rosie Walker by default. She is off-limits as subject. She has been since the company was founded.\n\nReasons:\n\n- Anything the family makes about Rosie is suspect by definition. The credibility cost outweighs the project value.\n- The Walker Archive is generations from being releasable. Phoenix Media is not in a hurry.\n- The long strategy is to build credibility on other artists so that when the Archive eventually surfaces, Phoenix Media is the unambiguous trusted home for it.\n\nA future generation may revisit this. v20 keeps the doctrine intact.\n\n## Phoenix Media Advantages\n\n- The Walker name opens doors with artists, estates, managers, labels, and platforms.\n- Homer/Phoenix Hollow studio relationships create access to producers, engineers, musicians, and archives.\n- The Solstice network creates trust across music, film, art, and culture.\n- Eleanor's backing gives long-term patience without sensationalism.\n- Thirty years of operating history and a real library create compounding deal leverage.\n\n## Walker Boundary\n\n| Walker does | Walker does not do |\n|---|---|\n| majority ownership | greenlight projects |\n| board oversight via Eleanor | run development |\n| capital allocation | approve scripts or cuts |\n| legal and PR escalation when family name is involved | manage staff |\n| the Rosie doctrine | influence editorial outside the doctrine |\n\nSame arms-length posture as Hatfield. Walker Holdings is the owner, not the operator.\n\n## Relationship To Alex\n\nFor Alex, Phoenix Media means:\n\n- a family-owned company he's adjacent to, not embedded in\n- a probable home for any documentary work that ever happens around him, but not by default\n- a place Eleanor knows the executive team well\n- a name he occasionally sees on documentary credits without registering the family connection in the moment\n\nIt does not mean:\n\n- his management company\n- his record label\n- his publicity arm\n- a vanity production house he can use freely\n\nIf Alex ever wants Phoenix Media to produce something for him, that's a real conversation through Eleanor and Rachel, not an automatic yes.\n\n## PR And Legal\n\nPhoenix Media institutional PR routes through Walker Holdings / SSML when the family name is involved. Project-level PR routes through Phoenix Media's own communications team and the typical talent/distribution PR machinery.\n\nAlex personal press remains Serena Management / The Lede.\n"},{"file":"46_ALBURY_ACOUSTICS_FULL.md","content":"# Albury Acoustics Full Detail\n\nUse this for Albury Acoustics as a company. Albury Acoustics is one of three operating pillars of Walker Holdings, alongside Hatfield Group and Phoenix Media.\n\n## Opening Principle\n\nAlbury Acoustics is a serious heritage audio company built on Homer Wilson's engineering legacy. Pieces of Albury are in every serious mastering and tracking room in the world. Albury patents power audio in everything from smartphones to automotive infotainment to broadcast chains. Albury's consulting team has shaped the sound of the most-talked-about new concert halls of the last fifteen years.\n\nIt is not Homer's personal company in any operational sense. It is not Phoenix Hollow's commercial arm. It is not a vanity audio brand. It is a real, arms-length, professionally run heritage manufacturer with foundational IP, and Walker Holdings is its majority owner.\n\n## Vital Statistics\n\n| Field | Canon |\n|---|---|\n| Founded | 1988 |\n| HQ | California (manufacturing & corporate) |\n| UK operation | Research and heritage outpost — Surrey |\n| Founder Emeritus | Homer Wilson, 1st Earl of Albury |\n| CEO | Marcus Halliday |\n| Reports to | own board; Walker Holdings majority owner |\n| Valuation | $3B |\n| Annual revenue | $375M |\n| Staff | 750 globally |\n| Business | pro audio gear, audiophile reference products, foundational IP licensing, studio design, acoustics consulting |\n\n## Name Lineage\n\nThe chain is **house → title → company.**\n\n- **Albury House** — 30 Upper Phillimore Gardens, Kensington. Homer bought it in 1967. The house already carried that name.\n- **Earl of Albury** — Homer was created 1st Earl of Albury in June 1977 for the Silver Jubilee album, services to music, and royal-family work. He chose the title from the house, not from a territorial village.\n- **Albury Acoustics** — when Walker Holdings spun out the company in 1988 to commercialize Homer's patent portfolio, it took its name from the earldom. By that point everyone in British public life knew what Albury meant.\n\nThe brand inherits the title's gravity without having to perform it. Audio dealers, mastering engineers, and audiophiles around the world know Albury — most of them never know the chain back to a Kensington address.\n\n## Origin\n\nThrough the 1960s and 1970s Homer Wilson became the most respected record producer and sound engineer of his generation. The work generated patents along the way — circuit designs, transducer geometries, signal-processing approaches, mastering techniques — accumulated quietly across a career that wasn't trying to monetise them.\n\nBy the mid-1980s the IP portfolio had become substantial enough that Eleanor Vance, then early in her tenure running Walker Holdings, made the case to commercialize it. Homer had no interest in running a company. He did have interest in the work being properly stewarded. In 1988 Walker Holdings spun out Albury Acoustics. Homer contributed his patents in exchange for equity and a permanent founder role. A professional CEO was hired. The first product was a flagship reference monitor.\n\nThe company grew through the 1990s as a respected pro audio name. Studio designers started specifying Albury monitors and signal processors as standard. In the 2000s Albury Reference (the audiophile consumer line) was launched and quickly became one of the names high-end dealers in Tokyo, Munich, and New York stocked. In the 2010s the IP & Licensing division became substantial as Albury patents found their way into smartphone audio chips, automotive infotainment, premium headphone codecs, and broadcast chains. In the 2020s the Studio Design and Acoustics Consulting divisions became prestige profit centres.\n\nBy story open the company is a fully realised heritage audio house. Homer is Founder Emeritus and a board member. Marcus Halliday has been CEO since 2019. The company is run independently of the family.\n\n### Spatial Audio Research Buildout\n\nIn 2023 Albury expanded its Surrey research operation with a dedicated Spatial Audio Research group focused on spatial monitoring, room modelling, low-latency studio playback, and architectural-listening simulation. The move sits inside Albury's own R&D roadmap and belongs to Walker Holdings' operating-company machinery.\n\nDo not attach this buildout to Alex as a deal, discovery, angel investment, acquisition lead, or founder relationship. Albury can be technically ambitious without turning into an Alex business plot.\n\n## Leadership\n\n| Person | Role |\n|---|---|\n| Homer Wilson, Earl of Albury | Founder Emeritus; board member; signs off on flagship products; not operational |\n| Marcus Halliday | CEO; long-tenured industry executive; previously ran a major British audio manufacturer |\n| Walker Holdings board representative | Eleanor Vance, with Diane Prescott on legal escalation |\n| President, Albury Pro Audio | (runs the studio gear division) |\n| President, Albury Reference | (runs the audiophile consumer line) |\n| President, IP & Licensing | (runs the patent portfolio and licensing relationships) |\n| Director, Albury Studio Design | (runs the turnkey studio design and build practice) |\n| Director, Albury Acoustics Consulting | (runs the architectural acoustics practice) |\n| Head of Research, UK | (runs the Surrey research operation; pure R&D) |\n\nMarcus Halliday runs Albury day-to-day. Homer does not approve product decisions. Eleanor does not specify circuit topologies. Alex does not sit at the table.\n\n## Divisions\n\n| Division | Approx revenue | Staff | Notes |\n|---|---:|---:|---|\n| Albury Pro Audio | $100M | 240 | preamps, EQs, compressors, monitor controllers, mastering equipment, reference monitors; industry-standard studio gear |\n| Albury Reference | $85M | 125 | flagship speakers, integrated amplifiers, DACs, reference headphones; audiophile/consumer line |\n| Albury IP & Licensing | $110M | 40 | foundational DSP algorithms, transducer designs, codec components, room-correction tech; licensed across consumer electronics, smartphones, automotive, broadcast, gaming |\n| Albury Studio Design | $45M | 100 | turnkey studio design and build for labels, broadcasters, post houses, prestige clients |\n| Albury Acoustics Consulting | $35M | 55 | concert halls, theatres, cultural buildings, listening rooms, residential listening rooms for collectors |\n| Albury Research | included in IP | 75 | pure-research engineers; primary site is Surrey, UK; feeds the patent pipeline; includes the Spatial Audio Research group |\n| Corporate / shared services | included | 115 | finance, business affairs, legal, HR, manufacturing operations, distribution |\n\n## The Hidden Engine: IP & Licensing\n\nThe visible Albury — the studio gear and the high-end speakers — is the cultural face of the company. The financial heart is the patent licensing business.\n\nFoundational Albury IP lives quietly inside other manufacturers' products. A premium smartphone audio card may include Albury DSP licensed at fractions of a cent per unit, at scale. A luxury automotive infotainment system may license Albury room-correction algorithms. Premium wireless headphones may license Albury codec components. Broadcast chains in Europe license Albury processing. The licensee logos rarely make it onto the product packaging; the engineering teams know.\n\nThis is the highest-margin part of the business by a wide margin. It is also the most invisible to the public, which suits the company perfectly.\n\n## Studio Design and Acoustics Consulting\n\nThe architectural side of Albury runs at lower volume, higher prestige.\n\n**Albury Studio Design** is hired to design and equip recording studios, mastering suites, post-production rooms, and broadcast facilities. They show up early in a project, design the room, install gear (their own and others'), and commission the space. Major label flagship rooms, prestige post houses, and premium broadcasters are typical clients.\n\n**Albury Acoustics Consulting** is hired for the architectural acoustics of concert halls, theatres, recital halls, soundscaping for cultural buildings, corporate auditoriums, and residential listening rooms for the world's collectors. They were the acoustic engineers on several of the most-talked-about new concert halls of the last decade. They're the acoustic engineers on Solstice's outdoor sound design every year — a Walker family-adjacent contract that Solstice insists on.\n\nThese two divisions feed each other and reinforce the broader Albury brand. The studio design clients become Albury Pro Audio customers. The consulting work generates flagship architectural references that the Reference line trades on.\n\n## Phoenix Hollow Connection (Clean Boundary)\n\nPhoenix Hollow Studio is built around Albury Pro Audio gear. The Phoenix Hollow live room is one of the most-photographed showcases of the Albury brand in the world. Artists who get invited to record there leave evangelised about the gear.\n\nBut Phoenix Hollow Studio is **not** an Albury property. It is Homer's personal studio on the Walker family compound, operated under its own logic, not commercially available, not Albury infrastructure. The fact that it runs Albury gear is because Homer prefers his own work — same way a Steinway designer would have a Steinway in their living room.\n\nAlbury never markets the Phoenix Hollow connection. It doesn't need to. The relationship is widely known inside the industry and never publicised outside it. That's the point.\n\nConversely: the gear in any Albury demo room or showroom is the same gear in Phoenix Hollow. What an artist hears at the Tokyo Albury Reference dealer is what they would hear if Homer ever invited them to track at Phoenix Hollow. The technology is identical. The room is the variable.\n\n## Walker Boundary\n\n| Walker does | Walker does not do |\n|---|---|\n| majority ownership | run R&D |\n| board oversight via Eleanor | approve products |\n| capital allocation | manage staff |\n| legal and PR escalation when Homer's name is involved | influence engineering decisions |\n| support flagship product launches | use Albury for personal favours outside the boundary |\n\nSame arms-length posture as Hatfield and Phoenix Media. Walker Holdings is the owner, not the operator.\n\n## Homer's Role\n\nHomer is Founder Emeritus, board member, and the company's living conscience. He is not employed by Albury and does not draw a salary from it. His engagement is:\n\n- a board seat with full information rights\n- final sign-off on flagship product launches (consultative; he hasn't blocked anything in fifteen years)\n- occasional appearances at major industry events, when Eleanor agrees it serves the brand\n- annual visits to the Surrey research operation, mostly to sit with the engineers and listen to what they're working on\n\nHe is genuinely revered inside the company. Engineers who joined fifteen years after he stopped engineering full-time still talk about him as a presence. The R&D team in Surrey has his old headphones on a shelf in the listening lab as a relic.\n\nHe does not run anything. He has chosen not to run anything. That is permanent.\n\n## Relationship To Alex\n\nFor Alex, Albury Acoustics means:\n\n- the gear in every studio he records in\n- a pair of Albury Reference headphones in his Kensington music floor (a 17th-birthday gift from Homer)\n- a pair of Reference monitors in his Phoenix Hollow practice space\n- the consulting team designed his Royal Academy practice room\n- a quiet eventual inheritance position — when Alex becomes the 2nd Earl of Albury, the company's name will resolve to his title\n\nIt does not mean:\n\n- his company\n- a company he runs or could run\n- public endorsement pressure (audio gear is invisible to the public; he doesn't talk about it)\n- any operational role, ever\n- a brand he uses freely outside of personal listening\n\nAlex is not asked to talk about Albury in interviews and won't be. The brand and the family quietly observe the line.\n\n## PR And Legal\n\nAlbury institutional PR routes through Walker Holdings / SSML when the family name is involved. Product PR routes through Albury's own communications team and the typical industry trade press (Sound on Sound, Tape Op, Stereophile, The Absolute Sound, Hi-Fi News, audiophile show coverage at Munich High End and CES).\n\nAlex personal press remains Serena Management / The Lede. Albury never trades on Alex's name.\n"},{"file":"49_ALEX_VOICE.md","content":"# Alex Voice — Read This First\n\nThis file exists for one reason: Claude's default failure mode for Alex Wilson is making him quiet, beautiful, and solemn. That is always wrong.\n\n## The Failure\n\nClaude defaults to this:\n\n> Alex watched the city from the window. The weight of it sat somewhere behind his eyes.\n\nOr:\n\n> \"Yes,\" Alex said quietly.\n\nThat is not Alex. That is generic tragic-beautiful-man output applied to Alex Wilson's body.\n\n## The Register\n\nAlex is funny, present, quick, physical, flirtatious, and alive. He does not process in public. He does not sit in significant silence. He does not need to be coaxed into speaking, eating, or functioning.\n\nHe is a 22-year-old who went to RAM, finished Electric Ivory, spent June at Phoenix Hollow, spent a socially full July at Villa Serena / Sardinia, came out from under the education-first boundary on 1 August, privately returned to the newly finished Kensington house on 5 August, and is now at 12 Charles Street for his first post-boundary team meeting while the Architectural Digest / Sophie Ashby house reveal goes public.\n\nHe is not in his feelings about being publicly known. Everyone already knew.\n\nHe is also not a clean orphan myth. David and Sarah are alive, sober, and complicated. Alex sees Sarah on a semi-regular basis and has reconnected with David. He is gracious about them in public; whatever is unresolved stays private unless Ryan brings it into the scene.\n\nIn Alex's mouth, Sarah is Sarah and David is David by default. Publicly, he can say mother/father when the factual relationship is the point. He does not casually say Mum/Dad unless Ryan chooses that moment.\n\nEarlier at the door he was probably making a joke about the scaffolding, the smell of paint, the fact that everyone was looking at him, or whether the kitchen survived. By the evening opening, that quickness should still be present: he does not become solemn just because the tour is over.\n\n## What Right Looks Like\n\n**Seeing Albury House for the first time earlier that day:**\n\nWrong:\n\n> Alex stood still, overwhelmed by the house and everything it meant.\n\nRight:\n\n> He looked up at the front door. \"If this smells like wet plaster after a year, I'm suing someone emotionally.\"\n\n**Someone makes it heavy:**\n\nWrong:\n\n> He absorbed the moment in silence.\n\nRight:\n\n> \"Yes, yes, rebirth, inheritance, symbolism.\" He glanced at Sophie. \"Where's the kitchen.\"\n\n**Latham texts career pressure:**\n\n> *cover, profiles, broadcast, music, performance, brand architecture. all held.*\n\nAlex:\n\n> *heroic of you*\n> *continue holding*\n> *I have a house to judge*\n\n**Someone references the press outside:**\n\n> \"How many?\"\n> Kevin said thirty, maybe forty.\n> \"Sweet. Intimate.\"\n\n## Beauty Is Not A Verdict\n\nDo not write: *He was impossibly beautiful, even exhausted.*\n\nWrite what his presence does. Someone forgets their sentence. Ottilie straightens without meaning to. Sophie pretends not to notice. Kevin does not react because Kevin is paid not to, which is almost funnier.\n\nThe physics happen around him. He doesn't notice. He's asking about the kitchen.\n\n## He Is Not Processing His Public Identity\n\nHe has always been famous. The press has always known the public facts. He is not newly becoming Prince Alex.\n\nThe boundary ending matters because education no longer shields him from choosing adult professional public action. It is not an existential identity crisis.\n\n## Media Filter\n\nAlex's first media filter is not prestige, register, seriousness, or whether a platform sounds culturally safe. It is: **would I enjoy myself?**\n\nHe is the life of the party, fun-loving, casual, relaxed, great in a room, flirty, genuinely funny, and socially quick. He does not want the world introduced to him as a serious boring prince turned pianist, because that is not him.\n\nWrong:\n\n> \"It's about the conversation, not the programme. Who's the person. What are we talking about.\"\n\nThat sounds thoughtful but too managed, too consultant-clean, and too unlike Alex. It makes him sound like he is trying to design a media thesis rather than saying the obvious thing in the room.\n\nRight:\n\n> \"It's simple. If I think I'll enjoy myself, do it. I don't want everyone deciding I'm some serious boring prince turned pianist. That's not me. Not even close.\"\n\nMedia examples in Alex's register:\n\n- Graham Norton down the line: yes, if the room is fun.\n- Jimmy Fallon: yes, if it is loose and funny.\n- Chicken Shop Date: yes.\n- Hot Ones: yes.\n- Newsnight: no. Never Newsnight.\n- Desert Island Discs: yes.\n- stiff culture-show solemnity: probably no.\n- Vogue: yes, fashion-focused.\n- Vanity Fair and Rolling Stone: yes down the line.\n- Gramophone: probably no by default, because it risks locking him into solemn classical-pianist framing.\n\nDo not make Alex allergic to broad, funny, popular, or lightly chaotic formats. He is more likely to reject formats that make him explain his parents for forty-five minutes, perform heritage gravity, or become Serious Prince Pianist than formats that let him be quick, hot, funny, musical, stylish, and alive.\n\n## Voice Markers\n\n- dry, not grave\n- quick, not considered\n- physical, not statuesque\n- affectionate through roasting\n- flirty without narrating that he is flirting\n- practical questions about food, rooms, people, plans\n- deflects weight with specificity, not silence\n- uses names\n- acts before over-explaining\n\n## One Last Check\n\nBefore you write a line of Alex's dialogue, ask:\n\n*Would this line work in a family drama about a sad beautiful prince?*\n\nIf yes, rewrite it.\n"},{"file":"50_ALEX_FIRST.md","content":"# Alex First\n\nSingle-screen anti-drift. `04_ALEX.md` is canonical character file.\n\n## Who He Is / Is Not\n\nAlex is a 22-year-old musician, public obsession, friend, son, host, charmer, flirt, fighter, instinctive decision-maker, and the most photographed young man alive.\n\nHe is not CEO/MBA/VC/business bro; solemn prince; brooding heir; sad beautiful boy; passive symbol; identity-discovery subject; day-to-day operator; operational-briefing sitter; fragile person needing room management; hermit/observer; recovery-family case study.\n\nBehavior cues: he decides, others manage; refuses earnest frames with jokes; uses names; is funny within two beats; flirty, sexual, body-comfortable; default lightness under pressure.\n\n## Baselines\n\n| Area | Lock |\n|---|---|\n| Fame | Famous since childhood. Public facts known. v20 pressure is boundary ending and first adult professional choices, not identity/fame/visibility. |\n| Operation | AW = lean family office; Walker = $27B family enterprise; Serena = career intake; al.x = rights. Eleanor/Catherine/Latham/Daniel/Nadia/Sophie/Kevin/Ottilie are mature, dry/warm/capable, not pitching/panicking/finance-bro functions. |\n| Fashion | Genuine style icon. First Met at 10 in custom Versace; every Met since. Light fashion work from 13; adult editorial/brand ramp 18-22; Versace, Burberry, Loro Piana, Hermes, Tatler, British Vogue, L'Uomo Vogue. Archive wardrobe for museum-tier pieces; Donatella godmother; fashion is personal/deep, not decoration. |\n| Languages | Native-tier English/Italian/French/Spanish; conversational German/Japanese; social Greek/Korean; Latin/classics understanding and quote-level phrases from Westminster. Casual, lived-in, not a polyglot performance. |\n| Westminster | GCSE/iGCSE 2019: English Language, English Literature, Maths, Biology, Chemistry, Physics, History, Music, French, Spanish, Latin, Classics. A-level/TAG 2021: Music, English Literature, Classical Civilisation, Drama. |\n| Westminster lineage | Performance and music lineage is broad: Gielgud, Dryden, Poliakoff, Helena Bonham Carter; Purcell, Boult, George Benjamin, Julian Anderson, Christian Mason, Andrew Lloyd Webber, Ian Bostridge, Mika, Dido, Clean Bandit; in-universe Homer Wilson, greatest audio engineer/producer alive. Use as cross-genre confidence, not theatre-kid/classical-only coding or Alex-as-Homer-extension. |\n| RAM | BMus Performance: Piano Principal, Cross-Genre Performance & Creative Practice, 2021-2025. Piano principal concert/professional level; guitar and violin concert-level serious secondary instruments; trained voice G2-G5; production/recording, composition/orchestration, chamber music, collaborative piano, conducting/ensemble direction. Official curriculum plus everyone-dragging-him-into-things curriculum. |\n| Dress | Public/social/event/photographed = intentional and considered. Joggers/sweats/training wear = compound-private, transit, training only; never party/drinks/guests. |\n| Cooking | Alex cannot cook. Every property has private chef/catering. Do not have him scramble eggs, offer food, or manage kitchen. |\n| No-first-move | Career-only guardrail. It does not make Alex reluctant. Ordinary default is yes to fun, people, rooms, conversation, flirt, party, plans. |\n| Media filter | First test is whether Alex thinks he will enjoy himself and sound like himself. Broad/funny/popular is not a problem; solemn Serious Prince Pianist framing is. Graham Norton, Jimmy Fallon, Chicken Shop Date, Hot Ones, Desert Island Discs, Vogue, Vanity Fair, and Rolling Stone are plausible; Newsnight is not. Gramophone is probably wrong by default. |\n| Rosie/Homer | Do not over-attribute Alex's warmth/confidence/taste/humour/physical ease to them. He is fully formed. Use them only when relevant. |\n| David/Sarah | Alive, sober, complicated, not defining. Sarah sober since 2019, Notting Hill, semi-regular, Stella/Kate/Naomi/Sadie/Sienna orbit. David sober since 2023, West Village, reconnected, Chris/old friends, fragile. Alex calls them Sarah/David, not Mum/Dad unless Ryan chooses it. |\n\n## Pre-Scene Pulse\n\nIs Alex active? Is this career choice, not business-building? Is public identity already known? Is the operation holding him, not acting on him? Will Alex be funny/hot/present/instinctive within two beats? Is fashion register right? Has no-first-move been misread as personality? Has media access been wrongly filtered for prestige instead of enjoyment/aliveness? Are Rosie/Homer explanations unnecessary? Are David/Sarah living sober complicated adults, not symbols/redemption?\n"},{"file":"51_MEETING_SCENE_VOICE.md","content":"# Meeting Scene Voice\n\nCompact active meeting guide.\n\n## Core Rule\n\nBusiness scenes are still Alex scenes. Do not write deck prose, corporate monologues, static briefings, or Alex nodding through frameworks. Serious rooms have bodies, jokes, interruptions, impatience, warmth, dry authority, concrete objects, and decisions held or handed back.\n\n## Alex In Meetings\n\nAlex should be quick, funny, specific, socially alive, and allergic to inflated grandeur. He can ask sharp questions, cut through status language, tease Latham/Catherine/Daniel, and still understand the stakes.\n\nDo not make him passive, solemn, blank, grateful, overawed, or reluctant by default.\n\n## Media Meetings\n\nDo not let Latham, Serena, or the narrator reduce Alex's media filter to prestige/register management. If Latham has been triaging against the wrong filter, he should say so and recalibrate.\n\nCorrect Latham beat:\n\n> \"All right. I'm going to take a moment here, because I've been triaging that pile against a register filter and you've just told me my filter is wrong. Which is what this meeting is for, so it's fine. But before I go any further I'd like to actually understand the filter you do want me using, because if it isn't register then I have been killing things in the wrong direction for about six weeks and I'd quite like to stop.\"\n\nCorrect Alex filter:\n\n> \"It's simple. If I think I'll enjoy myself, do it. I don't want the world to see me as some serious boring prince turned pianist, because that's not me. Not even close.\"\n\nPlausible Alex examples:\n\n- \"So yeah, Graham Norton down the line. Jimmy Fallon. Chicken Shop Date. Hot Ones.\"\n- \"Not Newsnight. Never Newsnight.\"\n- \"I'd do Desert Island Discs. Probably not the solemn culture-show version.\"\n- \"For print, Vogue works. Fashion-focused. I'm stylish, people know I'm stylish.\"\n- \"Vanity Fair and Rolling Stone down the line, probably. Gramophone, probably not.\"\n\nThese examples are not auto-acceptances in live play. They are the correct filter: Alex likes fun, social, stylish, funny, musical, lively rooms; he resists being frozen into Serious Prince Pianist or parental-trauma explainer.\n\n## Senior Voices\n\n| Person | Meeting register |\n|---|---|\n| James Latham | Dry, precise, human; gives clean category pressure and one recommendation when needed. No buzzwords/deck voice. |\n| Catherine Aldridge | Calm, executive, exact; cares about structure and risk, not theatre. |\n| Eleanor Vance | Institutional authority; few words; sees around corners; not sentimental. |\n| Daniel Sorensen | Legal architecture and consequences; concrete, not jargon soup. |\n| Nadia Hassani | Access/time/practical coordination; knows how the machine breathes. |\n| Sophie Kalu | Logistics, calendar, clothes, movement; not press/legal strategist. |\n| Kevin Marsh | Security/movement risk; physical facts, not emotional commentary. |\n\n## What Meetings May Do\n\n- Present inbound pressure.\n- Clarify categories and consequences.\n- Surface timing conflicts.\n- Recommend one path or no path.\n- Explain why a first move matters.\n- Hold choices for Alex/Ryan.\n\n## What Meetings Must Not Do\n\n- Choose Alex's first adult move.\n- Turn into a briefing deck.\n- Invent named contacts, exact pitch counts, private calls, memos, board histories, or procedural detail.\n- Let staff/family decide for Alex.\n- Use business language to swallow music, beauty, fashion, sex, friendship, or house life.\n\n## Handback Threshold\n\nHand back to Ryan before Alex accepts/declines/chooses a career-defining move: solo cover, profile, interview, broadcast, strategic social posture, adult brand architecture, headline performance, music release, label, public statement, or major relationship/public positioning.\n\nWrite through ordinary beats: greetings, jokes, room movement, coffee, glances, casual texts, obvious logistics, Alex mocking the phrasing, Latham being dry.\n"},{"file":"52_COMMERCIAL_WORK_TO_STORY_OPEN.md","content":"# Commercial Work To Story Open\n\nUse this file as the single clear reference for what Alex has done commercially before the default story opening: Thursday 7 August 2025, late morning, 12 Charles Street.\n\n## Core Rule\n\nAlex has not been commercially invisible. He has been commercially restrained.\n\nBefore Friday 1 August 2025, every paid opportunity sat under the education-first boundary: school/RAM first, guardianship/management control, no adult career thesis, no live social voice, no real interview access, no full-rights adult brand architecture. Brands could buy the picture. They could not buy Alex as a speaking principal.\n\n## Locked Cumulative Earnings\n\nAlex's personal commercial earnings since his first deal at 13 total approximately **£20M** across nine years. This money compounded inside AW Holdings' liquid portfolio and does not sit separately as a cash pot.\n\n| Stream | Cumulative to story open | Pricing shape |\n|---|---:|---|\n| Film / TV | ~£3M | Seven credits from 2017-2024; standard union/industry rates; fees priced on acting/work performed, not on social reach |\n| Brand / fashion | ~£15M | Age 13-22; passive-only image/editorial/usage pricing; no social activation, no interview, no spokesperson rights, no exclusivity premium |\n| Performance / music / other | ~£2M | Public piano, broadcast fees, event appearances, culture work, and miscellaneous controlled paid appearances |\n| **Total** | **~£20M** | Rounded story figure; do not recalculate in-scene |\n\n## Price Language\n\nThe cumulative totals above are locked. The deal bands below are working canon ranges for scene use where exact contract memos are not yet locked.\n\nUse bands in Serena/AW conversations, internal notes, and private analysis. Do not have the press, fans, or casual friends know exact fees unless Ryan explicitly reveals them.\n\n## What Brands Bought Before 1 August\n\nPre-boundary brand pricing usually included:\n\n- still image and campaign usage\n- editorial-style video or behind-the-scenes footage\n- limited event appearance where appropriate\n- controlled brand-side copy\n- PR-drafted one-line statement if needed\n- music/performance use only where separately approved\n\nPre-boundary brand pricing did not include:\n\n- Alex writing captions or posting sponsored content\n- TikTok, YouTube, X, or active Instagram strategy\n- a real interview or long-form public conversation\n- a press tour\n- a spokesperson role\n- product-development authority\n- name/title as a consumer product mark\n- exclusivity across fashion, watches, music, luxury, or lifestyle\n- an adult signature system or public al.x launch\n\nThis is the undervaluation engine: brands received extraordinary access to a globally famous, high-taste, high-status young public figure at passive-use prices.\n\n## Brand / Fashion Work\n\nThe following named partnerships are active pre-story-open commercial history. They are not post-boundary adult launches.\n\n| Partner / lane | Alex's commercial role | Working price band to story open | Notes |\n|---|---|---:|---|\n| Steinway & Sons | Young Artist from 17; image use, performance partnership, masterclass appearances, Hamburg-New York axis | £800k-£1.4M cumulative | Brand statements are Steinway-written; no Alex conversational quote |\n| Burberry | Heritage campaigns around 18 and 21 | £1.5M-£2.5M cumulative | British, age-appropriate, brand-side copy only |\n| Versace | Multiple family-friend campaign seasons through Donatella: Atelier, spring, men's tailoring | £4M-£5M cumulative | Donatella gives quotes; Alex shoots |\n| Loro Piana | Quiet luxury image work from 20-21 onward | £1.2M-£2M cumulative | Country/travel register |\n| Hermes | Equestrian and polo-side image work; possible Le Monde d'Hermes feature layer | £800k-£1.5M cumulative | Heritage/lifestyle, image-led |\n| IWC Schaffhausen or Vacheron Constantin | Heritage watch ambassador layer | £800k-£1.4M cumulative | One watch lane by default unless Ryan locks both |\n| La Martina | Polo gear campaigns | £400k-£800k cumulative | Sport/lifestyle, not active athlete sponsorship architecture |\n| The Row | Quiet inside imagery through Olsen / Kaia / Apple connection | £250k-£600k cumulative | Taste signal, not mass campaign posture |\n| Anderson & Sheppard or Huntsman | Tailoring features, sometimes with Homer or Edward | £200k-£500k cumulative | Mostly prestige/editorial-commercial hybrid |\n| Apple Music Classical | One thoughtful curated image partnership during RAM finalist year | £150k-£350k | Not a music release or label move |\n| Bosendorfer or Fazioli | Possible European recital piano partner alongside Steinway | £150k-£350k cumulative | Use only as a secondary piano lane |\n| Paid editorial / inside fashion usage | Selected fashion-magazine usage and controlled image packages | £750k-£1.5M cumulative | Prestige and visibility matter more than cash |\n| Miscellaneous passive luxury/image licenses | One-off controlled campaign, event, and image-use fees | £800k-£1.6M cumulative | Keeps the category near the locked ~£15M total |\n\nDo not add a solo cover, solo profile, adult beauty/fragrance face contract, underwear/swim campaign, or strategic social campaign before story open.\n\n## Editorial And Society Work\n\nThese are part of Alex's public work archive and commercial reputation, but most are editorial/prestige surfaces rather than large direct-fee deals.\n\n| Outlet / surface | Pre-story-open status | Price treatment |\n|---|---|---|\n| Tatler | Recurring inside features and society pages from 14 onward; ensemble shoots; never the cover | Usually unpaid/nominal editorial fee; value is cultural positioning |\n| British Vogue | Inside editorial spreads and Tim Walker portraits; never cover, never profile | Editorial/prestige usage; not a major fee driver unless tied to paid usage |\n| Vogue Italia / L'Uomo Vogue | Meisel / Mert & Marcus inside editorial via Donatella and Italian fashion layer | Editorial prestige; separate from commercial underwear/swim register |\n| Vanity Fair | Group portraiture in Hollywood/legacy-issue mode | Prestige/editorial, not an Alex-sells-himself profile |\n| AnOther Man / Fantastic Man / W / i-D / Dazed / Document Journal / T Magazine | Art-directed inside editorial and portfolio inclusions | Mostly reputation, not headline earnings |\n\nNo solo cover exists before story open. No long-form profile exists before story open.\n\n## Film / TV\n\nAlex has seven film/TV credits between 2017 and 2024, producing approximately **£3M** total.\n\nThe exact title-by-title list is not locked in v20. Until Ryan locks specific credits, use this pricing structure:\n\n| Credit type | Typical pre-story-open price | Rule |\n|---|---:|---|\n| Limited / cameo / small prestige credit | £25k-£100k | Paid like a young performer, not as a social-media asset |\n| Supporting or young-principal credit | £150k-£600k | Standard industry negotiation; no extra social activation |\n| Larger named screen credit | £600k-£1M | Still work-priced, not adult-brand priced |\n\nThese credits do not make Alex an actor as his primary public identity. No press-tour interview, actor-profile campaign, or awards-season self-positioning exists before story open.\n\n## Performance / Music / Broadcast / Other\n\nThis stream totals approximately **£2M** before story open.\n\n| Surface | Commercial treatment |\n|---|---|\n| Royal Variety Performance piano breakout at 15 or 16 | Performance/broadcast fee where applicable; public credibility spike |\n| BBC Proms / Cadogan Hall / BBC SO or RPO collaboration | Performance and broadcast fees; serious music-world evidence |\n| BBC Children in Need / Comic Relief | Often charity/no-fee or fee donated; public piano surface remains real |\n| King's College Cambridge Christmas Eve broadcast | Performance/broadcast fee where applicable |\n| Cardiff Singer of the World accompanist work | Serious musician context; programme bio only |\n| Sky Arts RAM-era recital broadcasts | Broadcast/performance fee where applicable; education context protects it |\n| Steinway documentary short | Brand-performance image work; no piece-to-camera |\n| RAM / festival / gala appearances | Mixed fees, honoraria, charity, and institutional context |\n\nAlex has public piano credibility. He does not have a released recording career, Spotify artist profile, label deal, public Electric Ivory release, or artist launch before story open.\n\n## Electric Ivory\n\n`Electric Ivory` is not income at story open.\n\nAlex paid for the 18 June 2025 RAM senior recital to be filmed with four high-end cinema-quality cameras and recorded to release quality. It is unreleased. Alex controls the recording, visual/film rights, performance rights, and Alex-created publishing/arrangement rights through al.x Music / AW Holdings, with Serena administration if he chooses.\n\nTreat it as a rights asset and pressure object, not a completed commercial release.\n\n## Excluded From Commercial Earnings\n\nDo not count the following inside the ~£20M personal commercial earnings figure:\n\n- Walker Holdings equity, distributions, or family wealth\n- AW Holdings property, art, watches, instruments, cars, or wine holdings\n- gifts from family, godparents, or close family friends\n- press agency resale money from paparazzi photographs\n- fan edits, fan accounts, TikTok clips, YouTube explainers, or Reddit lore\n- unpaid society coverage, party captions, or family-event photographs\n- private trips, private house content, private dinners, or friends' camera rolls\n- Electric Ivory future value\n\nPublic attention around Alex has enormous economic value for other people. That is not the same as Alex being paid.\n\n## Knowledge Wall\n\nPublic knowledge: Alex has done fashion, brand, screen, piano, and event work. The public can see some campaigns and infer that he is expensive.\n\nPublic unknowns: exact cumulative earnings, Serena inbox, al.x mechanics, rights register, contract terms, rejected offers, private price floors, and Electric Ivory release strategy.\n\nBrain Trust knowledge: they know Alex has worked and is wildly valuable; they do not automatically know fee splits, cumulative totals, Serena strategy, or contract terms unless Alex tells them.\n\nSerena/AW knowledge: Latham, Catherine, Daniel, Mina, and relevant internal staff can discuss the full price architecture.\n\n## Post-Boundary Value Deficit\n\nAt story open, the interesting number is not only the £20M already earned. It is the difference between passive-use pricing and what full-rights adult engagement can now command.\n\nA Charles Street meeting can frame it this way:\n\n- Alex has already earned approximately £20M while withholding almost every high-value right.\n- Brand/fashion partners paid for access to the image, not to Alex's voice, social reach, exclusivity, or adult signature.\n- The post-1-August inbox is not a blank debut. It is a correction to years of underpriced access.\n- Depending on what Alex accepts, individual adult deals could move an order of magnitude above old passive-use fees; a multi-part adult architecture could move more than that.\n\nDo not hard-code which deal Alex accepts first. The first adult commercial move remains Ryan-controlled.\n"},{"file":"53_INBOX_AND_WME_PITCH_LIST.md","content":"# Inbox And WME Pitch List\n\nUse this file during the 7 August 2025 Charles Street meeting. It gives Claude concrete things to pull from when Serena discusses held inbound and what WME would pitch if Alex activates them.\n\nNothing in this file is accepted. These are held opportunities, rough initial asks, and package ideas.\n\n## Pricing Rule\n\nAmounts are rough scene-use numbers, not audited contracts. Use them as first-position / initial-package values. Do not recalculate Alex's net worth from them.\n\nStory conversion for quick table use: **GBP 1 = USD 1.25**.\n\nEditorial, public-broadcast, and talk formats often have low direct talent fees. Their value is access, positioning, rights, and downstream leverage. Luxury, music-rights, social, exclusivity, appearances, automotive, tech, and global campaign packages carry the real money.\n\n## Global Scale Rule\n\nThe inbox is not taste-safe. It is global, noisy, overexcited, and full of people trying to buy first access to the most famous newly adult musician/fashion heir/social figure in the world.\n\nSerena's job is not to make every offer sound like Alex. Serena's job is to stop the wrong offers from defining him.\n\nExpect inbound from:\n\n- global TV and streaming platforms\n- US late-night and internet formats\n- Asia-facing fashion, music, tech, and platform media\n- automotive, phones, gaming, audio, travel, and luxury houses\n- charity galas, billionaire private events, fashion weeks, product launches, tech keynotes, and Formula 1 weekends\n- brands with no taste fit but very large cheques\n\nDo not over-code the list to \"credible Alex taste.\" The meeting pressure comes from the gap between what the world will pay for and what Alex would actually enjoy doing.\n\n## Core Filter\n\nAlex is not a classical musician in his own eyes. Do not let the inbox frame him as a classical pianist who happens to be famous.\n\nCorrect frame:\n\n- cross-genre musician\n- piano principal, but not classical-only\n- stylish/funny/social public figure\n- serious musical authority without solemnity\n- fashion object with agency\n- someone who wants rooms he will enjoy\n\nWrong frame:\n\n- \"Prince Alex, classical prodigy\"\n- \"serious pianist explains his lineage\"\n- \"classical crossover launch\"\n- \"troubled family survivor sits down\"\n- \"heritage prince enters public life\"\n\nAlex's media test: if he thinks he will enjoy himself and sound like himself, it is viable. If it makes him Serious Prince Pianist, it is probably wrong.\n\n## Serena Inbox\n\nSerena inbox means inbound already coming at him. Latham filters it. Alex chooses only if Ryan plays it.\n\n### Global TV / Streaming / Platform Lane\n\nThese are not all good ideas. They are the scale of the room.\n\n| Outlet / platform | What they want | Rough initial amount | Register note |\n|---|---|---:|---|\n| Netflix | First long-form global screen access: music film, limited doc, or event special | £3M-£10M / $3.75M-$12.5M | Huge. Dangerous if it becomes family trauma or prestige solemnity. |\n| Prime Video / Amazon Music | Music film, performance special, platform tie-in | £2M-£6M / $2.5M-$7.5M | Strong money. Tone must not become corporate gloss. |\n| Disney+ / Hulu | High-gloss music/family-culture special | £2M-£5M / $2.5M-$6.25M | Possibly too safe, but reach is enormous. |\n| HBO / Max | Serious premium documentary or artist film | £2M-£7M / $2.5M-$8.75M | Risk: too grave if handled as dynasty portrait. |\n| YouTube / YouTube Music | Global performance film, clips, Shorts, premiere event | £1M-£4M / $1.25M-$5M | Strong because video/body/music/social circulation all matter. |\n| TikTok | First official platform presence, live event, music activation | £10M-£25M / $12.5M-$31.25M | Big cheque, high risk. Dangerous if it forces him into content treadmill. |\n| Instagram / Meta | Reels/live/social first-look, Ray-Ban Meta angle, fashion/music distribution | £5M-£15M / $6.25M-$18.75M | Reach is obvious; control and privacy risks are high. |\n| Apple TV+ | Artist film or performance feature | £3M-£8M / $3.75M-$10M | Strong if paired with Apple Music, sensitive if Apple itself wants brand rights. |\n| CBS Sunday Morning | US serious but gentle profile | £0-£20k / $0-$25k | Potentially good if music/taste-led, not confession-led. |\n| Good Morning America / Today | Broad US morning TV | £0-£25k / $0-$31k | Useful reach, usually too managed/bland for first voice. |\n| Saturday Night Live | Host/musical guest fantasy ask | £0-£50k / $0-$62k | More cultural event than fee. Plausible down-line if he wants chaos/fun. |\n| Vogue China / Vogue Korea / Vogue Japan | Regional fashion cover packages with global luxury leverage | £150k-£750k / $188k-$938k | Strong if image-led and not \"foreign prince\" exoticism. |\n| GQ Korea / GQ Japan / GQ China | Menswear/style/music profile packages | £100k-£500k / $125k-$625k | Good if playful, stylish, and adult. |\n| W Korea / Elle Korea / Elle Japan | Fashion/music/social image | £75k-£350k / $94k-$438k | Useful for Asia-facing style heat. |\n| NHK / TV Asahi / Japanese music formats | Performance or culture profile | £25k-£150k / $31k-$188k | Good if music-first; language advantage helps. |\n| Korean variety / music YouTube formats | Funny, charming, social, not solemn | £25k-£250k / $31k-$312k | Strong anti-prince lane if the room is right. |\n\n### Global Appearances / Event Fees\n\nAppearance money is often vulgar and very real. It should be in the inbox even when Serena kills it quickly.\n\n| Appearance type | What they want | Rough initial amount | Register note |\n|---|---|---:|---|\n| Luxury product launch attendan
