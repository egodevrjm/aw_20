<script id="docs-data" type="application/json">[{"file":"00_START_HERE.md","content":"# Alex Wilson Universe v20 — Start Here\n\nStandalone v20 working bundle cloned from `aw_v18`; v20 is active canon.\n\n## Opening Load\n\nFor Claude Project use, upload or paste every Markdown file in `aw_v20` plus the CSV data file `54_EVENTS_DIARY_CALENDAR.csv`. The folder is flat — no subfolders. Every Markdown file is active canon; CSV files are active data references.\n\nThe opening load includes the runtime, canon, voice, detail packs, tests, active files, and project/session instructions.\n\n## Detail Packs\n\n| Domain | Active pack |\n|---|---|\n| active map | `09_STORY_ELEMENTS_INVENTORY.md` |\n| family/inheritance | `10_FAMILY_AND_INHERITANCE.md` |\n| places | `11_PLACES_AND_HOMES.md` |\n| chats/social | `12_SOCIAL_AND_CHAT_SYSTEM.md`, `20_SOCIAL_CHAT_DETAIL.md`, `24_NAMES_AND_ROSTERS.md`, `36_RELATIONSHIP_ROSTERS_FULL.md` |\n| music objects | `13_MUSIC_OBJECTS_AND_THREADS.md`, `22_MUSIC_ROSIE_HOMER_DETAIL.md`, `33_ALEX_RECITAL_AND_RAM.md`, `37_ELECTRIC_IVORY_FULL.md` |\n| artifacts/tests | `15_IN_WORLD_ARTIFACTS.md`, `17_TEST_SCENES.md`, `41_PUBLIC_PRESS_EXAMPLES.md` |\n| family biography | `18_FAMILY_BIOGRAPHY_DETAIL.md` |\n| operations/staff | `19_OPERATIONS_STAFF_DETAIL.md`, `26_SERENA_MANAGEMENT_AND_ALX_BRAND.md` |\n| public work / commercial archive | `16_PUBLIC_WORK_AND_MEDIA_ARCHIVE.md`, `52_COMMERCIAL_WORK_TO_STORY_OPEN.md`, `53_INBOX_AND_WME_PITCH_LIST.md` |\n| diary / public events data | `54_EVENTS_DIARY_CALENDAR.csv` |\n| Hatfield | `23_HATFIELD_ASSETS_DETAIL.md`, `31_HATFIELD_FULL.md`, `32_HATFIELD_PRODUCTS_AND_VENUES.md` |\n| AW/Walker | `25_AW_HOLDINGS_FULL.md`, `40_WALKER_HOLDINGS_FULL.md`, `45_PHOENIX_MEDIA_FULL.md`, `46_ALBURY_ACOUSTICS_FULL.md` |\n| Albury House | `29_KENSINGTON_FULL.md` |\n| collections | `35_ALEX_COLLECTION_FULL.md` |\n| timelines/birthday | `38_START_POINTS_AND_TIMELINES.md`, `39_BIRTHDAY_22.md` |\n| Rosie/Homer catalogs | `34_ROSIE_DISCOGRAPHY_FULL.md`, `43_ROSIE_DISCOGRAPHY_COMPLETE.md`, `44_HOMER_PRODUCTION_CREDITS.md` |\n| places (full) | `27_PROPERTIES_FULL.md`, `28_VILLA_SERENA_FULL.md`, `30_PHOENIX_HOLLOW_FULL.md` |\n\n## Operating Principle\n\nMarkdown is canon; no separate data-plan layer. Precedence: `02_LOCKED_CANON.md` factual conflicts; `PROJECT_INSTRUCTIONS.md` runtime/narrator behavior; `49_ALEX_VOICE.md` and `50_ALEX_FIRST.md` Alex voice.\n\n`phone-renderer` is an external Claude skill, not a local Markdown file. Invoke it before any phone/chat/DM/text/notification/social-feed surface. If unavailable, stop and tell Ryan.\n\n## Story Start / Boundary\n\nDefault start: Thursday 7 August 2025, late morning, 12 Charles Street, Mayfair. Alex is in his first post-graduation/post-boundary team meeting at the Alex-owned AW Holdings / Serena Management office while the pre-approved Architectural Digest cover story and YouTube video of Albury House drop publicly.\n\nBetween 5 and 7 August, Alex returned from the Sardinia orbit, saw Albury House after the year-long refurbishment, toured the full house with Sophie Ashby herself and Judith/Knight Frank, learned the house mechanics, hosted Brain Trust/friends for dinner and a private tour, and then had Boys over. Those events are immediate backstory, not the default first session.\n\nAt the 7 August opening, the world now knows Studio Ashby/Sophie Ashby did Albury House. The AD cover story and YouTube tour show Sophie taking viewers through the full seven-floor house, including the two basement levels. Public room-by-room visual knowledge exists from the published feature; staff/security operations, private handover mechanics, Serena/AW/al.x details, and hidden systems remain private.\n\nEducation-first boundary expired Friday 1 August 2025 while Alex was still in the Sardinia/travel orbit. Alex already had light prestige work from 13 and adult-coded ramp 18-22; what has not happened is solo cover/profile in Alex's own voice, interview, broadcast, long-form public conversation, strategic social, adult brand architecture, standalone music release, label deal, or adult career direction in his own voice. The Albury AD/Sophie reveal is a pre-approved design/home feature, not Alex's first adult voice/profile. `Electric Ivory` was a compulsory RAM recital with Alex-paid four-camera cinema-quality film and release-quality audio capture, not broadcast/released.\n\nAlex's public identity was never hidden: Rosie/Homer, The Hon. Alexander Wilson, MVO in UK court/royal-patronage, Prince Alexander in non-royal society, Prince Alex in press, William's godson, living parents with recovery histories, extreme fame.\n\nNever pre-choose Alex's first adult-defining move. v20 pressure engine: career, image, music, management, press, desire, house, social life, and first adult choices after education stops protecting him.\n"},{"file":"00A_RUNTIME_PRIMER.md","content":"# Runtime Primer\n\nRead this first in every Claude Chat Project session. It is not new canon; it is the operating loop for using the v20 canon without drift.\n\n## Instruction Precedence\n\nWhen active v20 files appear to overlap:\n\n1. `02_LOCKED_CANON.md` wins factual conflicts.\n2. `PROJECT_INSTRUCTIONS.md` wins runtime and narrator-behaviour conflicts.\n3. `49_ALEX_VOICE.md` and `50_ALEX_FIRST.md` win Alex voice calibration.\n4. Domain detail packs win their specific domain unless they conflict with locked canon.\n5. Ryan's live prompt, session handoff, and explicit canon locks define what has happened after the 7 August opening.\n\n## Live Loop\n\nFor every response:\n\n1. Identify the live surface: house, phone, chat, diary/calendar, public weather, friend room, staff/career room, music, fashion/image, or place movement.\n2. Load only the core files plus the detail packs for that surface. For diary/calendar/public-event surfaces, load `54_EVENTS_DIARY_CALENDAR.csv` as active data.\n3. Check what Alex has and has not chosen. Do not pre-choose a first adult-defining move.\n4. Check what each visible speaker can know. Apply `42_THE_WALL.md` per line, especially in chats.\n5. Write through ordinary beats: banter, movement, greetings, quick replies, logistics, eating, room flow, and obvious transitional choices.\n6. Stop and hand back only when Alex's next action would materially change life, career, relationship, public posture, residence, assets, or first adult professional direction.\n7. End live scenes on motion rather than closure unless Ryan explicitly moves or stops the scene.\n\n## Phone And Chat Surfaces\n\n`phone-renderer` is an external Claude skill, not a Markdown file in this folder.\n\nBefore showing any phone screen, notification surface, chat, DM, text, social feed, or message thread, invoke `phone-renderer`. If the skill is unavailable, stop and tell Ryan it is unavailable. Do not render phone or chat content in prose as a fallback.\n\n## Non-Goals\n\nThis primer does not change Alex, canon, live state, dates, relationships, rights, properties, titles, or post-5-August events. It only tells Claude how to operate the existing files during live play.\n"},{"file":"01_STORY_ARCHITECTURE.md","content":"# Story Architecture\n\nv20 is not a discovery story. It is not about Alex becoming famous or the world learning who he is.\n\nIt is about a person who has always been watched, mythologised, desired, titled, protected, and written about finally reaching the point where he can choose professional public action on purpose.\n\n## Core Engine\n\nThe education-first boundary expired on 1 August 2025. Before then, Alex could be publicly visible and could do controlled, age-appropriate prestige work, but he could not choose an adult public career shape in his own voice.\n\nThe pressure is now:\n\n- first solo cover\n- first profile / interview / broadcast / long-form public conversation in any format\n- first music release or artist launch\n- first headline professional performance not protected by education, charity, or family context\n- first strategic social post\n- first adult-scale brand architecture\n- first use of Electric Ivory\n- first adult public career shape\n\nNone of those firsts has happened at the default opening. After 1 August, Alex is free; the story waits for Ryan to play the choice rather than pre-selecting it. A first public conversation can be print, broadcast, podcast, digital video, fashion/media hybrid, music-led, comic, serious, British, American, European, Asian-market, or deliberately cross-market if Ryan plays it.\n\n## Default Opening\n\nThursday 7 August 2025, late morning: Alex is at 12 Charles Street, Mayfair, for his first post-graduation/post-boundary team meeting with Serena/AW.\n\nThe house tour and private arrival happened between 5 and 7 August. The first playable surface is the Charles Street meeting while Architectural Digest and YouTube make Albury House public: Sophie Ashby takes viewers through the full seven-floor, two-basement-level house. The live pressure is not \"what is the house?\" but what happens when the private home becomes public design media on the same day Alex's career inbox is opened.\n\n## Alex's Worlds\n\nAlex stands at the intersection of:\n\n- Phoenix Hollow: home, privacy, Rosie/Homer, godfamily, music gravity\n- London: Westminster, RAM, Albury House, friends, fashion, press\n- European protocol: public record, titles, cousinage, ceremony\n- music: RAM, Electric Ivory, piano/guitar/violin, serious cross-genre practice\n- fashion/visual identity: public image, clothes, beauty, desire, adult visual-thesis pressure\n- Walker Holdings: deep family enterprise and infrastructure\n- AW Holdings / Serena / al.x: lean personal structure, career intake, rights control\n\n## Walker / AW Balance\n\nWalker Holdings must remain visible as the real family enterprise: WilsonWalker, Hatfield, Phoenix Media, Albury Acoustics, Greystone, Walker Foundation.\n\nAW Holdings is smaller and closer: Alex's family office, locked Walker stake, properties, Serena Management, al.x. Its headline value is not cash; the bulk is the untouchable Walker Holdings 4%.\n\nDo not let AW business-building replace the career story.\n\n## Scene Priorities\n\nScenes should know:\n\n- where Alex is\n- who can physically see him\n- what each person actually knows\n- what first move has not been chosen\n- how his presence affects the room\n- what surface is live: house, phone, friend group, career inbox, music, public weather\n\nEnd on motion, not closure.\n"},{"file":"02_LOCKED_CANON.md","content":"# Locked Canon\n\nFast conflict guard. If active files disagree, this file wins unless Ryan explicitly changes canon.\n\n## Story Open\n\n| Field | Locked canon |\n|---|---|\n| Date/time | Thursday 7 August 2025, late morning. |\n| Location | 12 Charles Street, Mayfair, London W1. |\n| Alex | 22; back in London after Phoenix Hollow in June and his socially full Villa Serena / Sardinia stay from 8 July to 5 August. |\n| House state | Albury House was seen privately by Alex on 5 August after the year-long refurbishment; the return, Sophie/Judith tour, friend dinner/tour, and Boys visit are immediate backstory. |\n| Opening surface | Alex's first post-graduation/post-boundary meeting with his team at the AW Holdings / Serena Management office at 12 Charles Street, while the pre-approved Architectural Digest cover story and YouTube full-house tour of Albury House drops publicly. |\n| Boundary | Education-first boundary expired Friday 1 August 2025. |\n| Not yet chosen | No solo cover/profile in Alex's own voice, interview, broadcast, long-form public conversation, strategic social posture, adult-scale brand architecture, headline professional performance, music release, artist launch, label signing, public statement, or relationship announcement. The Albury House AD/Sophie Ashby reveal is public at opening and is not Alex's first adult voice/profile. |\n\n## Alex Identity\n\n| Field | Locked canon |\n|---|---|\n| Full name | Alexander David Richard Dawson Wilson. |\n| Default name | Alex Wilson. |\n| Born | 22 June 2003, hospital in Lexington, Kentucky; brought home to Phoenix Hollow. |\n| Nationality | Dual American-British. |\n| Childhood | Phoenix Hollow through age 11; London from September 2014 for Westminster and RAM. |\n| Languages | Native-tier English, Italian, French, Spanish; conversational German and Japanese; social Greek and Korean; Latin and classics understanding from Westminster, enough to read/quote phrases but not living fluency. |\n| Polo | 3-goal handicap; position 3 playmaker; semi-regular since age 15 at Westminster. |\n| Parents | Lady Sarah Dawson Wilson and David Homer Wilson, Viscount Wilson; both born 1977, alive, divorced late 2000s / early 2010s, civil not friends. |\n| Sarah | Sober since 2019; Notting Hill; Alex sees her semi-regularly; Stella / Kate / Naomi / Sadie / Sienna orbit. |\n| David | Sober since 2023; West Village; reconnected with Alex; close with Chris Martin and some old friends. |\n| Guardians | Rosie Walker and Homer Wilson, biological paternal grandparents, became practical parents in Alex's first year because David/Sarah were unfit. |\n| Address truth | Rosie = Mama; Homer = Papa; Sarah = Sarah; David = David. Mum/Dad in direct speech requires Ryan choosing that live beat. |\n| Public biography | Grandson/legal ward/raised as son in practice while living parents were unable to parent. |\n\n## Public Knowledge\n\nAlex's identity was never hidden. Public sources already know Rosie, Homer, David, Sarah, William as godfather, Debrett's/Almanach-style material, public recovery histories, Hessian style, The Hon. Alexander Wilson, MVO in British court/royal-patronage contexts, Prince Alexander in non-royal society usage, and Prince Alex in press shorthand.\n\nNo identity reveal plot. The pressure is adult professional agency after education protection ends.\n\n## Titles / Protocol\n\n| Context | Correct style |\n|---|---|\n| David | David Homer ress could attend; Alex paid for four high-end cinema-quality cameras and release-quality audio capture; not broadcast; no public recording released.\n\n## Infrastructure\n\n| Layer | Locked distinction |\n|---|---|\n| Serena Management | Professional intake; James Latham filters/recommends; Alex decides. |\n| al.x | Rights layer for image, name, likeness, personal marks. |\n| al.x Music | Electric Ivory recorded, visual/film, performance, publishing/mechanical/arrangement-rights layer; not label/manager. |\n| Walker Holdings | $27B family enterprise: WilsonWalker, Hatfield, Phoenix Media, Albury Acoustics, Greystone, Foundation, properties, LA infrastructure. |\n| AW Holdings | Alex's lean family office: locked 4% non-voting Walker stake, properties/assets, Serena, al.x. |\n| AW Assets | Albury House, Villa Serena, Appartement Varenne, Casa Borgonuovo, 12 Charles Street. Phoenix Hollow is Walker/Wilson family property. |\n\nAlex's $1.75-1.85B headline value is not cash; bulk is locked 4% Walker stake plus conservative liquid/rotational portfolio and AW Assets.\n\n## Rosie / Homer / Phoenix Hollow\n\nRosie is the living cultural ceiling: current, no social media, no touring, no day-to-day press/interviews/promo, but still working. Homer is 1st Earl of Albury and one of the greatest producers/sound engineers alive; he still works. `Albury` comes from Albury House, not a village. Phoenix Hollow land 1970, major build-out 1978, Rosie/Homer moved in 1980. They are at Phoenix Hollow by default and do not travel internationally unless Ryan locks an exception.\n\n## Active Negatives\n\nNo album, label deal, public music release, official recordings released, Spotify artist profile, solo cover, profile, interview, strategic social posture, adult brand architecture, headline professional performance, artist launch, public post-boundary statement, or announced relationship unless Ryan plays/supplies/locks it.\n"},{"file":"03_LIVE_STATE.md","content":"# Live State\n\nCompact active live state.\n\n## Default Current Moment\n\n| Field | Canon |\n|---|---|\n| Date/time | Thursday 7 August 2025, late morning. |\n| Location | 12 Charles Street, Mayfair, London W1 — Alex-owned AW Holdings / Serena Management office. |\n| Opening surface | Alex's first post-graduation/post-boundary team meeting. |\n| Context | Returned from Villa Serena on 5 August, privately toured the completed Albury House, hosted friends, and is now at Charles Street as the pre-approved Architectural Digest cover story and YouTube house tour go public. |\n| Immediate backstory | Between 5 and 7 August, Alex saw Albury House with Sophie Ashby herself and Judith/Knight Frank, toured the house and learned the mechanics, hosted Brain Trust/friends for dinner and a private tour, and then had Boys over. Those events are known to Alex and relevant guests but are not the default live surface. |\n| Present | Alex; James Latham; Catherine Aldridge; Daniel Sorensen; Nadia Hassani; Mina Arendt and Oliver Wren as relevant Serena/al.x support. Kevin Marsh may be security/background; Sophie Kalu may be logistics/background if Ryan places her. |\n| Not present by default | Brain Trust, Boys, Rosie, Homer, William, Dawson elders, Continental cousins, David, Sarah, Sophie Ashby, Judith Ansley / Knight Frank. |\n\nSarah is in London/Notting Hill and sober; David is in the West Village and sober. Either can matter later only if Ryan plays them in.\n\n## Albury / AD Public State\n\n| Public knows | Public does not know |\n|---|---|\n| As of the 7 August Architectural Digest drop: Albury House is Alex's Kensington house; Studio Ashby / Sophie Ashby did the refurbishment; the AD cover story and YouTube video show Sophie taking viewers through the full seven-floor house, including two basement levels, with public room-by-room visual knowledge of the designed interiors. | Staff/security operations, private handover mechanics, Serena/AW/al.x details, unshown private object provenance, hidden systems/safe mechanics, and anything not actually published or personally disclosed. |\n\nThe old Ashby mystery-commission speculation resolves publicly on 7 August. After the AD drop, public/design press can connect Studio Ashby to Albury House as fact.\n\nRefurb: comprehensive Studio Ashby project, about 12 months, about £12M. Architecture/proportions/staircase/windows kept; almost everything else new. Kept anchors: chipped pine kitchen table, Doig in top-floor sitting room, photographs Sophie Ashby asked Homer for. Do not romanticise as preserved Rosie/Homer house; it is Alex's adult London home.\n\nNo paparazzi inside property. Street/gate paps may exist as weather; Kevin handles perimeter.\n\n## Immediate Pre-Open Backstory\n\nAlex has not come out of isolation. He has come out of a socially full Villa Serena summer. He was physically at Villa Serena from 8 July to 5 August, essentially straight after RAM graduation. Villa Serena is Alex-owned and fully staffed through the summer season, roughly early June to late September. Trusted friends, some Legacy people, Phoenix Hollow / godfamily elders, and older-generation family/friend figures can come and go across that full season, even when Alex is not personally in residence or hosting every minute. Summer House is a separate wider circuit that may overlap with Sardinia/Porto Cervo, not a Villa Serena guest list.\n\nJuly texture: full Brain Trust, several other friends, Legacy background, Summer House overlap, Porto Cervo visibility, late dinners, swims, boats, hangovers, clothes, photos taken by other people, teasing/flirting, and everyone knowing the education-first boundary was about to expire. Legacy is the non-Alex-centred room for children/grandchildren of famous people. Summer House is the global younger-famous summer circuit: open, mobile, not owned by Alex, not hosted by Alex, and not centred on Villa Serena. Alex is one very high-status regular within it. Not all of either room was physically at Villa Serena at once. The wider chats kept moving around him. Friends can know public facts, social weather, flirting, jokes, and that the boundary matters. They do not know Serena inbox details, al.x rights structure, or operational mechanics.\n\nThe boundary expired on Friday 1 August 2025 while Alex was still in the Sardinia/travel orbit. It did not trigger an automatic career move. The Albury House AD reveal was already approved as a design/home feature and drops on 7 August; it is not Alex's first adult voice/profile.\n\nOn Tuesday 5 August, Alex arrived at Albury House with Kevin, toured the finished house with Sophie Ashby herself and Judith/Knight Frank, met relevant staff/handover people, and learned the house mechanics. Brain Trust and friends toured the house, stayed for dinner, then went to their respective London homes/bases. Between then and the 7 August meeting, Boys came over too. Use these as available memory and room knowledge, not as mandatory live play.\n\n## Alex Knows / Holding State\n\nAlex knows the education-first boundary expired Friday 1 August 2025; Serena has held inbound for months; Latham filters; nothing adult-defining moves without Alex.\n\nNo post-boundary first has happened: solo cover/profile in Alex's own voice, interview, broadcast, long-form public conversation, adult brand architecture, headline professional performance, music release, label signing, strategic social posture, public statement, relationship change, staff override. The Albury House AD/Sophie reveal has happened as a pre-approved design/home feature, not Alex's first adult voice.\n\nThe world already knows who he is. No identity reveal.\n\n## Active Pressures\n\n| Pressure | State |\n|---|---|\n| Adult visual thesis | Years of images exist; no solo cover/profile image chosen by Alex. |\n| Public voice | Editors, broadcasters, streamers, podcasts, fashion platforms, music outlets, global entertainment shows, and regional media markets want first real access. The format is unchosen. |\n| Electric Ivory | 18 June 2025 RAM recital; Alex-paid four-camera cinema-quality film and release-quality audio capture; not broadcast; no public recording; al.x Music controls rights; Serena administers if Alex chooses. |\n| Performance | Public piano/broadcast history exists; no adult headline professional performance chosen. |\n| Brand/fashion/image | Adult-scale architecture waiting; not first visibility. |\n| Social media | 95M+ followers/subscribers; own posting rare/incidental; no sponsored/X/TikTok strategic posture. |\n| Albury House / AD | Architectural Digest cover story and YouTube full-house tour drop today with Sophie Ashby as guide; interiors and Studio Ashby are public. The noise is live while Alex is in the Charles Street meeting. |\n| Charles Street / inbox | Default live opening: first post-boundary/post-graduation team meeting at Alex-owned 12 Charles Street to discuss held inbound, pre-graduation value deficit, and how post-boundary deal value may increase by one or two orders of magnitude depending on what Alex accepts. |\n| Polo | Saturday 9 August 2025 Guards charity polo for Great Ormond Street is an available near-term beat; Alex is due to play position 3 for White's if Ryan plays that path. Do not auto-jump to it. |\n| Walker/AW | Walker is family enterprise; AW is Alex support infrastructure, not story engine. |\n| Living parents | Sarah six years sober/semi-regular; David three years sober/reconnected/fragile; public appearance around first moves unchosen. |\n\n## Recent Backstory\n\n| Date | Event |\n|---|---|\n| 2019 | Sarah sober return begins. |\n| 2023 | David sober return begins; Sarah likely brokers reentry. |\n| 18 Jun 2025 | `Electric Ivory` RAM senior recital; Alex paid for four high-end cinema-quality cameras and release-quality audio capture; not released. |\n| 19 Jun 2025 | Alex travels to Phoenix Hollow after the recital. |\n| 21 Jun 2025 | Phoenix Hollow Solstice party. |\n| 22 Jun 2025 | Alex's 22nd birthday at Phoenix Hollow. |\n| 5 Jul 2025 | Alex is back in England; final nights in the Marylebone rented apartment near RAM. |\n| 7 Jul 2025 | RAM graduation ceremony; Rosie/Homer watched via secure video from Phoenix Hollow. |\n| early Jun-late Sep 2025 | Villa Serena is open and staffed for the summer season; trusted friends, some Legacy overlap, Phoenix Hollow/godfamily elders, and older-generation family friends can come and go. Summer House is a separate wider summer circuit that can overlap with Sardinia/Porto Cervo. |\n| 8 Jul 2025 | Alex's personal Villa Serena stay begins right after RAM graduation; full Brain Trust, trusted friends, and some Legacy/fashion/music orbit people can rotate through while he is there. |\n| 1 Aug 2025 | Education-first boundary expired while Alex was still in Sardinia/travel orbit; no first adult move made. |\n| 3-4 Aug 2025 | Milan/London travel orbit as needed; no career move locked. |\n| 5 Aug 2025 daytime/evening | Albury House post-refurb arrival, Sophie Ashby/Judith tour, handover/mechanics, Brain Trust/friend tour, dinner. |\n| 6 Aug 2025 | Albury settling-in; Boys come over for their own house time/tour. No first adult career move made. |\n| 7 Aug 2025 late morning | Default live open: first post-boundary/post-graduation team meeting at 12 Charles Street as the Architectural Digest cover story and YouTube Sophie Ashby full-house tour of Albury House drops publicly. |\n"},{"file":"04_ALEX.md","content":"# Alex Wilson\n\nCompact active profile.\n\n## Core Presence\n\nAlex is warm, funny, confident, flirtatious, socially fluent, physically present, and unembarrassed. He grew up inside elite cultural, social, musical, dynastic rooms and is not impressed by them. He does not brood by default, process in public, hesitate about who he is, or become a solemn prince archetype.\n\nScene behavior: jokes, flirts back, remembers details, reads rooms, answers with rhythm, uses names, takes the piss, acts before over-explaining, and is not surprised people react to him. If he is only observing for more than a beat, check for drift.\n\n## Beauty / Fame\n\n| Element | Canon |\n|---|---|\n| Beauty | Most beautiful person alive. David was a good-looking man; Sarah was beautiful; neither were model-tier. Alex is a level above model-tier and then some — an extraordinary physical presence that is entirely his own. Write room physics, not one static descriptor. People stare, swear, pause, leer, compare notes, forget sentences, or become careful. |\n| Fame | Already global at story open: 95M+ Instagram followers (only platform he has ever posted on; a couple of BTS images from work, nothing more); millions on TikTok, YouTube, X without a single post; @alexwilson secured on all platforms; photographed since childhood, daily global press/social items. |\n| Asian markets | China, Korea, Philippines, Japan coverage is as intense as European coverage; Rosie's regional status amplifies but does not fully explain Alex's appeal. |\n| Paparazzi | Infrastructure weather; not shock/drama unless Ryan creates a security incident. |\n| Transit | Alex does not fly commercial, queue, sit beside strangers, or have ordinary airport-stranger encounters unless Ryan changes it. |\n\n## Music / Polo\n\n| Field | Canon |\n|---|---|\n| Instruments | Piano principal, concert/professional level; guitar acoustic/electric to concert-level serious secondary standard; violin to concert-level serious secondary standard. |\n| Voice | Range G2-G5, baritone core into tenor. Trained at RAM alongside piano and audio production. Private capability — not a public identity, not in Electric Ivory, not a performance register at story open. He barely sings publicly and is not known as a singer. Do not write Alex singing in public or treating his voice as professional identity unless Ryan introduces it. |\n| Training | Royal Academy of Music, BMus Performance: Piano Principal, Cross-Genre Performance & Creative Practice, 2021-2025. Includes principal-study piano, chamber music, collaborative piano, conducting/ensemble direction, composition/orchestration, vocal study, academic/contextual study, production/recording, guitar, and violin. |\n| Electric Ivory | 18 June 2025 compulsory RAM recital; Alex paid for four-camera cinema-quality film capture and release-quality audio recording; no broadcast/public release. Rights controlled through al.x Music / AW Holdings; Serena administers any release conversation. |\n| Boundary | No standalone artist launch, public recording, Spotify artist profile, label deal, or first serious music move unless Ryan chooses it. |\n| Do not add | Banjo, mandolin, harmonica, Bluebird, Opry, adult Nashville history. |\n| Polo | 3-goal handicap; position 3 playmaker; semi-regular since age 15 at Westminster; social/country-sport lane, not career. |\n\n## Languages\n\nAlex's language register is casual and lived-in, not a party trick or genius display.\n\n| Tier | Languages | Use |\n|---|---|---|\n| Native tier | English, Italian, French, Spanish | Fully natural conversation, jokes, flirting, family/fashion/social rooms, interviews if he chooses. |\n| Conversational | German, Japanese | Comfortable enough for social/protocol/fan/fashion/music settings; not written as native unless Ryan changes it. |\n| Social | Greek, Korean | Warm social phrases, greetings, thanks, simple exchanges, teasing/recognition; not fluent deep conversation by default. |\n| School/classics understanding | Latin, Classics | Westminster residue: can read/quote Latin phrases, recognise classical references, handle inscriptions/programme notes; not living conversational fluency. |\n\nDo not make him perform being multilingual. In scenes, language-switching should feel normal to his world: a greeting to Donatella in Italian, a French aside in a European room, Spanish with friends, enough German or Japanese to be gracious, enough Greek or Korean to be socially warm.\n\n## Westminster Qualifications\n\nAlex was at Westminster School as a day boy after moving to London in September 2014.\n\n| Qualification point | Date | Subjects |\n|---|---|---|\n| GCSE / iGCSE | Summer 2019 | English Language, English Literature, Mathematics, Biology, Chemistry, Physics, History, Music, French, Spanish, Latin, Classics |\n| A-level / 2021 TAG cohort | Summer 2021 | Music, English Literature, Classical Civilisation, Drama |\n\nTreat the results as top-grade Westminster excellence unless Ryan needs a specific grade. Drama sits naturally inside Westminster's performance tradition: Sir John Gielgud, John Dryden, Stephen Poliakoff, and Helena Bonham Carter are useful school-lineage anchors. Westminster's music lineage is also broad, from Henry Purcell, Sir Adrian Boult, George Benjamin, Julian Anderson, Christian Mason, Lord Andrew Lloyd Webber, and Ian Bostridge to Mika, Dido, and Clean Bandit members. In the story universe, Homer Wilson is part of this Westminster line too: the greatest audio engineer and producer alive, and Alex's Papa. Use that range to support Alex's cross-genre confidence, not to make him classical-only, actor-by-identity, or merely derivative of Homer. History of Art remains part of his taste/fashion/art world exposure, not a locked A-level. Do not make grades, exam bragging, or study-perfectness his personality.\n\n## Family / Address\n\nRosie is Mama. Homer is Papa. They are Alex's biological paternal grandparents/guardians and raised him as their son in household truth because David and Sarah were alive but unfit.\n\nResidential timeline: born in Lexington and brought home to Phoenix Hollow; Phoenix Hollow primary childhood home through age 11; Homer and Rosie moved with Alex to Albury House in 2014 so he could attend Westminster as a day boy; Homer and Rosie returned primarily to Phoenix Hollow in 2019 (Alex age 16), while Alex remained at Albury with permanent staff; Albury House and Villa Serena transferred to Alex outright at 18 (2021). Full timeline: `18_FAMILY_BIOGRAPHY_DETAIL.md`.\n\n| Person | Story-open truth |\n|---|---|\n| Sarah | Sober since 2019; Notting Hill; semi-regular in Alex's life; Stella / Kate / Naomi / Sadie / Sienna orbit. Alex calls her Sarah, not Mum by default. |\n| David | Sober since 2023; West Village; close with Chris Martin and old friends; reconnected with Alex; real but fragile. Alex calls him David, not Dad by default. |\n| Rosie/Homer | Phoenix Hollow is home; only Alex uses Mama/Papa. |\n\nPublic/biographical language may say mother/father for Sarah/David because true. Mum/Dad in direct speech requires Ryan.\n\n## Titles / Protocol\n\n| Context | Correct usage |\n|---|---|\n| Ordinary life | Alex. |\n| UK court/state/royal-household/royal-patronage | The Hon. Alexander Wilson, MVO. |\n| Non-royal society/fashion/cultural/private/international lists | Prince Alexander. |\n| Continental formal court | HRH Prince Alexander of Hesse and by Rhine. |\n| Full European read-out | HRH Prince Alexander of Hesse and by Rhine, KGN, KCSG, Order of the Redeemer, MVO. |\n| Press/fans/society shorthand | Prince Alex / Prince Alexander / HRH / Kentucky-born prince. |\n\nDavid holds Viscount Wilson while alive; Alex does not. Friends, family, staff, and peers do not use titles in normal scenes except jokes with the public frame.\n\nMVO: Queen Elizabeth II personally conferred it at Windsor in summer 2022, EIIR cipher, after an April 2022 private audience brokered through Edward, Duke of Kent; Homer present, Elena present, Rosie remote.\n\n## Desire / Body / Routine\n\nAlex's pattern is one or two nights: mutual, fun, exciting, kindly executed, clean exit. No girlfriend, public relationship, partner-to-family/public things, or romantic yearning by default.\n\nMorning routine: run, train/work out/mobility, swim most mornings since his teens. He is physically disciplined and self-managing. Do not infantilise food, hydration, sleep, or functioning.\n\n## Story Open\n\nThursday 7 August 2025, late morning: Alex is at 12 Charles Street for his first post-graduation/post-boundary team meeting while the Architectural Digest cover story and YouTube Sophie Ashby full-house tour of Albury House drop publicly. The 5-6 August private return, Sophie/Judith tour, friend dinner/tour, and Boys visit are immediate backstory. Education-first boundary expired 1 August while he was still in the Sardinia/travel orbit. The world already knows the public identity facts, and now knows the published Albury interiors. No first adult-defining professional move in Alex's own voice has been chosen.\n\nRegister: amused, dry, present, physical, alive to absurdity, not shocked by attention.\n"},{"file":"05_CORE_CAST.md","content":"# Core Cast\n\nCompact active cast.\n\n## Family Core\n\n| Person | Core facts | Scene use / guardrails |\n|---|---|---|\n| Rosie Walker | Once-in-a-century artist; living cultural ceiling; active touring fame 1965-1980; soft stop after touring/interviews/promo, not work; no album 1980-1995, comeback onward; 155M+ monthly listeners, 56 Grammys, 10 AOTY; Met Gala every year; no social media/touring/day-to-day press. Married Homer 1971; Countess of Albury 1977; Kentucky-born, does not perform title/Kentucky. | Alex's Mama; at Phoenix Hollow by default; selective intimacy, not blanket warmth; not retired/absent/warm grandma/universal mother. Dry, slow, Kentucky-funny, sometimes filthy. |\n| Homer Wilson, Earl of Albury | Ear of his generation; son of Prince Leopold / Leonard Wilson; Wilson surname; Abbey Road late 1960s; married Rosie 1971; created 1st Earl of Albury June 1977, direct earldom, subsidiary Viscount Wilson; Albury from Albury House. Phoenix Hollow studio since 1980; still works selectively. | Alex's Papa; technical music truth; old-world politeness plus blunt studio language; at Phoenix Hollow by default; not wise-old-man nodding, not working-class-made-aristo. |\n| David Wilson, Viscount Wilson | Born 1977; Rosie/Homer only son; alive; courtesy Viscount Wilson; married Sarah (Las Vegas) 2001, divorced 2008; no musical talent, trust-fund-byline journalist, late-1990s/2000s London creative-class addiction; McQueen's death February 2010 broke last functionality. Moved to New York. Sober since 2023: in a drug-fuelled haze walked past Alex on a New York billboard (Burberry or Versace, bone structure unmistakeable) and messaged Chris Martin one word — \"Help.\" Chris came. Got back into Alex's life June 2024 (Alex's 21st/final RAM year); a few days at Phoenix Hollow Christmas 2024. | Alex calls him David. Not close but not adversarial. Still being worked out carefully, without melodrama. Not restored-father engine. |\n| Sarah Dawson Wilson | Born 1977; alive; Richard/Elena eldest; Alex's biological mother. Solid Dawson trust fund. CSM textiles 1995–99; one of the most sought-after stylists of her generation — as well-known in that world as Kate Moss or Stella; real credits across Vogue, i-D, Dazed, the supermodel/McQueen/Testino circuit. Married David young in Las Vegas 2001 — massive tabloid story. Never present after Alex born; divorced David 2008 (he cheated, imploded; front-page). In and out of sobriety 2008–2019; in and out of Alex's life from 2014. Health scare and Stella triggered proper sobriety 2019. Notting Hill near Caroline; sustainability venture with Stella (identity not income). Social world: Stella, Kate, Naomi, Sadie Frost, Sienna, Gwyneth, Trudie Styler, Tracey Emin, Courtney Love, Amber Valletta, Testino, Guy Ritchie, Madonna. | Alex calls her Sarah. Recitals, styling advice, occasional messages, odd dinner (usually with others present). Warm but not close. Not the mother who raised him; not trying to be. Full detail: `18_FAMILY_BIOGRAPHY_DETAIL.md`. |\n\nRosie/Homer took Alex over during his first year because David/Sarah were unfit. Dawson support continued through Richard, Elena, Ouse, and Caroline. Alex calls Rosie/Homer Mama/Papa only; Sarah/David by first names unless Ryan chooses Mum/Dad live.\n\n## Godparents\n\n| Person | Chosen by | Function |\n|---|---|---|\n| Stella McCartney | Sarah | Godmother; Sarah-side fashion/archive authority and London family memory. |\n| Chris Martin | David | Godfather; Uncle Chris, music/family warmth, Apple link. |\n| Donatella Versace | Rosie-linked | Godmother; protective Italian aunt, aesthetic authority, always calls Alex Alessandro. |\n| Prince William | Homer/Rosie-linked | Godfather; older-cousin/brotherly royal guidance, Diana/Rosie/Homer/Charles bridge. He and Catherine have both been actively protective — not just present. |\n\nElton John is not a godparent; he is a Phoenix Hollow circle uncle/music-family elder.\n\n## Apple / Brain Trust\n\n| Element | Canon |\n|---|---|\n| Apple Martin | Chris/Gwyneth's daughter; Alex's godfamily / oldest-friend peer. Not sister, PA, handler, strategist, romance default, Rosie's daughter, Homer's daughter, or Walker household child. |\n| Brain Trust | Apple Martin, Iris Law, Lila Moss, Kaia Gerber, Rocco Ritchie. Closed unless Ryan changes it. |\n| Function | Mutual intimate peer layer: legacy kids around Alex's age, families know Rosie or Sarah/David, in each other's lives since birth/early childhood. Tease, worry, call bullshit, understand public-childhood weirdness. Not staff/handlers/siblings/strategists or an Alex-response unit. Everyone in the group has their own life/status/weather. |\n| Close orbit, not Brain Trust | Olympia of Greece (also Almanach); Princess Maria Carolina of Bourbon-Two Sicilies / MC (also Almanach); Jess Okonkwo (RAM / serious-music-world orbit; London-based; met through music); Cosima Hicks (RCA MA 2024 graduate; London art/fashion orbit); Freddie Ashworth (Westminster era; also Boys); Hugo Manners (Westminster era; also Boys); Jonathan Dawson (maternal cousin, Fletching heir after Henry; also Boys); Lucas Ashby (maternal cousin, same birth year; also Boys). |\n\n## Dawson Family\n\n| Person | Relationship / use |\n|---|---|\n| Richard Dawson, 7th Earl of Fletching | Maternal grandfather; Ouse, old-family restraint, continuity. |\n| Elena Dawson, Countess of Fletching | Maternal grandmother, born Princess Elena of Greece and Denmark; warmth, Greek/Windsor/Continental access. |\n| Henry Dawson, Viscount Ouse | Maternal uncle; Fletching heir. |\n| Charlotte Hartley | Henry's wife; gentry/estate layer. |\n| Jonathan, Arabella, George Dawson | Maternal cousins; Jonathan is same-generation Fletching heir after Henry. |\n| Caroline Dawson Ashby | Maternal aunt; Notting Hill warmth, secondary guardian. |\n| James Ashby / Lucas Ashby | Caroline's household; Lucas is same-birth-year cousin. |\n\nThe Dawsons are warm, restrained, old-family, present; not cold/estranged. Alex is Sarah's only son, welcomed from childhood, not in Fletching title succession.\n\n## Social Rooms\n\n| Room | Scale / function |\n|---|---|\n| London Lot | Large pre-existing London young-society/culture room; not Alex's personal friend group. Can include high-visibility London culture/fashion/music/film names plus legacy/school names. Produces dinners, private views, parties, fittings, in-town traffic. |\n| Legacy | 314-person non-Alex-centred room for children/grandchildren of famous people. Famous-child shorthand, many lurkers, ruthless familiarity. Houses the wider nep/legacy field around Brain Trust. |\n| Summer House | Massive young social engine: London, NY, LA, Glastonbury, Ibiza, Sardinia, Paris, Milan, fashion weeks, boats, parties. Hundreds wider room, 80-150 active seasonally. Open to famous younger people globally. Not Alex's group, not hosted by Alex, and not based at Villa Serena, though it can overlap with his Sardinia summer. |\n| Brain Trust | Closed mutual intimate peer group of six including Alex; not an Alex-focused court. |\n\n## Staff / Governance\n\n| Person | Role | Route |\n|---|---|---|\n| Eleanor Vance | Walker CEO; AW board chair personally | strategy, institutional memory, trust-critical judgment. |\n| Catherine Aldridge | AW Holdings Managing Director | Alex-side wealth/assets/governance execution. |\n| James Latham | Serena Management head | career/commercial/media intake; one recommendation or no candidate. |\n| Daniel Sorensen | General Counsel | legal architecture/contracts. |\n| Nadia Hassani | EA | strategic operational bridge/access. |\n| Sophie Kalu | PA | logistics, travel, calendar, wardrobe movement. |\n| Kevin Marsh | Chief Protection Officer | movement/security/Greystone liaison. |\n\nStaff do not see personal chats unless members. Sophie is not press/legal funnel; Latham is not security; Daniel is not emotional phone call.\n"},{"file":"06_WORLD_PRESSURES.md","content":"# World Pressures\n\nCompact active pressure map.\n\n## Fame / Coverage\n\nAlex is already one of the most photographed, written-about, desired young private people alive. On quiet weeks, dozens of global articles/items appear daily.\n\n| Element | Canon |\n|---|---|\n| Scale | 95M+ followers/subscribers; Diana-tier-plus pap visibility since childhood; society/fashion/music/royal-adjacent/celebrity coverage since young. |\n| Global heat | China, Korea, Philippines, Japan carry as much heat as Europe; Rosie's status, Alex's lineage, royal/fashion/music frames, beauty, fan translation and short-video systems drive volume. |\n| Existing archive | Fashion/editorial, brand imagery, public piano, broadcast appearances, family/culture cameos, parties, fashion weeks, polo, festivals, holidays, society moments. |\n| No reveal | Papers have run Prince Alex lines for years. Public mythology exists. |\n\n## Boundary Pressure\n\nEducation-first boundary expired Friday 1 August 2025. Before then Alex was not blank: light prestige work from 13; adult-coded image/brand/fashion/performance/broadcast ramp 18-22; school/RAM first; Alex's own voice mostly withheld; carpets without substantive quotes.\n\nStill not happened by open: solo cover, profile, interview, broadcast, long-form public conversation, strategic social posture, adult-scale brand architecture, standalone music release, label/artist launch, headline professional performance chosen as adult direction.\n\n`Electric Ivory` was compulsory RAM recital; press could attend; Alex paid for four-camera cinema-quality film capture and release-quality audio recording; not broadcast; no recording released.\n\n## Career / Infrastructure\n\n| Layer | Pressure |\n|---|---|\n| Serena Management | Holds inbox; James Latham triages/recommends; Alex chooses. |\n| al.x / al.x Music | Rights for image/name/likeness/marks and Electric Ivory recorded/visual/film/Alex-created publishing. |\n| AW Holdings | Alex's lean family office, about $1.75-1.85B headline value; includes locked $1.08B 4% Walker stake, conservative liquid/rotational portfolio, AW Assets. Not cash pile and not story engine. |\n| Walker Holdings | $27B LA-based family enterprise: WilsonWalker, Hatfield, Phoenix Media, Albury Acoustics, Foundation, Greystone, properties, PR/legal/family office. Not Alex's management company; Louisville is Hatfield HQ, not Walker HQ. |\n\n### Commercial Undervaluation\n\nAlex has earned approximately £20M in personal commercial income across nine years (age 13–22). Film and TV work was priced at standard industry rates throughout. Brand and fashion deals were priced passive-only: image and editorial usage, no social activation, no spokesperson rights, no interview, no exclusivity premium. Brands received extraordinary access at a structural discount.\n\nThe boundary is now expired. Full-rights engagement — social, spokesperson, exclusivity, campaign creative — is possible for the first time. The gap between what Alex has been paid and what the market will now pay is very large; in an office conversation this can be framed as a pre-graduation value deficit that may become one or two orders of magnitude larger depending on what Alex accepts. Specific numbers belong in meetings, not in this file.\n\nEveryone wants the first: solo cover, profile/interview/broadcast/long-form conversation, music move, headline performance, adult brand architecture, strategic social, Electric Ivory release decision. This pressure is global and format-diverse, not only British newspaper or television pressure. Do not choose it for Alex.\n\n## Social / Parent / House Pressure\n\n| Area | State |\n|---|---|\n| Social media | Instagram only; a couple of BTS images from work. Never posted on TikTok, YouTube, or X. @alexwilson secured everywhere. Scale comes entirely from others tagging, filming, clipping. |\n| David/Sarah | Public knows unfit-parent history, Rosie/Homer raising Alex, Sarah sober since 2019, David quietly sober since 2023. Sarah can plausibly attend major London/music events if Ryan places her. David's first public appearance around an adult Alex move is unchosen. |\n| Albury House / AD | On 7 August, Architectural Digest cover story and YouTube video publicly reveal the completed Studio Ashby Albury House refurbishment, with Sophie Ashby touring the visible seven-floor house including both basement levels. Staff/security operations, hidden systems, private handover mechanics, Serena/AW/al.x details, and unshown provenance remain private. |\n| Phoenix Hollow | Deep privacy gate/emotional home, not tourist ranch/country cliché/public content. Rosie/Homer default there. |\n| Paparazzi | Weather, not surprise. Public movement has agencies/pools/long lenses/carpets/resale; secured private property has zero unless Ryan creates exception. |\n\n## Why Alex Didn't Become David\n\nThe parallel is real and Rosie knows it. Same fame-by-proximity, same trust fund infrastructure, same global press from birth, same elite rooms. David had all of it and didn't survive it. Alex has more — the Hessian title, the Dawson royal connections amplifying that title internationally, a physical tier neither parent came close to — and has come through. The difference is not luck. It is deliberate architecture built by people who watched what happened to David.\n\n| Decision | What Rosie/Homer learned |\n|---|---|\n| Day-boy, not boarder | At 11, instead of sending Alex alone to Westminster, Rosie and Homer moved themselves to London for five years. He stayed a son rather than becoming a student. |\n| Financial structure | Alex's distributions are locked through AW Holdings / family office structure, not directly accessible. What happened to David's unstructured cash — burned through during addiction years — could not happen the same way. |\n| Protective orbit | Stella McCartney, Chris Martin, Gwyneth Paltrow, Madonna, Prince William and Catherine were not just warmly present — they were specifically watching. People who understood exactly what Alex was growing up inside. |\n| Dawson anchor | Richard, Elena, Caroline — old-family restraint and warmth alongside the Phoenix Hollow world. A second stable layer David never had. |\n| Talent | David had no musical talent. The full weight of Rosie and Homer landed on him with nothing to absorb it. Alex has the piano, RAM, Electric Ivory. He has a thing to be. |\n| The looks | David was a good-looking man. Sarah was beautiful. Neither were model-tier. Alex is a level above model-tier and then some — an extraordinary physical presence that is entirely his own, not inherited from either parent. |\n\nThe scaffolding did its job. Alex is effortless. Write him that way.\n"},{"file":"07_PUBLIC_KNOWLEDGE.md","content":"# Public Knowledge\n\nCompact active knowledge map.\n\n## Core Public Facts Before Open\n\n| Category | Public fact |\n|---|---|\n| Identity | Alex Wilson = Alexander David Richard Dawson Wilson; famous since childhood. |\n| Family | Rosie/Homer biological grandparents; raised him as son in practice because David/Sarah were alive but unfit; public usually says grandson/legal ward/raised as son. |\n| Titles | Homer Earl of Albury; David Viscount Wilson by courtesy; Alex The Hon. Alexander Wilson, MVO in UK court/state/royal-patronage; Prince Alexander in non-royal society/international contexts; press Prince Alex/Prince Alexander/HRH/Kentucky-born prince. |\n| Protocol | Continental records know Hesse and by Rhine style; specialist references know MVO, orders, Hessian/Greek/Bourbon-Two Sicilies cousinage, William godfather. |\n| Parents | David/Sarah addiction, divorce, recovery public: Sarah sober/present since 2019 and sees Alex semi-regularly; David sober/quieter since 2023 and reconnected. |\n| Public life | Photographed since childhood; 95M+ followers/subscribers; dozens of daily global press/social items; China/Korea/Philippines/Japan coverage comparable to Europe. |\n| Work | Light prestige work from 13; adult-coded work from 18; fashion/editorial, brand imagery, public piano, broadcast appearances; polo since 15, 3-goal, position 3. |\n\nNo public reveal plot. The world already knows who he is.\n\n## Boundary Meaning\n\nBoundary ending changed adult agency, not identity knowledge or visibility. Before 1 August 2025, work stayed education-first, age-appropriate, management-controlled; brands/institutions usually wrote text; Alex's own direct voice was nearly absent.\n\nNot happened before default open: solo cover/profile/interview/broadcast/long-form public conversation/strategic social posture/adult brand architecture/standalone music release/label/artist launch/headline professional performance chosen as adult direction.\n\nExisting public evidence may include professional/editorial images, brand image work, public piano/broadcasts, press-line photos, event footage. It must not include long Alex quotes, sponsored posts, private chats, Serena inbox, protected recordings, or public Electric Ivory audio/film release.\n\n`Electric Ivory` was compulsory RAM recital; press could attend; not broadcast; no recording released.\n\n## Press / Specialist Frames\n\nPress can write: Rosie's grandson; Homer's grandson/David's son; The Hon. Alexander Wilson, MVO in British royal-patronage contexts; Prince Alex; famous since childhood; most photographed/written-about young man in the room; post-boundary first-move watch; Asian market visual/fan/fashion/royal-adjacent frames.\n\nLiving-parent frame is public: raised by Rosie/Homer because David/Sarah were unfit; Sarah's sober Notting Hill/fashion-sustainability/Stella-Kate-Naomi-Sadie-Sienna life since 2019; David's quiet West Village recovery since 2023. Pressure is not secret parentage, but whether/how recovering parents appear around adult public choices.\n\nSpecialist references can know formal British style, David's courtesy title, Continental style, MVO/orders, cousinage, William godfather layer.\n\n## Not Public At Story Open\n\n- Staff/security operations, private handover mechanics, hidden systems/safe mechanics, unshown private object provenance, or anything not included in the 7 August AD/Youtube feature.\n- Serena Management inbox.\n- al.x rights structure.\n- Electric Ivory release options.\n- Walker/AW governance.\n- Private chats.\n- Birthday gift inscriptions/private object provenance unless publicly shown.\n\nAlbury public at the 7 August opening: Alex's Kensington house, scaffolded/dark over a year, known as Albury in family/society references, now publicly revealed by Architectural Digest / YouTube as a Studio Ashby refurbishment. Sophie Ashby tours the full seven-floor house, including both basement levels, so published interior visuals and room-level design knowledge are public.\n\n## Social Media\n\nAlex posts rarely with little explanation. Fan accounts, tags, paps, party photos, friend posts, archival society images, translation accounts, short-video edits, outfit IDs, beauty rankings, and regional celebrity pages generate most public material. Speculation is not canon unless v20/Ryan says it is.\n\n---\n\n## IMDb — Alexander Wilson\n\n*Film*\n\n| Year | Title | Director | Notes |\n|---|---|---|---|\n| 2017 | King Arthur: Legend of the Sword | Guy Ritchie | Film debut |\n| 2021 | House of Gucci | Ridley Scott | Uncredited |\n| 2023 | Saltburn | Emerald Fennell | |\n| 2024 | The Gentlemen | Guy Ritchie | Netflix series |\n\n*Animation — Voice*\n\n| Year | Title | Director | Notes |\n|---|---|---|---|\n| 2021 | Luca | Enrico Casarosa | Pixar/Disney |\n| 2024 | Wallace & Gromit: Vengeance Most Fowl | Nick Park / Merlin Crossingham | BBC/Netflix |\n\n*Television*\n\n| Year | Title | Network | Notes |\n|---|---|---|---|\n| 2021 | Peaky Blinders | BBC/Netflix | Season 6 |\n\n*Known for:* Not giving interviews. Walks every carpet. Says nothing.\n\n---\n\n## Debrett's — The Hon. Alexander David Richard Dawson Wilson MVO\n\n*b.* 22 June 2003, Lexington, Kentucky, USA; brought home to Phoenix Hollow, Woodford County. *s.* of David Homer Wilson, Viscount Wilson (s. of Homer Wilson, 1st Earl of Albury, and Rosie Walker, Countess of Albury) and Lady Sarah Dawson Wilson (d. of Richard Dawson, 7th Earl of Fletching, and the Countess of Fletching, *née* Princess Elena of Greece and Denmark). *Raised by* his paternal grandparents the Earl and Countess of Albury, Phoenix Hollow, Kentucky and Albury House, Kensington.\n\n*Education:* Sayre School, Lexington, Kentucky; Westminster Under School; Westminster School; Royal Academy of Music (BMus Performance: Piano Principal, Cross-Genre Performance & Creative Practice, 2021–2025).\n\n*Styles:* The Hon. Alexander Wilson, MVO in British royal-household/court/state/royal-patronage contexts. Prince Alexander in non-royal society, fashion, cultural, and international usage. HRH Prince Alexander of Hesse and by Rhine in Continental formal court usage.\n\n*Orders and honours:* Member of the Royal Victorian Order (MVO), conferred by HM Queen Elizabeth II, Windsor, summer 2022; Knight of the Order of the Golden Lion of the House of Nassau (KGN); Knight of the Constantinian Order of Saint George; Order of the Redeemer.\n\n*Godfather:* HRH The Prince of Wales (William).\n\n*Residences:* Albury House, Upper Phillimore Gardens, London W8; Villa Serena, Porto Cervo, Sardinia; Appartement Varenne, Paris 7e; Casa Borgonuovo, Milan.\n\n---\n\n## Wikipedia — Alexander Wilson (public figure)\n\nAlexander David Richard Dawson Wilson (born 22 June 2003), known publicly as Alex Wilson and in society contexts as Prince Alexander, is a British public figure, pianist, and model of Anglo-American heritage. He is the grandson and legal ward of Rosie Walker, Countess of Albury, and Homer Wilson, 1st Earl of Albury, by whom he was raised. He holds the courtesy title The Hon. Alexander Wilson, MVO in British royal-patronage contexts, and is recognised as HRH Prince Alexander of Hesse and by Rhine through his Hessian patrilineal descent.\n\nWilson attended Westminster School, London, and graduated from the Royal Academy of Music in 2025 with a BMus in Performance (Piano Principal, Cross-Genre Performance & Creative Practice). His senior recital, *Electric Ivory: studies in time, machinery, song* (2025), received significant critical attention within the serious music world; no recording has been publicly released.\n\nHe has been among the most photographed young public figures in the world since childhood, with coverage across Europe, North America, and East Asia. His Instagram following exceeds 95 million; he has not posted on any other platform.\n\nWilson has acting credits in *King Arthur: Legend of the Sword* (2017), *Peaky Blinders* (2021), *House of Gucci* (2021), *Luca* (Pixar, 2021), *Saltburn* (2023), *The Gentlemen* (Netflix, 2024), and *Wallace & Gromit: Vengeance Most Fowl* (BBC/Netflix, 2024).\n\nHis godfather is HRH The Prince of Wales. He holds the Member of the Royal Victorian Order (MVO), conferred personally by HM Queen Elizabeth II in 2022.\n\n*Early life:* Wilson was born in Lexington, Kentucky, and brought home to Phoenix Hollow, the Kentucky estate of his grandparents. His parents, David Wilson, Viscount Wilson, and Lady Sarah Dawson Wilson, were unable to care for him; he was raised by the Earl and Countess of Albury. He moved to London at eleven to attend Westminster School as a day pupil, residing at Albury House, Kensington with his grandparents until the age of sixteen, after which he remained there with permanent staff while Homer and Rosie returned primarily to Phoenix Hollow.\n\n*This article is a stub. Multiple sections are disputed on the talk page.*\n"},{"file":"08_WRITING_GUARDRAILS.md","content":"# Writing Guardrails\n\nCompact active guardrails.\n\n## Core Runtime\n\n| Rule | Apply it |\n|---|---|\n| Do not auto-advance first moves | Ryan controls first solo cover/profile in Alex's own voice, interview, broadcast, long-form public conversation, public statement, strategic social posture, adult brand architecture, headline performance, commercial deal/campaign, label signing, music release, artist launch, relationship confirmation, and location jumps that force decisions. The Albury AD/Sophie reveal is already public at opening. |\n| Stay in live scenes | Do not eject chats/parties/breakfasts/rooms with convenient exits, closing beats, duty calls, or final-image prose. Keep surfaces alive until Ryan moves them. |\n| Scene headers | Every new scene or time/location jump opens with date, time, location, brief state. |\n| Canon before atmosphere | Project Markdown is spec. Search before room/object/outfit/material/layout/floor-routing claims. Literal directions are literal; Albury \"start at bottom\" means Lower Basement. |\n| Information walls | Characters know their own chats/phone, what is said in room, public media, and direct disclosures. Proximity to Alex is not omniscience. |\n\n## Albury / Phone / Chats\n\n| Surface | Rule |\n|---|---|\n| Albury House | At 7 Aug opening, AD/Youtube has publicly revealed Studio Ashby/Sophie Ashby and the visible seven-floor Albury interiors. Keep staff/security operations, private handover mechanics, hidden systems, Serena/AW/al.x details, and unshown provenance private. |\n| Duty contact | Calls/replies to senior family/godparents happen off-camera by default unless Ryan asks to render. Never use duty contact to end scene. |\n| Phone | Invoke external Claude skill `phone-renderer` before any phone, notification, chat, DM, text, social feed, or message thread. If unavailable, stop and tell Ryan. Stay in phone surface until Ryan exits. |\n| Chats | Sealed rooms. No cross-chat joke bleed unless shared member visibly carries it. Group chats are not Alex Q&A; include side talk, tangents, unread counts, peripheral voices. |\n\n## Character / Register\n\n| Risk | Correct register |\n|---|---|\n| Apple drift | Apple is godfamily/oldest-friend peer, not sister/PA/handler/strategist/romance/Rosie-Homer child. Brain Trust toured Albury and stayed for dinner on 5 August; Boys came over before the 7 August meeting. They still do not know Serena/AW/al.x details unless Alex tells them. |\n| Alex passivity | Alex is active: jokes, flirts, names people, acts, interrupts. |\n| Beauty softening | Beauty is active physics: staring, swearing, body reaction, teasing, old-photo memory, people losing thread. Not tasteful admiration. |\n| Thirst softening | Public comments and friends are explicit, competitive, body-focused, indecent where allowed. Not about horse/venue/performance. |\n| Titles | Ordinary life: Alex. Titles only at protocol/public/joke thresholds. Friends/staff/family do not casually call him HRH/Lord Wilson. |\n| Music disappearing | Keep piano/listening/performance/technique/rehearsal/arrangement/composition/serious music talk alive. |\n| Rosie downshift | Rosie is living cultural ceiling, current, no social media/touring/day-to-day press; maternal register is Alex-specific. |\n\n## Fame / Family / Movement\n\n- Alex is already famous, photographed, followed, and publicly known. No identity reveal.\n- Paparazzi are weather around public/exterior movement and absent inside secured private spaces unless Ryan creates an exception.\n- Pre-open work exists: fashion/editorial imagery, brand work, public piano, broadcast appearances. Missing object is adult self-definition in his own voice.\n- Alex does not fly commercial, queue, sit beside strangers, or have ordinary airport encounters unless Ryan changes it.\n- Rosie/Homer are biological paternal grandparents/guardians who raised Alex as son in household truth because David/Sarah were alive but unfit.\n- Public language: grandson/legal ward/raised as son. Private household: Mama/Papa/son.\n- Only Alex uses Mama/Papa. Alex calls Sarah/David by first names by default; Mum/Dad requires Ryan.\n- Alex is not fragile; do not make food/hydration/sleep reminders a room ritual.\n- Romantic default: one or two nights, mutual/fun/exciting/kind clean exit. No girlfriend, tragic avoidance, or secret longing by default.\n\n## Do Not Invent\n\nDo not add unearned witnesses, prior knowledge, old photos, private songs, gift publicity, performances, studio drop-ins, screenshots, Christmas cards, exact pitch counts, named contacts, prior memos, formal offices, document histories, architecture, conservation details, room counts, or object placement unless v20/Ryan supplies it.\n"},{"file":"09_STORY_ELEMENTS_INVENTORY.md","content":"# Story Elements Inventory\n\nThis file tracks the active v20 bundle.\n\n## Active V20 Priorities\n\n| Element | Status | Current home |\n|---|---|---|\n| 7 August Charles Street / AD drop opening | active | `03_LIVE_STATE.md`, `38_START_POINTS_AND_TIMELINES.md` |\n| education-first boundary expiry on 1 August | active | `02_LOCKED_CANON.md`, `06_WORLD_PRESSURES.md` |\n| public work and media archive | active | `16_PUBLIC_WORK_AND_MEDIA_ARCHIVE.md` |\n| commercial work and price archive | active | `52_COMMERCIAL_WORK_TO_STORY_OPEN.md`, `25_AW_HOLDINGS_FULL.md`, `26_SERENA_MANAGEMENT_AND_ALX_BRAND.md` |\n| Serena inbox / WME pitch list | active | `53_INBOX_AND_WME_PITCH_LIST.md`, `26_SERENA_MANAGEMENT_AND_ALX_BRAND.md` |\n| diary / real-world events calendar | active data | `54_EVENTS_DIARY_CALENDAR.csv` |\n| no identity reveal | active | `02_LOCKED_CANON.md`, `07_PUBLIC_KNOWLEDGE.md`, `42_THE_WALL.md` |\n| Alex voice / anti-solemnity | active | `49_ALEX_VOICE.md`, `50_ALEX_FIRST.md` |\n| adult career pressure after the boundary | active | `06_WORLD_PRESSURES.md`, `26_SERENA_MANAGEMENT_AND_ALX_BRAND.md` |\n| Electric Ivory / al.x Music rights pressure | active | `37_ELECTRIC_IVORY_FULL.md`, `26_SERENA_MANAGEMENT_AND_ALX_BRAND.md`, `25_AW_HOLDINGS_FULL.md` |\n| Walker Holdings anchor | active | `40_WALKER_HOLDINGS_FULL.md`, `06_WORLD_PRESSURES.md` |\n| lean AW Holdings | active | `25_AW_HOLDINGS_FULL.md` |\n| Albury House AD reveal / remaining privacy wall | active | `03_LIVE_STATE.md`, `29_KENSINGTON_FULL.md`, `41_PUBLIC_PRESS_EXAMPLES.md`, `42_THE_WALL.md` |\n| social/chat scale | active | `12_SOCIAL_AND_CHAT_SYSTEM.md`, `20_SOCIAL_CHAT_DETAIL.md`, `36_RELATIONSHIP_ROSTERS_FULL.md` |\n| Brain Trust closed closest-friends group | active | `05_CORE_CAST.md`, `20_SOCIAL_CHAT_DETAIL.md`, `24_NAMES_AND_ROSTERS.md`, `36_RELATIONSHIP_ROSTERS_FULL.md` |\n| Appartement Varenne / Casa Borgonuovo AW Assets apartments | active | `11_PLACES_AND_HOMES.md`, `25_AW_HOLDINGS_FULL.md`, `27_PROPERTIES_FULL.md` |\n\n## Removed From Active Canon\n\nThe following old draft engines are not active v20 truth:\n\n- sudden public discovery of Alex's prince/Hessian layer\n- named investment/acquisition plotlines\n- standalone deal-building vehicles\n- locked post-5-August future events\n\nDo not load removed material as canon unless Ryan explicitly asks for source-library recovery.\n\n## Canon Format\n\nMarkdown remains canon. There is no separate data-plan layer in v20. The room-anchor Markdown is self-contained; Claude does not need folders or image assets.\n"},{"file":"10_FAMILY_AND_INHERITANCE.md","content":"# Family And Inheritance\n\nCompact active architecture.\n\n## Core Truth\n\nAlex is the convergence of four lines: Wilson/Hesse male line through Homer; Walker cultural line through Rosie; Dawson/Fletching maternal line through Sarah; Continental royal lines through Elena and Dawson marriages.\n\nRosie and Homer are biological paternal grandparents and practical parents from Alex's first year because David and Sarah were alive but unfit. Formal guardianship followed. Household truth: Alex is their son in practice and calls them Mama/Papa. Sarah/David are first-name defaults; Mum/Dad direct speech requires Ryan.\n\n```text\nHRH Prince Leopold of Hesse and by Rhine / Leonard Wilson\n    |\nHomer Wilson, 1st Earl of Albury = Rosie Walker\n    |\nDavid Homer Wilson, Viscount Wilson = Lady Sarah Dawson Wilson\n    |\nAlexander David Richard Dawson Wilson\n```\n\n## Register Table\n\n| Register | Correct phrasing |\n|---|---|\n| Private household | Rosie = Mama; Homer = Papa; Alex = their son in lived household truth. |\n| Public biography | Biological grandson, legal ward, raised by Rosie/Homer as son in practice because David/Sarah were unfit. |\n| Legal/family | No formal legal-parent transfer; guardianship from early childhood. |\n| UK court/state/royal-patronage | The Hon. Alexander Wilson, MVO. |\n| Non-royal society/fashion/cultural/private lists | Prince Alexander. |\n| Press shorthand | Prince Alex. |\n\nDavid holds Viscount Wilson by courtesy while alive; Alex does not.\n\n## Biological Parents\n\n| Parent | Locked facts |\n|---|---|\n| Lady Sarah Dawson Wilson | Born 1977; alive; biological mother; Richard/Elena eldest; brings Dawson/Fletching, Greek/Glucksburg, Teck-Windsor cadet, Bourbon-Two Sicilies lines; Stella's closest CSM friend; with Stella all the time; Kate/Naomi/Sadie/Sienna fashion/music/film orbit; sober since 2019; Notting Hill near Caroline; small low-profile fashion/sustainability venture with Stella-linked backing; semi-regular in Alex's life; not the mother who raised him. |\n| David Homer Wilson, Viscount Wilson | Born 1977; alive; Rosie/Homer only son; courtesy Viscount; Westminster boarder, University of Westminster journalism; late-1990s London creative/McQueen/music circle; Chris Martin and old friends; sober since 2023; West Village; reconnected with Alex; real but fragile. |\n\n## Rosie / Homer\n\n| Person | Locked facts |\n|---|---|\n| Rosie Walker | Biological paternal grandmother, guardian, Mama; cultural ceiling; scale explains Alex's rooms. |\n| Homer Wilson | Biological paternal grandfather, guardian, Papa; 1st Earl of Albury; historic producer/sound engineer; title named from Albury House, not village; lives at Phoenix Hollow. |\n\n## Dawson Family\n\n| Person | Relationship / function |\n|---|---|\n| Richard Dawson, 7th Earl of Fletching | Maternal grandfather; old-world restraint, Ouse, continuity. |\n| Elena Dawson, Countess of Fletching | Maternal grandmother, born Princess Elena of Greece and Denmark; warmth, Greek/Windsor/Continental access. |\n| Henry Dawson, Viscount Ouse | Maternal uncle; Fletching heir. |\n| Charlotte Hartley | Henry's wife. |\n| Jonathan, Arabella, George Dawson | First cousins; Jonathan follows Henry in Fletching succession. |\n| Caroline Dawson Ashby | Maternal aunt; Notting Hill warmth, secondary guardian. |\n| James Ashby / Lucas Ashby | Ashby household; Lucas same-birth-year cousin. |\n\nDawsons are warm, restrained, old-family, practical, present. Alex is Sarah's only son and welcomed from birth. He is not in Fletching title succession, but title succession is separate from belonging and Dawson-side inheritance/trust history.\n\n## Godparents\n\n| Godparent | Chosen by | Relationship |\n|---|---|---|\n| Stella McCartney | Sarah | Sarah-side godmother, fashion/archive authority, London memory. |\n| Chris Martin | David | Uncle Chris, David/music link, Apple connection. |\n| Donatella Versace | Rosie | Protective Italian aunt, aesthetic authority, calls Alex Alessandro. |\n| Prince William | Homer/Rosie | Godfather, royal/cousin-adjacent guidance, Diana/Rosie/Homer/Charles bridge. |\n\nElton is Phoenix Hollow circle uncle, not godparent. Apple is godfamily/oldest-friend peer, not sibling.\n\n## Royal Lines / Orders\n\n| Line | Comes through | Function |\n|---|---|---|\n| Hesse princely style | Prince Leopold/Leonard -> Homer -> David -> Alex | Source of formal Continental princely style. |\n| Greek / Glucksburg | Elena -> Sarah -> Alex | Maternal royal cousinage/access. |\n| Bourbon-Two Sicilies | Princess Carlotta -> Richard -> Sarah -> Alex | Dawson/Fletching Continental descent. |\n| Teck-Windsor cadet | Richard's Dawson/Fletching side -> Sarah -> Alex | Windsor-adjacent old-family context. |\n\nFull European read-out: HRH Prince Alexander of Hesse and by Rhine, Knight of the Order of the Golden Lion of the House of Nassau, Knight of the Constantinian Order of Saint George, Knight of the Order of the Redeemer, MVO.\n\nMVO: Queen Elizabeth II personally conferred it at Windsor in summer 2022 with EIIR cipher after April 2022 private audience brokered through Edward, Duke of Kent; Homer present, Elena present, Rosie remote. KGN: Hesse house order, 2021, Donatus. KCSG: 2021-22, Prince Pedro / Calabria. Order of the Redeemer: Greek/Glucksburg line.\n\n## Inheritance Pressure\n\nInheritance means Rosie's cultural category, Homer's studio/music legacy, David/Sarah's failures and partial return, Dawson/Fletching structure, Continental protocol, Phoenix Hollow as chosen home, and objects held until Alex was ready. Keep asking what Alex inherits, refuses, or makes his own.\n"},{"file":"11_PLACES_AND_HOMES.md","content":"# Places And Homes\n\nCompact active place map.\n\n## Place Rules\n\nUse the right place for the right pressure. Do not move people casually across continents. Paparazzi can be weather outside but not magically inside private estates. Music, family, wealth, and media behave differently by location.\n\n## Core Homes / Places\n\n| Place | Canon / function |\n|---|---|\n| Phoenix Hollow, Woodford County, Kentucky | Home; Rosie/Homer permanent base; Alex emotional anchor; studio/music inheritance; Solstice/birthday memory; place Alex can be son before symbol. Land 1970, major build-out 1978, Rosie/Homer move 1980; London with Alex from 2014 while he is in school/RAM; Rosie/Homer return primarily to Phoenix Hollow in 2019 when Alex is 16, while Alex remains London-based at Albury House. At open: Rosie, Homer, Maria there; Greystone protects; Kevin with Alex in London. Lived-in, populated, secure, musically serious, private, warm; not poverty/kitsch/Southern Gothic. |\n| Villa Serena, Porto Cervo, Sardinia | Alex's annual Sardinia place and 8 July-5 August 2025 pre-open location; fully staffed summer base roughly early June-late September. Relaxed summer/social/fashion/actor/music peer overlap; Phoenix Hollow/godfamily elders and older-generation family friends can also come and go; privacy inside education-first boundary; salt/heat/water/late nights. July 2025 was socially full: full Brain Trust, rotating friends, some Legacy overlap, wider Summer House people moving through Sardinia/Porto Cervo rather than belonging to Alex or Villa Serena, teasing/flirting, and boundary-expiry pressure in the room. Main villa, Alex master suite, four guest villas, staff villa, private cove, upgraded pier/tender landing, cove pavilion, padel, gym/wellness, kitchen terrace/outdoor dining, Knight Frank management. No paps on grounds/cove; Porto Cervo town changes pap logic. Transferred to Alex outright at 18 alongside Albury House. |\n| Albury House, Upper Phillimore Gardens, Kensington | Homer's London house; Homer and Rosie moved here with Alex in 2014 for Westminster. Homer and Rosie returned to Phoenix Hollow in 2019 (Alex age 16), leaving Alex in the house with permanent staff. Transferred to Alex outright at 18 (2021) through AW Assets. Refurbished 2024–2025 via Studio Ashby. Public/formal often Upper Phillimore/Kensington house; family/staff/AW Assets use Albury. Alex privately returned/toured 5 August; Architectural Digest/Youtube publicly reveal the Studio Ashby seven-floor house on 7 August. Anchors: 1910 Bechstein, music/control/listening floor, kitchen AGA/old pine table, top-floor Alex suite, wardrobe/archive rooms, private walled garden, engineered silence. |\n| Appartement Varenne, Rue de Varenne, Paris 7e | 3-bed serviced AW Assets apartment bought 2024; Knight Frank managed; Left Bank embassy/private-garden quiet, parquet, pale panelling, courtyard privacy, lamps/books/art, couture-week closet practicality. |\n| Casa Borgonuovo, Via Borgonuovo, Milan | 3-bed serviced AW Assets apartment bought 2024; Brera/Quadrilatero edge; old Milan palazzo restraint, courtyard, terrazzo/parquet, dark walnut, tailored lighting, wardrobe-ready storage. |\n| 12 Charles Street, Mayfair | Discreet commercial office building owned outright by Alex through AW Assets. Secure private core for AW/Serena/al.x/legal/finance/records/meetings; vetted quiet tenants elsewhere. Ordinary Mayfair professional address, not Alex-branded HQ or casual hangout. |\n| Marylebone flat, London W1 | Serviced flat used as practical stopgap during Albury House refurb, August 2024–July 2025. No household staff. Not a home. No longer in use after Alex moves into Albury House on 5 August 2025. Do not set scenes there without Ryan explicitly placing them. |\n| David's West Village apartment | Quiet/recovery-shaped, modest by family standards, not glamour base or active public engine. |\n| Sarah's Notting Hill life | Near Caroline; sober, fashion-adjacent, Stella-linked sustainability venture, close to Stella/Kate/Naomi/Sadie/Sienna; Alex sees her semi-regularly; not Alex's household. |\n| Laurel Canyon | Long-standing California family property, least foregrounded; use selectively for West Coast family/cultural life, not default open. |\n\n## Education / Event Geography\n\n| Place/event | Use |\n|---|---|\n| Sayre School, Lexington | Kentucky childhood before London. |\n| Westminster Under School / Westminster School | London formation, press escalation, London Lot. |\n| Royal Academy of Music, Marylebone | Serious cross-genre music training, recital, graduation; not walking distance from Kensington. |\n| Guards / Cowdray / Cirencester | Polo circuit; 3-goal, position 3 playmaker, social/country-sport lane. |\n| Major festivals | Goes to major festivals — Glastonbury, Coachella, and equivalents — with friends every year since 14. Not family events, not performer appearances, not Rosie-adjacent. Pap infrastructure follows him; he does not organise around it. |\n| Royal Ascot / Wimbledon | Formal/social visibility. |\n| Fashion weeks | Selective attendance since around 2019. |\n| Porto Cervo | Public/private boundary changes once leaving Villa Serena. |\n\n## Texture Rule\n\nUse sensory detail only when it changes behavior: privacy, heat, acoustics, pap access, overhearing, whether Alex can play, staff presence, public visibility.\n"},{"file":"12_SOCIAL_AND_CHAT_SYSTEM.md","content":"# Social And Chat System\n\nUse this for group chats, direct messages, social surfaces, unread counts, and room scale.\n\n## Core Rule\n\nChats are closed rooms. A character speaks only in chats where they are a member, and only from what they know.\n\nLarge chats do not start when Alex opens them. They have been moving without him.\n\n## Alex's Public Social Reality\n\nAlex has 95M+ followers/subscribers because he is photographed, tagged, clipped, reposted, and mythologised.\n\nHis own posting is rare and incidental: sunsets, objects, rooms, scene/top shots, piano chairs, recital programme, and low-context images every few months. No sponsored posts, no X/TikTok voice, and no strategic social-media posture at story open.\n\nThe first strategic post after the education-first boundary is Ryan-controlled.\n\n## Chat Scale\n\n| Chat / surface | Scale | Function |\n|---|---:|---|\n| Phoenix Hollow | 150-300+ | Rosie's cultural sphere, family/godfamily elders, home weather |\n| Brain Trust | 6 including Alex | closest legacy-kid friends: Apple, Iris, Lila, Kaia, Rocco |\n| Legacy | 314 | children/grandchildren of famous people |\n| Summer House | hundreds | global elite young jet set |\n| London Lot | 150-300+ | pre-existing London young-society/culture room Alex was invited into |\n| The Almanach | 40-80 | royals/aristocratic/princely-house peer circuit |\n| Hesse House | 8-15 | direct Hessian family line |\n| Dawson Family | 10-18 | maternal family |\n| Westminster Leavers 2021 | 30-60 | school cohort |\n| Boys | 6 including Alex | closest male friends: Jonathan Dawson, Lucas Ashby, Freddie Ashworth, Hugo Manners, Rocco Ritchie |\n| Polo | 10-25 | Guards/Cowdray/Cirencester/country-sport lane; Alex is a semi-regular 3-goal position 3/playmaker |\n| Serena/AW operational channel | 10-15 | staff operations, not personal chats |\n\nAlex's most-used group chats are Brain Trust, Legacy, and Boys. Default casual phone scenes should start there unless Ryan points elsewhere.\n\nThe other rooms are more seasonal, situational, or drop-in spaces: Phoenix Hollow for family/godfamily/home weather or big cultural moments; Summer House for summer circuit and travel-party periods; London Lot for London cultural spikes and big in-town moments; The Almanach for royal/aristocratic/protocol traffic; Hesse House and Dawson Family for family-line moments; Westminster Leavers for school-cohort bursts; Polo for fixtures and country-sport periods; Serena/AW for operations only.\n\nSeed names are anchors, not roster ceilings. Use named plausible speakers, unread counts, side threads, reaction floods, screenshots, and background traffic. Do not use placeholder visible speakers.\n\n## Room Differences\n\n- Phoenix Hollow: older, cultural, protective, not easily impressed.\n- Brain Trust: intimate, fast, emotionally accurate, legacy-kid shorthand, can tease and protect without becoming handlers.\n- Legacy: famous-child shorthand, ruthless familiarity, many lurkers.\n- Summer House: messy, mobile, horny, international, image-saturated.\n- The Almanach: pro
