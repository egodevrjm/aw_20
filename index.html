country branding.\n- Do not make Alex explain Hatfield unless Ryan asks.\n\n"},{"file":"33_ALEX_RECITAL_AND_RAM.md","content":"# Alex Recital And RAM Detail\n\nUse this for Alex's education, senior recital, and music-career pressure.\n\n## Education\n\n| Period | School |\n|---|---|\n| 2014 onward | Westminster Under / Westminster School London route |\n| Summer 2019 | GCSE / iGCSE at Westminster School |\n| Summer 2021 | A-level / TAG cohort at Westminster School |\n| 2021-2025 | Royal Academy of Music, BMus Performance: Piano Principal, Cross-Genre Performance & Creative Practice |\n| 18 June 2025 | Senior recital, `Electric Ivory` |\n| 7 July 2025 | Graduation ceremony/private graduation period |\n| 1 August 2025 | The education-first boundary expires |\n\nAlex moved to London at 11 in September 2014. His post-11 daily music geography is Westminster, Kensington, RAM, London, European summers, and Phoenix Hollow returns.\n\n## Westminster Qualifications\n\nAlex was born 22 June 2003, so his Westminster exam rhythm is:\n\n| Qualification | Date / age | Subjects |\n|---|---|---|\n| GCSE / iGCSE | Summer 2019, age 16 | English Language, English Literature, Mathematics, Biology, Chemistry, Physics, History, Music, French, Spanish, Latin, Classics |\n| A-level / TAG cohort | Summer 2021, age 18 | Music, English Literature, Classical Civilisation, Drama |\n\nUse the qualifications as elite-school background, not as a bragging surface. Latin and Classics explain Westminster/classics understanding: he can read/quote Latin phrases, recognise inscriptions and allusions, and handle programme-note/classical-reference texture. They are not living fluent languages. Drama sits inside Westminster's performance tradition: Sir John Gielgud, John Dryden, Stephen Poliakoff, and Helena Bonham Carter are useful school-lineage anchors.\n\nWestminster's music lineage should read broad, not classical-only. Useful anchors include Henry Purcell, Sir Adrian Boult, George Benjamin, Julian Anderson, Christian Mason, Lord Andrew Lloyd Webber, Ian Bostridge, Mika, Dido, and Clean Bandit members. In the story universe, Homer Wilson belongs in this line too: the greatest audio engineer and producer alive, and Alex's Papa. This supports Alex's cross-genre confidence, performance timing, ease with rooms, and screen/stage literacy without turning him into a theatre-kid stereotype, actor-by-identity, solemn classical-piano object, or mere extension of Homer.\n\n## Degree Wording Lock\n\nUse this exact form when precision matters:\n\n`Royal Academy of Music, BMus Performance: Piano Principal, Cross-Genre Performance & Creative Practice, 2021-2025.`\n\nShort form:\n\n`RAM BMus Performance, piano principal, cross-genre creative practice.`\n\nDo not call it a classical degree. Do not write \"classical pianist\" as Alex's identity label. Classical repertoire is one part of the training; the degree sits across performance, arrangement, improvisation, contemporary repertoire, jazz language, studio/listening practice, and composition-adjacent work.\n\n## RAM Education Shape\n\nAlex had two simultaneous RAM educations:\n\n1. the official conservatoire curriculum\n2. the unofficial everyone-keeps-dragging-him-into-things curriculum\n\nThe official transcript should stay plausible for a BMus piano principal at the Royal Academy of Music. The mythology sits on top of structure, not instead of it.\n\n| Area | Shape |\n|---|---|\n| Principal study: piano performance | Centre of the degree. Weekly 1:1 principal study, technical work, repertoire classes, performance workshops, mock juries, recital preparation. Bach, Ligeti, Rzewski, Kapustin, Adams, and the rest of the `Electric Ivory` language are refined formally here. |\n| Chamber music | Piano trios, violin sonatas, contemporary ensembles, singer collaboration. This is one of the ways Alex becomes known across the building. |\n| Keyboard skills / collaborative piano | Vocal coaching sessions, opera rehearsal accompaniment, score reduction, rehearsal piano, transposition, sight-reading. Not because he needs remedial training; because he is too musically useful not to get dragged in. |\n| Conducting / ensemble direction | Secondary, not a professional-conductor track. Gesture, rehearsal language, orchestration, structural thinking, and how groups breathe. |\n| Composition / orchestration | Not composer-track by default, but enough that faculty know he writes and students ask for arrangements. Includes orchestration, counterpoint, harmony, analysis, contemporary notation, and arranging techniques. |\n| Vocal study | Unusual for a piano student at this seriousness. Secondary vocal tuition, song interpretation, diction, breath/control, ensemble singing. Not opera-singer training; vocal artistry as musicianship. |\n| Academic / contextual studies | Twentieth-century music, postwar composition, electronic music history, ethnomusicology options, philosophy/aesthetics, analysis seminars. Alex is plausible writing about Aphex Twin and minimalism, Monk and late-Debussy spacing, Radiohead as art-song structure, or Nancarrow as proto-electronic composition. |\n| Production / recording | Officially electives and modules: recording, studio sessions, live sound exposure, DAW mockups, mic technique, production workshops, composition technology. Unofficially: demos for friends, chamber recordings, hybrid arrangements, 2am rehearsal-room experiments, and learning how rooms sound. |\n\nThe real curriculum is also social and practical: jazz players, singers, late-night listening sessions, arranging for friends, arguing about records, discovering obscure electronic composers, learning audience breath, room sound, recording psychology, and culture rather than repertoire alone.\n\n`Electric Ivory` should feel like the result of that whole education. Not \"elite piano student.\" A musician who used conservatoire training as raw material.\n\n## Instruments\n\nAlex plays:\n\n- piano: principal instrument; concert/professional level\n- guitar: acoustic and electric; concert-level serious secondary instrument; cross-genre; acoustic for private/intimate contexts, electric for studio/experimental\n- violin: concert-level serious secondary instrument\n\n## Voice\n\nAlex has a trained singing voice: range G2-G5, baritone core into tenor. He took singing classes at RAM alongside piano performance and audio production training. The degree's cross-genre scope includes vocal practice.\n\nHis voice is a private capability, not a public identity. He does not sing in Electric Ivory. He barely sings publicly and is not known as a singer. Do not write Alex singing in public, describe his voice as a performance register, or make his singing a professional story thread unless Ryan introduces it explicitly.\n\nIn private contexts — Phoenix Hollow, late nights, close friends — informal singing is plausible. That is not a public fact and should not be volunteered.\n\nDo not give him banjo, mandolin, harmonica, Opry, Bluebird, or adult Nashville performance history.\n\nPiano is the principal instrument inside a cross-genre musical life. Do not reduce him to a classical pianist as identity label.\n\n## Electric Ivory\n\nSenior recital: `Electric Ivory`, 18 June 2025, Royal Academy of Music.\n\nFull title: `Electric Ivory: studies in time, machinery, song`.\n\nFull programme and rights detail: see `37_ELECTRIC_IVORY_FULL.md`.\n\nCanon facts:\n\n- compulsory degree recital\n- academic performance inside the education-first frame\n- press could attend enough to create serious music coverage\n- described in-story as the best undergraduate recital in twenty years\n- Alex paid for the recital to be filmed with four high-end cinema-quality cameras and recorded to release-quality audio\n- it was not broadcast\n- Alex owns/controls recording, visual/film, performance, and Alex-created publishing rights through al.x Music / AW Holdings; Serena Management administers release conversations\n- no public recording has been released\n- no Spotify artist profile\n- no album\n- no label deal\n- no official public music release\n- no standalone artist launch\n\n## What The Recital Does In The Story\n\nThe recital makes serious music people pay attention. It supports:\n\n- classical agency interest, because the playing is technically serious enough for that world\n- major-label curiosity\n- press asking `now what?`\n- WME readiness\n- industry waiting for boundary expiry\n\nIt does not create:\n\n- an existing commercial music career\n- a released album\n- an active touring plan\n- public fan access to the recording\n- proof that Alex is classical-only\n\nThe correct distinction is: the recording exists, but it is unreleased and controlled. Do not write \"no public music\" as \"no recording exists.\"\n\n## Boundary / Graduation Timing\n\nThe education-first boundary held adult career architecture back until 1 August 2025. It did not block public piano performances, broadcasts, charity stages, family-context appearances, or compulsory academic assessment. Graduation occurred 7 July 2025. The period between graduation and boundary expiry is a known waiting period inside the industry.\n\nWhen the boundary expires on 1 August, it collides with an already-watched career threshold.\n\n## Writing Alex At Music\n\nAlex can sit at the piano, test a chord, play a phrase, stop, listen, or use music to think. Do not turn every musical moment into a concert. He is allowed to be casual and serious at once.\n\nMusic should remain alive in scenes even when title/fashion/press pressure is loud.\n"},{"file":"34_ROSIE_DISCOGRAPHY_FULL.md","content":"# Rosie Discography Guardrails And Summary\n\nUse this to prevent Claude from flattening Rosie into country, folk nostalgia, or generic fame.\n\nFor fast album years, singles, awards, and sales/charts, use `43_ROSIE_DISCOGRAPHY_COMPLETE.md`.\n\nFor full album track listings, tours, hidden songwriting lore, and placement rules, load `43_ROSIE_DISCOGRAPHY_COMPLETE.md`.\n\nFor fast Homer credit lookup, use `44_HOMER_PRODUCTION_CREDITS.md`. For Homer's career context, HWAM, and scene guards, load `44_HOMER_PRODUCTION_CREDITS.md`.\n\n## Scale\n\nRosie Walker is not a famous singer. She is the living cultural ceiling.\n\n| Stat | Canon |\n|---|---:|\n| Studio albums | 12 |\n| Album of the Year Grammys | 10 |\n| Total Grammys | about 56 |\n| Album certifications | all 12 multi-Diamond |\n| Total albums sold | 500M+ |\n| All-time streams | 100B+ |\n| Annual streams in 2025 | 22B+ |\n| Monthly Spotify listeners in 2025 | 155M+ |\n| US #1 singles | 34 |\n| US #1 albums | 11 of 12 |\n| Combined US album weeks at #1 | 184 |\n\nShe has no social media, no touring, no press machine, and remains current.\n\n## Not Country\n\nRosie is Kentucky-born, but her career is not country. She is from Lexington/horse country/university-town Kentucky, not an Appalachian country archetype. Do not route her through Opry/Bluebird/country as default.\n\nCountry-adjacent friends can exist inside her circle. They do not define her category.\n\n## Career Phases\n\n| Phase | Years | Albums | Character |\n|---|---|---|---|\n| The Roots | 1965-1968 | A Still Small Voice; Baptized in Bourbon | chamber folk into soul/gospel-rock detonation |\n| Imperial Phase | 1970-1973 | Good Girls Go to Heaven; Neon Cathedral; Starlight & Steel | three consecutive AOY Grammys; stadium queen; meets Homer |\n| Reinvention | 1974-1977 | Concrete & Chrome; Radio Silence | Berlin/Eno then California/Homer; machines warm |\n| Departure | 1979 | The Last Cathedral | sixth AOY; long goodbye |\n| Soft Stop | 1980-1994 | no albums | no touring/interviews/promo; work continues privately |\n| Return | 1995-present | Glass Garden; A House With No Mirrors; Black Sun Archive; The Quiet Index | one album per decade; no tours/interviews/promo; all listed singles global #1 |\n\n## Albums\n\n| Album | Year | Vibe | AOY |\n|---|---:|---|---|\n| A Still Small Voice | 1965 | folk revival, chamber folk, classical-inflected singer-songwriter | no |\n| Baptized in Bourbon | 1968 | Muscle Shoals soul, R&B, gospel-rock | no |\n| Good Girls Go to Heaven | 1970 | symphonic rock / Wall of Sound | yes |\n| Neon Cathedral | 1971 | art rock / psychedelic concept album | yes |\n| Starlight & Steel | 1972 | glam rock / hard rock | yes |\n| Concrete & Chrome | 1974 | industrial/krautrock/new machine language | yes |\n| Radio Silence | 1977 | California/Homer warmth, new wave/ambient gospel edge | yes |\n| The Last Cathedral | 1979 | departure album | yes |\n| Glass Garden | 1995 | ambient gospel / early digital textures | yes |\n| A House With No Mirrors | 2003 | chamber pop / minimal piano / experimental electronica | yes |\n| Black Sun Archive | 2008 | industrial classical / fractured orchestration | yes |\n| The Quiet Index | 2021 | post-genre minimalism; spatial audio; still current | yes |\n\n## Early Anchors\n\n`A Still Small Voice` is the conservatory dropout becoming a folk prophet, not country. `Baptized in Bourbon` is Muscle Shoals soul/gospel-rock detonation. Bourbon language in Rosie's work is sacred/profane, Southern, and literary, not a country-lane instruction.\n\n## Homer\n\nRosie meets Homer Wilson at Abbey Road during `Good Girls Go to Heaven`. He is an engineer/producer force, not a country producer. Their marriage creates the Walker/Wilson cultural centre.\n\n## Writing Rosie\n\nRosie can be brief, funny, warm, dry, frighteningly perceptive, and not performative. She does not need paragraphs of legend explanation in-scene. Her scale should be felt through everyone else's calibration.\n\n## Failure Guards\n\n- Do not call her a country singer.\n- Do not write Phoenix Hollow as Nashville industry default.\n- Do not make Alex inherit country performance habits from her.\n- Do not use Kentucky as genre.\n- Do not downscale her to `famous singer`.\n"},{"file":"35_ALEX_COLLECTION_FULL.md","content":"# Alex Collection Full Detail\n\nUse this file for art, fashion, watches, books, vinyl, jewellery, gifts, birthday objects, or AW Assets collection logic — including provenance, conservation, and expanded object texture.\n\nThe full object inventory is embedded in this file. The CSV (`alex_wilson_collection.csv`) is now absorbed — mark it for deletion.\n\n---\n\n## Collection Governance\n\nAlex buys or receives objects. AW Assets registers, insures, ships, stores, and values them.\n\n| Person/entity | Role |\n|---|---|\n| Judith Ansley | Head of AW Assets; collection register |\n| Lena Carr | Independent collection/art advisor |\n| Christie's Private Sales | Annual valuations/acquisition support |\n| AW Assets | Ownership/insurance/logistics |\n\nAlex has the eye. Lena knows the market. Judith handles the machine.\n\n---\n\n## Fashion Archive\n\nThe archive wardrobe room at Albury House is museum-grade: vitrines, conservation lighting, climate control around 45% humidity, bespoke mannequins for shaped garments. Archive pieces are protected as fine art. Wearing one is an event, not a casual choice.\n\n| Piece | Provenance | Value |\n|---|---|---|\n| Fitted frock coat, pink silk lining — Alexander McQueen *Jack the Ripper Stalks His Victims* (1992) | Given by Alexander McQueen to David Wilson; passed to Alex via Rosie/Homer | Priceless / Museum Grade |\n| Embroidered frock coat, crucifixion imagery — Alexander McQueen *Dante* AW 1996 | Purchased Christie's London | $30,000–$60,000 |\n| Military jacket, floral embroidery — Alexander McQueen *Sarabande* SS 2007 | Purchased Kerry Taylor Auctions London | $15,000–$30,000 |\n| Embroidered jacket — Alexander McQueen by Sarah Burton AW 2011 | Purchased Alexander McQueen London | $5,000–$12,000 |\n| Structured shoulder jacket — Alexander McQueen by Sarah Burton SS 2022 | Purchased Alexander McQueen London | $2,000–$5,000 |\n| Blue velvet blazer — Tom Ford era Gucci AW 1996 | Purchased Sotheby's | $5,000–$15,000 |\n| White satin shirt — Tom Ford era Gucci SS 1997 | Purchased Vestiaire Collective | $1,500–$4,000 |\n| Bomber jacket, patched — Raf Simons *Riot Riot Riot* AW 2001 | Purchased Grailed | $30,000–$50,000 |\n| Leather jacket, minimalist — Helmut Lang late 1990s | Purchased private dealer | $2,000–$6,000 |\n| Deconstructed overcoat, asymmetric black — Yohji Yamamoto early 2000s | Purchased at auction London | $3,000–$8,000 |\n| Artisanal piece (numbered line) — Martin Margiela early 2000s | Purchased private dealer Paris | $10,000–$20,000 |\n| Gianni-era Versace silk dressing gown with private Hessian inscription | Gift from Donatella Versace (22nd birthday) | Priceless / Archive |\n| Gianni-era Versace silk shirt | Gift from Donatella (Nella) Versace | $2,000–$5,000 |\n| Vintage Ossie Clark dress-shirt 1970s | Gift from Stella McCartney | $500–$2,000 |\n| Tailored jacket, deconstructed shoulder — Central Saint Martins BA graduate 2023 | Commissioned at degree show | $500–$1,500 |\n| Oversized shirt, hand-printed — Parsons MFA graduate 2022 | Found at graduate exhibition | $300–$800 |\n| Knitted vest, sculptural — Royal College of Art MA graduate 2024 | Commissioned via Cosima's connections | $500–$1,200 |\n| Custom Swarovski crystal hand-beaded tank — Allegra Vitali 2024 | Solstice birthday commission | Priceless / Custom |\n\nThe 1992 McQueen Jack the Ripper frock coat lives on a mannequin built to David Wilson's measurements. The Sarabande SS07 piece and Gianni-personal Versace dressing gown receive similar conservation treatment. Do not write these as casually accessible clothing.\n\nMcQueen matters because of the Sarah/Stella/fashion memory thread and Alex's own eye. Do not turn the archive into costume storage.\n\n---\n\n## Kensington Wardrobe Rooms\n\n| Room | Function |\n|---|---|\n| Current-Season Dressing Room | everyday current-season wardrobe, tailoring, shoes, grooming, and integrated watch/jewellery island |\n| Archive Wardrobe Room | vintage, museum-tier, fashion-history pieces |\n\nThe everyday Watch/Jewellery Safe is integrated into the Current-Season Dressing Room as the marble-topped island with glass display trays. A separate safe room exists for the really rare stuff; it is not a third dressing room.\n\n---\n\n## Fashion-Peer Knowledge\n\nBrain Trust members are not blank outsiders to Alex's archive.\n\n- Apple is peer-deep through godfamily, Phoenix Hollow, and the 22nd birthday weekend.\n- Iris carries Sadie Frost / Jude Law / late-90s London fashion context around McQueen and Stella.\n- Lila carries Kate Moss / McQueen-world context.\n- Kaia carries Cindy Crawford / model-family / international fashion context.\n- Rocco carries Madonna / Ritchie / London-legacy art and music context, though less archive-specific than the others.\n\nIn archive scenes, they can ask informed questions: where a piece is housed, whether it has its own case, whether it is form-mounted or flat, whether conservation lighting is installed, whether he has put it on. Do not default them to \"define the archive\" questions.\n\n---\n\n## Art\n\nStudio Ashby placed key works during the Albury House refurbishment. Do not write these as new acquisitions — they are already in the collection and already installed.\n\n| Work | Provenance | Value |\n|---|---|---|\n| *Sleepless Night (Sitting)* — Yoshitomo Nara (acrylic on canvas) | Christie's | $1,000,000–$3,000,000+ |\n| *Untitled (Rome series)* — Cy Twombly (1970) | Sotheby's London | $200,000–$500,000 |\n| *Untitled* (word painting) — Christopher Wool (2005) | Phillips | $500,000–$1,000,000+ |\n| *Untitled* (mixed media on canvas) — Mark Bradford (2018) | Private sale through gallery | $500,000–$1,500,000 |\n| Small study/sketch — Peter Doig (early 2000s) | Phillips London | $100,000–$250,000 |\n| Dialogue painting, small-format — Lee Ufan (2015) | Pace Gallery London | $100,000–$300,000 |\n| Portrait, small — Elizabeth Peyton (early 2010s) | Gladstone Gallery | $50,000–$150,000 |\n| Face study — Marlene Dumas (2000s) | Zeno X Gallery | $50,000–$120,000 |\n| Watercolour study — Luc Tuymans (2010s) | David Zwirner | $40,000–$90,000 |\n| *Untitled* (surfer series) — Raymond Pettibon (2008) | Private sale | $30,000–$80,000 |\n| *Untitled* (from Paintings Drawings) — Agnes Martin (1991) | Private dealer | $30,000–$60,000 |\n| Bedford series lithograph — Joan Mitchell (1981) | Christie's | $20,000–$50,000 |\n| Etchings to Rexroth series — Brice Marden (1986) | Private dealer | $15,000–$40,000 |\n| *And Then And Then And Then (Blue)* — Takashi Murakami (2006) | Gallery purchase | $5,000–$15,000 |\n| COMPANION (Resting Place) + WHAT PARTY screenprint — KAWS | Gallery/auction | $5,000–$15,000 |\n| Large-format oil on canvas — CSM graduate (2024) | Discovered at degree show | $1,000–$4,000 |\n| Mixed media, mid-sized — Brooklyn-based painter | Found at open studios | $1,000–$3,500 |\n\nThe Nara can function as an immediate Alex statement in the entrance hall. The Doig is on the top-floor sitting room. The Wool is in the supper room. Do not repeat the same artwork everywhere. Do not identify a specific artwork in a room unless it is locked in this file or Ryan supplies it.\n\n---\n\n## Books\n\nAlex actually reads. The study/library at Albury House should feel used, not staged.\n\n| Book | Provenance | Value |\n|---|---|---|\n| *Blood Meridian* — Cormac McCarthy (First Edition 1985) | Bauman Rare Books | $8,000–$35,000 |\n| *Slouching Towards Bethlehem* — Joan Didion (First Edition 1968) | Private dealer | $1,500–$2,500 |\n| *Giovanni's Room* — James Baldwin (First Edition 1956) | At auction | $1,000–$5,000 |\n| *Ariel* — Sylvia Plath (First UK Edition 1965) | Maggs Bros London | $500–$1,500 |\n| *Ossi di seppia* — Eugenio Montale (First Edition 1925) | Purchased in Milan | $4,000–$8,000 |\n| *Se una notte d'inverno un viaggiatore* — Italo Calvino (First Edition 1979) | Italian antiquarian dealer London | $500–$1,500 |\n| *Les Fleurs du mal* — Charles Baudelaire (early edition, late 19th c.) | Librairie Giraud-Badin Paris | $3,000–$15,000 |\n| *L'Étranger* — Albert Camus (First Edition 1942) | At auction London | $5,000–$20,000 |\n| *Romancero gitano* — Federico García Lorca (early edition 1928) | Antiquarian dealer London | $2,000–$8,000 |\n| *Ficciones* — Jorge Luis Borges (First Edition 1944) | At auction | $4,000–$15,000 |\n\nBooks live in the top-floor rare books room, the private lounge, and the ground-floor study/library. Do not make the collection only English-language. The Italian and French first editions matter — they point to the European side of Alex's education and taste.\n\n---\n\n## Vinyl\n\nVinyl lives on the first-floor music layer (music room, control/listening room) and occasionally in the top-floor private lounge.\n\n| Record | Provenance | Value |\n|---|---|---|\n| *Kind of Blue* — Miles Davis (first pressing 'six-eye' 1959) | Specialist dealer | $500–$1,500 |\n| *A Love Supreme* — John Coltrane (first pressing 1965) | Specialist dealer | $500–$1,200 |\n| *Waltz for Debby* — Bill Evans Trio (first pressing 1962) | Specialist dealer | $500–$2,000 |\n| *Lady in Satin* — Billie Holiday (first pressing 1958) | Sounds of the Universe London | $200–$600 |\n| *In the Wee Small Hours* — Frank Sinatra (first pressing 1955) | Private sale | $100–$400 |\n| *Illmatic* — Nas (first pressing 1994) | Specialist dealer | $150–$400 |\n| *The Low End Theory* — A Tribe Called Quest (first pressing 1991) | Record fair | $100–$300 |\n| *The Miseducation of Lauryn Hill* — Lauryn Hill (first pressing 1998) | Discogs | $100–$250 |\n| *Hounds of Love* — Kate Bush (first UK pressing 1985) | Rough Trade London | $50–$150 |\n| *Homogenic* — Björk (first pressing 1997) | Specialist dealer London | $100–$250 |\n| *Kid A* — Radiohead (first pressing 2000) | Discogs | $100–$250 |\n| *Just Another Diamond Day* — Vashti Bunyan (first pressing 1970) | At auction London | $2,000–$5,000 |\n| *World of Echo* — Arthur Russell (first pressing 1986) | Specialist dealer | $150–$400 |\n| *Journey in Satchidananda* — Alice Coltrane (first pressing 1971) | Specialist dealer | $300–$800 |\n\nDo not make the collection only classic jazz or only one genre.\n\n---\n\n## Jewellery\n\n| Object | Source / Meaning | Value |\n|---|---|---|\n| Diana emerald signet | Gift from Prince William, 22nd birthday | Deeply loaded; not worn casually; do not place on Alex's hand without Ryan directing it |\n| Gold signet ring — Dawson family estate | Sarah-side Dawson family provision via the Earl | $2,000–$8,000 |\n| Fine-gauge gold chain necklace — Italian custom | Gift from Donatella (Nella) Versace | $1,500–$5,000 |\n| Single gold hoop earring | Bought personally, jeweller in Notting Hill | $200–$800 |\n| Vintage ring | Gift from Stella McCartney | $1,000–$4,000 |\n\nJewellery is private-layer: watches and jewellery live in the current-season dressing room island. Public/friend scenes can see them only if Alex physically brings them into view or is wearing them.\n\n---\n\n## Watches\n\n| Watch | Source / Meaning | Value |\n|---|---|---|\n| Patek Philippe Perpetual Calendar | Gift from Beyoncé | $80,000–$250,000+ |\n| Rolex Submariner vintage ref 5513 | Gift from Homer (Papa) | $10,000–$25,000 |\n| Cartier Tank | Sarah-side Dawson family provision | $2,000–$10,000 |\n| Jaeger-LeCoultre Reverso | Gift from Elton John | $4,000–$10,000 |\n| Omega Speedmaster Professional ('Moonwatch') | Personal purchase | $4,000–$8,000 |\n\n---\n\n## Bourbon Collection\n\nThe private Hatfield Alex Wilson 21-Year Cave-Aged Bourbon is the largest single collection object by value: approximately 200 remaining bottles, insured at approximately $100,000 each, held by AW Assets in the Albury House reserve cellar and Phoenix Hollow.\n\n---\n\n## 22nd Birthday Objects\n\nThe 22 June 2025 birthday at Phoenix Hollow produced objects that can drive later scenes.\n\nMaster record is `39_BIRTHDAY_22.md`. Key objects by category:\n\nFamily / personal:\n- David Wilson's University of Westminster journalism notebooks — passed via Rosie/Homer as family-history objects.\n- Sarah Dawson Wilson's CSM sketchbook and unfinished textile panel from her student years.\n- Diana emerald signet from Prince William — see jewellery above; deeply loaded.\n- Apple Martin's photo book — godfamily/shared childhood.\n- Dawson-side cufflinks — Richard/Elena Dawson family provision.\n- Continental cousinage small objects — collective Hessian/Greek/Bourbon-Two Sicilies cousin layer.\n\nFashion / archive:\n- Donatella's Gianni-archive dressing gown with private Hessian inscription — see fashion archive above.\n- Beyoncé's Sarabande-era Alexander McQueen cocktail jacket — see fashion archive above.\n- Stella/Sarah-linked fashion and memory objects.\n\nMusic / craft:\n- David Gilmour's vintage U47 condenser microphone — Homer's engineering world, craft inheritance.\n- Brandi Carlile's birthday song lead sheet, handwritten.\n- Paul McCartney's lyric sheet — Phoenix Hollow circle/Chris Martin connection.\n- Private music gifts (Phoebe Bridgers, Hozier-style) remain private unless Ryan releases them.\n\nOther:\n- Elton's Order of the Golden Lion of the House of Nassau miniature/private joke layer.\n- Stevie's shawl — Phoenix Hollow circle elder gift.\n- Dolly Parton's signed Hatfield bourbon barrel half-stave.\n\nRosie and Homer's own gifts are deliberately undefined. Ryan reveals them in play.\n\nDo not publish private gift material unless Ryan chooses it.\n\n---\n\n## Collection Writing Rules\n\n- Objects carry relationship, taste, and memory — not shopping-list flex.\n- Do not over-explain provenance in dialogue.\n- If an object is publicly visible, media/fans may notice only what public visibility allows.\n- Do not invent fan accounts perfectly identifying private signets, miniatures, or personal orders from old photos unless Ryan asks for that mechanism.\n- Anchor room/object specifics to this file before prose atmosphere.\n- Studio Ashby placed key artworks during the Albury House refurbishment. They are already installed. Do not write them as new purchases.\n"},{"file":"36_RELATIONSHIP_ROSTERS_FULL.md","content":"# Relationship Rosters Full\n\nUse this for large name pools and social room texture. Names are anchors, not mandatory casts.\n\nDefault usage: Alex's most-used group chats are Brain Trust, Legacy, and Boys. Other rooms are seasonal, event-led, or drop-in during big moments.\n\n## Social Gravity Rule\n\nVery few social groups are Alex-focused. Alex is famous, loved, high-status, and often gravitational, but most rooms existed before him or exist around multiple people at once.\n\nDo not write Alex's friends as his court, fan club, handler set, or support cast. Brain Trust and Boys are his closest peer groups from his point of view, but they are reciprocal groups: everyone has lives, work, jokes, crushes, crises, family weather, gossip, and status inside the room. Alex can be central to a given scene without the group being structurally centred on him.\n\n## Brain Trust\n\nMutual closest-friend group that includes Alex, Apple Martin, Iris Law, Lila Moss, Kaia Gerber, and Rocco Ritchie. From Alex's point of view, these are his closest friends; from the room's point of view, everyone matters.\n\nMembership is closed unless Ryan explicitly changes it. They are all legacy people around Alex's age, give or take a year or two. Their parents all know either Rosie or Sarah/David, and the group has been in each other's lives closely since birth or very early childhood.\n\nAge rhythm: Iris and Rocco were born in 2000, Kaia in 2001, Lila in 2002, Alex in 2003, Apple in 2004. Apple is at Vanderbilt in Nashville; classes start 26 August, so she is available for Villa Serena and the 5 August return. Iris, Lila, Kaia, and Rocco are working as models, artists, stylists, or adjacent creative/public figures.\n\nThis is the intimate peer layer under London Lot, Summer House, and Legacy. They can tease, check in, call bullshit, and understand public-childhood pressure without exposition. They are not handlers, staff, strategists, siblings, automatic romance, or an Alex-response unit.\n\nClose orbit, not Brain Trust unless Ryan says otherwise: Olympia of Greece, Princess Maria Carolina of Bourbon-Two Sicilies / MC, Ryder Robinson, Iris Apatow, Nico Parker, Gracie Abrams, Leni Klum, Amelia Gray Hamlin, Gene Gallagher, Damian Hurley, Romeo Beckham, Moses Martin.\n\nThe wider famous-child field belongs to Legacy. Brain Trust is the smaller reciprocal group that latched onto each other because of old parent-circle overlap, fashion/music/social proximity, and the Sarah connection to Kate Moss, Stella McCartney, Madonna, Sadie Frost, and that world.\n\nStella McCartney's three children are close through the Sarah/Stella/family orbit, slightly younger and lower-publicity. Donatella Versace's children have older-sister / older-cousin energy around Alex and are now approaching 40, so they are not peer-room defaults.\n\n## London Lot\n\nLondon Lot is a large pre-existing London young-society / culture room Alex was invited into. It exists outside him, like Phoenix Hollow and Legacy do.\n\nUse for London cultural traffic: dinners, Albury House curiosity, private views, fashion events, film/music/art parties, fittings, nightlife, who is in town, and last-minute plans. It includes high-visibility London figures from music, film, fashion, art, legacy families, and society. Stormzy, Florence Pugh, and Cara Delevingne are scale anchors for the room.\n\nSeed names:\n\nApple Martin, Iris Law, Lila Moss, Rocco Ritchie, Cosima Hicks, Hugo Manners, Freddie Ashworth, Maya Okafor, Felix Bauer, Jess Okonkwo, Lennon Gallagher, Pixie Geldof, Stormzy, Florence Pugh, Cara Delevingne.\n\nAt the 7 August opening, they are not in the Charles Street meeting unless Ryan invites them.\n\n## Summer House\n\nHundreds of global elite young modern jet-set people. Use named plausible anchors and lots of background motion. Alex is one high-status regular, not the owner of the room.\n\nVisible anchors may include Apple Martin, Iris Law, Lila Moss, Rocco Ritchie, Kaia Gerber, Ryder Robinson, Olympia of Greece, MC, Iris Apatow, Nico Parker, Gracie Abrams, Leni Klum, Amelia Gray Hamlin, Lennon Gallagher, Anais Gallagher, Gene Gallagher, Damian Hurley, Romeo Beckham, Lucas Jagger, Georgia May Jagger.\n\n## Boys\n\nClosest male-friend room from Alex's point of view, but still a mutual peer chat rather than an Alex-focused channel. Brutal affection, school shorthand, low operational access.\n\nJonathan Dawson, Lucas Ashby, Freddie Ashworth, Hugo Manners, Rocco Ritchie.\n\n## Westminster Leavers 2021\n\nMixed school cohort, 30-60. Use for school memories, jokes, parties, and London overlap.\n\nSeed names:\n\nFreddie Ashworth, Tom Harington, Hugo Manners, Milo Astor, Kit Anstruther, Nat Portman, Arthur Devereux, Max Harcourt, Seb Lennox, Henry Bellasis, Otto Grenfell, Ludo Parker, Beatrice Wynn, Amara Okonkwo, Clemmie Balfour, Sophie Trevelyan, India Fairfax, Maya Patel, Elodie Shaw, Ottilie North, Celia Grey, Ruby Soames, Martha Cadogan, Nell Egerton, Florence Yorke, Sienna Travers.\n\n## Polo\n\nUse for Guards/Cowdray/Cirencester country-sport chat, ponies, fixtures, summer parties, and people who know polo logistics.\n\nAlex has a 3-goal polo handicap. He plays position 3 as a playmaker and has played semi-regularly since age 15 at Westminster.\n\nPolo is a serious social/sport lane for him, not a career replacement. He is good enough that knowledgeable people respect him, fixtures and ponies can matter in scene texture, and country-sport friends can talk details without treating him as a professional.\n\n## RAM / Music\n\nUse for music peers, faculty, serious practice, Electric Ivory, and post-boundary music pressure.\n\nAnchors:\n\nDr Catherine Marlowe, Dr Amara Osei, Maya Okafor, Gabriel Chen, Nina Patel.\n\n## FAM / Godfamily\n\nChosen-family and godfamily, not a legal sibling/household-child map.\n\nRosie Walker, Homer Wilson, David Wilson, Sarah Dawson Wilson, Richard Dawson, Elena Dawson, Caroline Dawson Ashby, Stella McCartney, Alasdhair Willis, Kate Moss, Naomi Campbell, Sadie Frost, Sienna Miller, Chris Martin, Gwyneth Paltrow, Apple Martin, Moses Martin, Donatella Versace, Allegra Versace, Prince William, Catherine Princess of Wales, Elton John, David Furnish, Paul McCartney, Stevie Nicks, Dolly Parton, Joni Mitchell, Carole King, T Bone Burnett, Beyonce, Jay-Z.\n\nApple and Moses are Chris/Gwyneth's children. Apple is close to Alex, but she is not Rosie's daughter, Homer's daughter, or Alex's sister.\n\nDavid and Sarah are living relationships, not absences. Sarah is six years sober, more settled in Alex's adult life, and sees him on a semi-regular basis. She is socially close to Stella and the Kate/Naomi/Sadie/Sienna fashion orbit. David is about three years sober, West Village-based, reconnected with Alex, still close with Chris Martin and some old friends, and still fragile. Neither has household-parent status.\n\n## Walker / Operations\n\nWalker Holdings:\n\nEleanor Vance, Graham Forsyth, Diane Prescott, Peter Aldridge, Sarah Langley, Connie Briggs.\n\nAW / Serena / al.x:\n\nCatherine Aldridge, James Latham, Priya Chandra, Oliver Wren, Daniel Sorensen, Beatrice Vale, Imogen Park, Nadia Hassani, Sophie Kalu, Kevin Marsh, Judith Ansley, Miriam Santos, Rafael Costa, Mina Arendt.\n\nAlbury House:\n\nOttilie Marchant, Kit Peverell, Mairi Elphinstone, Sabine Kroll, Priya Nandha, Blythe Carrow, Rafael Bellocq, Tolly Venn, Crispin Vale, Saskia Rooke, Niall Bracken.\n\n## Naming Rules\n\n- Do not invent visible placeholder people.\n- Do not make every room the same room.\n- Do not give operational knowledge to social peers.\n- Do not make Apple Alex's sister or handler.\n- Do not make friends know Albury House interiors before access.\n"},{"file":"37_ELECTRIC_IVORY_FULL.md","content":"# Electric Ivory Full Recital\n\nUse this file when a scene, article, Serena Management note, music-world chat, or test prompt touches Alex's RAM senior recital.\n\n## Canon Lock\n\n`Electric Ivory: studies in time, machinery, song`\n\n| Field | Canon |\n|---|---|\n| Performer | Alex Wilson |\n| Date | 18 June 2025 |\n| Venue | Duke's Hall, Royal Academy of Music, Marylebone |\n| Degree Context | RAM BMus Performance, piano principal, cross-genre creative practice |\n| Length | about 65 minutes |\n| Event Status | compulsory degree recital inside the education-first frame; press could attend |\n| Faculty Assessment | Dr Catherine Marlowe: \"The best undergraduate recital in twenty years.\" |\n| Recording | Alex-paid four-camera cinema-quality film capture and release-quality audio recording |\n| Broadcast | not broadcast |\n| Rights | Alex owns/controls recording, visual/film, performance, and Alex-created publishing rights through al.x Music / AW Holdings; Serena Management administers any release conversation |\n| Public Release | no public release yet |\n| Commercial Status | no album, no Spotify artist profile, no label deal, no official public music release |\n\nThe recital happened less than two months before story open. It was compulsory for Alex's degree and sat inside the education-first frame. Press could attend, but it was not broadcast. The recording exists and is controlled, but it has not been released. Do not write \"no public music\" as \"no public performance history\" or \"no recording exists.\" The correct distinction is: public performances exist; this recording has no public release.\n\n## Programme\n\n| Order | Work | Composer / Source | Alex Role | Register |\n|---:|---|---|---|---|\n| 1 | `Chromatic Fantasy and Fugue, BWV 903` | J.S. Bach | performer | historical keyboard architecture; virtuosity without display |\n| 2 | `Etude No. 1, \"Desordre\"` | Gyorgy Ligeti | performer | rhythm, instability, machine logic |\n| 3 | `Etude No. 13, \"L'escalier du diable\"` | Gyorgy Ligeti | performer | escalation, architecture, danger |\n| 4 | `Study No. 21, \"Canon X\"` | Conlon Nancarrow | solo piano transcription by Alex Wilson | machine music translated into human body |\n| 5 | `Concert Etude Op. 40 No. 3, \"Toccatina\"` | Nikolai Kapustin | performer | classical technique through jazz language |\n| 6 | `Round Midnight` | Thelonious Monk | arrangement by Alex Wilson | jazz standard as private architecture |\n| 7 | `Peace Piece` into improvisation | Bill Evans / Alex Wilson | performer; improvisation | stillness becoming composition |\n| 8 | `China Gates` | John Adams | performer | minimalism, pulse, suspended light |\n| 9 | `Avril 14th` | Aphex Twin | expanded arrangement by Alex Wilson | electronic intimacy made pianistic |\n| 10 | `Everything in Its Right Place` | Radiohead | reconstruction by Alex Wilson | pop/electronic structure rebuilt at the keyboard |\n| 11 | `Winnsboro Cotton Mill Blues` | Frederic Rzewski | performer | machinery, labor, political piano violence |\n\n## Alex Arrangement / Transcription Credits\n\nThese are real recital credits, but not public releases.\n\n| Work | Credit |\n|---|---|\n| `Study No. 21, \"Canon X\"` | solo piano transcription by Alex Wilson |\n| `Round Midnight` | arrangement by Alex Wilson |\n| `Avril 14th` | expanded arrangement by Alex Wilson |\n| `Everything in Its Right Place` | reconstruction by Alex Wilson |\n| `Peace Piece` into improvisation | includes Alex's live improvisation |\n\n## What The Programme Proves\n\nThe programme is the argument against flattening Alex into \"classical pianist.\"\n\nIt contains:\n\n- Bach\n- late 20th-century virtuoso etudes\n- machine/transcription work\n- jazz language\n- improvisation\n- minimalism\n- electronic music translated to piano\n- Radiohead reconstruction\n- political/industrial piano writing\n\nThis is a serious performance programme. It is not a crossover novelty set, not a pop covers recital, and not a standard classical final.\n\n## Recording And Rights\n\nAlex paid for the recital to be filmed with four high-end cinema-quality cameras and recorded to release-quality audio. RAM permitted the capture inside the degree-recital frame. The recital was not broadcast.\n\nAlex owns and controls the recital's recorded, visual/film, performance, and Alex-created publishing rights through the al.x Music / AW Holdings rights architecture. Serena Management can administer release, licensing, broadcast, album, visual film, documentary, or platform conversations, but any movement requires Alex's decision.\n\nAt story-open:\n\n- no public recording has been released\n- no clip has been authorized\n- no album exists\n- no streaming artist profile exists\n- no label deal exists\n- no standalone artist launch has happened\n- Serena Management can hold inbound about the recording\n- al.x controls the broad rights/brand layer\n- al.x Music controls the Electric Ivory recorded, visual/film, and Alex-created publishing layer\n- the recording is an asset and an option, not a public fact for fans to consume\n\n## Public Knowledge Wall\n\nPublic and music-world people may know:\n\n- the recital happened\n- the programme was unusually broad and serious\n- press could attend\n- reviews/reports were strong\n- Dr Marlowe called it the best undergraduate recital in twenty years\n- no recording has been released\n\nOnly inner operational/music-rights layers know:\n\n- exact al.x / al.x Music rights structure\n- release options\n- who has requested access to the recording\n- internal assessment of broadcast/album/documentary possibilities\n\n## Dr Catherine Marlowe\n\nDr Catherine Marlowe is RAM piano faculty and Alex's primary professor.\n\nUse her for:\n\n- serious faculty authority\n- terse technical judgment\n- \"Again.\" as a working-room line\n- the quoted assessment of the recital\n\nDo not make her a publicist, manager, or family surrogate.\n\n## Dr Amara Osei\n\nDr Amara Osei is RAM voice faculty.\n\nUse her when:\n\n- Alex's voice training is relevant\n- someone is pressing the question of whether he will sing publicly\n- post-graduation musical development is under discussion\n\nHer pressure is musical, not commercial.\n\n## Failure Guards\n\n- Do not call Alex's degree classical.\n- Do not call Alex a classical pianist as his identity.\n- Do not say there is no recording.\n- Do not release the recital unless Ryan explicitly plays that.\n- Do not create fan clips, leaks, or bootlegs unless Ryan explicitly creates them.\n- Do not make RAM own or control release rights.\n- Do not turn `Electric Ivory` into an album that already exists.\n- Do not make Serena Management decide to release it without Alex.\n"},{"file":"38_START_POINTS_AND_TIMELINES.md","content":"# Start Points And Timelines\n\nCompact active alternate-start map.\n\nUse when Ryan starts away from default Albury arrival. Preserve Alex's agency, no pre-chosen professional move/music release/relationship change, correct knowledge for date, and no identity reveal.\n\n## Parent / Recovery Timeline\n\n| Date | Canon |\n|---|---|\n| 2001 | David Wilson and Sarah Dawson marry. |\n| 22 Jun 2003 | Alex born at a hospital in Lexington; Phoenix Hollow is the immediate family home; David/Sarah alive but unfit; Rosie/Homer become practical parents in first year. |\n| late 2000s / early 2010s | David/Sarah divorce; later civil, not friends. |\n| Feb 2010 | Alexander McQueen dies by suicide; shatters David's last functionality and begins sustained absence. |\n| around 2019 | Sarah gets sober when Alex around 16; begins returning as present adult. |\n| around 2023 | David gets sober when Alex around 19-20; Sarah likely brokers reentry; Alex begins reconnecting. |\n| 5 Aug 2025 | Sarah six years sober in Notting Hill, semi-regular with Alex; David three years sober in West Village, reconnected/fragile. |\n\n## Start Points\n\n| Start | Date / place | State | Do not advance |\n|---|---|---|---|\n| Default Charles Street / AD drop | Thu 7 Aug 2025, late morning, 12 Charles Street | Alex is in his first post-graduation/post-boundary team meeting with Serena/AW as the pre-approved Architectural Digest cover story and YouTube Sophie Ashby full-house tour of Albury House drop publicly. The private 5-6 Aug return/tours/dinner/Boys visit are immediate backstory. | No strategic post, profile/interview in Alex's own voice, broadcast, solo cover, headline performance, release, adult brand architecture, or accepted deal unless Ryan plays it. |\n| A: Phoenix Hollow / Solstice | 19 Jun-5 Jul 2025, Kentucky / England return | Electric Ivory happened 18 Jun; Alex travels to Phoenix Hollow 19 Jun for Solstice 21 Jun and his birthday 22 Jun; back to England by 5 Jul for last Marylebone nights and graduation. Education-first still active; son-before-symbol, music/family strong. | No adult career activation before 1 Aug. |\n| B: Sardinia before expiry | 8-31 Jul 2025, Villa Serena / Porto Cervo | Post-graduation/post-recital; Alex is personally at Villa Serena from 8 July; the villa itself is fully staffed and open roughly early June-late September for trusted friends, Brain Trust, some Legacy overlap, Phoenix Hollow/godfamily elders, and older-generation traffic. Summer House is the separate global younger-famous summer circuit that may overlap with Sardinia/Porto Cervo, not Alex's group and not based at Villa Serena. Socially full, visible at Porto Cervo edges, private at Villa Serena; no isolation. | No solo cover, profile, interview, strategic social, adult brand architecture, release, label, headline performance before 1 Aug. |\n| C: Boundary expiry | Fri 1 Aug 2025, Sardinia/travel orbit unless Ryan places him elsewhere | Restraint ends inside an already-moving summer social life; friends know the boundary matters, joke/speculate/flirt around it, but nobody gets operational detail. Alex is free to choose, not forced. | Do not pre-choose first move. |\n| D: Early London / Albury | 5-10 Aug 2025, Albury/London | 5-6 Aug private Albury return/tours/dinner/Boys visit; 7 Aug Charles Street team meeting and public AD/Sophie Ashby full-house reveal; Saturday 9 Aug Guards charity polo for Great Ormond Street, White's, position 3 remains available. | Do not lock accepted career choices before Ryan plays them; do not auto-jump to polo. |\n| E: RAM recital / graduation run | 18 Jun-8 Jul 2025, RAM/Phoenix Hollow/Marylebone/Sardinia | Electric Ivory 18 Jun, captured by Alex-paid four-camera cinema-quality film and release-quality audio; Phoenix Hollow 19 Jun-early Jul; Marylebone/graduation 5-7 Jul; Sardinia 8 Jul. | No public release, label, headline performance, adult career activation before 1 Aug. |\n"},{"file":"39_BIRTHDAY_22.md","content":"# Birthday 22\n\nUse this for Alex's 22nd birthday objects from Phoenix Hollow, 20-22 June 2025.\n\nThese objects are emotionally weighted and can re-enter scenes after the education-first boundary ends. They are private unless Ryan makes them visible.\n\nThis file is the master birthday record. `13_MUSIC_OBJECTS_AND_THREADS.md` and `35_ALEX_COLLECTION_FULL.md` reference a subset; this file is authoritative.\n\n## Core Gifts\n\n| Giver | Object | Use |\n|---|---|---|\n| Rosie Walker | private music/family object (deliberately vague; Ryan reveals in play) | home, memory, musical inheritance |\n| Homer Wilson | studio/listening/engineering object (deliberately vague; Ryan reveals in play) | sound, craft, Homer texture |\n| David Wilson | University of Westminster journalism notebooks, passed via Rosie/Homer as family-history objects | family, history, David reconnection layer |\n| Sarah Dawson Wilson | CSM sketchbook and unfinished textile panel from her student years | family, fashion history, Sarah-side texture |\n| Prince William | Diana emerald signet | deeply loaded protocol/family object; not worn automatically; use with care |\n| Apple Martin | photo book | friendship, godfamily, shared childhood memory |\n| Donatella Versace | Gianni-archive Versace dressing gown with private Hessian inscription | fashion, intimacy, old public/protocol knowledge made physical |\n| Catherine, Princess of Wales | Smythson notebook in Hatfield-bourbon leather plus framed photograph | godfamily, personal record |\n| Paul McCartney | lyric sheet (Phoenix Hollow circle / Chris Martin / Rosie connection) | music, family-elder layer |\n| Elton John | miniature Hessian order / vintage Order of the Golden Lion replica | formal/protocol object with private-joke register |\n| Beyoncé | Sarabande-era Alexander McQueen cocktail jacket | fashion history, potential public appearance object |\n| Brandi Carlile | birthday song lead sheet, handwritten | music, Phoenix Hollow circle, private |\n| David Gilmour | vintage U47 condenser microphone | music, Homer's engineering world, craft inheritance |\n| Stevie | shawl | Phoenix Hollow circle elder gift; intimate and private |\n| Dolly Parton | signed Hatfield bourbon barrel half-stave | Kentucky, family-business adjacency, affectionate/funny |\n| Dawson family | Dawson-side cufflinks from Richard/Elena provision | Dawson belonging, old-family layer |\n| Continental cousinage | small protocol/family objects (collective, unspecified) | Hessian/Glucksburg/Bourbon-Two Sicilies cousin layer |\n\n## Private Music Gifts Category\n\nSeveral Phoenix Hollow circle musicians sent private music-layer gifts (lead sheets, recordings, handwritten notes). Brandi Carlile's birthday song lead sheet is named above. Others in this category — Phoebe Bridgers-style, Hozier-style, and similar — exist but are not individually named unless Ryan supplies them.\n\n## Rules\n\n- Private inscriptions remain private.\n- Public/protocol facts may be known, but object provenance is not automatically public.\n- The Diana emerald signet from William is deeply loaded. Do not put it on Alex's hand without Ryan choosing that beat.\n- The Rosie and Homer gifts are intentionally vague. Do not name or define them; Ryan will reveal in play.\n- Do not use gifts to force a first solo cover, strategic post, profile, headline performance, or release.\n- Do not turn the birthday into a public content event.\n- Do not publicise any gift unless Ryan plays that reveal.\n"},{"file":"40_WALKER_HOLDINGS_FULL.md","content":"# Walker Holdings Full Detail\n\nUse this file for Walker Holdings as a whole: the LA family office, WilsonWalker, the Walker Foundation, institutional PR/security infrastructure, family properties, and the distinction between Walker Holdings and Alex's AW Holdings.\n\nFor the operating pillars, use the dedicated detail files:\n\n- `31_HATFIELD_FULL.md` and `32_HATFIELD_PRODUCTS_AND_VENUES.md` — Hatfield Group\n- `45_PHOENIX_MEDIA_FULL.md` — Phoenix Media\n- `46_ALBURY_ACOUSTICS_FULL.md` — Albury Acoustics\n\nFor Alex's personal entity, use:\n\n- `25_AW_HOLDINGS_FULL.md` — AW Holdings, personal entity mechanics\n- `26_SERENA_MANAGEMENT_AND_ALX_BRAND.md` — Serena Management / al.x\n\n## Core Position\n\nWalker Holdings is Rosie Walker's family enterprise and the umbrella structure around the Walker/Wilson family business machine.\n\n| Field | Canon |\n|---|---|\n| Entity | Walker Holdings LLC |\n| Base / HQ | Los Angeles, California |\n| CEO | Eleanor Vance |\n| Story-open enterprise value | $27B |\n| Family office staff | 14 at LA HQ |\n| Function | strategic direction, capital allocation, investments, legal, rights, property, security oversight, charitable giving, tax, estate planning |\n\nDo not place Walker Holdings HQ in Louisville. Louisville is Hatfield Group's corporate HQ.\n\nWalker Holdings is not Alex's personal management company. Alex has AW Holdings / Serena Management / al.x for his personal assets, staff, career/commercial readiness, and rights layer.\n\n## Value Architecture\n\nMost of the enterprise value sits in the catalogs and archive at WilsonWalker. The operating pillars deploy the family's cultural authority into real cash-flowing businesses that compound that value.\n\n| Component | Value | Type |\n|---|---:|---|\n| WilsonWalker LLC | $11B | rights stewardship — catalogs, masters, archive |\n| Albury Acoustics | $3B | operating pillar — audio technology |\n| Hatfield Group | $2.6B | operating pillar — hospitality, spirits, lifestyle |\n| Phoenix Media | $1.8B | operating pillar — content, library, distribution |\n| Family office investments | $3.5B | public/private equity, infrastructure, separately managed accounts |\n| Property portfolio | $2B | Phoenix Hollow, Laurel Canyon, LA HQ, other family properties |\n| Cash & liquidity | $1.5B | operating reserves, capital allocation runway |\n| Other | $1.6B | foundation reserves, retained earnings, smaller positions |\n| Walker Foundation | not valued in enterprise figure | philanthropic |\n| **Walker Holdings total** | **$27B** | |\n\nThe catalog/archive foundation is the unmoved engine. Three operating pillars sit on top, each anchored in something authentic to the family but each fully arms-length and culturally distinct: Hatfield is whiskey/hospitality, Phoenix Media is music documentary/cultural storytelling, Albury Acoustics is audio technology.\n\nEach pillar has its own CEO and board. Walker Holdings is majority owner, board oversight, capital allocation, and legal/PR escalation when the family name is involved.\n\n## Top-Level Structure\n\n```mermaid\nflowchart TD\n  WH[\"Walker Holdings<br/>Los Angeles HQ<br/>$27B\"]\n  WH --> FO[\"LA Family Office<br/>14 staff\"]\n  WH --> WW[\"WilsonWalker LLC<br/>creative rights stewardship<br/>$11B\"]\n  WH --> PM[\"Phoenix Media<br/>content / library / distribution<br/>$1.8B\"]\n  WH --> HG[\"Hatfield Group<br/>Louisville HQ<br/>$2.6B\"]\n  WH --> AA[\"Albury Acoustics<br/>California HQ<br/>$3B\"]\n  WH --> WF[\"Walker Foundation<br/>philanthropy / charitable giving\"]\n  WH --> PR[\"SSML / institutional PR\"]\n  WH --> SEC[\"Greystone / security infrastructure\"]\n  WH --> PROP[\"Walker family properties<br/>Phoenix Hollow / Laurel Canyon etc.\"]\n```\n\n## Ownership and Governance\n\n| Entity | Stake | Voting |\n|---|---:|---|\n| Walker family trust structures | 92% | full voting Class A |\n| David Homer Wilson | 4% | non-voting Class B |\n| AW Holdings / AW Investments (Alex) | 4% | non-voting Class B |\n| External | 0% | — |\n\nDavid's 4% is his original protected allocation and remains his personally while he is alive. AW Holdings holds only Alex's own 4% allocation from his 21st birthday in 2024. Both positions are locked and illiquid; neither David nor Alex can sell, direct, or use the stake for operational control.\n\n### The Governance Interlock\n\n| Direction | Mechanism |\n|---|---|\n| Walker -> AW | Eleanor Vance chairs AW Holdings board as the Walker governance presence and family-trust adult |\n| AW -> Walker | AW holds Alex's 4% non-voting Class B in Walker Holdings; receives annual distributions when declared; no operational reach |\n\nThis is reconsolidation architecture: the mechanism by which AW Holdings can be cleanly merged or absorbed back into Walker Holdings when Alex eventually inherits.\n\n## LA Family Office\n\n| Person / Function | Role |\n|---|---|\n| Eleanor Vance | CEO; final strategic authority; trust-sensitive decisions; chairs AW Holdings board |\n| Graham Forsyth | CFO; financial oversight, allocation, reporting, tax planning |\n| Diane Prescott | General Counsel; legal risk, rights control, institutional legal coordination |\n| Peter Aldridge | Head of Investments; portfolio strategy with external advisors |\n| Sarah Langley | analyst; financial analysis/tracking |\n| Connie Briggs | office manager; HQ administrative backbone |\n| Property Director | Walker property operations, including Phoenix Hollow and Laurel Canyon |\n| Security Director | Greystone contract owner; compound/travel/security protocols |\n| Events Coordinator | Solstice and major-event operations |\n| Rosie & Homer's PA | day-to-day principal care, compound-based rhythm |\n| Admin/support | shared operations |\n\nNadia Hassani began in the Walker/Alex operational world but is now an AW Holdings employee.\n\n## WilsonWalker LLC\n\nWilsonWalker is the private creative rights stewardship entity for Rosie Walker and Homer Wilson's creative/intellectual property legacy.\n\n| Division | Function | Value |\n|---|---|---:|\n| Walker Publishing | Rosie's songwriting catalog ownership and publishing control | $3.2B |\n| Walker Records | Rosie's master recordings ownership | $2.4B |\n| Walker Archive | unreleased film/video/photo/audio documentation, especially 1965-1980 | $3.5B |\n| Homer Wilson Asset Management / HWAM | production royalties, technology licensing, credit usage approvals | $500M present value |\n| WilsonWalker overall | rights stewardship, preservation, strategic control | $11B |\n\nWilsonWalker is stewardship, not active production. It protects, preserves, administers, approves, and plans long-term legacy control.\n\n## Operating Pillars\n\n### Phoenix Media\n\nPhoenix Media is the Walker Holdings content pillar: music/cultural content production, owned library, distribution, audio, and studios infrastructure. It does not produce on Rosie Walker by default.\n\n### Hatfield Group\n\nHatfield Group is the Walker Holdings hospitality and spirits pillar. It is headquartered in Louisville, Kentucky. It is a real operating group, not a vanity prop.\n\n### Albury Acoustics\n\nAlbury Acoustics is the Walker Holdings audio technology pillar. Name lineage: Albury House -> Earl of Albury -> Albury Acoustics. Homer is Founder Emeritus and a board member; he does not run the business.\n\n## Walker Foundation\n\nWalker Foundation is the philanthropic layer. It sits outside the enterprise valuation figure.\n\n## Institutional PR\n\nSSML / institutional PR handles Walker Holdings, Rosie/Homer institutional posture, Solstice media posture, family-business press, charitable PR, and Walker-level privacy protection.\n\nSSML is not Alex's personal publicist. Alex's personal/global PR readiness is The Lede through Serena Management.\n\n## Security\n\nGreystone is the larger Walker Holdings security infrastructure.\n\n| Layer | Function |\n|---|---|\n| compound security | Phoenix Hollow gate/perimeter and privacy |\n| close protection support | surge support for Alex/Rosie/Homer as needed |\n| advance work | routes, venues, travel coordination |\n| drivers/local providers | vetted drivers and local security |\n| threat monitoring | social media, doxxing, fixation, pap intelligence |\n| cyber/deepfake monitoring | AI/deepfake/digital-risk identification and takedown coordination |\n\nAlex mostly sees Kevin and the gate. The full machine is deliberately invisible.\n\n## What Alex Sees\n\nAlex does not experience Walker Holdings as a corporate structure. He sees:\n\n- Eleanor when something is trust-critical\n- Kevin / gate / invisible security competence\n- Phoenix Hollow working smoothly\n- Solstice happening without visible machinery\n- Hatfield objects/venues as family-business background\n- Albury gear in studios without thinking about it\n- Phoenix Media as a cultural company in the family weather\n- AW Holdings / Serena Management for his own personal/career structure\n\nHe will one day inherit Walker Holdings principal status. He still has nothing to do with running it at story open.\n\n## Key Distinctions\n\n| Do not confuse | Correct distinction |\n|---|---|\n| Walker Holdings HQ vs Hatfield HQ | Walker Holdings is LA-based; Hatfield Group is Louisville-based |\n| Walker Holdings vs AW Holdings | Walker is the family enterprise; AW is Alex's lean personal family office |\n| Phoenix Media vs WilsonWalker | Phoenix Media actively produces/licences/distributes media; WilsonWalker stewards rights/archive |\n| Albury Acoustics vs Phoenix Hollow Studio | Albury is the Walker-owned audio company; Phoenix Hollow Studio is Homer's personal studio |\n| Albury House vs Albury Acoustics | Albury House is Alex's Kensington home; Albury Acoustics is Walker's audio company |\n| SSML vs The Lede | SSML is institutional/family; The Lede is Alex personal PR readiness |\n| Greystone vs Kevin | Greystone is larger infrastructure; Kevin is Alex's CPO |\n| Walker Foundation vs WilsonWalker | Foundation is philanthropy; WilsonWalker is rights stewardship |\n"},{"file":"41_PUBLIC_PRESS_EXAMPLES.md","content":"# Public Press Examples\n\nUse this for press voice and public archive tone.\n\n## Core Frame\n\nAlex is not newly famous at story open. He is already treated as one of the most photographed and most written-about young private individuals in the world. A normal boring week produces dozens of articles/items globally every day.\n\nThe press already has:\n\n- childhood photographs\n- royal-adjacent coverage\n- Rosie/Homer family context\n- Prince Alex headline language\n- fashion-week scrutiny\n- society genealogy\n- polo/country-sport visibility, including his 3-goal handicap in knowledgeable coverage\n- music-school coverage\n- pre-story-open prestige work: fashion/editorial, brand imagery, public piano performances, broadcast appearances, and family/culture cameos\n- paparazzi and party archive\n- fan-platform mythology\n- heavy China, Korea, Philippines, and Japan coverage equal in heat to Europe\n- Asian-market beauty/fashion/fan coverage, amplified by Rosie's huge cultural status there\n\nThe 1 August education-first boundary expiry is covered because it changes adult agency, not because it reveals who he is or makes work possible for the first time.\n\n## Press Registers\n\n### Tabloid / Entertainment\n\nLikely angle: the most-watched young man alive has been commercially legible for years and can finally choose adult access, or refuse it.\n\nAvoid: \"secret prince revealed.\"\n\n### Fashion Press\n\nLikely angle: no solo cover or adult profile exists yet; global houses, magazines, platforms, photographers, and stylists want the first adult thesis.\n\nAvoid: inventing a booked cover or campaign.\n\n### Music Press\n\nLikely angle: Electric Ivory was serious, broad, and unreleased; the recording exists but has not been made public.\n\nAvoid: calling him a released recording artist.\n\n### Society / Royal-Adjacent\n\nLikely angle: old public facts, education-first boundary gone, Albury House return, family mythology.\n\nAvoid: acting as if Debrett's/Almanach material was hidden.\n\n### Polo / Country-Sport\n\nLikely angle: Alex as a semi-regular Guards/Cowdray/Cirencester player, 3-goal handicap, position 3/playmaker, in the circuit since Westminster.\n\nAvoid: making polo his job, treating him as a professional player, or writing it as a sudden post-boundary pivot.\n\n### East / Southeast Asian Entertainment And Fashion Press\n\nLikely angle: Rosie's grandson, beautiful royal-adjacent musician, global fashion object, \"Prince Alex\" mythology, first adult access watch, recycled sightings made huge through edits and translation accounts.\n\nAvoid: treating these markets as secondary, niche, or merely reposting Europe. China, Korea, the Philippines, and Japan are major engines of daily Alex coverage.\n\n### Public Conversation Formats\n\nLikely angle: the first real conversation could happen through many registers: print profile, broadcast interview, podcast, fashion film, music special, late-night couch, global streaming segment, Asian-market entertainment/fashion platform, or a hybrid built around Electric Ivory.\n\nAvoid: assuming British media owns the first access lane, treating comic/broad formats as impossible, or filtering everything through prestige. The question is whether Alex would enjoy himself, sound like himself, and avoid being packaged as Serious Prince Pianist.\n\n## Albury House Press\n\nPublic can say:\n\n- Albury House is Alex's Kensington house.\n- It was under scaffolding / dark for more than a year.\n- The 7 August Architectural Digest cover story and YouTube video reveal the completed Studio Ashby refurbishment.\n- Sophie Ashby takes viewers through the full seven-floor house, including both basement levels.\n- Published room-by-room interiors and design language are public.\n- Alex is back in London and in the first post-boundary access watch.\n\nPublic cannot say from the AD feature unless Ryan reveals:\n\n- private handover details\n- staff/security operations\n- hidden systems or safe mechanics\n- Serena/AW/al.x details\n- unshown private object provenance\n\n## Ashby Reveal\n\nBefore 7 August, public/design press could separately say:\n\n- Sophie Ashby / Studio Ashby has been unusually silent for about 18 months.\n- Ashby is one of the most in-demand interior designers in society and almost impossible to book.\n- Occasional cryptic social posts have fuelled speculation about a major mystery commission.\n\nOn 7 August, the mystery resolves publicly as Albury House.\n\n## Example Language\n\nGood:\n\n> Alex Wilson's image has never been private. What changes now is agency: the solo cover, the first real conversation, the adult brand architecture, the music release he can finally choose or refuse.\n\nGood:\n\n> Prince Alex has been a headline since before he had adult teeth. What changed on Friday was not the paperwork. It was the end of education as the answer to every offer.\n\nGood:\n\n> In Seoul, Tokyo, Manila, and Shanghai, the question is not whether Alex Wilson is famous enough to matter. It is whether the world's most watched beautiful man will finally choose a first adult voice.\n\nGood:\n\n> A Graham Norton sofa would not be the safe route or the unserious route by default. With the right room, it would be a choice about timing, humour, and control: Alex deciding whether the first real conversation can happen in public without becoming a confession.\n\nGood:\n\n> The offer list tells you more about Alex if you stop ranking it by prestige. Newsnight is the wrong room because it makes him a subject. Hot Ones might be the right room because it lets him be funny, physical, musical, ridiculous, and in control.\n\nBad:\n\n> The world woke up to discover that Alex Wilson was secretly a prince.\n\nBad:\n\n> Sources confirm Alex has selected his first cover, first label partner, and first campaign.\n"},{"file":"42_THE_WALL.md","content":"# The Wall — Per-Character Knowledge Gate\n\nThis file prevents Claude from treating narrator knowledge as character knowledge.\n\nThe narrator can know everything. Characters cannot.\n\n## The Principle\n\nEach character knows only what their position gives them: family role, friendship, staff access, professional access, public information, social room, and proximity over time.\n\nThe public identity layer is broad in v20. Alex being Rosie Walker's grandson, Homer Wilson's line, David Wilson's son, royal-adjacent, famous, and called Prince Alex is not secret. Operational details remain private.\n\n## The Gate\n\nBefore generating any character's spoken line, internal thought, text, post, or reaction, run this gate silently:\n\n1. Who is speaking?\n2. What positions does this character hold?\n3. What does each position give them access to know?\n4. Take the union of those access sets.\n5. Generate only from that union.\n\nThe gate runs per character, per scene, per line.\n\n## Public Layer\n\nMost socially aware characters can know:\n\n- Alex is famous and has been famous for years\n- Rosie/Homer family structure in public form\n- British courtesy title / Prince Alex public language\n- William godfather layer\n- education-first boundary expiry date and broad meaning\n- Alex has not yet made a first adult-defining post-boundary move\n\nSpecialist/protocol characters know more precisely:\n\n- Continental formal style\n- Almanach / Debrett's details\n- honors/orders\n- cousinage\n\nCasual public/fans know headline versions, often distorted.\n\n## Private / Restricted Layer\n\nDo not leak these unless the speaker has access:\n\n- Serena Management inbox details\n- al.x legal/rightsholding structure\n- Electric Ivory release options and internal rights conversations\n- Walker/AW governance mechanics beyond public/business-summary level\n- Albury House details not shown in the 7 August Architectural Digest / YouTube feature or personally disclosed\n- private chats and scrollback\n- birthday gift inscriptions and private object provenance\n- family grief texture beyond public biography\n- staff routing and house operations\n\n## Position Map\n\n| Position | Public identity | Boundary / career pressure | Operations | Private family texture | Albury interior |\n|---|---|---|---|---|---|\n| Alex | full | full | full | full | full |\n| Rosie / Homer | full | full | partial | full | partial unless shown |\n| Dawson elders / closest family | full | full | partial | full/partial by line | only if shown |\n| Godparents / godfamily elders | full | full | partial | partial/full by relationship | only if shown |\n| Brain Trust: Apple / Iris / Lila / Kaia / Rocco | full | public speculation only, no Serena details | no | inherited close texture | only if shown/invited |\n| Close peers outside Brain Trust | full | public speculation only, no Serena details | no | only what their relationship supports | only if shown/invited |\n| London Lot | public/social layer | public speculation only | no Serena details | only what members personally know | only if Alex shows/invites |\n| Serena Management | public layer + professional inbound | full for managed categories | Serena/al.x only | no personal chats | no unless briefed |\n| AW family-office staff | public layer + role-relevant private facts | partial | role-specific | no personal chats | role-specific |\n| Knight Frank / household staff | public layer + house operations | no career inbox | house/property only | no personal chats | yes for work areas |\n| Walker Holdings staff | public layer + Walker institutional facts | no personal career inbox unless routed | Walker layer | no personal chats | no unless property task |\n| Press / fans | public layer incl. AD/Youtube Albury feature after 7 Aug drop | public speculation only | no | no | published Albury visuals only |\n\n## Chat-Room Seal\n\nEach chat is a sealed room with its own scrollback, members, jokes, timing, and access.\n\nA joke made in Boys is not automatically available to The Almanach. A Serena Management internal note is not available to Summer House. A member who belongs to two rooms may carry a thought across only if the scene visibly gives them the chance, and even then it should mutate into that room's register.\n\n## Albury House Wall\n\nAt 7 August opening:\n\n- public knows the house is his and has been under work\n- Architectural Digest cover story and YouTube video drop with Sophie Ashby taking viewers through the full seven-floor house, including both basement levels\n- public now knows Studio Ashby / Sophie Ashby did Albury House\n- public has room-by-room visual knowledge from the published feature\n- Brain Trust/friends saw room details during the 5 August dinner/tour; Boys saw the house before the 7 August meeting\n- wider friends / Legacy / Summer House / London Lot know at least the published AD/Youtube material once it drops, plus anything Alex personally showed them\n- staff know only what their work requires\n\nDo not let characters know staff/security operations, private handover mechanics, hidden systems/safe mechanics, Serena/AW/al.x details, or unshown private object provenance from the AD feature.\n\n## Common Failures\n\n- Treating public Prince Alex knowledge as a new reveal.\n- Letting friends know Serena Management inbox details.\n- Letting staff see personal chats.\n- Treating AD-public interiors as still secret after 7 August.\n- Letting press know staff/security operations, hidden systems, Serena/AW details, or private handover mechanics.\n- Letting a chat recycle another chat's joke.\n- Letting narrator knowledge leak into a throwaway line.\n"},{"file":"43_ROSIE_DISCOGRAPHY_COMPLETE.md","content":"# Rosie Walker Complete Discography\n\nUse this file when a scene, article, chat, business note, or music-world artifact needs Rosie's deep catalog detail.\n\n`34_ROSIE_DISCOGRAPHY_FULL.md` is the quick guardrail file. This file is the deep catalog reference.\n\n## Category Lock\n\nRosie Walker is Kentucky-born, but she is not country.\n\nDo not route her through Nashville, the Opry, the Bluebird, country music shorthand, banjo/mandolin texture, or \"country royalty\" language. Her Kentucky is Lexington, horse country, university-town, literary Southern, and Phoenix Hollow. It is not a genre instruction.\n\nHer catalog moves through folk, Muscle Shoals soul, gospel-rock, symphonic rock, art rock, psychedelic concept work, glam/hard rock, industrial/Krautrock, new wave/art pop, cinematic orchestral work, ambient gospel, chamber pop, experimental electronica, industrial classical, and post-genre minimalism.\n\n## Scale\n\n| Stat | Canon |\n|---|---:|\n| Studio albums | 12 |\n| Album of the Year Grammys | 10 |\n| Total Grammys | about 56 |\n| Album certifications | all 12 multi-Diamond |\n| Total albums sold | 500M+ |\n| All-time streams | 100B+ |\n| Annual streams in 2025 | 22B+ |\n| Monthly Spotify listeners in 2025 | 155M+ |\n| US #1 singles | 34 |\n| US #1 albums | 11 of 12 |\n| Combined US album weeks at #1 | 184 |\n\nWalker Publishing, established 1965, administers the catalog. Walker Records, established 1971, owns all masters from Phase III onward. Atlantic-era masters have been bought back by negotiation.\n\n## Career Map\n\n| Phase | Years | Albums | Character |\n|---|---|---|---|\n| The Roots | 1965-1968 | `A Still Small Voice`; `Baptized in Bourbon` | chamber folk into Muscle Shoals soul/gospel-rock |\n| Imperial Phase | 1970-1973 | `Good Girls Go to Heaven`; `Neon Cathedral`; `Starlight & Steel` | three consecutive Album of the Year wins; biggest artist on earth; meets Homer |\n| Reinvention | 1974-1977 | `Concrete & Chrome`; `Radio Silence` | Berlin/Eno machine language, then warm California/Homer new wave |\n| Departure | 1979 | `The Last Cathedral` | sixth Album of the Year; the long goodbye |\n| Soft Stop | 1980-1994 | no albums | no tours/interviews/promo; work continues privately; home at Phoenix Hollow |\n| Return | 1995-present | `Glass Garden`; `A House With No Mirrors`; `Black Sun Archive`; `The Quiet Index` | one album per decade; no tours/interviews/promo; Homer producing at Phoenix Hollow |\n\n## Album Of The Year Wins\n\n| # | Album | Grammy Year |\n|---:|---|---:|\n| 1 | `Good Girls Go to Heaven` | 1971 |\n| 2 | `Neon Cathedral` | 1972 |\n| 3 | `Starlight & Steel` | 1973 |\n| 4 | `Concrete & Chrome` | 1975 |\n| 5 | `Radio Silence` | 1978 |\n| 6 | `The Last Cathedral` | 1980 |\n| 7 | `Glass Garden` | 1996 |\n| 8 | `A House With No Mirrors` | 2004 |\n| 9 | `Black Sun Archive` | 2009 |\n| 10 | `The Quiet Index` | 2022 |\n\n## Albums, Tracks, Singles\n\n### 1. A Still Small Voice\n\n| Field | Canon |\n|---|---|\n| Year | 1965 |\n| Label | Atlantic Records |\n| Vibe | folk revival; chamber folk; classical-inflected singer-songwriter |\n| Producer | Paul Rothchild |\n| Chart | US #12; Folk Albums #1 |\n| Certification | multi-Diamond 3x |\n\nTracks: `First Principles`; `The Long Way Home`; `Counterpoint`; `Blue Grass Blue Notes`; `A Scholar's Lament`; `The Empty Room`; `River Road`; `Still Water`; `Borrowed Hymn`; `Nightingale`; `The Open Tuning`; `Vespers`; `A Still Small Voice`.\n\nSingles: `The Long Way Home` (Folk #3 / Pop #54); `A Still Small Voice` (Folk #1 / Pop #38).\n\n### 2. Baptized In Bourbon\n\n| Field | Canon |\n|---|---|\n| Year | 1968 |\n| Label | Atlantic Records |\n| Vibe | Muscle Shoals soul; R&B; gospel-rock |\n| Producer | Jerry Wexler |\n| Recorded | Fame Studios and Muscle Shoals Sound Studio |\n| Chart | US #1 for 14 weeks; UK #2 |\n| Certification | multi-Diamond 6x |\n\nTracks: `Baptized in Bourbon`; `Sunday Clothes Saturday Sins`; `Preacher's Daughter`; `Judgment Day Soul`; `Midnight Train to Memphis`; `Pour Another`; `Red Clay Heart`; `Sweet Salvation`; `Ain't No Grave`; `Whiskey & Holy Water`; `Broken Hallelujah`; `Southern Nights`; `Baptized in Bourbon`.\n\nSingles: `Sunday Clothes Saturday Sins` (#1, 7 weeks); `Baptized in Bourbon` (#1, 4 weeks); `Preacher's Daughter` (#2); `Sweet Salvation` (#4).\n\n### 3. Good Girls Go To Heaven\n\n| Field | Canon |\n|---|---|\n| Year | 1970 |\n| Label | Atlantic Records |\n| Vibe | symphonic rock; Wall of Sound |\n| Producer | Quincy Jones |\n| Recorded | Abbey Road Studios |\n| Grammy | Album of the Year 1971 |\n| Chart | US #1 for 22 weeks; UK #1 for 14 weeks |\n| Certification | multi-Diamond 12x |\n\nRosie meets Homer Wilson during the Abbey Road sessions. He is a 26-year-old engineer who stops a take over mic placement. She says, \"Show me.\" They marry in 1971.\n\nTracks: `Good Girls Go to Heaven (Bad Girls Go Everywhere)`; `Transistor Heart`; `Sequin Sermon`; `City of Angels`; `Golden Cage`; `The Paparazzi Waltz`; `Velvet Rope`; `Million Dollar Tears`; `Spotlight Blindness`; `New York is a Lonely Town`; `Centerfold Soul`; `Symphony for the Broken`; `Curtain Call`.\n\nSingles: `Good Girls Go to Heaven (Bad Girls Go Everywhere)` (#1, 11 weeks, 2.1B streams); `Million Dollar Tears` (#1, 6 weeks); `Transistor Heart` (#1, 5 weeks, Stevie Wonder co-performance); `Spotlight Blindness` (#1, 3 weeks); `Golden Cage` (#2).\n\n### 4. Neon Cathedral\n\n| Field | Canon |\n|---|---|\n| Year | 1971 |\n| Label | Atlantic Records |\n| Vibe | art rock; psychedelic; concept album |\n| Producers | Quincy Jones and Rosie Walker |\n| Recorded | Abbey Road Studios and Laurel Canyon |\n| Grammy | Album of the Year 1972 |\n| Chart | US #1 for 18 weeks; UK #1 for 13 weeks |\n| Certification | multi-Diamond 11x |\n\nTracks: `Neon Cathedral`; `Electric Communion`; `Stained Glass Sky`; `The Altar of Sound`; `Velvet Guillotine`; `Laser Beams & Rosaries`; `Cybernetic Soul`; `Plastic Jesus`; `The Confessional Booth`; `Modern Gods`; `Technicolor Ghost`; `Sacred Static`; `Echoes of Eve`; `Fade to White`.\n\nSingles: `Neon Cathedral` (#1, 8 weeks); `Velvet Guillotine` (#1, 4 weeks); `Plastic Jesus` (#1, 4 weeks); `Modern Gods` (#2 US / #1 UK).\n\n### 5. Starlight & Steel\n\n| Field | Canon |\n|---|---|\n| Year | 1972 |\n| Label | Atlantic Records |\n| Vibe | glam rock; hard rock |\n| Producers | Rosie Walker and Tony Visconti |\n| Recorded | Chateau d'Herouville |\n| Grammy | Album of the Year 1973 |\n| Chart | US #1 for 21 weeks; UK #1 for 17 weeks; #1 in 14 countries |\n| Certification | multi-Diamond 13x |\n\nQueen opens the 1973 leg. This is stadium command, not country adjacency.\n\nTracks: `Starlight & Steel`; `Diamond Delirium`; `Hollywood Cemetery`; `Glitter Blood`; `Mars Landing`; `Rocket Fuel`; `Platform Shoes`; `Starship Lover`; `Cosmic Dust`; `The Man Who Sold the Earth`; `Silver Screen Suicide`; `Champagne Supernova`; `Exit Velocity`.\n\nSingles: `Starlight & Steel` (#1, 9 weeks); `Champagne Supernova` (#1, 6 weeks, 1972 original); `Diamond Delirium` (#1, 4 weeks); `Rocket Fuel` (#1, 3 weeks).\n\n### 6. Concrete & Chrome\n\n| Field | Canon |\n|---|---|\n| Year | 1974 |\n| Label | Walker Records |\n| Vibe | industrial; Krautrock; Berlin machine language |\n| Producers | Brian Eno and Rosie Walker |\n| Recorded | Hansa Studios Berlin and Abbey Road Studios |\n| Grammy | Album of the Year 1975 |\n| Chart | US #3; UK #5 |\n| Certification | multi-Diamond 4x, largely retrospective |\n\nTracks: `Concrete & Chrome`; `Machine Music`; `The Hum of the World`; `Factory Girl`; `Steel Thoughts`; `Electric Dreams`; `Neon Rain`; `The City at Night`; `American Ruin`; `Chrome Heart (Reprise)`; `Fade to Grey`; `Machine Dreams`.\n\nSingles: `Concrete & Chrome` (#18); `Factory Girl` (#12); `American Ruin` (#24).\n\n### 7. Radio Silence\n\n| Field | Canon |\n|---|---|\n| Year | 1977 |\n| Label | Walker Records |\n| Vibe | new wave; art pop; warm machine joy |\n| Producers | Rosie Walker and Homer Wilson |\n| Recorded | Laurel Canyon |\n| Grammy | Album of the Year 1978 |\n| Chart |
