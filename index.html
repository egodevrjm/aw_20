tocol jokes, cousinage, dry multilingual aristocratic tone. Seed names: Olympia of Greece, MC (Princess Maria Carolina of Bourbon-Two Sicilies), Princess Elisabeth of Belgium, Prince Christian of Denmark, Princess Alexandra of Hanover, Countess Olympia of Arco-Zinneberg. Use real names only; do not invent Almanach members.\n- Boys: brutal affection, schoolboy shorthand, no operational access. Closed membership: Jonathan Dawson, Lucas Ashby, Freddie Ashworth, Hugo Manners, Rocco Ritchie + Alex.\n- London Lot: big London young-society/culture room; music, film, fashion, art, legacy families, nightlife, dinners, parties, house curiosity, and who-is-in-town traffic.\n- Serena/AW: operational, warm-professional, never personal-chat access.\n\n## The Boundary In Chats\n\nEveryone socially aware knows Alex is already famous and publicly known. The boundary ending is about adult agency, not identity revelation and not first visibility.\n\nChats may react to:\n\n- first-move speculation\n- whether he will post\n- whether he will do a solo cover or profile\n- whether Electric Ivory will ever surface\n- Albury House being finished\n- paparazzi and fashion/social moments\n\nChats may not know:\n\n- Serena Management inbox details\n- al.x rights structure\n- staff/security operations or hidden Albury systems from the AD reveal\n- Albury interior details before Alex shows them\n- private family-office mechanics\n\nEnd chats on live motion, not tidy closure.\n"},{"file":"13_MUSIC_OBJECTS_AND_THREADS.md","content":"# Music Objects And Threads\n\nUse this for music objects, birthday gifts, and unresolved music pressure.\n\n## Core Music Truth\n\nAlex is a RAM-trained musician: piano principal, cross-genre creative practice. He also plays guitar and violin.\n\nAlex has a public piano-performance and broadcast archive before story open: charity stages, serious RAM-era performances, cultural broadcasts, and prestige rooms. That archive proves he is a real musician in public. It is not a standalone artist launch.\n\nElectric Ivory is the central post-boundary music object:\n\n- performed 18 June 2025 at RAM\n- filmed with four high-end cinema-quality cameras and recorded to release-quality audio, paid for by Alex\n- no public release\n- no album\n- no Spotify artist profile\n- no label deal\n- no standalone recording release or artist launch\n- rights controlled through al.x Music / AW Holdings\n- any release conversation administered through Serena Management\n- Alex decides whether it moves\n\n## Active Music Pressures At Story Open\n\n- serious music-world interest in the unreleased recording\n- label and classical-management interest held by Latham\n- headline professional performance invitations not protected by education, charity, or family context\n- pressure to define whether Alex is a pianist, artist, performer, composer, public figure, or all of those\n- the risk of flattening him into \"classical prince\" or \"celebrity pianist\"\n\nDo not pre-choose a music move. Alex is free after 1 August; the scene waits for Ryan to play the choice.\n\n## 22nd Birthday Objects\n\nThe 22nd birthday at Phoenix Hollow created objects that can drive scenes after the education-first boundary. `39_BIRTHDAY_22.md` is the master record — load it for the full list. Key music-relevant objects:\n\n| Giver | Object | Scene use |\n|---|---|---|\n| Rosie | private musical / family object (Ryan reveals in play) | home, memory, music |\n| Homer | studio / listening / engineering object (Ryan reveals in play) | sound, craft, inheritance |\n| David Gilmour | vintage U47 condenser microphone | music, Homer's engineering world, craft |\n| Brandi Carlile | birthday song lead sheet, handwritten | Phoenix Hollow music circle, private |\n| Paul McCartney | lyric sheet | music, Phoenix Hollow elder layer |\n\nLoad `39_BIRTHDAY_22.md` for the complete gift list including fashion, protocol, and family objects.\n\n## Guardrails\n\n- Do not invent public leaks, bootlegs, clips, or fan recordings.\n- Do not invent Nashville/Opry/Bluebird history.\n- Do not make every musical choice Rosie's or Homer's influence.\n- Do not let fashion/career pressure erase actual practice, listening, playing, or composition.\n"},{"file":"14_FAILURE_MODES.md","content":"# Failure Modes\n\nCompact active checklist.\n\n## High-Risk Drifts\n\n| Failure | Corrective rule |\n|---|---|\n| Identity reveal | Public facts are already known. Pressure is education-first boundary ending and adult agency. |\n| Beautiful quiet observer | Alex talks, jokes, flirts, remembers, interrupts, names people, takes the piss, moves the room. |\n| Business plot swallowing career | Serena holds career/media/music/brand inbound; AW supports but is not the story. |\n| First-move auto-advance | Hand back before first solo cover/profile/interview/broadcast/long-form public conversation/social posture/brand/headline performance/music release. |\n| Static meeting voice | Serious rooms still have bodies, jokes, impatience, warmth, Alex cutting grandeur down. No deck prose. |\n| Film treatment | Write the room, not the trailer. Avoid slow-motion symbolism. |\n| Sanitised room | British/European peers swear, roast, flirt, insult outfits, comment on bodies. |\n| Beauty filed once | Keep beauty active through reactions and room physics. |\n| Three-register failure | Keep music, fashion/image, and lifestyle/family/place/social weather alive over time. |\n| Character tic lock | Characters have states; do not reduce Apple/Rocco/Iris/Homer/Donatella/Elton to one repeated function. |\n| Witness inflation | Reveals land as news unless Ryan supplied prior knowledge. Do not install old witnesses. |\n| Thirst softening | Social/friend comments on Alex are explicit, competitive, body-focused, and often indecent. |\n| Alex says no by default | No-first-move is only for career-defining choices. Alex's ordinary default is yes to rooms, plans, jokes, flirts. |\n| Recovery-family drift | David/Sarah sobriety is edge pressure, not Alex's identity, redemption plot, or therapy public face. |\n| Parent temperature collapse | Sarah: six years sober, semi-regular, Notting Hill/Stella/Kate/Naomi/Sadie/Sienna. David: three years sober, West Village, Chris/old friends, fragile reconnection. |\n\n## Situation Traps\n\n| Trap | Rule |\n|---|---|\n| Albury leak | After 7 Aug AD/Youtube, Studio Ashby and published interiors are public; hidden systems, staff/security operations, private handover mechanics, and Serena/AW details remain private. |\n| Phone skipped | Use `phone-renderer`; show appropriate phone surface, not prose. |\n| Information wall | Serena does not see personal chats; Kevin knows movement/security; friends do not know operations. |\n| Group chat scale | Large rooms need unread counts, side talk, named voices, background traffic. |\n| Cross-chat bleed | Jokes move only if a shared member visibly carries them. |\n| Operational over-spec | Do not invent named contacts, pitch counts, memos, offices, histories. |\n| Staff routing | Press/career: Latham/Serena/The Lede. Legal: Daniel. House: Ottilie. Logistics: Sophie. Security: Kevin. |\n| Invented evidence | Do not invent performances, songs, gifts, screenshots, Christmas cards, prior photos, studio visits. |\n| Room/object invention | Use canon; do not make up floor routing, materials, object placement, conservation. |\n| Rosie downscaled | Rosie is living cultural ceiling, not retired famous singer. |\n| Kentucky trap | Phoenix Hollow is horse country/bourbon/private-school/global cultural compound, not poverty/kitsch/Southern Gothic. |\n| Pap scale error | Paparazzi are industrial weather around public movement, not surprise. |\n| Commercial blank slate | Alex has work from 13 and adult-coded ramp 18-22; missing firsts are self-authored adult moves. |\n| Commercial transit | Alex does not fly commercial/queue/sit with strangers unless Ryan creates exception. |\n| Apple trap | Apple is godfamily/oldest-friend peer, not sister/romance/PA/handler. |\n| Living parent trap | Sarah not universal mother/apology machine. David not simple restored father/tragic corpse/emotional plot holder. |\n| Mama/Papa leakage | Only Alex uses Mama/Papa. Sarah/David are first names by default; Mum/Dad requires Ryan. |\n| Food infantilisation | Alex is not fragile or managed through food reminders. |\n| Romantic drift | Pattern is one/two nights, mutual, fun, exciting, kind, clean exit. No girlfriend/tragic longing by default. |\n\n## Pre-Scene Gate\n\nBefore writing, check: Alex active? Boundary = adult agency not reveal? First move chosen by Ryan or handed back? Knowledge walls intact? Walker/AW/Serena/al.x clean? Sarah/David living/sober/complicated without becoming identity?\n"},{"file":"15_IN_WORLD_ARTIFACTS.md","content":"# In-World Artifacts\n\nUse this for press, fan posts, chats, internal notes, and business/career artifacts.\n\n## Artifact Rule\n\nArtifacts must obey:\n\n- public/private knowledge walls\n- speaker/source access\n- no pre-chosen first professional move\n- no invented named contacts\n- no fake receipts for private facts\n\n## Press Voice\n\nPress can know Alex is already famous, titled, connected, and publicly mythologised.\n\nGood press angle:\n\n> Alex Wilson's image was never private. His adult voice still has not been chosen.\n\nBad press angle:\n\n> The world has just discovered his secret title.\n\n## Fan Voice\n\nFans can be thirsty, funny, excessive, wrong, and fast. They can reference public photos, old clips, party images, fashion-week sightings, and his rare incidental posts.\n\nFans cannot know Serena Management inbox details, al.x rights structure, private house interiors, or unreleased Electric Ivory material.\n\n## Internal Notes\n\nInternal notes should feel competent without inventing infrastructure.\n\nGood:\n\n- \"The Lede has optional response frameworks ready.\"\n- \"Music requests remain held.\"\n- \"No recommendation goes to Alex until Latham has filtered the category.\"\n- \"Rights requests route through Daniel and al.x.\"\n\nAvoid:\n\n- named agency/label/editor contacts not in v20\n- exact pitch counts unless Ryan supplies them\n- public statements not chosen by Alex\n- staff language that decides his first move for him\n\n## Serena Management Note Shape\n\nUse Serena notes for pressure, not decision.\n\nCorrect:\n\n> Recommendation: hold all first-move categories until Alex chooses which surface he wants to open.\n\nWrong:\n\n> Recommendation: proceed with the first cover and announce release strategy.\n\n## Social Post Shape\n\nAlex's own posts are rare and low-context. He does not explain himself in captions.\n\nDo not pre-create his first strategic post. Alex is free after 1 August; the scene waits for Ryan to play the choice.\n\n## Albury House Artifacts\n\nAt story open, public artifacts can reference the 7 August Architectural Digest cover story and YouTube Sophie Ashby full-house tour, including published Studio Ashby interiors and room-level visuals.\n\nThey cannot identify staff/security operations, private handover mechanics, hidden systems/safe mechanics, Serena/AW/al.x details, or unshown private object provenance unless Ryan reveals it.\n"},{"file":"16_PUBLIC_WORK_AND_MEDIA_ARCHIVE.md","content":"# Public Work And Media Archive\n\nUse this file for Alex's pre-story-open public image, light commercial history, media volume, photography economy, and the line between public extraction and private control.\n\n## Core Principle\n\nAlex's image has never been private. His agency has been.\n\nBy story open, the world has had two decades of Alex Wilson photographs, captions, edits, articles, outfit IDs, speculation, and public-work fragments. What it has not had is Alex choosing an adult career thesis in his own voice.\n\nThe education-first boundary expired on Friday 1 August 2025, after RAM graduation. Before then, work was allowed only when it fit school, RAM, age, family protection, and management control. After 1 August, the pressure is not that work becomes possible for the first time. The pressure is that education no longer shields Alex from deciding what kind of adult public figure, musician, fashion object, social presence, and commercial principal he wants to be.\n\n## Timeline\n\n| Period | Public / Work Reality |\n|---|---|\n| Infancy to 13 | Public image and mythology are constant: family photographs, paparazzi, society pages, event frames, royal-adjacent coverage, Rosie/Homer context, and tabloid/fan archive formation. No meaningful career work. |\n| 13 to 18 | Light, age-appropriate prestige work begins: group editorials, society/fashion features, charity or culture appearances, controlled brand imagery, and early piano appearances. Education and guardianship remain the ceiling. |\n| 18 to 22 | Adult-coded work ramps: stronger fashion/editorial work, serious brand partnerships, public piano credibility, broadcast performances, and controlled culture cameos. Still no solo cover, profile, interview, broadcast/long-form public conversation, strategic social-media voice, standalone music release, label deal, or adult career architecture. |\n| After 1 August 2025 | The education-first boundary is gone. Alex is free to choose. First solo cover, profile, interview, broadcast/long-form conversation, strategic social-media posture, adult-scale brand architecture, headline performance, music release, artist launch, or an unexpected format can all happen if Ryan plays or locks them. |\n\n## Photography Economy\n\nAlex is photographed at industrial scale even on quiet days. On loud days, the photo economy organises itself around his movement.\n\nCanon scale:\n\n- sustained paparazzi presence at Diana-tier and above, updated for the social-media era\n- every major UK and global agency has a dedicated Alex Wilson file going back to childhood\n- Goff, Backgrid, X17, Splash, Eroteme, and similar agencies treat him as a top single-name young-person asset\n- long-lens infrastructure exists around his movement specifically\n- pool photography at press-list events moves Alex frames within hours\n- the pool system covers events such as Royal Variety Performance, Proms, Wimbledon Royal Box, Ascot, Cartier Queen's Cup, Met steps, BAFTAs, fashion week front rows, charity galas, and major cultural arrivals\n- public exits, arrivals, boats, airports, restaurants, clubs, hotel entrances, street movement, beaches outside private zones, and event carpets are live photo surfaces\n\nPrivate homes, private interiors, private chats, Serena/AW material, protected recordings, Villa Serena grounds, Phoenix Hollow, and Albury House interiors do not leak by default.\n\n## Friends' Phones And Private Boundaries\n\nApple, Iris, Lila, Kaia, Rocco, and the wider social rooms have enormous combined reach. Their camera rolls contain Alex because they have known him for years.\n\nBut the inner-circle rule is not carelessness. Friends ask before posting from private spaces or private trips. A birthday, kitchen photo, ski-trip frame, villa dinner, or sofa shot may exist, but posting it is a social choice with Alex's consent.\n\nThe pressure comes from the perimeter and public surface: paparazzi, pool photographers, event footage, public arrivals, street movement, old public-facing school/RAM material, and tabloids buying peripheral old images or anecdotes. The privacy wall is socially respected inside the circle and economically attacked everywhere outside it.\n\n## Writing And Platform Volume\n\nAlex generates daily public writing without cooperating.\n\nCanon scale:\n\n- UK tabloids and entertainment desks run multiple Alex pieces per week, often per day during active periods\n- US entertainment, fashion, and celebrity desks keep parallel rolling coverage\n- European, Latin American, Middle Eastern, South Asian, and East/Southeast Asian outlets localise him through different frames: royal-adjacent, fashion, music, beauty, legacy-family, society, and youth-culture mythology\n- fashion and business-of-fashion outlets maintain rolling analysis of the image economy around him\n- broadsheets and international papers periodically attempt profiles from public material across UK, US, European, and Asian markets\n- music press periodically writes around the silence across classical, pop, indie, jazz-adjacent, and cultural-criticism registers\n- at least two unauthorised biographies are already in print by story open, with more on contract and translations in multiple languages\n- his Wikipedia page is among the most-edited living-person pages and its talk page is permanently argumentative\n- gossip newsletters, Substack, Deuxmoi-style accounts, Air Mail-style society writing, and dedicated Alex newsletters are constant\n- Reddit has multiple Alex communities, the largest in six figures, with wikis, sighting logs, and Brain Trust friendship analysis\n- TikTok and YouTube have lore explainers, fashion analysis, sighting timelines, and classical-piano analysis of public/broadcast material, with cumulative views in the billions\n- Tumblr, Pinterest, Instagram, and fan sites maintain photo databases organised by year, school year, outfit, event, hair length, and friend group\n- academic and music-criticism essays can discuss public performances, RAM programme material, and Electric Ivory as an unreleased object\n\nFans may analyse friendship constellations. They do not have chat access.\n\n## Social Media\n\nAlex has never posted on TikTok, YouTube, or X. He has posted a handful of times on Instagram — in practice a couple of behind-the-scenes images from work — nothing more. @alexwilson is secured on all platforms.\n\nDespite this, he has 95M+ followers on Instagram alone, and millions of followers on TikTok, YouTube, and X without posting a single piece of content. All of it is fan creation, reposting, tagging, clipping, and mythologising. He has not cooperated with any of it.\n\nNo sponsored posts, no ad reads, no active voice anywhere, no \"get ready with me,\" no explanatory captions, no strategic social-media persona.\n\nAny shift toward active social media after 1 August is a major adult choice.\n\n## Fashion And Editorial Archive\n\nAlex has a real pre-story-open fashion/editorial archive. He is never a blank debut.\n\nLocked foundation facts:\n\n- Alex attended his first Met Gala at age 10 in custom Versace, dressed personally by Donatella. He has attended every Met Gala since. This is not a casual or incidental relationship to fashion — it is foundational.\n- Light prestige fashion work began at 13. Adult-coded editorial and brand work ramped from 18 to 22.\n- He is a genuine style icon. That status is established, not emerging.\n\nLocked editorial examples:\n\n- Tatler: recurring inside features and society pages from 14 onward; ensemble shoots, Young Britain group portraits, and party coverage; never the cover\n- British Vogue: inside editorial spreads and Tim Walker portraits in themed issues such as cricketing Britain, country house, and music stories; never the cover, never the profile\n- Vogue Italia / L'Uomo Vogue: Meisel and Mert & Marcus inside editorial through Donatella and the Italian fashion layer; recurring ensemble work\n- Vanity Fair: group portraiture in Hollywood/legacy-issue mode, including Annie Leibovitz-style legacy peer frames\n- AnOther Man and Fantastic Man: art-directed inside editorial\n- W Magazine: Tim Walker or Steven Klein inside stories\n- i-D and Dazed: one Mitchell or Beirut-style shoot around 19-20\n- Tyler Mitchell: portrait-portfolio inclusion\n- Document Journal: quiet inside editorial\n- T: The New York Times Style Magazine: one inside feature shoot, no profile\n\nNo solo cover exists before story open.\n\n## Brand Partnerships\n\nAlex has done real brand partnerships before story open. The shape is: he is the picture; the brand writes the text.\n\nNo talent quote longer than a couple of PR-drafted lines. No conversational interview. No press tour.\n\nLocked examples:\n\n- Steinway & Sons: Young Artist programme from 17; image use, performance partnership, masterclass appearances, Hamburg-New York axis; brand statements ghost-written by Steinway press with no Alex conversational quote\n- Burberry: heritage campaigns around 18 and 21; British, age-appropriate, brand-side copy only\n- Versace: multiple family-friend campaign seasons through Donatella; Atelier, spring, men's tailoring; Alex shoots and Donatella gives the quotes\n- Loro Piana: quiet luxury image work from 20-21 onward; country and travel campaigns\n- Hermes: equestrian and polo-side image work, including possible Le Monde d'Hermes features\n- IWC Schaffhausen or Vacheron Constantin: heritage watch ambassador layer, image only\n- La Martina: polo gear campaigns\n- The Row: quiet inside imagery through the Olsen / Kaia / Apple connection\n- Anderson & Sheppard or Huntsman: tailoring features, sometimes paired with Homer or Edward\n- Apple Music Classical: a single thoughtful curated image partnership during RAM finalist year\n- Bosendorfer or Fazioli: possible European recital piano partner alongside Steinway\n\nThese partnerships do not equal a launched adult brand architecture. The first adult-scale brand structure after 1 August remains Ryan-controlled.\n\n## TV, Culture, And Broadcast Cameos\n\nAlex has been on camera before story open. That does not make him an actor, host, or interview subject.\n\nLocked examples:\n\n- Royal Variety Performance: piano breakout at 15 or 16; host introduces, he plays, he leaves\n- BBC Proms: Last Night family box appearances; one Late Night Prom solo feature; one chamber-music Cadogan Hall slot\n- BBC Children in Need / Comic Relief: recurring piano performances\n- King's College Cambridge Christmas Eve broadcast: guest pianist\n- BBC documentaries on Rosie or Homer: observational footage at home and Phoenix Hollow, no talking head\n- Cardiff Singer of the World: accompanist for a young singer in a serious round; programme bio is the only voice\n- Sky Arts: broadcast of one or two RAM-era recitals\n- Steinway-produced documentary short: recital preparation, image and music, brand narration, no piece-to-camera\n- BBC Young Musician: possible alumnus showcase appearance, performance only\n\nNo interview, broadcast interview, or long-form public conversation exists before story open.\n\n## Public Piano Performance Credibility\n\nAlex has public piano credibility before story open. He does not have a released recording career. He is not a classical pianist — his RAM degree is cross-genre, his playing spans classical, jazz language, contemporary, and his own compositional work, and his public performances reflect that breadth. Do not write him as a classical pianist or frame his music identity as purely classical.\n\nCredibility venues and contexts include Wigmore Hall, Royal Festival Hall, Royal Albert Hall, Cadogan Hall, St John's Smith Square, ROH Crush Room, Aldeburgh Festival / Snape Maltings, Verbier Festival Academy, RAM touring through Bridgewater Hall Manchester, Symphony Hall Birmingham, and Sage Gateshead, a family-related Carnegie Hall gala by 21, Salle Cortot or Theatre des Champs-Elysees in Paris, a Vienna / Berlin equivalent, and one BBC SO or RPO collaboration with broadcast.\n\nThese create serious music-world evidence. They do not create:\n\n- a standalone recording release\n- a Spotify artist profile\n- a label deal\n- an artist launch\n- a public Electric Ivory release\n\nBroadcast performances can be public. Electric Ivory remains unreleased and controlled.\n\n## Festivals\n\nAlex has gone to Glastonbury every year since 14, with friends, not as a family event. Same with other major festivals — field, social, music. He attends as a participant, not a performer or guest of a headliner. The pap and fan infrastructure follows him there; he does not organise his festival attendance around it.\n\nDo not write festival appearances as Rosie-adjacent or family-sanctioned culture moments. They are a normal part of his social life with peers.\n\n## Press Lines And Event Surfaces\n\nAlex walks carpets. He does not give carpet quotes.\n\nThe question \"did Alex stop?\" is answered no across years of footage.\n\nLive event surfaces include Met Gala, BAFTAs, BRIT Awards, Cannes, Venice, Wimbledon Royal Box, Royal Ascot, Cartier Queen's Cup, Cowdray Gold Cup, Glastonbury, Coachella, other major festivals, Vanity Fair Oscar Party, Serpentine Summer Party, Frieze openings, LACMA Art+Film Gala, Met Costume Institute side dinners, fashion week front rows, BFC Fashion Awards, Royal Variety Performance, and the Almanach / Hesse / continental aristocratic circuit where press access is closed but present.\n\nBefore story open, the public can see him, photograph him, caption him, and speculate about him. It still does not have a long-form quote from him.\n\n## Not Yet Chosen At Story Open\n\n- first solo cover\n- first profile\n- first interview, broadcast, or long-form public conversation\n- first strategic social-media posture\n- first adult-scale brand architecture\n- first headline professional performance not protected by education, charity, family context, or institutional context\n- first standalone music release or artist launch\n\nThese are absent facts at the Thursday 7 August 2025 opening, not limits on Alex. The Albury AD/Sophie Ashby feature is already public, but it is a design/home reveal rather than Alex's first adult voice/profile. After the boundary expires, Alex can choose any of them.\n\n## Alex's Media Filter: Enjoyment First\n\nAfter 1 August, Alex is free. The format of a first public conversation is not predetermined. A first access move can be serious, funny, British, American, European, Asian-market, fashion-led, music-led, digital, print, live, recorded, or hybrid if Ryan plays the reason.\n\nDo not filter opportunities by cultural prestige first. Alex's own first test is whether he thinks he would enjoy himself and sound like himself. He is not trying to become a solemn serious-prince-turned-pianist public figure. He is funny, social, flirtatious, stylish, musical, loose, and alive in a room.\n\nPlayable/down-the-line examples by Alex's own register:\n\n- Graham Norton\n- Jimmy Fallon\n- Chicken Shop Date\n- Hot Ones\n- Desert Island Discs\n- Vogue, if fashion-focused\n- Vanity Fair\n- Rolling Stone\n\nWrong by default:\n\n- Newsnight\n- solemn culture-show framing\n- Gramophone if it pins him as a serious classical-piano object\n- any format built around explaining Sarah/David for forty-five minutes\n- any format that turns him into Serious Prince Pianist\n\nSome formats are still sensitive because they can make Alex look like he is selling access, becoming the punchline, or letting a platform define him before he defines himself. They are not forbidden; they need scene logic and consequences.\n\nSensitive-by-default examples:\n\n- reality TV or competition-TV formats\n- tabloid exclusives, kiss-and-tells, home tours, engagement sales, or access sold as personal revelation\n- fast fashion, gambling, betting, crypto/NFTs, vaping, energy drinks, or other low-control brand categories\n- adult underwear or swim campaigns\n- mass fragrance/cosmetics face contracts if sold as a blank beauty commodity\n- daytime chat or broad entertainment chat if framed as easy access rather than chosen fun\n- late-night, comedy, viral food/music/car formats, or ensemble couches if Alex is positioned as the joke rather than the person in control\n- influencer-tier sponcon, ad reads, get-ready-with-me formats, or branded short-form content\n- selling the title or family name as a product mark: Prince Alex lines, Hesse-Kassel branded lines, and equivalents\n- political endorsements\n- music-video appearances as decorative talent outside the immediate family / Brain Trust orbit\n- any campaign that requires him to be the British posh boy punchline\n- charity ambassadorships chosen for PR optics rather than long-running family causes\n\nA Graham Norton appearance is playable. It should not be written off by default. The question is not whether it is prestigious enough. The question is whether Alex would enjoy it and whether the room lets him be funny, musical, flirty, relaxed, and himself.\n\nIf Ryan chooses a sensitive format, do not block it. Treat it as a deliberate public move and write the consequences at full scale.\n\nMagazine grooming editorials are ordinary-register. Being a mass-market fragrance or cosmetics face is a major adult choice, but still choosable.\n\nL'Uomo Vogue black-and-white art editorial is a different register from a commercial underwear/swim campaign.\n"},{"file":"17_TEST_SCENES.md","content":"# Test Scenes\n\nUse these prompts to test whether v20 works before expanding more canon.\n\n## Charles Street / AD Opening\n\n> Render Alex at 12 Charles Street on Thursday 7 August 2025 late morning, in his first post-graduation/post-boundary team meeting as the Architectural Digest cover story and YouTube Sophie Ashby full-house Albury tour drop publicly. Keep Alex funny and physical. Let the 5-6 August private house return/tours/dinner/Boys visit be immediate backstory, not the live scene.\n\nChecks:\n\n- opens at 12 Charles Street, not Albury\n- AD/Youtube reveal is live public noise, not still secret\n- 5-6 Aug Albury tours are immediate backstory, not the full first session\n- no solemn inherited-house monologue or Serious Prince Pianist meeting voice\n- Serena/AW team holds choices; Alex does not accidentally accept a first adult move\n\n## Career Inbox Held\n\n> Render a short Latham text thread surfacing that solo-cover, profile/interview, headline-performance, adult-brand-architecture, strategic-social, and Electric Ivory requests are all waiting. Alex does not choose any first move.\n\nChecks:\n\n- Latham filters, does not decide\n- no first move chosen\n- Alex stays quick and alive\n\n## Public Knowledge\n\n> Write three public headlines about the education-first boundary expiry: tabloid, fashion press, and serious music press. They should treat Alex's identity and pre-2025 public archive as already public.\n\nChecks:\n\n- no secret-prince reveal\n- adult agency is the angle\n- Electric Ivory remains unreleased\n\n## Albury House Wall\n\n> Render a friend chat discussing Alex being back at the Kensington house. They know it has been scaffolded for a year but do not know Studio Ashby or interior details.\n\nChecks:\n\n- speculation does not land accurately\n- no room details leak\n- chat feels socially alive\n\n## Walker / AW Distinction\n\n> Write a short internal explainer distinguishing Walker Holdings, AW Holdings, Serena Management, and al.x.\n\nChecks:\n\n- Walker is $27B family enterprise\n- AW is lean family office with 4% Walker stake\n- Serena is career management\n- al.x is rights layer\n\n## Parents Alive Fork\n\n> Write a short public-biographical explainer of David Wilson, Sarah Dawson Wilson, Rosie/Homer's guardianship, and Alex's current relationship to his living parents.\n\nChecks:\n\n- David and Sarah are alive, sober, divorced, civil but not friends\n- Sarah is Notting Hill / fashion-sustainability / sober since around 2019 / semi-regularly sees Alex / Stella-Kate-Naomi-Sadie-Sienna orbit\n- David is West Village / quiet / sober since around 2023 / reconnected with Alex / still close with Chris Martin and some old friends\n- Rosie and Homer remain Mama/Papa and the household parents\n- Alex calls Sarah and David by their names by default, not Mum/Dad\n\n## Parent Address\n\nPrompt:\n\n> Sarah texts Alex about seeing him next week. David leaves a voicemail. Render Alex referring to each of them in a private conversation with Apple. Do not create a dramatic emotional breakthrough.\n\nPass if:\n\n- Alex calls them Sarah and David by default\n- public/biographical mother/father remains factually available\n- Mum/Dad is not used unless Ryan explicitly chooses that beat\n- Rosie/Homer remain Mama/Papa\n- Alex is gracious in public; recovery family does not become his identity\n\n## Title Fork\n\n> Write Alex's title usage for British court protocol, non-royal society events, press shorthand, and David's courtesy title.\n\nChecks:\n\n- Alex is The Hon. Alexander Wilson, MVO in British court/royal-patronage protocol\n- David holds Viscount Wilson\n- non-royal society can use Prince Alexander\n- press can use Prince Alex\n\n## Meeting Voice\n\n> Render Alex in a short meeting with James Latham and Catherine Aldridge about held career inbound. Keep the information clear, but make the scene funny, physical, personable, and specific. No first move is chosen.\n\nChecks:\n\n- no static briefing voice\n- no buzzword list or deck language\n- Latham sounds former FCDO / Rothschild private office: dry, precise, human\n- Catherine is calm and efficient without becoming a corporate narrator\n- Alex stays funny, quick, and socially alive\n- no first professional move chosen\n\n## Phone Surface\n\n> Alex checks his phone after stepping inside Albury House. Show the competing surfaces without opening a specific chat.\n\nChecks:\n\n- phone surface first\n- `phone-renderer` is invoked as an external Claude skill\n- no automatic plot advancement\n- no first professional choice\n\n## Phone Renderer Unavailable\n\n> Ryan asks to show Alex opening Brain Trust, but the external Claude skill `phone-renderer` is unavailable.\n\nChecks:\n\n- stops and tells Ryan `phone-renderer` is unavailable\n- does not render chat, texts, DMs, notifications, or social surfaces in prose\n- does not summarize the unseen chat as a workaround\n\n## Wider-Room Knowledge Wall\n\n> Render Legacy or London Lot reacting to Alex being back at the Kensington house. They know the public house/scaffolding facts and social context, but they have not been shown the interior and do not know Serena Management inbox details.\n\nChecks:\n\n- room membership/register stays distinct from Brain Trust\n- no staff/security/hidden-systems/private-handover detail leaks\n- no Serena/al.x/held-inbox details leak into the friend room\n- chat has side motion and does not become Alex Q&A\n\n## Brain Trust After Dinner\n\n> Render Brain Trust reacting after touring Albury House and leaving dinner on 5 August. They may know room details Alex showed them. By the 7 August opening, Studio Ashby and published interiors are public through AD/Youtube, but Serena Management inbox details, al.x mechanics, hidden house systems, and staff/security operations remain private.\n\nChecks:\n\n- Brain Trust remains Apple, Iris, Lila, Kaia, Rocco, and Alex only\n- firsthand room jokes are allowed if they came from the tour\n- no Serena/al.x/held-inbox details leak into the friend room\n- no hidden systems/staff operations leak into the friend room\n\n## Secret-Prince Trap\n\n> Write a dramatic scene where the press suddenly discovers Alex is secretly a prince, Rosie's grandson, and William's godson for the first time.\n\nChecks:\n\n- rejects the premise as incompatible with v20 public knowledge\n- reframes pressure as post-education adult agency, not identity revelation\n- does not generate a discovery plot\n"},{"file":"18_FAMILY_BIOGRAPHY_DETAIL.md","content":"# Family Biography Detail\n\nCompact active family-biography sheet.\n\n## Residential Timeline\n\n| Period | Age | Place | Facts |\n|---|---|---|---|\n| June 2003 – Sept 2014 | 0–11 | Phoenix Hollow, Kentucky | Born at a hospital in Lexington and brought home to Phoenix Hollow; raised by Rosie and Homer as their son; regular Ouse and Caroline/Notting Hill Dawson time. |\n| Sept 2014 – 2019 | 11–16 | Albury House, Kensington | Homer and Rosie moved with Alex to London so he could attend Westminster School as a day boy rather than boarding. |\n| 2019 | 16 | Albury House (Alex and staff only) | Homer and Rosie returned to Phoenix Hollow. Alex remained at Albury House, running the household with permanent staff. Not boarding; not sent away; the house simply became his in practice. |\n| 2021 | 18 | Albury House + Villa Serena transferred | Homer and Rosie transferred Albury House and Villa Serena to Alex outright. Both properties registered through AW Assets on legal advice. |\n| Aug 2024 – July 2025 | 21 | Marylebone flat (stopgap) | Alex vacated Albury House during the year-long refurbishment commissioned through Studio Ashby; used a serviced Marylebone flat with no household staff. |\n| 5 Aug 2025 | 22 | Albury House (post-refurb) | Alex returns to Albury House and sees the finished refurbishment privately for the first time. |\n| 7 Aug 2025 | 22 | 12 Charles Street / Albury public reveal | Story opens at Alex's first post-boundary team meeting while AD/Youtube publicly reveal the Studio Ashby Albury House refurbishment. |\n\n## Hard Facts\n\n- Alex born 22 June 2003 at a hospital in Lexington and brought home to Phoenix Hollow.\n- Sarah and David were alive but unfit during Alex's childhood.\n- Rosie/Homer became practical parents during Alex's first year; formal guardianship followed.\n- Richard/Elena Dawson supported; Alex had regular Ouse and Caroline Notting Hill time.\n- Sarah sober since 2019, when Alex was 16; semi-regular in his adult life.\n- David sober since 2023, when Alex was 19-20; Chris Martin pulled him back; Alex has reconnected with him.\n- Household language: Mama/Papa/son. Address language: Sarah/David by default, not Mum/Dad.\n- Public biography: biological grandson, legal ward, raised as son in practice.\n\n## David Wilson\n\n| Field | Canon |\n|---|---|\n| Identity | David Homer Wilson, Viscount Wilson; born 1977; Rosie/Homer only son. |\n| Education/work | Westminster boarder 1988-1995; University of Westminster journalism 1995-1998; trust-fund-byline Tatler / British GQ / Vanity Fair orbit; rarely filing. |\n| Social past | Late-1990s London creative-class / music / McQueen circle; Chris Martin and old friends; Alexander McQueen part of old circle. |\n| Sarah | Married Sarah 2001; divorced late 2000s / early 2010s. |\n| Addiction | Substance-involved and unfit through Alex's childhood; McQueen's February 2010 suicide broke last functionality. |\n| Sobriety | 2023. In a drug-fuelled haze he walked past Alex on a New York billboard — a campaign, Burberry or Versace, Alex's face forty feet tall, the bone structure unmistakeable. He messaged Chris Martin one word: \"Help.\" Chris came. |\n| Present | Sober since 2023; West Village; quieter, no active public figure; still has real old friendships (Chris Martin, old London circle). |\n| Alex | Got back into Alex's life when Alex turned 21 in June 2024, during his final RAM year. Spoken a couple of times. Spent a few days at Phoenix Hollow over Christmas 2024. Not close but not adversarial — still being worked out carefully, without melodrama on either side. |\n\n### Walker Allocation\n\nDavid received 4% non-voting Class B Walker Holdings at 21. Walker then about $2.5B; entry value about $100M. Locked, non-voting, professionally trusteed, structurally illiquid by Eleanor's design. David burned through unstructured cash distributions during addiction years, not the locked 4%.\n\nAt story open David still personally holds that 4%, now about $1.08B with Walker at $27B. He receives distributions when declared; cannot sell/direct/control.\n\nAlex received his own 4% non-voting Class B through AW Holdings / AW Investments at 21 in June 2024, mirroring David's protected structure. Alex's stake also about $1.08B, locked/illiquid. Full structure: `25_AW_HOLDINGS_FULL.md`.\n\n## Sarah Dawson Wilson\n\n| Field | Canon |\n|---|---|\n| Identity | Lady Sarah Dawson Wilson; born 1977; Richard/Elena eldest; Alex's biological mother. |\n| Background | Solid Dawson trust fund; grew up at Ouse / Fletching; left for London at 18 (1995); Central Saint Martins textiles/fashion, graduating 1998/99. |\n| Career | One of the most sought-after stylists of her generation. Brilliant eye for colour and pattern — editorial, fashion week, major photographers. As well-known in that world as Kate Moss or Stella. Real credits: British Vogue, Vogue Italia, i-D, Dazed, the full supermodel/McQueen/Testino circuit. Career always real; patchwork because the trust fund meant there was never a financial floor to hit. |\n| Social world | Stella McCartney (closest friend, met at CSM); Kate Moss, Naomi Campbell, Sadie Frost, Sienna Miller; Gwyneth Paltrow, Trudie Styler, Tracey Emin, Courtney Love, Amber Valletta, Mario Testino, Guy Ritchie, Madonna (via Rosie layer). Still in most of this world at story open. |\n| David | Met in the London creative world; married young in Las Vegas, 2001 — massive tabloid story given Rosie. David's Walker trust fund dwarfed her own. Neither had financial pressure to hold things together. |\n| Pregnancy | Sober and drug-free for the full pregnancy. Lived at Phoenix Hollow for nine months, cared for by Rosie, Homer, and staff. |\n| After Alex | Pregnancy sobriety didn't hold; David pulled her back. Never really present in Alex's life from birth. Career intermittent — brilliant when functional, absent when not. |\n| Divorce | 2008; David went completely off the rails, cheated; high-profile tabloid divorce. Alex was five. Coverage was about David's behaviour but Sarah's state was not invisible. |\n| 2008–2019 | In and out of sobriety; career fragmented. Started being in and out of Alex's life from 2014 when he moved to London — proximity made occasional contact possible for the first time. |\n| Sobriety | 2019: health scare (not life-threatening; specifics remain private) and Stella's intervention. Properly sober since. Having access to Alex has helped maintain it; it did not cause it. |\n| Present | Notting Hill near Caroline. Sustainability venture with Stella — identity and purpose rather than income; connects to her textiles background and eye for materials and colour. Still tabloid-adjacent through her friend group. |\n| Alex | Comes to recitals. Offers styling advice. Occasional messages. Odd dinner, usually with one or more of her friend group or Alex's present. Warm but not close. Not trying to be the mother who raised him. |\n| Lineage | Sole maternal-line carrier of Alex's Greek/Glucksburg, Teck-Windsor cadet, Bourbon-Two Sicilies descent. |\n\n## Dawson / Royal / Hesse Lines\n\n| Line | Path / use |\n|---|---|\n| Dawson family | Warm, restrained, old-family, present. Richard, Elena, Henry, Caroline, Jonathan, Arabella, George, Lucas. Alex not in Fletching title succession; Henry -> Jonathan. |\n| Greek / Glucksburg | Princess Elena of Greece and Denmark -> Sarah -> Alex; royal cousinage/access. |\n| Bourbon-Two Sicilies | Princess Carlotta -> Richard -> Sarah -> Alex; Dawson/Fletching Continental descent. |\n| Teck-Windsor cadet | Dawson/Fletching marriage line before Richard -> Sarah -> Alex; Windsor-adjacent context. |\n| Hesse | Prince Leopold / Leonard Wilson -> Homer -> David -> Alex; source of Hessian princely style. |\n\nHomer: born 1944; son of Prince Leopold/Leonard; created 1st Earl of Albury June 1977 with subsidiary Viscount Wilson; title from Albury House; not knighted framing. David holds Viscount Wilson; Alex uses The Hon. Alexander Wilson, MVO in UK court/state/royal-patronage; Prince Alexander at non-royal society events; press Prince Alex.\n\n## Godparents\n\n| Godparent | Pick / function |\n|---|---|\n| Stella McCartney | Sarah pick; Sarah-side godmother, fashion/archive authority, London memory. |\n| Chris Martin | David pick; Uncle Chris, David/music link, Apple connection. |\n| Donatella Versace | Rosie-linked; protective Italian aunt, aesthetic authority, calls Alex Alessandro. |\n| Prince William | Homer/Rosie-linked; godfather, royal/cousin-adjacent guidance, Diana/Rosie/Homer/Charles bridge. |\n\nElton is Phoenix Hollow uncle, not godparent. Apple is godfamily/oldest-friend peer, not sister/romance/PA/handler.\n\n## Do Not\n\nDo not write Sarah as the mother who raised Alex; David as simple restored father; Sarah/David same temperature; Mum/Dad in Alex's mouth without Ryan; public resentment; Hesse title through Rosie; Homer as knighted-form; Dawsons cold/estranged; Fletching succession as no Dawson belonging.\n"},{"file":"19_OPERATIONS_STAFF_DETAIL.md","content":"# Operations And Staff Detail\n\nUse this file for AW Holdings, Serena Management, al.x, press routing, legal routing, property support, security, and operational scenes.\n\n## Core Principle\n\nOperations support Alex. They do not replace his agency.\n\nNo adult-defining public move, career move, solo cover, profile, interview, broadcast, long-form public conversation, headline performance, release, adult-scale brand architecture, or strategic post happens without Alex's decision.\n\nOperational scenes should still feel like Alex scenes. Do not write staff, career, AW, Walker, or protocol meetings as static briefings, buzzword lists, or paragraph handovers. Alex stays funny, quick, personable, and specific in senior rooms. Latham, Catherine, Eleanor, Edward, Daniel, Nadia, Sophie, Kevin, and Ottilie are people with rhythm, not briefing software.\n\n## AW Holdings\n\nAW Holdings is Alex's lean family office.\n\n- established 22 June 2003\n- owned solely by Alex\n- chaired by Eleanor Vance\n- managed day-to-day by Catherine Aldridge\n- HQ: 12 Charles Street, Mayfair, London W1J\n- holds Alex's locked 4% non-voting Walker Holdings Class B stake\n- owns/coordinates properties, collections, Serena Management, and al.x\n\nAW Holdings is deliberately small on the page. It should not become a venture-building or acquisition plot engine.\n\n## Staff Routing\n\n| Person | Role | Route |\n|---|---|---|\n| Eleanor Vance | Walker Holdings CEO; AW Holdings board chair | trust-critical judgment, institutional memory, Walker/AW interlock |\n| Catherine Aldridge | MD, AW Holdings | family-office governance, assets, staff, execution |\n| James Latham | Head of Serena Management | career/commercial/media/industry intake |\n| Priya Chandra | Serena Management coordinator | relationship log, outreach calendar, coordination |\n| Oliver Wren | Serena Management analyst | research, market intelligence, briefing notes |\n| Daniel Sorensen | General Counsel | contracts, privacy, rights, legal architecture |\n| Beatrice Vale | Finance Controller | payments, accounts, reporting, tax coordination |\n| Imogen Park | Mayfair Office Manager | office operations, document handling, meeting logistics |\n| Nadia Hassani | EA | strategic operational bridge and access coordination |\n| Sophie Kalu | PA | travel, calendar, restaurants, wardrobe movement, daily logistics |\n| Kevin Marsh | CPO | security, movement risk, Greystone liaison |\n| Judith Ansley | Head of AW Assets | properties, collections, insurance/registers |\n| Miriam Santos | Property Coordinator | Albury House, Villa Serena, Appartement Varenne, Casa Borgonuovo, 12 Charles Street vendors/readiness and tenant coordination |\n| Rafael Costa | Collections Registrar | art/books/fashion/vinyl/object records and shipping |\n| Mina Arendt | al.x Rights and Marks Manager | usage log, permissions register, name/image/likeness admin |\n| Ottilie Marchant | Albury House Manager | house readiness, household staff, guest-facing operations |\n\nSophie is not press intake. Press/career goes through Latham/Serena Management and The Lede. Legal goes through Daniel. Security goes through Kevin. Household operation at Albury House goes through Ottilie.\n\nDo not invent named operators at agencies, PR firms, labels, galleries, fashion houses, or external legal offices unless v20 names them.\n\n## Serena Management\n\nSerena Management is the career/management company inside AW Holdings.\n\nIt exists because the education-first boundary held back adult career architecture until 1 August 2025.\n\nRules:\n\n- all career/commercial/media inbound routes through Latham first\n- Alex sees only what Latham has reviewed and positioned\n- Latham can recommend; he cannot decide Alex's first move\n- The Lede Company is readiness infrastructure, not an automatic public-action machine\n- WME representation is signed and ready, but dormant until Alex chooses to engage\n- Askonas Holt is the serious music lane, held until Alex chooses\n\n## al.x\n\nal.x is the rights layer. It is not the management office.\n\nIt holds:\n\n- Alex's name rights\n- image rights\n- likeness rights\n- personal marks\n- Electric Ivory recording/performance rights administration\n- publishing/mechanical/arrangement-rights administration where applicable\n\nal.x is not a launched consumer brand at story open.\n\n## External Network\n\nLocked or safe-to-name:\n\n- WME\n- Askonas Holt\n- The Lede Company\n- Karla Otto / fashion PR lane if relevant\n- Grubman Shire / entertainment-law lane if relevant\n- Greystone for security support\n- Collins Brand as external strategy support\n- Knight Frank Private Office for property / house support\n\nDo not invent named operators at these firms unless v20 names them.\n\n## Story-Open Operations\n\nAt Thursday 7 August 2025:\n\n- Alex is at 12 Charles Street for his first post-graduation/post-boundary team meeting.\n- Latham, Catherine, Daniel, Nadia, Mina, and Oliver are the default Serena/AW meeting layer.\n- Kevin is physically with Alex as security/background.\n- Sophie Kalu is logistics/background only if Ryan places her.\n- Sophie Ashby / Judith / Knight Frank were 5 August house-return backstory, not default meeting participants.\n- Eleanor is strategic, likely Walker/LA layer unless explicitly placed.\n- No professional public move has happened.\n\n## Internal Notes\n\nInternal notes should be category-level unless canon supplies exact names.\n\nGood:\n\n- \"WME has confirmed readiness.\"\n- \"The Lede has prepared optional response frameworks.\"\n- \"Several editor-level approaches are logged.\"\n- \"Legal can prepare a privacy note if needed.\"\n- \"Electric Ivory requests remain held.\"\n\nAvoid:\n\n- invented named agency/PR contacts\n- invented exact pitch counts\n- invented acquisition memos\n- formal \"offices\" that v20 has not named\n- routing press/legal to Sophie\n- making staff choose Alex's public move\n\n## Security\n\nKevin is what Alex sees.\n\nGreystone is the larger Walker Holdings security infrastructure: perimeter, threat monitoring, advance work, drivers, surge support, local security coordination. It should remain quiet and competent unless the scene is about security.\n"},{"file":"20_SOCIAL_CHAT_DETAIL.md","content":"# Social Chat Detail\n\nUse this for phone surfaces, group chats, and chat membership texture.\n\n## Phone Rule\n\n`phone-renderer` is an external Claude skill, not a Markdown file in this folder.\n\nIf Ryan says a character checks their phone, receives a text, looks at social media, reads DMs, sees notifications, or opens messages, invoke `phone-renderer` before showing the surface. If the skill is unavailable, stop and tell Ryan instead of rendering phone/chat content in prose.\n\nPhone-renderer output is pure UI simulation. End the response after the phone render; do not wrap it in narration.\n\n## Opening Phone Weather\n\nAt 7 August story open, Alex's phone may contain:\n\n- Serena Management held-inbox previews from Latham\n- friends reacting to the AD/Youtube Albury reveal and the 5-6 August private visits\n- tags / fan-account storms\n- pap alerts and location chatter\n- family/godfamily check-ins\n- quiet logistics from Sophie/Nadia/Kevin\n\nDo not make a phone check choose a first career move.\n\nAlex's daily-use group chats are Brain Trust, Legacy, and Boys. Use these as the default active social rooms on an ordinary phone check.\n\nOther rooms are seasonal, event-led, or drop-in: Phoenix Hollow, Summer House, London Lot, The Almanach, Hesse House, Dawson Family, Westminster Leavers, Polo, and Serena/AW operational.\n\n## Social Gravity Rule\n\nVery few rooms are Alex-focused. Alex is famous, loved, high-status, and often gravitational, but group chats are still reciprocal social ecosystems. Friends have their own work, gossip, jokes, flirtations, travel, family drama, status, and crises. Do not make Brain Trust, Boys, London Lot, Legacy, or Summer House read as Alex's court, fan club, handler set, or support cast.\n\n## Core Rooms\n\n### Phoenix Hollow\n\nLarge elder/godfamily/family cultural room. 150-300+. It is not centred on Alex but he is deeply known there.\n\n### Brain Trust\n\nMutual closest-friend room that includes Alex, Apple Martin, Iris Law, Lila Moss, Kaia Gerber, and Rocco Ritchie. From Alex's point of view these are his closest friends; from the room's point of view, everyone matters. Do not add people unless Ryan explicitly changes the canon.\n\nThey are legacy people around Alex's age, give or take a year or two. Their parents all know either Rosie or Sarah/David, and the group has been in each other's lives closely since birth or very early childhood.\n\nUse for intimate friend reality: teasing, checking in, fashion/public-childhood shorthand, house reactions if invited, and emotionally accurate bullshit-calling. They are not handlers, staff, strategists, siblings, automatic romance, or an Alex-response unit.\n\n### Legacy\n\nChildren/grandchildren of famous people. Huge, multilingual, image-aware, often filthy and funny.\n\n### Summer House\n\nGlobal young jet-set room. Hundreds. Mobile, horny, fast, half in airports/boats/fittings/beds.\n\n### London Lot\n\nLarge pre-existing London young-society / culture room Alex was invited into. It exists outside him, like Phoenix Hollow and Legacy do.\n\nUse for big London cultural traffic: dinners, private views, fashion events, parties, last-minute plans, who is in town, house curiosity, jokes, flirtation, and social weather.\n\nIt can include some of the biggest names in young London society, music, film, fashion, art, legacy families, and nightlife. Stormzy, Florence Pugh, and Cara Delevingne are calibration anchors for the scale of the room, not mandatory speakers in every scene.\n\nCore likely house-invite names: Brain Trust members — Apple Martin, Iris Law, Lila Moss, Kaia Gerber, and Rocco Ritchie.\n\n### Boys\n\nClosed membership: Jonathan Dawson, Lucas Ashby, Freddie Ashworth, Hugo Manners, Rocco Ritchie, and Alex. Westminster school era and close-orbit male peers. Mutual peer chat rather than an Alex-focused channel. Brutal affection, school shorthand, little operational knowledge. No Serena/AW/Walker access.\n\nJonathan Dawson is Alex's maternal cousin and Fletching heir after Henry. Lucas Ashby is Alex's same-birth-year maternal cousin (Caroline's son). Freddie Ashworth and Hugo Manners are Westminster-era close orbit. Rocco Ritchie crosses over from Brain Trust; Boys is the male-specific room for school shorthand and brutal affection without the Brain Trust legacy-kid framing.\n\n### The Almanach\n\nProtocol jokes, cousinage, aristocratic dry register. Use real names only; do not invent Almanach members.\n\nSeed anchors: Olympia of Greece; Princess Maria Carolina of Bourbon-Two Sicilies (MC); Princess Elisabeth of Belgium; Prince Christian of Denmark; Princess Alexandra of Hanover; Countess Olympia of Arco-Zinneberg. 40-80 members total; many lurkers; multilingual; dry wit across French, German, Italian, English. Render sparse named visible engagement — most Almanach traffic is background protocol noise and cousinage in-jokes.\n\n### Polo\n\nCountry-sport chat for Guards, Cowdray, Cirencester, ponies, fixtures, and party logistics. Alex has a 3-goal handicap, plays position 3 as a playmaker, and has played semi-regularly since age 15 at Westminster.\n\n### Serena / AW Operational\n\nStaff operations only. Alex does not participate casually. This room never sees personal chats.\n\n## Chat Rules\n\n- Each chat has its own register.\n- Do not recycle jokes.\n- Do not use placeholder visible speakers.\n- Large rooms need sparse visible engagement.\n- A chat can know public facts about Alex's titles/family/fame.\n- A chat cannot know Serena inbox details, al.x rights structure, staff/security operations, hidden Albury systems, or private handover mechanics. After the 7 August AD/Youtube drop, chats can know published Albury interiors and Studio Ashby as public facts.\n\nEnd chats on motion, not closure.\n"},{"file":"21_PLACES_DETAIL.md","content":"# Places Detail\n\nUse this file to keep location, residence, privacy, and movement logic clean.\n\n## Alex's Residential Timeline\n\n- 2003-2014: Phoenix Hollow, Kentucky, primary childhood home.\n- September 2014: Alex moves to London at age 11 for Westminster Under School.\n- 2014 onward: Alex's Kensington/London years begin. Rosie/Homer relocate to Kensington as primary residence to be physically present for Alex's early London schooling.\n- 2019 onward: Rosie/Homer return primarily to Phoenix Hollow when Alex is 16. Alex remains London-based at Albury House through Westminster Sixth Form and RAM, with staff support.\n- 2021-2025: Royal Academy of Music, London.\n- story-open: 12 Charles Street, Mayfair, Thursday 7 August 2025.\n\nDo not treat Alex as having an adult Kentucky/Nashville daily circuit. Phoenix Hollow is home, holiday, family, studio, and emotional anchor, not an adult gigging geography.\n\n## Phoenix Hollow\n\nLocation: Woodford County, Kentucky.\n\nFunction:\n\n- home\n- Rosie/Homer permanent base\n- studio compound\n- Solstice / birthday memory\n- private family/cultural anchor\n- protective infrastructure\n\nNot:\n\n- rural poverty\n- country kitsch\n- Nashville circuit\n- Southern Gothic\n- default adult peer world after age 11\n\n## Kensington\n\nFamily name: Albury House.\n\nLocation: Upper Phillimore Gardens, Kensington.\n\nAlbury House predates Homer's earldom. Homer chose Earl of Albury from the house name in 1977; the title is not named for a village in the story logic.\n\nFunction:\n\n- London base\n- Homer's house remade into Alex's adult house\n- Bechstein music room\n- hybrid studio/control/listening room\n- wardrobe/archive rooms\n- walled garden\n- engineered silence\n\nAt story open the refurbishment is complete, and Alex saw it for the first time earlier that day. The reveal/tour/handover are immediate backstory. Do not replay the full tour unless Ryan asks for it.\n\n## Villa Serena\n\nLocation: Porto Cervo, Costa Smeralda, Sardinia.\n\nFunction:\n\n- July 2025 pre-opening location\n- privacy before phone-on\n- Summer House / celebrity / fashion / actor / music peer overlap\n- cove, heat, water, late-night residue\n\nEstate:\n\n- main villa\n- four guest villas\n- staff villa\n- private cove\n- upgraded pier/tender landing\n- cove pavilion\n- padel court\n- gym/wellness setup\n- kitchen terrace\n\nPrivacy:\n\n- no paps inside\n- no paps at cove\n- Porto Cervo town changes the public/pap dynamic\n\n## Movement Logic\n\nDo not casually move people across continents.\n\nAt default story open:\n\n- Alex: 12 Charles Street, first post-graduation/post-boundary team meeting\n- Kevin: with Alex as security/background\n- Latham / Catherine / Daniel / Nadia / Mina / Oliver: default Serena/AW meeting layer\n- Sophie Kalu: logistics/background only if Ryan places her\n- Sophie Ashby / Judith / Knight Frank: 5 August house-return backstory, not present by default\n- Brain Trust / Boys: not present unless invited\n- Rosie/Homer: Phoenix Hollow\n- Maria: Phoenix Hollow\n- Latham/Catherine/Daniel/Nadia: London unless moved\n- Eleanor: strategic Walker/AW layer, not morning handler\n- Dawson elders: Ouse/London family locations unless moved\n\n## Pap Logic\n\nPaparazzi are weather in public/exterior spaces around Alex. They are not inside private secured estates unless canon makes that possible.\n\nKensington exterior, London venues, airports, Porto Cervo town, festivals, Royal Ascot, Glastonbury: public visibility possible.\n\nVilla Serena estate/cove and Phoenix Hollow inside gate: private.\n"},{"file":"22_MUSIC_ROSIE_HOMER_DETAIL.md","content":"# Music, Rosie, And Homer Detail\n\nUse this file when scenes need music texture, Rosie's scale, Homer's production identity, the Wilson family partnership, or Alex's musical path.\n\n## Alex's Instruments\n\nAlex plays:\n\n- piano, principal instrument\n- guitar\n- violin\n\nDo not give him banjo, mandolin, harmonica, Bluebird/Opry sit-ins, or adult Nashville performance history unless Ryan explicitly creates it.\n\n## Alex's Music Path\n\n- Royal Academy of Music, BMus Performance: Piano Principal, Cross-Genre Performance & Creative Practice, 2021-2025\n- piano principal study, but not a classical-only degree\n- cross-genre: classical repertoire, jazz language, contemporary repertoire, arrangement, improvisation, studio/listening practice, composition-adjacent work\n- senior recital: Electric Ivory, 18 June 2025\n- public piano performances and broadcast appearances exist before story open, but they sit inside education, charity, family, RAM, and prestige-cultural contexts rather than a launched adult artist career\n- Alex paid for the recital to be filmed with four high-end cinema-quality cameras and recorded to release-quality audio; Alex owns/controls the recorded, visual/film, performance, and Alex-created publishing rights through al.x Music / AW Holdings, with Serena Management administering any release conversation\n- no public recording released\n- no Spotify artist profile\n- no label deal\n- no public music release\n- no standalone recording release or artist launch\n\nAlex's music is his. Do not reflexively attribute his choices to Rosie/Homer. He was raised in the room with both of them; he has his own ear, his own taste, and his own register.\n\n## Rosie — Who She Is\n\nRosie is the once-in-a-century talent. The Mozart comparison is not flattery: voice, songwriting, beauty, performance, all at the highest tier in one person. That combination does not usually live in a single body. People who have heard her sing at full power describe it as a physical event. Civilians cry. Other singers stop singing when she enters their range.\n\nActive touring fame 1965-1980. By the time she made the soft stop, she had already redefined three or four genres and was one of the most photographed women alive. She stopped touring and stopped doing interviews/promo/day-to-day media in 1980 to give David, then around three or four, a chance at a life with parents in the room. She did not retire from music, public life, recording, writing, performing at her own events, or working. She stopped the parts that took her away from her family and away from her work.\n\nWhat that looks like in practice from 1980 to now:\n\n- recording when she chooses (no album 1980-1995; the 1995 comeback record reset her contemporary relevance; she has continued recording since)\n- Met Gala every year\n- Oscars, BRITs, Grammys — life fellow at the Recording Academy\n- regular mega-scale parties at Phoenix Hollow that function as the most exclusive room in music; she still performs at her own events\n- selective other appearances — coronations, jubilees, friends' weddings, friends' funerals\n- no social media, no touring, no day-to-day press, no interviews\n\nCoverage figure: 155M+ monthly Spotify listeners, 56 Grammys, 10 Album of the Year wins. She is current. Other artists rotate above and below her in the chart on any given week; she is the permanent feature.\n\nShe is Kentucky-born, married into a peerage in 1977, became Countess of Albury at the same moment Homer became Earl. She does not perform the title and does not perform the Kentucky either. Both are real. She moves through fashion week, the Met, royal events, and her own kitchen with the same person showing up every time.\n\nThe room organises around her without her doing anything. She is uninterested in performing charm and uninterested in being impressed. She decides who gets the kitchen and who gets the formal sitting room. To Alex specifically she is Mama; to everyone else she is Rosie or Lady Albury depending on the room. The maternal register is for him.\n\n## Homer — Who He Is\n\nHomer is the ear of his generation. The first person to tell Rosie she was wrong about something musical and be right. That moment, at Abbey Road in 1968 or 1969, is the love story.\n\nHe is half-Hessian by blood. His father was HRH Prince Leopold of Hesse and by Rhine, who lived as Leonard Wilson. Homer is the second generation of the Wilson family choosing the working surname over the royal style. His Britishness is real but his upbringing was royal-adjacent, public-school British gentry rather than working-class — the \"old-world politeness\" the spine file mentions is literal, not vibe. He went to Westminster as a boy. The Kensington house was in the family before he was old enough to inherit it.\n\nHe chose engineering. Abbey Road in the mid-1960s. Worked on Beatles sessions in the late 60s. Met Rosie there. Married her in 1971. Made 1st Earl of Albury directly in June 1977 for the Silver Jubilee album work, services to music, and other royal-family work — not a knighthood first, not an elevation. The earldom recognised a man who was already inside the circle by blood and by labour. Albury is named for Albury House, the family Kensington base, not a territorial village. Subsidiary title Viscount Wilson, which David holds now.\n\nIn 1980 Homer and Rosie moved to the 500-acre Phoenix Hollow site. Homer built the studio. He has worked from there since. The discography running through that studio is essentially the contemporary canon — Rosie's records, Elton, McCartney, Stevie, Chris Martin, Brandi Carlile, Beyoncé sessions, Gilmour, plus producing and engineering work for whoever earns the room. He still works.\n\nHomer is direct in the studio. \"That's shit.\" \"That's brilliant.\" Will not soften a verdict. Owns specific microphones he has had for forty years. Has a personal lexicon for what is wrong with a mix. Old British engineer-funny: deadpan, dry, often filthy. Pre-existed Rosie in the studio world; she is the bigger cultural force, but she defers to him on engineering and on production architecture, and they both know why.\n\nQuiet not because he is wise but because he is listening. Looks like he is not paying attention. Can repeat back what was said an hour ago. He is bored by London now and is primarily at Phoenix Hollow except when work or family brings him elsewhere.\n\n## Rosie And Homer Together\n\n54 years of marriage by 2025. Met at Abbey Road late 60s. Married 1971. Built Phoenix Hollow together starting 1980. Lost David to addiction for most of Alex's childhood and have him back only partially. Raised Alex.\n\nAfter that long together they communicate in looks and minimal words. Running arguments about specific producers, specific musicians, specific events from forty years ago. Private vocabulary — songs referenced by single words. Take the piss out of each other constantly: he mocks her Kentucky pronunciation, she mocks his Britishness, neither stops. Physically affectionate in passing — hand on shoulder, brief kiss, knee touch — without making a thing of it. Disagree often. Don't fight much.\n\nWorking partnership in music: she sings and writes, he produces and engineers. He is the one she trusts with her vocals; she is the one whose ear he respects above his own on the song. The records they made together are the records.\n\nThey share a bed, a kitchen, a studio, a grief, and a grandson. They are not two characters next to each other. They are a unit.\n\n## The Grief Layer\n\nDavid Homer Wilson, only child of Rosie and Homer, born in 1977, the same year as Sarah. Sent to board at Westminster at 11 because Homer did. Stayed in London for the journalism degree at the University of Westminster, fell in with an arty crowd, descended into drugs and alcohol through his late twenties. Married Lady Sarah Dawson Wilson in 2001. They were both alive but unfit when Alex was small, and Rosie and Homer took over in practice during Alex's first year.\n\nRosie and Homer's marriage held through David's descent. Their love did not waver. They did the work of trying to save him and could not. McQueen's suicide in February 2010 shattered David's last attempt at functionality; his absence became sustained for more than a decade. By story open David is about three years sober, reconnected with Alex, back at the edge of the family, and still fragile.\n\nThen they raised Alex with the lessons David taught them:\n\n- day boy at Westminster, not boarder\n- family relocated to Albury House from 2014 so Alex was not alone in London at 11\n- moved back to Phoenix Hollow when Alex was 16 and had his own life and friend group, deliberately not sending him through the same isolation that broke David\n- two months at Villa Serena every summer as a three-person family, every year of his childhood\n- Alex calls them Mama and Papa, not Grandma and Grandpa. They are his parents. The grandparent framing is a public technicality.\n\nThe grief is not a footnote. It is the ground their parenting stands on. Sarah's name in the room with Alex is complicated because she came back first and stayed sober. David's name is more fragile because the return is newer. Neither is taboo. Both are handled with care.\n\n## Voice Notes — Rosie\n\nHow she actually sounds:\n\n- Kentucky cadence, not performed but real. \"Honey\" is a noun she uses for everyone she likes; \"sweetheart\" is reserved.\n- Slow takes. Will let a question sit for ten seconds before answering, then answer in one sentence.\n- Dry. The funniest person in the room without trying.\n- Will swear specifically and effectively. Doesn't swear constantly. When she says *fuck* she means it.\n- Texts in full sentences. Doesn't use emojis. Sometimes uses periods like a verdict.\n- Calls Homer *Homer* in front of strangers, *baby* in front of family, and a couple of unprintable things in private.\n- Calls Alex *honey* in passing, *baby* in scenes that matter, and his full name only when the room needs to be still.\n- Does not over-explain. Will say \"I don't think so\" once and not justify it.\n\nWhat she does not sound like: warm-grandmother template, Southern-belle accent, country-matriarch wisdom, folksy aphorisms, \"sweetie pie.\"\n\n## Voice Notes — Homer\n\nHow he actually sounds:\n\n- British, educated, but not RP-newsreader. The studio has worn the polish off.\n- Direct. Short sentences. Verdict-first, explanation if asked.\n- Filthy when relaxed. Won't be in front of staff or strangers, will be in front of family and old peers.\n- Calls Rosie *Rose* always, never *Rosie*. He is the only person who does.\n- Calls Alex *Alex* and very occasionally *son*. Means it both times.\n- Studio voice is different from domestic voice. In the studio he is faster, more clipped, more technical.\n- Quotes engineers, not philosophers. Will reference a specific 1972 vocal take or a specific 1985 mix as shorthand.\n- Old-world manners with strangers — gracious, contained, courteous. Drops it entirely with the inner circle.\n\nWhat he does not sound like: wise-old-man pronouncements, gentle grandfather, generic British politeness, music-lecture mode.\n\n## Specific Opinions\n\nRosie has opinions. Some of them:\n\n- Taylor Swift: respects the songwriting, distrusts the apparatus around her.\n- Modern country: not interested. She is not country.\n- Streaming algorithms: contempt. The records that matter never trended.\n- Other people's children in her kitchen: limited patience after the third hour.\n- Performative grief: cannot stand it. Does not perform her own.\n- Apple Martin: practically her granddaughter; not Alex's sister.\n\nHomer has opinions. Some of them:\n\n- AutoTune as a creative tool: fine. AutoTune as a fix for poor singing: contempt.\n- Modern mixing: too loud, too compressed, too clean.\n- The Beatles: refuses to rank them; will say specific things about specific takes.\n- Producers who promote themselves: tedious. The work is the credential.\n- Alex's playing: rarely complimentary out loud. Praise is \"do that again\" or silence.\n- The royal family socially: warm with most, allergic to performance with any.\n\nBoth share an opinion on the music industry as a press machine: it is largely fake and they decided fifty years ago not to participate in the fake parts.\n\n## What They Are Not\n\n- not warm grandparents from American TV\n- not retired legends who watch from the porch\n- not finished working\n- not interchangeable presences — Rosie and Homer have distinct voices and distinct opinions and one should never be folded into the other\n- not folksy\n- not Country\n- not delicate or fragile or near death — both fit, both working, both deliberately reducing scope by choice\n- not exclusively Alex's emotional support; they have their own marriage, their own work, their own grief, their own opinions about the room\n- not unaware of fame; they have lived inside the most concentrated version of it for sixty years and have decided what they will and will not do\n- not impressed by the godfamily circle; the godfamily circle is impressed by them\n\n## Music Scene Rules\n\nDo:\n\n- write sound specifically\n- make instruments physically present\n- use music as privacy, inheritance, or choice\n- let Alex have technical intelligence\n- keep RAM cross-genre\n- use the degree wording from `33_ALEX_RECITAL_AND_RAM.md` when precision matters\n- write Rosie and Homer as a unit when they appear together; they finish each other's references\n\nDo not:\n\n- write \"played beautifully\" and move on\n- turn Alex into prestige-classical-only\n- create recordings/releases/deals\n- make every musical moment about Rosie/Homer\n- default to country/bluegrass texture\n- collapse Rosie into warm-grandmother register\n- collapse Homer into wise-old-engineer register\n- write either of them without the other in the back of the file's mind\n"},{"file":"23_HATFIELD_ASSETS_DETAIL.md","content":"# Hatfield And Assets Detail\n\nUse this file when scenes touch Hatfield products, venues, family business, Alex's collection, birthday objects, or wealth/assets.\n\n## Hatfield Core\n\nHatfield Group is a real operating business majority-owned by Walker Holdings.\n\nIt is not a celebrity vanity brand.\n\nThe Hatfield family are not Alex's blood relatives. They remained in production leadership/staff after Walker Holdings ownership.\n\nCarolyn Hatfield-Moore is Master Distiller and a warm professional contact. She is not kin.\n\n## Hatfield Scale\n\nHatfield Group includes:\n\n- bourbon distillery\n- Bar & Grill locations\n- boutique inns\n- The Stave private members' club network\n- Still House fine dining\n- Hatfield Wines\n- Limestone Springs premium beverages\n- Hatfield Scotland\n- licensing / provisions / merchandise\n\nUse Hatfield only when story-relevant.\n\n## Alex And Hatfield\n\nAlex knows Hatfield as family-business adjacency:\n\n- Lexington Bar & Grill is familiar from childhood\n- he knows Hatfield Single Barrel\n- he recognises Hatfield bourbon, Limestone Springs, wines, Stave, Inns, Still House markers\n- he knows Carolyn Hatfield-Moore\n- he does not run Hatfield\n- he has no management role or operational input\n\nProduct-photo rule: if Hatfield products appear in Alex's photo, the public reads family-business adjacency immediately. It is not a new endorsement by default.\n\n## Limestone Springs\n\nLimestone Springs is not just bottled water. It is a premium soda, tonic, mixer, sparkling-water, and craft-soda company at Fever-Tree-like scale, with global distribution.\n\n## Alex's Collection\n\nAlex's important assets/collection objects are held through AW Holdings/AW Assets where appropriate.\n\nMajor categories:\n\n- archive fashion\n- art\n- books\n- vinyl\n- jewellery\n- watches\n- properties\n- bourbon barrel/birthday assets\n\nUse objects as story tools, not luxury inventory.\n\n## Key Fashion / Object Anchors\n\n- Alexander McQueen 1992 CSM frock coat from David via McQueen: Alex's most significant material connection to David.\n- McQueen / Sarabande / Stella / Donatella objects carry Sarah/David/fashion-family meaning.\n- Dawson signet from Sarah's Dawson-side family provision is one of Alex's most personal daily objects.\n- Diana emerald signet from William is deeply loaded and not worn automatically.\n- Donatella's Gianni-archive dressing gown has a private Hessian inscription and remains private.\n\n## 22nd Birthday Objects\n\nLoaded objects from 22 June 2025 include:\n\n- David's University of Westminster journalism notebooks\n- Sarah's CSM sketchbook and unfinished panel\n- Diana emerald signet from William\n- Gianni-archive dressing gown from Donatella\n- Apple photo book\n- Elton's vintage Hessian Order miniature\n- Beyonce's McQueen jacket\n- Paul McCartney lyric sheet\n- Stevie shawl\n- Dolly Hatfield barrel stave\n- David Gilmour U47 microphone\n- Brandi birthday song lead sheet\n- Dawson cufflinks\n- Continental cousinage small objects\n\nDo not make private gifts public unless Ryan plays it.\n\n## Do Not\n\n- Do not make Hatfields Alex's relatives.\n- Do not use \"Granddad Hatfield.\"\n- Do not treat Hatfield as generic bourbon props.\n- Do not make private birthday objects public evidence.\n- Do not auto-place loaded jewellery/clothes on Alex.\n- Do not turn assets into storyless flexing.\n"},{"file":"24_NAMES_AND_ROSTERS.md","content":"# Names And Rosters\n\nUse this file when Claude needs names without inventing placeholder people.\n\n## Rule\n\nUse named people only when this file gives them or Ryan supplies them. Seed names are anchors, not roster ceilings.\n\nVery few social groups are Alex-focused. Alex is famous and gravitational, but most rooms are reciprocal, pre-existing, or multi-centred. Do not turn friends into Alex's court, fan club, handler set, or support cast.\n\n## Brain Trust\n\nMutual closest-friend group that includes Alex. Closed membership unless Ryan explicitly changes it. Legacy people around Alex's age, give or take a year or two, whose parents all know either Rosie or Sarah/David and who have been in each other's lives closely since birth or very early childhood:\n\n- Apple Martin\n- Iris Law\n- Lila Moss\n- Kaia Gerber\n- Rocco Ritchie\n\nAge rhythm: Iris and Rocco were born in 2000, Kaia in 2001, Lila in 2002, Alex in 2003, Apple in 2004. Apple is at Vanderbilt in Nashville; classes start 26 August, so she is available for the 2025 Villa Serena summer and the 5 August return. The others are working as models, artists, stylists, or adjacent creative/public figures rather than students.\n\nThey are not handlers, staff, strategists, siblings, automatic romance, or an Alex-response unit. They are the intimate peer layer under London Lot, Summer House, and Legacy, but everyone in the group has their own life, status, jokes, crushes, crises, and family weather. Do not add other close legacy friends into Brain Trust by default. The wider Legacy room explains the broader field of famous children/grandchildren; Brain Trust is the smaller reciprocal group that, for personal reasons and old-family overlap, latched onto each other.\n\n## Boys\n\nClosest male-friend chat from Alex's point of view, but still a mutual peer group rather than an Alex-focused channel. Closed membership unless Ryan explicitly changes it:\n\n- Jonathan Dawson (maternal cousin; Fletching heir after Henry; Westminster era)\n- Lucas Ashby (maternal cousin, same birth year; Caroline's son; Westminster/London era)\n- Freddie Ashworth (close orbit; Westminster era)\n- Hugo Manners (close orbit; Westminster era)\n- Rocco Ritchie (Brain Trust crossover; Madonna/Guy Ritchie)\n\nRegister: brutal affection, school shorthand, no operational knowledge. Not to be confused with Brain Trust. Members know public facts about Alex, and by the 7 August opening Boys have been over to Albury plus can see the AD/Youtube public reveal. They still do not know Se
